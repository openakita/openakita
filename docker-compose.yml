# MVP 本地开发环境 - Docker Compose
# 用途：一键启动完整开发环境（应用 + 数据库 + 缓存 + 向量库）
# 使用：docker-compose up -d

version: '3.8'

services:
  # ── 应用服务 ──
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: openakita-app
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/openakita
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: >
      bash -c "python -m uvicorn src.openakita.api.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - openakita-net
    restart: unless-stopped

  # ── Celery Worker ──
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: openakita-celery
    environment:
      - ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/openakita
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      - app
      - redis
    command: >
      bash -c "celery -A src.openakita.core.celery_app worker --loglevel=info"
    networks:
      - openakita-net
    restart: unless-stopped

  # ── PostgreSQL 数据库 ──
  db:
    image: postgres:15-alpine
    container_name: openakita-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=openakita
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openakita-net
    restart: unless-stopped

  # ── Redis 缓存 ──
  redis:
    image: redis:7-alpine
    container_name: openakita-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openakita-net
    restart: unless-stopped

  # ── Qdrant 向量数据库 ──
  qdrant:
    image: qdrant/qdrant:latest
    container_name: openakita-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openakita-net
    restart: unless-stopped

  # ── Prometheus 监控 ──
  prometheus:
    image: prom/prometheus:latest
    container_name: openakita-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - openakita-net
    restart: unless-stopped

  # ── Grafana 可视化 ──
  grafana:
    image: grafana/grafana:latest
    container_name: openakita-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - openakita-net
    restart: unless-stopped

  # ── Loki 日志聚合 ──
  loki:
    image: grafana/loki:latest
    container_name: openakita-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - openakita-net
    restart: unless-stopped

  # ── Nginx 反向代理（可选） ──
  nginx:
    image: nginx:alpine
    container_name: openakita-nginx
    ports:
      - "80:80"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - openakita-net
    restart: unless-stopped
    profiles:
      - with-proxy

networks:
  openakita-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  prometheus-data:
  grafana-data:
  loki-data:
