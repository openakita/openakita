services:
  openakita:
    # 构建上下文指向项目根目录
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: openakita
    restart: unless-stopped
    # 运行时工作区：配置、数据、日志都放在独立可写目录
    volumes:
      - ./data:/workspace/data
      - ./identity:/workspace/identity
      - ./logs:/workspace/logs
    # 端口映射
    ports:
      - "18900:18900"
    # 环境变量
    environment:
      - API_HOST=0.0.0.0
      - PROJECT_ROOT=/workspace
      - OPENAKITA_WEB_PASSWORD=your_password_here
