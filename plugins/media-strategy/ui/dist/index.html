<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>融媒智策 · Media Strategy</title>
  <!-- Self-contained plugin UI. Assets are owned by this plugin; no /api/plugins/_sdk dependency. -->
  <script src="_assets/bootstrap.js"></script>
  <link rel="stylesheet" href="_assets/styles.css">
  <script src="_assets/icons.js"></script>
  <script src="_assets/i18n.js"></script>
  <script src="_assets/markdown-mini.js"></script>
  <style>
    :root {
      --bg:#f8fafc; --bg-card:#fff; --bg-hover:#f0fdfa;
      --text:#0f172a; --text-muted:#475569; --text-dim:#64748b;
      --primary:#0F766E; --primary-hover:#0D9488; --primary-soft:#CCFBF1;
      --success:#16a34a; --warning:#d97706; --danger:#dc2626;
      --border:#cbd5e1; --radius:10px;
    }
    [data-theme="dark"] {
      --bg:#0f172a; --bg-card:#1e293b; --bg-hover:#134e4a;
      --text:#f8fafc; --text-muted:#cbd5e1; --text-dim:#94a3b8;
      --primary:#2DD4BF; --primary-hover:#5EEAD4; --primary-soft:#134e4a;
      --border:#334155;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg:#0f172a; --bg-card:#1e293b; --bg-hover:#134e4a;
        --text:#f8fafc; --text-muted:#cbd5e1; --text-dim:#94a3b8;
        --primary:#2DD4BF; --primary-hover:#5EEAD4; --primary-soft:#134e4a;
        --border:#334155;
      }
    }
    body { background:var(--bg); color:var(--text); line-height:1.5; -webkit-font-smoothing:antialiased; }
    .app { min-height:100%; display:flex; flex-direction:column; }
    .header { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; background:var(--bg-card); border-bottom:1px solid var(--border); }
    .oa-hero-title { display:flex; align-items:center; gap:12px; margin:0; font-size:20px; font-weight:700; color:var(--text); }
    .oa-hero-title__icon { width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,#2DD4BF,#0F766E); display:grid; place-items:center; color:#fff; box-shadow:0 8px 22px rgba(15,118,110,.22); }
    .oa-hero-title__icon img { width:32px; height:32px; }
    .oa-hero-title__text { display:flex; flex-direction:column; line-height:1.15; }
    .oa-hero-title__sub { font-size:12px; color:var(--text-muted); font-weight:500; margin-top:4px; }
    .api-pill { display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:999px; border:1px solid var(--border); color:var(--text-muted); font-size:12px; background:var(--bg-card); }
    .api-pill.ok { color:var(--primary); border-color:rgba(15,118,110,.35); background:var(--primary-soft); }
    .tabs { display:flex; gap:4px; padding:0 20px; background:var(--bg-card); border-bottom:1px solid var(--border); }
    .tab { padding:10px 14px; border:0; border-bottom:2px solid transparent; background:transparent; color:var(--text-muted); cursor:pointer; font-size:13px; display:inline-flex; gap:6px; align-items:center; }
    .tab:hover { color:var(--text); background:var(--bg-hover); }
    .tab.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:600; }
    .content { padding:18px 20px; flex:1; overflow:auto; }
    .stack-layout { display:flex; flex-direction:column; gap:12px; }
    .grid { display:grid; grid-template-columns:1.2fr .8fr; gap:14px; align-items:start; }
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:0 1px 2px rgba(15,23,42,.04); }
    .card.grow { min-height:320px; }
    .oa-section-title { display:flex; align-items:center; gap:10px; margin:0 0 12px; font-size:16px; font-weight:650; }
    .oa-section-title::before { content:""; width:4px; height:18px; border-radius:2px; background:var(--primary); }
    .oa-hint { font-size:12px; color:var(--text); line-height:1.6; background:var(--bg-hover); border-left:3px solid var(--primary); padding:8px 12px; border-radius:6px; margin-bottom:10px; }
    .filter-bar { display:flex; flex-wrap:wrap; gap:10px 14px; align-items:center; padding:12px; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-card); }
    .seg-group { display:inline-flex; gap:4px; padding:3px; background:var(--bg-hover); border-radius:8px; }
    .seg-btn { padding:6px 10px; border:1px solid transparent; border-radius:6px; background:transparent; color:var(--text-muted); cursor:pointer; font-size:12px; }
    .seg-btn.active { background:var(--bg-card); color:var(--primary); border-color:var(--border); font-weight:650; }
    .btn { padding:7px 12px; border-radius:7px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); cursor:pointer; font-size:13px; display:inline-flex; gap:6px; align-items:center; }
    .btn:hover { background:var(--bg-hover); }
    .btn-primary { color:#fff; background:var(--primary); border-color:var(--primary); }
    .btn-primary:hover { background:var(--primary-hover); }
    .input { padding:8px 10px; border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); min-width:180px; }
    .item { padding:12px; border:1px solid var(--border); border-radius:9px; margin-bottom:8px; background:var(--bg-card); }
    .item h3 { margin:0 0 6px; font-size:14px; }
    .meta { display:flex; flex-wrap:wrap; gap:6px; color:var(--text-muted); font-size:12px; }
    .pill { display:inline-flex; padding:2px 8px; border-radius:999px; background:var(--bg-hover); border:1px solid var(--border); color:var(--text-muted); font-size:12px; }
    .pill.score { color:var(--primary); border-color:rgba(15,118,110,.35); }
    .pill.high { color:var(--danger); } .pill.medium { color:var(--warning); } .pill.low { color:var(--success); }
    .empty { text-align:center; color:var(--text-muted); padding:28px 12px; font-size:13px; }
    .report { max-height:520px; overflow:auto; color:var(--text); }
    .report h1 { font-size:20px; }.report h2 { font-size:16px; margin-top:18px; }.report p,.report li { font-size:13px; }
    @media (max-width: 900px) { .grid { grid-template-columns:1fr; } .header { align-items:flex-start; gap:10px; flex-direction:column; } }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1 class="oa-hero-title">
      <span class="oa-hero-title__icon"><img src="media-strategy-brand.svg" alt=""></span>
      <span class="oa-hero-title__text">融媒智策 <span class="oa-hero-title__sub">全源融聚・智察热点・策研采编</span></span>
    </h1>
    <span id="health" class="api-pill">健康检查中</span>
  </header>
  <nav class="tabs">
    <button class="tab active" data-tab="radar">雷达</button>
    <button class="tab" data-tab="brief">简报</button>
    <button class="tab" data-tab="plan">策研采编</button>
    <button class="tab" data-tab="settings">设置</button>
  </nav>
  <main class="content">
    <section id="tab-radar" class="stack-layout">
      <div class="filter-bar">
        <span class="pill">Iconify: solar:radar-linear</span>
        <select id="package" class="input">
          <option value="">全部套餐</option><option value="taiwan">台海观察</option><option value="policy">时政政策</option><option value="economy">经济财经</option><option value="world">国际局势</option><option value="tech">科技产业</option><option value="platform">平台热点</option>
        </select>
        <input id="query" class="input" placeholder="关键词，例如 台海 / 政策 / 关税">
        <button id="ingest" class="btn">拉取 RSS</button>
        <button id="radar" class="btn btn-primary">生成热点雷达</button>
      </div>
      <div class="grid">
        <div class="card grow"><h2 class="oa-section-title">热点榜</h2><div id="items" class="empty">暂无数据，先拉取 RSS 或调整时间窗。</div></div>
        <div class="card"><h2 class="oa-section-title">信源复核</h2><div class="oa-hint">所有热点都保留原文链接。对高风险内容，请先复核再进入采编。</div><button id="verify" class="btn btn-primary">为选中热点生成复核清单</button><div id="verifyOut" class="report"></div></div>
      </div>
    </section>
    <section id="tab-brief" class="stack-layout" hidden>
      <div class="card"><h2 class="oa-section-title">融媒简报</h2><div class="oa-hint">适合早报、午报、晚报和专题简报，每条保留来源链接。</div><button id="brief" class="btn btn-primary">生成今日简报</button><div id="briefOut" class="report"></div></div>
    </section>
    <section id="tab-plan" class="stack-layout" hidden>
      <div class="card"><h2 class="oa-section-title">策研采编计划</h2><div class="oa-hint">复刻只复用角度、结构和制作方法，不照搬原文。</div><input id="topic" class="input" placeholder="主题，可留空按选中热点生成"><button id="plan" class="btn btn-primary">生成采访/拍摄/脚本计划</button><div id="planOut" class="report"></div></div>
    </section>
    <section id="tab-settings" class="stack-layout" hidden>
      <div class="card"><h2 class="oa-section-title">订阅与存储</h2><div id="settingsOut" class="report">加载中</div></div>
    </section>
  </main>
</div>
<script>
const API = window.OpenAkitaPlugin.apiBase;
let selected = [];
async function api(path, opts={}) {
  const res = await fetch(API + path, {headers:{'Content-Type':'application/json'}, ...opts});
  const body = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(body.detail || res.statusText);
  return body;
}
function showHealth(ok, text){ const el=document.getElementById('health'); el.textContent=text; el.className='api-pill ' + (ok?'ok':''); }
function renderItems(items){
  selected = items.slice(0, 3).map(x=>x.id);
  const el=document.getElementById('items');
  if(!items.length){ el.className='empty'; el.textContent='暂无热点，先拉取 RSS 或扩大范围。'; return; }
  el.className='';
  el.innerHTML = items.map((it,i)=>`<article class="item">
    <h3><label><input type="checkbox" data-id="${it.id}" ${i<3?'checked':''}> <a href="${it.url}" target="_blank" rel="noreferrer">${it.title}</a></label></h3>
    <div class="meta"><span class="pill score">score ${it.hot_score||0}</span><span class="pill ${it.risk_level||'medium'}">risk ${it.risk_level||'medium'}</span><span>${it.source_id||''}</span><span>${it.published_at||it.fetched_at||''}</span></div>
    <p>${it.ai_summary || it.summary || '无摘要'}</p>
  </article>`).join('');
  el.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.addEventListener('change',()=>{ selected=[...el.querySelectorAll('input:checked')].map(x=>x.dataset.id); }));
}
async function refreshHealth(){ try{ const h=await api('/healthz'); showHealth(true, `运行中 · ${h.version}`); }catch(e){ showHealth(false, '健康检查失败'); } }
async function runRadar(){ const pkg=document.getElementById('package').value; const q=document.getElementById('query').value.trim(); const data=q?await api(`/articles?q=${encodeURIComponent(q)}&package_id=${pkg}`):await api('/tasks',{method:'POST',body:JSON.stringify({mode:'hot_radar',params:{package_id:pkg,since_hours:24,limit:30}})}); renderItems(data.items || data.result?.items || []); }
async function runTask(mode, params, outId){ const out=document.getElementById(outId); out.innerHTML='<p>生成中...</p>'; const data=await api('/tasks',{method:'POST',body:JSON.stringify({mode,params})}); const md=data.result?.report?.markdown || JSON.stringify(data.result,null,2); out.innerHTML=window.MarkdownMini.render(md); }
document.querySelectorAll('.tab').forEach(btn=>btn.onclick=()=>{ document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('main section').forEach(s=>s.hidden=true); document.getElementById('tab-'+btn.dataset.tab).hidden=false; });
document.getElementById('ingest').onclick=async()=>{ await runTask('ingest',{package_ids:[document.getElementById('package').value].filter(Boolean)},'verifyOut'); await runRadar(); };
document.getElementById('radar').onclick=runRadar;
document.getElementById('brief').onclick=()=>runTask('daily_brief',{session:'morning',since_hours:24,limit:20},'briefOut');
document.getElementById('verify').onclick=()=>runTask('verify_pack',{article_ids:selected},'verifyOut');
document.getElementById('plan').onclick=()=>runTask('replicate_plan',{article_ids:selected,topic:document.getElementById('topic').value,target_format:'short_video',tone:'稳健客观'},'planOut');
async function loadSettings(){ const s=await api('/settings'); const pk=await api('/packages'); document.getElementById('settingsOut').innerHTML = `<p>数据目录：${s.host_config.custom_data_dir || '宿主管理目录'}</p>` + Object.values(pk.packages).map(p=>`<p><span class="pill">${p.enabled?'已启用':'未启用'}</span> ${p.label_zh} · ${p.description}</p>`).join(''); }
refreshHealth(); loadSettings().catch(()=>{}); runRadar().catch(()=>{});
</script>
</body>
</html>
