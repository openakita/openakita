<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Fin Pulse">
  <title>Fin Pulse</title>
  <desc>Theme icon using Iconify mdi:finance.</desc>
  <defs>
    <linearGradient id="fp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#150B2E"/>
      <stop offset="0.48" stop-color="#64162E"/>
      <stop offset="1" stop-color="#D32F2F"/>
    </linearGradient>
    <linearGradient id="fp-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF7D6"/>
      <stop offset="0.46" stop-color="#FFB86C"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="fp-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#fp-bg)"/>
  <circle cx="48" cy="15" r="20" fill="#FFD166" opacity="0.18"/>
  <circle cx="12" cy="52" r="18" fill="#7C3AED" opacity="0.18"/>
  <rect x="8" y="8" width="48" height="48" rx="15" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
  <!-- Iconify mdi:finance, scaled from 24px to the 64px app icon canvas. -->
  <g transform="translate(8 8) scale(2)" fill="url(#fp-mark)" filter="url(#fp-glow)">
    <path d="m6 16.5l-3 2.94V11h3m5 3.66l-1.57-1.34L8 14.64V7h3m5 6l-3 3V3h3m2.81 9.81L17 11h5v5l-1.79-1.79L13 21.36l-3.47-3.02L5.75 22H3l6.47-6.34L13 18.64"/>
  </g>
</svg>
