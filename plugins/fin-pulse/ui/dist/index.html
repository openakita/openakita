<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fin Pulse · 财经脉动</title>
  <!--
    Self-contained plugin UI: bootstrap + shared UI Kit inlined under _assets/.
    fin-pulse shares the same UI Kit as avatar-studio / subtitle-craft — the
    five files below are the canonical 5-asset bundle, vendored from
    plugins-archive/_shared/web-uikit/ at build time. React / ReactDOM / Babel
    are loaded from unpkg; everything else is local.
  -->
  <script src="_assets/bootstrap.js"></script>
  <link rel="stylesheet" href="_assets/styles.css">
  <script src="_assets/icons.js"></script>
  <script src="_assets/i18n.js"></script>
  <script src="_assets/markdown-mini.js"></script>
  <link rel="preload" as="script" crossorigin href="https://unpkg.com/react@18/umd/react.production.min.js" />
  <link rel="preload" as="script" crossorigin href="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" />
  <link rel="preload" as="script" href="https://unpkg.com/@babel/standalone/babel.min.js" />
  <style>
    /* ── Theme tokens ──
       Clean white/black base; stock-market red accent (#D32F2F)
       for borders, tab underlines, icons, and button outlines. */
    :root {
      --bg: #FFFFFF; --bg-card: #FFFFFF; --bg-hover: #F7F8FA;
      --text: #1a1a1a; --text-muted: #64748b; --text-dim: #94a3b8;
      --primary: #D32F2F; --primary-hover: #B71C1C;
      --primary-soft: #FFCDD2;
      --success: #16a34a; --warning: #f59e0b; --danger: #ef4444;
      --border: #e2e8f0; --radius: 8px;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --bg-card: #1e293b; --bg-hover: #334155;
      --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
      --border: #334155;
      --primary: #EF5350; --primary-hover: #E53935; --primary-soft: #4a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0f172a; --bg-card: #1e293b; --bg-hover: #334155;
        --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
        --border: #334155;
      }
    }
    /* ── Reset + typography ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    /* ── Layout shell ── */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .tabs {
      display: flex; gap: 4px; padding: 0 18px; border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    .tab {
      padding: 10px 14px; font-size: 13px; cursor: pointer;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      display: inline-flex; align-items: center; gap: 6px;
      transition: color .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
    .content { flex: 1; overflow: auto; padding: 18px 20px; background: var(--bg); display: flex; flex-direction: column; }
    .empty { color: var(--text-muted); font-size: 13px; padding: 32px 12px; text-align: center; }
    /* ── Split layout (left filter + right list) ── */
    .split-layout { display: flex; gap: 16px; height: 100%; }
    /* ── Stack layout (top filter bar + bottom content) ── */
    .stack-layout { display: flex; flex-direction: column; gap: 12px; flex: 1; min-height: 0; }
    .stack-layout > .card.grow { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
    .stack-layout > .card.grow > .card-body { flex: 1; overflow: auto; }
    .stack-layout > .card--compact { flex: 0 0 auto; }
    /* ── Hero title (oa-hero-title) — big gradient brand mark ──
       Matches the avatar-studio hard contract: always explicit --text
       colour, weight 700, size 20px so the Chinese headline stays
       legible on the blush background (previous 18/600 inherited to
       a weak pink rendering on the macaron theme). */
    .oa-hero-title {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 20px; font-weight: 700; color: var(--text);
      letter-spacing: -0.01em; margin: 0;
    }
    .oa-hero-title__icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      /* Container bg is a neutral dark so any 1px SVG seam blends in;
         the inline SVG itself renders its full navy background. */
      background: #0B1526;
      color: #fff; display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(201,21,42,.28), inset 0 0 0 1px rgba(255,255,255,.08);
      position: relative; overflow: hidden;
    }
    .oa-hero-title__icon svg { width: 100%; height: 100%; display: block; }
    .oa-hero-title__text { display: inline-flex; flex-direction: column; line-height: 1.15; color: var(--text); }
    .oa-hero-title__sub { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-top: 4px; letter-spacing: .3px; }
    /* ── Section title with leading accent bar ── */
    .oa-section-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 16px; font-weight: 600; color: var(--text);
      margin-bottom: 12px; line-height: 1.2;
    }
    .oa-section-title::before {
      content: ""; width: 4px; height: 18px; border-radius: 2px;
      background: var(--primary);
      display: inline-block;
    }
    .oa-section-title__count {
      font-size: 12px; font-weight: 500; color: var(--text-muted);
      padding: 2px 8px; border-radius: 999px; background: var(--bg-hover);
    }
    .oa-section-title__actions { margin-left: auto; display: inline-flex; gap: 6px; align-items: center; }
    /* ── Hint text (beginner-friendly description under a title) ── */
    .oa-hint {
      font-size: 12px; color: var(--text); line-height: 1.6;
      background: var(--bg-hover); padding: 8px 12px; border-radius: 6px;
      border-left: 3px solid var(--primary);
      margin-bottom: 10px;
    }
    .oa-hint code {
      background: var(--bg-card); padding: 1px 6px; border-radius: 4px;
      font-size: 11px; color: var(--primary); border: 1px solid var(--border);
    }
    /* ── Segmented button group (active-state aware) ── */
    .seg-group { display: inline-flex; gap: 4px; padding: 3px;
                 background: var(--bg-hover); border-radius: 8px; }
    .seg-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; font-size: 12px; font-weight: 500;
      color: var(--text-muted); background: transparent;
      border: 1px solid transparent; border-radius: 6px; cursor: pointer;
      transition: background .12s, color .12s, box-shadow .12s;
    }
    .seg-btn:hover { color: var(--text); }
    .seg-btn.active {
      color: var(--primary); background: var(--bg-card);
      border-color: var(--border);
      box-shadow: 0 1px 3px rgba(211,47,47,.18);
    }
    /* ── Filter bar (horizontal sticky strip for Today tab) ── */
    .filter-bar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px 16px;
      padding: 12px 14px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius);
    }
    .filter-bar__item { display: inline-flex; align-items: center; gap: 6px; }
    .filter-bar__label { font-size: 12px; color: var(--text); font-weight: 500; }
    .filter-bar__sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
    /* ── Ingest split-button (main action + dropdown for single-source) ── */
    .ingest-split { display: inline-flex; align-items: stretch; position: relative; }
    .ingest-split .btn { border-radius: 0; }
    .ingest-split .btn:first-child { border-top-left-radius: 6px; border-bottom-left-radius: 6px; }
    .ingest-split .btn--caret {
      padding: 0 8px; min-width: 28px; border-left: 1px solid rgba(255,255,255,.32);
      border-top-right-radius: 6px; border-bottom-right-radius: 6px;
    }
    .ingest-split__menu {
      position: absolute; top: calc(100% + 4px); right: 0; z-index: 20;
      min-width: 200px; padding: 6px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.12);
    }
    .ingest-split__menu button {
      display: block; width: 100%; text-align: left;
      padding: 8px 10px; border: none; border-radius: 6px;
      background: transparent; color: var(--text); cursor: pointer; font-size: 13px;
    }
    .ingest-split__menu button:hover { background: rgba(211,47,47,.10); color: var(--primary); }
    .ingest-split__menu button[disabled] { opacity: .5; cursor: not-allowed; }
    /* ── Spinner icon ── */
    @keyframes fp-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .fp-spin { animation: fp-spin 1s linear infinite; transform-origin: 50% 50%; display: inline-block; }
    /* ── Indeterminate progress bar ── */
    @keyframes fp-shimmer {
      0%   { background-position: -200px 0; }
      100% { background-position: 400px 0; }
    }
    .fp-progress {
      height: 3px; border-radius: 2px; overflow: hidden;
      background: linear-gradient(90deg,
        rgba(211,47,47,.08) 0%,
        rgba(211,47,47,.32) 50%,
        rgba(211,47,47,.08) 100%);
      background-size: 400px 100%;
      animation: fp-shimmer 1.4s linear infinite;
    }
    /* ── Ingest result drawer ── */
    .fp-drawer {
      display: flex; flex-direction: column; gap: 10px;
      padding: 12px 14px; border-radius: var(--radius);
      background: var(--bg-card); border: 1px solid var(--border);
    }
    .fp-drawer__head { display: flex; align-items: center; gap: 8px; }
    .fp-drawer__title { font-weight: 600; font-size: 13px; color: var(--text);
                        display: inline-flex; align-items: center; gap: 6px; }
    .fp-drawer__title::before {
      content: ""; width: 3px; height: 14px; background: var(--primary);
      border-radius: 1px; display: inline-block;
    }
    .fp-drawer__spacer { flex: 1; }
    .fp-drawer__summary { font-size: 12px; color: var(--text-muted); }
    .fp-drawer__summary strong { color: var(--text); }
    .fp-drawer__body { display: flex; flex-wrap: wrap; gap: 8px; }
    .fp-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 12px; line-height: 1.4;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text);
    }
    .fp-pill--ok    { background: rgba(34,197,94,.10);  color: #15803D;
                       border-color: rgba(34,197,94,.28); }
    .fp-pill--empty { background: rgba(245,158,11,.10); color: #B45309;
                       border-color: rgba(245,158,11,.30); }
    .fp-pill--error { background: rgba(239,68,68,.10);  color: #B91C1C;
                       border-color: rgba(239,68,68,.32); }
    .fp-pill__via   { font-size: 10px; padding: 1px 6px; border-radius: 6px;
                       background: rgba(0,0,0,.06); color: inherit; font-weight: 500; }
    .fp-pill__sep   { opacity: .5; }
    .fp-pill__btn   { font-size: 11px; cursor: pointer; background: transparent;
                       border: none; color: inherit; text-decoration: underline;
                       padding: 0; margin-left: 2px; }
    .fp-pill__reason { display: inline-flex; align-items: center; gap: 4px;
                       font-size: 11px; opacity: .85; font-style: italic; }
    .fp-drawer__error {
      width: 100%; font-size: 11.5px; color: var(--danger);
      background: rgba(239,68,68,.06); border: 1px dashed rgba(239,68,68,.28);
      border-radius: 6px; padding: 6px 10px; word-break: break-word;
    }
    /* ── Config banner (oa-config-banner) ── */
    .oa-config-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: var(--radius);
      background: rgba(245,158,11,.12); color: var(--warning);
      border: 1px solid rgba(245,158,11,.24);
    }
    .oa-config-banner__icon { display: inline-flex; align-items: center; }
    .oa-config-banner__text { flex: 1; font-size: 13px; color: var(--text); }
    .oa-config-banner__action {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 10px; font-size: 12px;
      border: none; border-radius: 6px; cursor: pointer;
      background: var(--primary); color: #fff;
    }
    .oa-config-banner__action:hover { background: var(--primary-hover); }
    .oa-icon { display: inline-flex; align-items: center; }
    /* ── Code block (terminal-style, with copy button) ── */
    .fp-codeblock { position: relative; border-radius: 6px;
                    background: #1F0F14; color: #FDEEF1;
                    border: 1px solid var(--border);
                    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                    font-size: 12px; overflow: hidden; }
    .fp-codeblock pre { margin: 0; padding: 10px 56px 10px 12px;
                        white-space: pre-wrap; word-break: break-word;
                        line-height: 1.55; color: inherit; background: transparent; }
    .fp-codeblock__copy { position: absolute; top: 6px; right: 6px;
                          padding: 2px 8px; font-size: 11px; }
    /* ── Label bar ── */
    .label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px;
             display: flex; align-items: center; gap: 6px; }
    .label::before {
      content: ""; width: 3px; height: 14px; background: var(--primary);
      border-radius: 1px; display: inline-block;
    }
    /* ── Form inputs (input + invalid tooltip) ── */
    .field-wrap { position: relative; display: block; }
    .input {
      width: 100%; padding: 8px 10px; font-size: 13px;
      color: var(--text); background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius);
      transition: border-color .15s;
    }
    .input:focus { outline: none; border-color: var(--primary); }
    .input.is-invalid { border-color: var(--danger); padding-right: 28px; }
    .field-warn-icon {
      position: absolute; top: 50%; right: 8px; transform: translateY(-50%);
      color: var(--danger); pointer-events: auto; cursor: help;
    }
    .field-warn-tip {
      position: absolute; top: calc(100% + 4px); right: 0;
      padding: 6px 10px; border-radius: 6px;
      font-size: 12px; color: #fff; background: var(--danger);
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity .15s;
      z-index: 10;
    }
    .field-warn-icon:hover + .field-warn-tip,
    .field-warn-tip:hover { opacity: .95; }
    /* ── Cards ── */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
    }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; font-size: 13px; font-weight: 500;
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text); border-radius: var(--radius); cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .btn:hover { background: var(--bg-hover); }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    /* ── API pill (source status) ── */
    .api-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 500;
      background: rgba(22,163,74,.12); color: var(--success);
      cursor: default;
    }
    .api-pill--missing {
      background: rgba(245,158,11,.15); color: var(--warning); cursor: pointer;
    }
    .api-pill--missing:hover { filter: brightness(0.95); }
    /* ── Error panel (used by PluginErrorBoundary) ── */
    .err-panel { border: 1px solid var(--danger); border-radius: var(--radius); padding: 14px; background: rgba(220,38,38,0.08); }
    .err-panel__title { font-weight: 600; color: var(--danger); display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .err-panel__msg { font-size: 12px; color: var(--text); margin-bottom: 8px; word-break: break-word; }
    /* ── Confirm dialog (ConfirmHost / oaConfirm) ── */
    .confirm-mask {
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .confirm-dialog {
      background: var(--bg-card); color: var(--text);
      border-radius: var(--radius); border: 1px solid var(--border);
      padding: 18px; max-width: 360px;
    }
    .confirm-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    /* ── News card ── */
    .news-card {
      padding: 12px 0; border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .news-card:last-child { border-bottom: none; }
    .news-card:hover { background: var(--bg-hover); margin: 0 -14px; padding: 12px 14px; border-radius: var(--radius); }
    .news-card__header {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px;
    }
    .news-card__title {
      font-size: 14px; font-weight: 500; color: var(--text);
      text-decoration: none; display: block; word-break: break-word;
      line-height: 1.5;
    }
    .news-card__title:hover { color: var(--primary); }
    .news-card__summary {
      font-size: 12px; color: var(--text-muted); margin-top: 4px;
      line-height: 1.5; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-card__footer {
      display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap;
    }
    .news-card__time { font-size: 11px; color: var(--text-dim); }
    .news-card__actions { margin-left: auto; display: flex; gap: 4px; align-items: center; }
    .news-card--compact {
      padding: 10px; border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-card); min-width: 0;
    }
    .news-card--compact:hover { border-color: rgba(211,47,47,.28); box-shadow: 0 4px 14px rgba(0,0,0,.05); }
    .news-card--compact .news-card__title {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; min-height: 42px;
    }
    .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
    .news-source-group { margin-bottom: 16px; }
    .news-source-group__head {
      display: flex; align-items: center; gap: 8px; margin: 12px 0 8px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }
    .news-source-group__title { font-size: 13px; font-weight: 600; color: var(--text); }
    .news-source-group__meta { margin-left: auto; font-size: 11px; color: var(--text-muted); }
    /* Source pill — colored by source */
    .source-pill {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 500;
      background: rgba(211,47,47,.08); color: #c62828; white-space: nowrap;
    }
    .source-pill--nn { background: rgba(245,158,11,.10); color: #b45309; }
    .source-pill--rss { background: rgba(16,185,129,.10); color: #047857; }
    .source-pill--direct { background: rgba(59,130,246,.10); color: #1d4ed8; }
    /* Source chip grids (settings + news source rail) */
    .source-chip-grid { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .source-chip-grid--rail {
      flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px;
      scrollbar-width: thin;
    }
    .source-chip {
      display: inline-flex; align-items: center; gap: 6px;
      min-height: 28px; padding: 4px 10px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-card); color: var(--text);
      font-size: 12px; font-weight: 500; cursor: pointer;
      white-space: nowrap; transition: border-color .12s, background .12s, color .12s;
    }
    .source-chip:hover { border-color: var(--primary); }
    .source-chip--on { border-color: rgba(211,47,47,.38); background: rgba(211,47,47,.06); }
    .source-chip--off { opacity: .52; }
    .source-chip--active { border-color: var(--primary); background: rgba(211,47,47,.10); color: var(--primary); }
    .source-chip__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
    .source-chip--on .source-chip__dot,
    .source-chip--active .source-chip__dot { background: var(--primary); }
    .source-chip__type {
      padding: 0 5px; border-radius: 999px; background: var(--bg-hover);
      color: var(--text-muted); font-size: 10px; font-weight: 500;
    }
    .source-panel-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .filter-bar--news { display: flex; flex-direction: column; align-items: stretch; gap: 10px; }
    .filter-bar__row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px 16px; }
    /* Keyword tag */
    .kw-tag {
      display: inline-flex; padding: 1px 6px; border-radius: 4px;
      font-size: 11px; font-weight: 500;
      background: #eff6ff; color: #2563eb;
    }
    [data-theme="dark"] .kw-tag { background: rgba(59,130,246,.15); color: #60a5fa; }
    /* AI score badge — color scales with score */
    .ai-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
    }
    .ai-badge--high { background: rgba(211,47,47,.10); color: #c62828; }
    .ai-badge--mid { background: rgba(245,158,11,.10); color: #b45309; }
    .ai-badge--low { background: var(--bg-hover); color: var(--text-muted); }
    /* Keyword highlight */
    mark.kw-hl { background: #FFF9C4; color: inherit; border-radius: 2px; padding: 0 1px; }
    [data-theme="dark"] mark.kw-hl { background: rgba(255,235,59,.18); }
    /* AI filter dialog overlay */
    .ai-dialog-mask {
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .ai-dialog {
      background: var(--bg-card); color: var(--text);
      border-radius: var(--radius); border: 1px solid var(--border);
      padding: 20px; width: 380px; max-width: 90vw;
    }
    .ai-dialog__title {
      font-size: 15px; font-weight: 600; color: var(--text);
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }
    .ai-dialog__title::before {
      content: ""; width: 3px; height: 16px; background: var(--primary);
      border-radius: 1px; display: inline-block;
    }
    .ai-dialog__field { margin-bottom: 12px; }
    .ai-dialog__label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; }
    .ai-dialog__actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    /* ── Collapsible ── */
    .coll { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; background: var(--bg-card); }
    .coll-head {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; cursor: pointer; user-select: none;
    }
    .coll-head:hover { background: var(--bg-hover); border-radius: var(--radius); }
    .coll-head__arrow {
      display: inline-flex; transition: transform .2s; font-size: 10px;
      color: var(--text-muted);
    }
    .coll--open > .coll-head > .coll-head__arrow { transform: rotate(90deg); }
    .coll-head__title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
    .coll-head__badge {
      font-size: 11px; color: var(--text-muted); background: var(--bg-hover);
      padding: 1px 8px; border-radius: 999px;
    }
    .coll-body { padding: 0 14px 12px; }
    /* ── Source row ── */
    .source-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 0; border-bottom: 1px solid var(--border);
    }
    .source-row:last-child { border-bottom: none; }
    .source-row--disabled { opacity: .5; }
    .source-row__name { font-size: 13px; font-weight: 500; color: var(--text); min-width: 0; }
    .source-row__spacer { flex: 1; min-width: 8px; }
    /* ── Toggle switch ── */
    .switch {
      position: relative; width: 34px; height: 18px; flex-shrink: 0;
      background: var(--border); border-radius: 999px;
      cursor: pointer; transition: background .2s;
    }
    .switch--on { background: var(--primary); }
    .switch__knob {
      position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #fff; transition: left .2s;
    }
    .switch--on .switch__knob { left: 18px; }
    /* ── Content-type pill ── */
    .ct-pill {
      display: inline-flex; align-items: center;
      padding: 1px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 500;
    }
    .ct-pill--flash { background: rgba(239,68,68,.12); color: #dc2626; }
    .ct-pill--news { background: rgba(59,130,246,.12); color: #2563eb; }
    .ct-pill--hot_stock { background: rgba(245,158,11,.12); color: #d97706; }
    .ct-pill--policy { background: rgba(139,92,246,.12); color: #7c3aed; }
    .ct-pill--filing { background: rgba(107,114,128,.12); color: #4b5563; }
    .ct-pill--data { background: rgba(16,185,129,.12); color: #059669; }
    .ct-pill--custom { background: rgba(99,102,241,.12); color: #4f46e5; }
    /* ── Source status dot ── */
    .source-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .source-dot--ok { background: var(--success); }
    .source-dot--err { background: var(--danger); }
    .source-dot--unknown { background: var(--border); }
    /* ── Bing RSS builder ── */
    .bing-builder { padding: 10px 0; }
    .bing-builder__row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .bing-builder__preview {
      font-size: 11px; color: var(--text-muted); word-break: break-all;
      margin-top: 6px; padding: 6px 10px;
      background: var(--bg-hover); border-radius: 6px;
    }
    /* ── Custom source add form ── */
    .custom-add-form { display: flex; flex-direction: column; gap: 8px; padding: 10px 0; }
    .custom-add-form__row { display: flex; gap: 8px; align-items: center; }
    /* ── Section wrapper (vertical-line title) ── */
    .oa-settings-section { margin-bottom: 16px; }
    .oa-settings-section__title {
      font-size: 14px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    }
    .oa-settings-section__title::before {
      content: ""; width: 3px; height: 16px; background: var(--primary);
      border-radius: 1px; display: inline-block;
    }
    /* ── NewsNow status bar ── */
    .nn-status-bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 8px 12px; margin-bottom: 10px;
      background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.2);
      border-radius: var(--radius); font-size: 12px; color: var(--text);
    }
    .nn-status-bar__pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500;
      background: rgba(245,158,11,.15); color: #d97706;
    }
  </style>
  <script>
    /* Apply saved theme before React mounts to avoid a FOUC flash. */
    (function () {
      try {
        var saved = localStorage.getItem('fp-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* no-op */ }
    })();
  </script>

const ICON_ALIAS = {
  /* tabs */

  /* actions */
  play: "arrowRight", save: "download", plus: "arrowRight",

  trash: "close", edit: "edit", history: "listTask", lib: "folder",

  /* schedule-row actions — host icon lib exposes pause/bell/target but we
     keep fallbacks to keep first-render safe. */
  pause: "close", bell: "warning", refresh: "refresh",
};
function Ico(props) {
  const name = props.name || "";
  const lib = window.OpenAkitaIcons;
  if (lib) {
    const key = (typeof lib[name] === "function") ? name
              : (typeof lib[ICON_ALIAS[name]] === "function") ? ICON_ALIAS[name] : "";
    if (key) {
      return <span className="oa-icon" dangerouslySetInnerHTML={{__html: lib[key]()}} />;
    }
  }
  return <span className="oa-icon" aria-hidden="true">·</span>;
}

/* ── Plugin API wrapper ──
   The host bridge (plugin-bridge-host.ts::handleApiRequest) does NOT
   auto-prefix `/api/plugins/<id>/`; it fetches `${apiBase}${path}`
   verbatim. Other plugins (ecommerce-image etc.) prepend the plugin
   base themselves. We do the same so relative plugin paths like
   "/ingest" reach "/api/plugins/fin-pulse/ingest".
   Host Bridge wraps responses as `{ok, status, body: <plugin JSON>}`,
   so we unwrap `body` and carry the transport-level `ok` when the
   JSON body doesn't have it. Outside the iframe (dev direct-URL
   mode) the fetch returns the plugin JSON at the root already. */
const API_BASE_PATH = "/api/plugins/fin-pulse";
function _finPulsePath(path) {
  if (typeof path !== "string") return path;
  if (path.startsWith("http://") || path.startsWith("https://")) return path;
  if (path.startsWith("/api/")) return path;
  return API_BASE_PATH + (path.startsWith("/") ? path : "/" + path);
}
/* FastAPI and some proxies return ``detail`` as a string, an object, or
   a Pydantic ``[{loc,msg,...}]`` array — the toast and ingest error line
   must never degrade to the useless plain word ``unknown``. */
function _stringifyApiDetail(d) {
  if (d == null || d === "") return "";
  if (typeof d === "string") return d;
  if (Array.isArray(d)) {
    return d.map(function (x) {
      if (x && typeof x === "object" && "msg" in x) return String(x.msg);
      return String(x);
    }).join("; ");
  }
  if (typeof d === "object" && d !== null && "msg" in d) {
    return String((d).msg);
  }
  try { return JSON.stringify(d); } catch (_) { return String(d); }
}
/* Unify every host/bridge response shape the iframe can see.

   1) Full transport (preferred): ``{ok, status, body}`` from the
      desktop host's fetch proxy.
   2) Bootstrap timeout: ``{ok:false, error:"timeout"}`` — *no* ``body``
      key, so the old code fell through and ``ingest`` showed
      ``ingest failed: unknown`` (reported 2025-04).
   3) Lean hosts that forward JSON without wrapping — return as-is
      after normalising a top-level ``detail`` string. */
function _normalizeBridgeApiResult(res) {
  if (!res || typeof res !== "object") {
    return { ok: false, detail: "no-response" };
  }
  if (!("body" in res) && ("error" in res || "message" in res)) {
    var err = res.error != null ? res.error : res.message;
    return {
      ok: false,
      detail: _stringifyApiDetail(err) || "bridge_error",
    };
  }
  if ("body" in res && "status" in res) {
    var inner = res.body;
    if (inner == null || typeof inner !== "object" || Array.isArray(inner)) {
      inner = {};
    } else {
      inner = Object.assign({}, inner);
    }
    if (!("ok" in inner)) {
      inner.ok = !!res.ok;
    }
    if (!inner.ok) {
      if (!("detail" in inner) && res.status) {
        inner.detail = "http_" + res.status;
      } else if (!("detail" in inner)) {
        inner.detail = "http_error";
      } else {
        inner.detail = _stringifyApiDetail(inner.detail);
      }
    }
    return inner;
  }
  if ("detail" in res && !("ok" in res)) {
    return Object.assign({ ok: false }, res, {
      detail: _stringifyApiDetail(res.detail),
    });
  }
  return res;
}
async function api(method, path, body) {
  const fullPath = _finPulsePath(path);
  if (window.OpenAkita && typeof window.OpenAkita.api === "function") {
    const res = await window.OpenAkita.api(method, fullPath, body);
    return _normalizeBridgeApiResult(res);
  }
  const resp = await fetch(fullPath, {
    method: method,
    headers: body ? { "Content-Type": "application/json" } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  var json;
  try {
    json = await resp.json();
  } catch (_) {
    return {
      ok: false,
      detail: (resp && resp.status) ? "http_" + resp.status : "empty_body",
    };
  }
  if (json == null) {
    return { ok: false, detail: (resp && resp.status) ? "http_" + resp.status : "empty_body" };
  }
  if (!resp.ok) {
    if (typeof json === "object" && json && "detail" in json) {
      return Object.assign({ ok: false }, json, {
        detail: _stringifyApiDetail(json.detail),
      });
    }
    return { ok: false, detail: (resp && resp.status) ? "http_" + resp.status : "request_failed" };
  }
  return json;
}

/* ── Settings hook (Phase 1 placeholder — Phase 6 hydrates from /config) ── */
function useSettings() {
  /* `available_channels` here holds the host's rich channel entries
     ({channel_id, chat_id, chat_name, ...}) so the Settings / Schedule
     pickers can show the same dropdown as SchedulerView. */
  const [settings, setSettings] = useState({ available_channels: [] });
  const [loaded, setLoaded] = useState(false);
  const refresh = useCallback(async function () {
    const resp = await api("GET", "/scheduler/channels");
    let list = (resp && Array.isArray(resp.channels)) ? resp.channels : [];
    if (!list.length) {
      /* Fallback to the adapter-probe route when the host scheduler
         didn't surface any sessions yet. */
      const fallback = await api("GET", "/available-channels");
      const names = (fallback && fallback.channels) || [];
      list = names.map(function (n) {
        return { channel_id: String(n), chat_id: "", chat_name: "", chat_type: "private" };
      });
    }
    setSettings(function (prev) {
      return Object.assign({}, prev, { available_channels: list });
    });
    setLoaded(true);
  }, []);
  useEffect(function () { refresh().catch(function () { setLoaded(true); }); }, [refresh]);
  return { settings: settings, loaded: loaded, refresh: refresh };
}

/* Build a display label for a channel entry coming from
   `/scheduler/channels`. Prefer `chat_name`; fall back to channel_id. */

  if (!ch || typeof ch !== "object") return String(ch || "");
  const cid = String(ch.channel_id || "");
  const name = String(ch.chat_name || ch.display_name || ch.alias || "");

}

/* ── Ingest drawer helpers + component ───────────────────────────
   The drawer renders the per-source breakdown returned by
   POST /ingest (or POST /ingest/source/{id}). Each pill shows:
   · source display name
   · NewsNow / 直连 / 冷却 / 无结果 badge (the "via" transport)
   · result summary (+{inserted} new · {updated} updated, empty, failed)
   · an expandable error row when the fetcher reported an error.
*/
function _sourceName(sources, id) {
  for (let i = 0; i < sources.length; i++) {

  }

}
function _countNonEmpty(bySource) {

  Object.keys(bySource || {}).forEach(function (k) {
    const row = bySource[k] || {};
    if (!row.error && Number(row.inserted || 0) + Number(row.updated || 0) > 0) n += 1;
  });
  return n;
}
function _pillClass(row) {
  if (row.error || row.error_kind) return "fp-pill fp-pill--error";
  if (Number(row.inserted || 0) + Number(row.updated || 0) > 0) return "fp-pill fp-pill--ok";
  return "fp-pill fp-pill--empty";
}
function _viaKey(row) {
  if (row.error_kind === "rate_limited") return "cooldown";
  const v = String(row.via || "").toLowerCase();
  if (v === "newsnow") return "newsnow";
  if (v === "direct") return "direct";

/* Map the fetcher-side ``via_reason`` string (e.g.
   ``newsnow:cloudflare_blocked``) to a user-facing label.

function _viaReasonLabel(t, raw) {
  const s = String(raw || "").trim();
  if (!s) return "";
  const parts = s.split(":");
  const head = (parts[0] || "").toLowerCase();
  const tail = (parts[1] || "").toLowerCase();
  if (head !== "newsnow") return s;
  const knownKinds = {
    "cloudflare_blocked": "today.drawer.via_reason.newsnow_cloudflare_blocked",
    "invalid_source_id": "today.drawer.via_reason.newsnow_invalid_source_id",
  };
  if (knownKinds[tail]) return t(knownKinds[tail]);
  if (tail.indexOf("http_") === 0) return t("today.drawer.via_reason.newsnow_http");
  if (tail.indexOf("error") === 0) return t("today.drawer.via_reason.newsnow_error");
  return s;
}

function IngestDrawer(props) {

  const summary = props.summary;

        <span className="fp-drawer__summary">

          <strong>{updated}</strong>

          const label = _sourceName(sources, id);
          const ins = Number(row.inserted || 0);
          const upd = Number(row.updated || 0);
          let statusText = "";

          } else if (ins + upd > 0) {

          } else {

                        onClick={function () { setExpandedId(expanded ? "" : id); }}>
                  {expanded ? "−" : "+"} {t("today.drawer.show_error")}
                </button>
              )}
              {expanded && hasError && (
                <div className="fp-drawer__error">
                  <strong>{row.error_kind || "error"}</strong>

}

/* ── Keyword highlight helper ── */
function highlightText(text, keyword) {
  if (!keyword || !text) return text;
  var lower = String(text).toLowerCase();
  var kw = keyword.toLowerCase();
  var idx = lower.indexOf(kw);
  if (idx < 0) return text;
  var parts = [];
  var lastIdx = 0;
  while (idx >= 0) {
    if (idx > lastIdx) parts.push(text.substring(lastIdx, idx));
    parts.push(<mark key={idx} className="kw-hl">{text.substring(idx, idx + kw.length)}</mark>);
    lastIdx = idx + kw.length;
    idx = lower.indexOf(kw, lastIdx);
  }
  if (lastIdx < text.length) parts.push(text.substring(lastIdx));
  return parts;
}

    </div>
  );
}

  var keyword = props.keyword || "";
  var srcDef = props.source || {};
  var score = (typeof it.ai_score === "number") ? it.ai_score.toFixed(1) : "-";
  var srcName = _sourceDisplayName(srcDef) || it.source_id || "";
  var tags = [];

  return (
    <div className="news-card news-card--compact">

}

/* ── Today Tab — live article feed ─────────────────────────────── */
function TodayTab() {
  const t = useT();
  const [items, setItems] = useState([]);
  const [total, setTotal] = useState(0);
  const [loading, setLoading] = useState(false);
  const [filters, setFilters] = useState({ source: "", window: 24, minScore: 0, sort: "time" });
  const [keyword, setKeyword] = useState("");
  const [ingesting, setIngesting] = useState(false);
  const [sources, setSources] = useState([]);
  const [sourceConfig, setSourceConfig] = useState({});
  const [lastIngest, setLastIngest] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [cooldown, setCooldown] = useState(0);
  const [aiFilterOpen, setAiFilterOpen] = useState(false);
  const [aiFilter, setAiFilter] = useState(null);
  const [viewMode, setViewMode] = useState("grouped");

  /* Load sources + config for enabled state */
  useEffect(function () {
    let cancelled = false;
    Promise.all([api("GET", "/sources"), api("GET", "/config")]).then(function (resps) {
      if (cancelled) return;
      var srcResp = resps[0], cfgResp = resps[1];
      if (srcResp && srcResp.ok && Array.isArray(srcResp.items)) {
        var mapped = srcResp.items.map(function (s) {
          return {
            id: String(s.id || ""), name: String(s.display_zh || s.display_en || s.id || ""),
            kind: String(s.kind || ""), content_type: String(s.content_type || "news"),
            group: String(s.group || ""),
            fetcher_id: String(s.fetcher_id || s.id || ""),
            probe_target: String(s.probe_target || s.fetcher_id || s.id || ""),
            default_enabled: !!s.default_enabled
          };
        }).filter(function (s) { return s.id; });
        setSources(mapped);
      }
      if (cfgResp && cfgResp.config) setSourceConfig(cfgResp.config);
    }).catch(function () {});
    return function () { cancelled = true; };
  }, []);

  var enabledSources = sources.filter(function (s) {
    var v = sourceConfig["source." + s.id + ".enabled"];
    if (v === undefined || v === null || v === "") return s.default_enabled;
    return v !== false && v !== "false";
  });

  var sourcesMap = {};
  sources.forEach(function (s) { sourcesMap[s.id] = s; });

  const load = useCallback(async function () {
    setLoading(true);
    try {
      const qs = {
        source_id: filters.source || undefined,
        since: filters.window ? hoursAgoISO(filters.window) : undefined,
        min_score: (aiFilter && aiFilter.minScore > 0) ? aiFilter.minScore : (filters.minScore > 0 ? filters.minScore : undefined),
        sort: filters.sort || "time",
        limit: 200,
      };
      const query = Object.keys(qs)
        .filter(function (k) { return qs[k] !== undefined && qs[k] !== ""; })
        .map(function (k) { return encodeURIComponent(k) + "=" + encodeURIComponent(String(qs[k])); })
        .join("&");
      const resp = await api("GET", "/articles" + (query ? "?" + query : ""));
      if (resp && resp.ok) {
        setItems(resp.items || []);
        setTotal(resp.total || 0);
      } else {
        setItems([]); setTotal(0);
      }
    } finally {
      setLoading(false);
    }
  }, [filters, aiFilter]);

  useEffect(function () { load(); }, [load]);

  /* Cooldown timer */
  useEffect(function () {
    if (cooldown <= 0) return;
    var timer = setTimeout(function () { setCooldown(cooldown - 1); }, 1000);
    return function () { clearTimeout(timer); };
  }, [cooldown]);

  const runIngest = useCallback(async function (opts) {
    const single = !!(opts && opts.sourceId);
    if (ingesting || cooldown > 0) return;
    setIngesting(true);
    setDrawerOpen(true);
    try {
      var src = single ? sourcesMap[opts.sourceId] : null;
      var target = src ? (src.probe_target || src.fetcher_id || src.id) : opts.sourceId;
      const path = single ? ("/ingest/source/" + encodeURIComponent(target)) : "/ingest";
      const body = single ? null : { since_hours: 24 };
      let resp = null;
      try {
        resp = await api("POST", path, body);
      } catch (err) {
        resp = { ok: false, detail: (err && err.message) || String(err) };
      }
      const summary = (resp && resp.summary) || {};
      const totals = summary.totals || {};
      const bySource = summary.by_source || {};
      setLastIngest({
        mode: single ? "single" : "all",
        sourceId: single ? opts.sourceId : null,
        taskId: resp && resp.task_id,
        totals: totals,
        bySource: bySource,
        reason: summary.reason || null,
        ok: !!(resp && resp.ok),
      });
      const inserted = Number(totals.inserted || 0);
      const updated = Number(totals.updated || 0);
      const sourcesOk = Number(totals.sources_ok || 0);
      const sourcesTotal = Number(totals.sources_total || Object.keys(bySource).length || 0);
      const failed = Number(totals.failed_sources || 0);
      let level = "success", msg = "";
      if (summary.reason === "no_sources_enabled") {
        level = "warning";
        msg = t("today.ingest.done.none_enabled");
      } else if (!resp || !resp.ok) {
        level = "error";
        var why = "";
        if (resp) {
          why = _stringifyApiDetail(resp.detail);
          if (!why && typeof resp.error === "string") { why = resp.error; }
          if (!why && typeof resp.message === "string") { why = resp.message; }
        }
        msg = "ingest failed: " + (why || "unknown");
      } else if (inserted + updated > 0) {
        level = "success";
        msg = tfmt(t("today.ingest.done.green"), {
          inserted: inserted, updated: updated,
          sourcesOk: sourcesOk, sourcesTotal: sourcesTotal });
      } else {
        level = "warning";
        msg = tfmt(t("today.ingest.done.amber"), {
          sourcesOk: sourcesOk, failed: failed,
          empty: Math.max(0, sourcesTotal - sourcesOk - failed) });
      }
      window.oaToast({ level: level, message: msg });
      setCooldown(30);
      load();
    } finally { setIngesting(false); }
  }, [ingesting, cooldown, load, t, sourcesMap]);

  const onIngestAll = useCallback(function () {
    setMenuOpen(false);
    runIngest({});
  }, [runIngest]);

  const onIngestCurrent = useCallback(function () {
    setMenuOpen(false);
    if (!filters.source) return;
    runIngest({ sourceId: filters.source });
  }, [runIngest, filters.source]);

  const onDismissDrawer = useCallback(function () { setDrawerOpen(false); }, []);

  /* AI filter keyword matching (front-end) */
  var aiKeywordTokens = [];
  if (aiFilter && aiFilter.keywords) {
    aiFilter.keywords.split("\n").forEach(function (line) {
      line = line.trim();
      if (!line) return;
      if (line.startsWith("!")) return;
      var word = line.replace(/^[+]/, "").trim();
      if (word) aiKeywordTokens.push(word.toLowerCase());
    });
  }
  var aiExcludeTokens = [];
  if (aiFilter && aiFilter.keywords) {
    aiFilter.keywords.split("\n").forEach(function (line) {
      line = line.trim();
      if (line.startsWith("!")) {
        var w = line.substring(1).trim();
        if (w) aiExcludeTokens.push(w.toLowerCase());
      }
    });
  }

  /* Filter items by keyword + AI filter */
  var displayItems = items;
  if (keyword) {
    var kw = keyword.toLowerCase();
    displayItems = displayItems.filter(function (it) {
      return (it.title && it.title.toLowerCase().indexOf(kw) >= 0) ||
             (it.summary && it.summary.toLowerCase().indexOf(kw) >= 0);
    });
  }
  if (aiKeywordTokens.length) {
    displayItems = displayItems.filter(function (it) {
      var text = ((it.title || "") + " " + (it.summary || "")).toLowerCase();
      return aiKeywordTokens.some(function (tok) { return text.indexOf(tok) >= 0; });
    });
  }
  if (aiExcludeTokens.length) {
    displayItems = displayItems.filter(function (it) {
      var text = ((it.title || "") + " " + (it.summary || "")).toLowerCase();
      return !aiExcludeTokens.some(function (tok) { return text.indexOf(tok) >= 0; });
    });
  }
  if (aiFilter && aiFilter.sentiment && aiFilter.sentiment !== "all") {
    displayItems = displayItems.filter(function (it) {
      return it.sentiment === aiFilter.sentiment;
    });
  }
  var groupedItems = {};
  displayItems.forEach(function (it) {
    var sid = it.source_id || "unknown";
    if (!groupedItems[sid]) groupedItems[sid] = [];
    groupedItems[sid].push(it);
  });
  var groupedSourceIds = Object.keys(groupedItems).sort(function (a, b) {
    return groupedItems[b].length - groupedItems[a].length;
  });

  var onApplyAiFilter = useCallback(function (f) {
    setAiFilter(f);
    setAiFilterOpen(false);
    if (f.minScore > 0) {
      setFilters(function (prev) { return Object.assign({}, prev, {minScore: f.minScore}); });
    }
  }, []);

  var onExport = useCallback(function () {
    exportHtmlReport(displayItems, sourcesMap, Object.assign({}, filters, {keyword: keyword}), t);
    window.oaToast({level: "success", message: t("today.export.done")});
  }, [displayItems, sourcesMap, filters, keyword, t]);

  return (
    <div className="stack-layout">
      {/* Filter bar */}
      <div className="filter-bar filter-bar--news">
        <div className="source-chip-grid source-chip-grid--rail">
          <SourceChip
            source={{display_zh: t("today.filters.source.all"), content_type: "all"}}
            enabled={true}
            active={!filters.source}
            showType={false}
            onClick={function () { setFilters(Object.assign({}, filters, {source: ""})); }}
          />
          {enabledSources.map(function (s) {
            return (
              <SourceChip
                key={s.id}
                source={s}
                enabled={true}
                active={filters.source === s.id}
                onClick={function () { setFilters(Object.assign({}, filters, {source: filters.source === s.id ? "" : s.id})); }}
              />
            );
          })}
        </div>
        <div className="filter-bar__row">
          <div className="filter-bar__item">
            <span className="filter-bar__label">{t("today.filters.window")}</span>
            <div className="seg-group">
              {[{h:6,k:"6h"},{h:24,k:"24h"},{h:72,k:"72h"}].map(function (w) {
                const active = filters.window === w.h;
                return <button key={w.h} type="button"
                               className={"seg-btn " + (active ? "active" : "")}
                               onClick={function () { setFilters(Object.assign({}, filters, {window: w.h})); }}>
                  {t("today.filters.window." + w.k)}
                </button>;
              })}
            </div>
          </div>
          <span className="filter-bar__sep"/>
          <div className="filter-bar__item">
            <input className="input" type="text" style={{width: 190, padding: "6px 10px"}}
                   placeholder={t("today.filters.keyword.placeholder")}
                   value={keyword}
                   onChange={function (e) { setKeyword(e.target.value); }}/>
          </div>
          <button className={"btn btn-sm" + (aiFilter ? " btn-primary" : "")} type="button"
                  onClick={function () { setAiFilterOpen(true); }}
                  title={aiFilter ? t("today.filters.ai.active") : ""}>
            <Ico name="ai"/> {t("today.filters.ai")}
          </button>
          <div className="filter-bar__item">
            <span className="filter-bar__label">{t("today.filters.sortLabel")}</span>
            <div className="seg-group">
              {[{k:"time"},{k:"score"}].map(function (s) {
                const active = filters.sort === s.k;
                return <button key={s.k} type="button"
                               className={"seg-btn " + (active ? "active" : "")}
                               onClick={function () { setFilters(Object.assign({}, filters, {sort: s.k})); }}>
                  {t("today.filters.sort." + s.k)}
                </button>;
              })}
            </div>
          </div>
          <div className="filter-bar__item">
            <span className="filter-bar__label">{t("today.filters.view")}</span>
            <div className="seg-group">
              {["grouped", "timeline"].map(function (mode) {
                return <button key={mode} type="button"
                               className={"seg-btn " + (viewMode === mode ? "active" : "")}
                               onClick={function () { setViewMode(mode); }}>
                  {t("today.filters.view." + mode)}
                </button>;
              })}
            </div>
          </div>
          <span style={{flex: 1}}/>
          <button className="btn btn-sm" type="button"
                  onClick={function () { setFilters({source: "", window: 24, minScore: 0, sort: "time"}); setKeyword(""); setAiFilter(null); }}>
            <Ico name="refresh"/> {t("today.filters.reset")}
          </button>
          <button className="btn btn-sm" type="button" onClick={onExport} title={t("today.export.title")}>
            <Ico name="save"/> {t("today.export")}
          </button>
          <span className="ingest-split">
            <button className="btn btn-primary" type="button"
                    disabled={ingesting || cooldown > 0}
                    aria-busy={ingesting ? "true" : "false"}
                    onClick={onIngestAll}>
              {ingesting
                ? <span className="fp-spin"><Ico name="refresh"/></span>
                : <Ico name="play"/>}
              {" "}
              {ingesting ? t("today.ingest.busy") : cooldown > 0 ? tfmt(t("today.ingest.cooldown"), {s: cooldown}) : t("today.list.ingest.all")}
            </button>
            <button className="btn btn-primary btn--caret" type="button"
                    disabled={ingesting || cooldown > 0}
                    title={t("today.list.ingest.more")}
                    onClick={function () { setMenuOpen(!menuOpen); }}>
              <span style={{fontSize: 10}}>▾</span>
            </button>
            {menuOpen && (
              <div className="ingest-split__menu"
                   onMouseLeave={function () { setMenuOpen(false); }}>
                {enabledSources.map(function (s) {
                  return (
                    <button key={s.id} type="button"
                            disabled={ingesting || cooldown > 0}
                            onClick={function () { setMenuOpen(false); runIngest({sourceId: s.id}); }}>
                      {s.name}
                    </button>
                  );
                })}
              </div>
            )}
          </span>
        </div>
      </div>

      {/* AI filter active indicator */}
      {aiFilter && (
        <div style={{display: "flex", alignItems: "center", gap: 8, padding: "4px 0"}}>
          <span className="api-pill" style={{background: "rgba(211,47,47,.10)", color: "var(--primary)"}}>
            <Ico name="ai"/> {t("today.filters.ai.active")}
          </span>
          <button className="btn btn-sm" onClick={function () { setAiFilter(null); }}>
            {t("today.filters.ai.clear")}
          </button>
        </div>
      )}

      {ingesting && <div className="fp-progress" aria-hidden="true"/>}

      {drawerOpen && lastIngest && (
        <IngestDrawer summary={lastIngest} sources={sources.map(function (s) { return {id: s.id, name: s.name}; })}
                      onDismiss={onDismissDrawer} />
      )}

      {/* News list */}
      <div className="card grow">
        <div className="oa-section-title">
          {t("today.list.title")}
          <span className="oa-section-title__count">{displayItems.length}{total > displayItems.length ? " / " + total : ""}</span>
          <span className="oa-section-title__actions">
            <button className="btn btn-sm" type="button" onClick={load}>
              <Ico name="refresh"/> {loading ? t("today.list.loading") : t("today.list.refresh")}
            </button>
          </span>
        </div>
        <div className="card-body">
          {loading && items.length === 0 && <div className="empty">{t("today.list.loading")}</div>}
          {!loading && displayItems.length === 0 && <div className="empty">{t("today.list.empty")}</div>}
          {viewMode === "grouped" ? (
            groupedSourceIds.map(function (sid) {
              var groupItems = groupedItems[sid] || [];
              var srcDef = sourcesMap[sid] || {id: sid, name: sid, content_type: ""};
              return (
                <div key={sid} className="news-source-group">
                  <div className="news-source-group__head">
                    <span className={_sourcePillClass(srcDef)}>{_sourceDisplayName(srcDef) || sid}</span>
                    {srcDef.content_type && <ContentTypePill type={srcDef.content_type}/>}
                    <span className="oa-section-title__count">{groupItems.length}</span>
                    <span className="news-source-group__meta">{groupItems[0] ? fmtDate(groupItems[0].fetched_at) : ""}</span>
                  </div>
                  <div className="news-grid">
                    {groupItems.map(function (it) {
                      return <NewsCardCompact key={it.id} item={it} source={srcDef} keyword={keyword}/>;
                    })}
                  </div>
                </div>
              );
            })
          ) : (
            <div className="news-grid">
              {displayItems.map(function (it) {
                return <NewsCardCompact key={it.id} item={it} source={sourcesMap[it.source_id]} keyword={keyword}/>;
              })}
            </div>
          )}
        </div>
      </div>

      {/* AI Filter Dialog */}
      {aiFilterOpen && (
        <AIFilterDialog
          initialMinScore={aiFilter ? aiFilter.minScore : filters.minScore}
          initialKeywords={aiFilter ? aiFilter.keywords : ""}
          initialSentiment={aiFilter ? aiFilter.sentiment : "all"}
          onApply={onApplyAiFilter}
          onClose={function () { setAiFilterOpen(false); }}
        />
      )}
    </div>
  );
}

/* ── Digests Tab — daily briefs + preview + resend ─────────────── */
function DigestsTab() {
  const t = useT();
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(null);
  const [running, setRunning] = useState("");
  const [channels, setChannels] = useState([]);

  const load = useCallback(async function () {
    setLoading(true);
    try {
      const resp = await api("GET", "/digests?limit=50");
      if (resp && resp.ok) setItems(resp.items || []);
    } finally { setLoading(false); }
  }, []);
  const loadChannels = useCallback(async function () {
    const resp = await api("GET", "/scheduler/channels");
    let list = (resp && Array.isArray(resp.channels)) ? resp.channels : [];
    if (!list.length) {
      const fb = await api("GET", "/available-channels");
      const names = (fb && fb.channels) || [];
      list = names.map(function (n) { return { channel_id: String(n), chat_id: "" }; });
    }
    setChannels(list);
  }, []);
  useEffect(function () { load(); loadChannels(); }, [load, loadChannels]);

  const onRun = useCallback(async function (session) {
    if (running) return;
    setRunning(session);
    try {
      const resp = await api("POST", "/digest/run", {session: session, since_hours: 12, top_k: 20, lang: "zh"});
      window.oaToast({level: resp && resp.ok ? "success" : "error",
        message: resp && resp.ok ? "generated " + session : ("failed: " + (resp && resp.detail || ""))});
      load();
    } finally { setRunning(""); }
  }, [running, load]);

  const onResend = useCallback(async function (digest) {
    if (!channels.length) {
      window.oaToast({level: "warning", message: "no channel registered"});
      return;
    }
    const pick = channels[0] || {};
    const channel = pick.channel_id || "";
    const defaultChatId = pick.chat_id || "";
    const chat_id = window.prompt("chat_id for " + channel + "?", defaultChatId);
    if (!chat_id) return;
    const ok = await window.oaConfirm({
      title: t("digests.resend"),
      message: tfmt(t("digests.resend.confirm"), {channel: channel + ":" + chat_id}),
      okText: t("digests.resend"),
    });
    if (!ok) return;
    const resp = await api("POST", "/dispatch/send", {
      channel: channel, chat_id: chat_id,
      content: digest.markdown_blob || "",
      cooldown_s: 0,
    });
    if (resp && resp.ok) {
      window.oaToast({level: "success", message: t("digests.resend.success")});
    } else {
      window.oaToast({level: "error",
        message: tfmt(t("digests.resend.fail"), {err: (resp && resp.dispatch && resp.dispatch.error) || "unknown"})});
    }
  }, [channels, t]);

  /* Icon + session map — semantic icons, not generic "play" */
  const SESSION_META = {
    morning: {icon: "refresh"},
    noon: {icon: "target"},
    evening: {icon: "bell"},
  };

  return (
    <div className="stack-layout">
      <div className="card grow">
        <div className="oa-section-title">
          {t("digests.title")}
          <span className="oa-section-title__count">{items.length}</span>
          <span className="oa-section-title__actions">
            <div className="seg-group" role="group" aria-label={t("digests.runGroup")}>
              {["morning", "noon", "evening"].map(function (s) {
                const meta = SESSION_META[s] || {icon: "refresh"};
                const active = running === s;
                return <button key={s} type="button"
                               className={"seg-btn " + (active ? "active" : "")}
                               disabled={!!running}
                               title={t("digests.run")}
                               onClick={function () { onRun(s); }}>
                  <Ico name={meta.icon}/> {t("digests.session." + s)}
                </button>;
              })}
            </div>
          </span>
        </div>
        <div className="oa-hint">{t("digests.hint")}</div>

        <div className="card-body">
          {loading && items.length === 0 && <div className="empty">{t("today.list.loading")}</div>}
          {!loading && items.length === 0 && <div className="empty">{t("digests.empty")}</div>}
          <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12}}>
            {items.map(function (d) {
              const sMeta = SESSION_META[d.session] || {icon: "refresh"};
              return (
                <div key={d.id}
                     className="card"
                     style={{margin: 0, cursor: "pointer", transition: "box-shadow .12s, transform .12s"}}
                     onMouseEnter={function (e) { e.currentTarget.style.boxShadow = "0 4px 12px rgba(232,106,123,.20)"; }}
                     onMouseLeave={function (e) { e.currentTarget.style.boxShadow = "none"; }}
                     onClick={function () { setSelected(d); }}>
                  <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, color: "var(--text-muted)"}}>
                    <span style={{display: "inline-flex", alignItems: "center", gap: 4, color: "var(--primary)", fontWeight: 500}}>
                      <Ico name={sMeta.icon}/> {t("digests.session." + d.session) || d.session}
                    </span>
                    <span>{fmtDate(d.generated_at)}</span>
                  </div>
                  <div style={{fontSize: 14, fontWeight: 600, marginTop: 8, color: "var(--text)"}}>{d.title || d.session}</div>

              <div className="card-title" style={{margin: 0}}>{selected.title || selected.session}</div>
              <button className="btn btn-sm" onClick={function () { setSelected(null); }}>×</button>

                    style={{flex: 1, width: "100%", minHeight: 400, border: "1px solid var(--border)", borderRadius: 6, background: "#fff"}}/>

/* ── Radar Tab — rule editor + AI suggest + history ──────────── */
const RADAR_TEMPLATE = (
  "+美联储\n" +
  "+降息\n" +
  "!传闻\n" +
  "\n" +
  "+特朗普\n" +
  "+关税\n" +
  "\n" +
  "[GLOBAL_FILTER]\n" +
  "!小道消息\n" +
  "!论坛\n"
);

function RadarTab() {
  const t = useT();
  const [rulesText, setRulesText] = useState("");
  const [hits, setHits] = useState([]);
  const [meta, setMeta] = useState({total: 0, since_hours: 24});
  const [loading, setLoading] = useState(false);
  const [sinceHours, setSinceHours] = useState(24);
  /* AI-suggest modal state */
  const [aiOpen, setAiOpen] = useState(false);
  const [aiDesc, setAiDesc] = useState("");
  const [aiBusy, setAiBusy] = useState(false);
  /* Save-rule naming modal state */
  const [saveOpen, setSaveOpen] = useState(false);
  const [saveName, setSaveName] = useState("");
  /* Rules library (saved presets) */
  const [library, setLibrary] = useState([]);
  const [libOpen, setLibOpen] = useState(false);

  /* Preload stored rules + library */
  const loadLibrary = useCallback(async function () {
    const resp = await api("GET", "/radar/library");
    setLibrary((resp && resp.items) || []);
  }, []);
  useEffect(function () {
    (async function () {
      const resp = await api("GET", "/config");
      if (resp && resp.ok) {
        setRulesText(String((resp.config || {})["radar_rules"] || ""));
      }
    })();
    loadLibrary();
  }, [loadLibrary]);

  const onEvaluate = useCallback(async function () {
    setLoading(true);
    try {
      const resp = await api("POST", "/radar/evaluate", {
        rules_text: rulesText,
        since_hours: sinceHours,
        limit: 100,
      });
      if (resp && resp.ok) {
        setHits(resp.items || resp.hits || []);
        setMeta({total: (resp.items || resp.hits || []).length, since_hours: sinceHours});
      } else {
        setHits([]);
        window.oaToast({level: "error", message: "evaluate failed: " + (resp && resp.detail || "")});
      }
    } finally { setLoading(false); }
  }, [rulesText, sinceHours]);

  const onFillTemplate = useCallback(function () {
    setRulesText(function (prev) {
      if (prev && prev.trim()) {
        return prev.replace(/\s*$/, "\n") + "\n" + RADAR_TEMPLATE;
      }
      return RADAR_TEMPLATE;
    });
    window.oaToast({level: "success", message: t("radar.template.filled")});
  }, [t]);

  const onOpenAi = useCallback(function () {
    setAiDesc("");
    setAiOpen(true);
  }, []);

  const onAiRun = useCallback(async function () {
    if (!aiDesc.trim()) return;
    setAiBusy(true);
    try {
      const resp = await api("POST", "/radar/ai-suggest", {
        description: aiDesc, existing: rulesText, lang: "zh",
      });
      if (resp && resp.ok && resp.rules_text) {
        setRulesText(resp.rules_text);
        setAiOpen(false);
        const src = (resp.source === "brain") ? t("radar.ai.source.brain") : t("radar.ai.source.fallback");
        window.oaToast({level: "success", message: tfmt(t("radar.ai.ok"), {source: src})});
      } else {
        window.oaToast({level: "error",
          message: tfmt(t("radar.ai.fail"), {err: (resp && (resp.message || resp.detail || resp.error)) || "unknown"})});
      }
    } finally { setAiBusy(false); }
  }, [aiDesc, rulesText, t]);

  const onOpenSave = useCallback(function () {
    if (!rulesText.trim()) {
      window.oaToast({level: "warning", message: t("radar.save.empty")});
      return;
    }
    setSaveName("");
    setSaveOpen(true);
  }, [rulesText, t]);

  const onSaveConfirm = useCallback(async function () {
    const name = saveName.trim();
    if (!name) return;
    /* 1) persist as the "current" rule so radar runs pick it up */
    await api("PUT", "/config", {updates: {radar_rules: rulesText}});
    /* 2) also push into the library for future recall */
    const resp = await api("POST", "/radar/library", {name: name, rules_text: rulesText});
    if (resp && resp.ok) {
      window.oaToast({level: "success", message: tfmt(t("radar.save.ok"), {name: name})});
      setSaveOpen(false);
      loadLibrary();
    } else {
      window.oaToast({level: "error",
        message: tfmt(t("radar.save.fail"), {err: (resp && (resp.detail || resp.error)) || "unknown"})});
    }

  const onLoadPreset = useCallback(function (entry) {

  const onDeletePreset = useCallback(async function (entry, e) {

      title: t("radar.history.delete"),
      message: entry.name,
      danger: true,
      okText: t("radar.history.delete"),

    await api("DELETE", "/radar/library/" + encodeURIComponent(entry.name));
    loadLibrary();
  }, [t, loadLibrary]);

  return (
    <div className="stack-layout">

            </button>
            <button className="btn btn-sm" type="button" onClick={onOpenAi} title={t("radar.ai.tooltip")}>
              <Ico name="sparkles"/> {t("radar.ai")}
            </button>
            <div style={{position: "relative"}}>
              <button className="btn btn-sm" type="button"
                      onClick={function () { setLibOpen(function (v) { return !v; }); }}
                      title={t("radar.history.tooltip")}>
                <Ico name="folder"/> {t("radar.history")} · {library.length}
              </button>
              {libOpen && (
                <div style={{position: "absolute", top: "calc(100% + 4px)", right: 0, minWidth: 260, maxHeight: 320, overflow: "auto",

                             boxShadow: "0 6px 16px rgba(0,0,0,.15)", zIndex: 40, padding: 6}}>
                  {library.length === 0 ? (
                    <div className="empty" style={{padding: "12px 8px"}}>{t("radar.history.empty")}</div>
                  ) : (
                    library.map(function (p) {
                      return (
                        <div key={p.name}
                             style={{display: "flex", alignItems: "center", gap: 6, padding: "6px 8px",
                                     borderRadius: 4, cursor: "pointer"}}
                             onMouseEnter={function (e) { e.currentTarget.style.background = "var(--bg-hover)"; }}
                             onMouseLeave={function (e) { e.currentTarget.style.background = "transparent"; }}
                             onClick={function () { onLoadPreset(p); }}>
                          <span style={{flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                                        fontSize: 13, color: "var(--text)"}}>{p.name}</span>
                          <span style={{fontSize: 11, color: "var(--text-muted)"}}>
                            {fmtDate(p.saved_at).slice(5, 16)}
                          </span>
                          <button className="btn btn-sm btn-danger"
                                  style={{padding: "2px 6px", fontSize: 11}}
                                  onClick={function (e) { onDeletePreset(p, e); }}>
                            <Ico name="trash"/>
                          </button>
                        </div>
                      );
                    })
                  )}
                </div>
              )}
            </div>
          </span>
        </div>
        <div className="oa-hint" dangerouslySetInnerHTML={{__html: t("radar.editor.hintHtml")}}/>
        <textarea
          className="input"
          style={{minHeight: 120, maxHeight: 180, resize: "vertical", fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace", fontSize: 12, lineHeight: 1.6}}
          value={rulesText}
          onChange={function (e) { setRulesText(e.target.value); }}
          placeholder={RADAR_TEMPLATE}/>
        <div style={{display: "flex", gap: 8, marginTop: 10, alignItems: "center"}}>
          <span style={{fontSize: 11, color: "var(--text-muted)"}}>{t("radar.window")}</span>
          <select className="input" style={{width: 110, padding: "6px 8px"}}
                  value={sinceHours}
                  onChange={function (e) { setSinceHours(parseInt(e.target.value, 10) || 24); }}>
            <option value={6}>6h</option>
            <option value={24}>24h</option>
            <option value={72}>72h</option>
            <option value={168}>7d</option>
          </select>
          <button className="btn btn-primary" disabled={loading} onClick={onEvaluate}>
            <Ico name="target"/> {loading ? t("radar.evaluate.loading") : t("radar.evaluate")}
          </button>
          <button className="btn" type="button" onClick={onOpenSave}>
            <Ico name="download"/> {t("radar.save.short")}
          </button>
        </div>
      </div>

      {/* Hit preview at the bottom — fills remaining height */}
      <div className="card grow">
        <div className="oa-section-title">
          {t("radar.hits.title")}
          <span className="oa-section-title__count">{meta.total}</span>
          <span style={{fontSize: 11, color: "var(--text-muted)", fontWeight: 400}}>
            {tfmt(t("radar.hits.subtitle"), {since_hours: meta.since_hours})}
          </span>
        </div>
        <div className="card-body">
          {loading && hits.length === 0 && <div className="empty">{t("radar.evaluate.loading")}</div>}
          {!loading && hits.length === 0 && <div className="empty">{t("radar.hits.empty")}</div>}
          {hits.map(function (h) {
            return (
              <div key={h.id || h.url}

                  <span>{fmtDate(h.fetched_at)}</span>

      </div>

      {/* AI-suggest modal */}
      {aiOpen && (
        <div className="confirm-mask" onClick={function () { if (!aiBusy) setAiOpen(false); }}>
          <div className="confirm-dialog" style={{maxWidth: 520, width: "92vw"}}
               onClick={function (e) { e.stopPropagation(); }}>
            <div className="oa-section-title" style={{marginBottom: 8}}>
              <Ico name="sparkles"/> {t("radar.ai.title")}
            </div>
            <div className="oa-hint">{t("radar.ai.hint")}</div>
            <textarea className="input" rows={4}
                      placeholder={t("radar.ai.placeholder")}
                      value={aiDesc}
                      onChange={function (e) { setAiDesc(e.target.value); }}/>
            <div className="confirm-actions">
              <button className="btn btn-sm" type="button" disabled={aiBusy}

              <button className="btn btn-sm btn-primary" type="button"

              </button>
            </div>
          </div>
        </div>
      )}

      {/* Save-rule naming modal */}
      {saveOpen && (
        <div className="confirm-mask" onClick={function () { setSaveOpen(false); }}>
          <div className="confirm-dialog" style={{maxWidth: 420, width: "92vw"}}
               onClick={function (e) { e.stopPropagation(); }}>
            <div className="oa-section-title" style={{marginBottom: 8}}>
              <Ico name="download"/> {t("radar.save.title")}
            </div>
            <div style={{fontSize: 12, color: "var(--text-muted)", marginBottom: 8}}>

                <Ico name="download"/> {t("radar.save.confirm")}

      )}
    </div>
  );

/* ── CodeBlock — render preformatted command snippets with a copy
   button. Strips markdown code fences (``` ... ```) and unescapes
   ``\n`` so the NewsNow docker snippet renders as real lines.  */
function CodeBlock(props) {
  const raw = String(props.text || "");
  let cleaned = raw.replace(/\\n/g, "\n");
  cleaned = cleaned.replace(/^\s*>\s?/gm, "");
  cleaned = cleaned.replace(/```[a-zA-Z0-9_-]*\n?/g, "").replace(/```\s*$/g, "");
  cleaned = cleaned.trim();
  const onCopy = function () {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(cleaned);
      } else {
        const ta = document.createElement("textarea");
        ta.value = cleaned;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      window.oaToast({level: "success", message: _i18n.t("ask.copied")});
    } catch (_) {}
  };
  return (
    <div className="fp-codeblock">
      <pre>{cleaned}</pre>
      <button className="btn btn-sm fp-codeblock__copy" type="button" onClick={onCopy}>
        <Ico name="copy"/> Copy
      </button>
    </div>
  );
}

/* ── ScheduleDialog — modal form mirroring the host "新建任务" layout
   (see Image-3 spec) so users can create a fin-pulse scheduled task
   entirely in-plugin. Every submission goes through the fin-pulse
   /schedules route which delegates to the host Agent Scheduler, so the
   underlying rows still live alongside other host-managed schedules —
   we just skip the redirect hand-off. */
const SCHEDULE_TEMPLATES = {
  morning:  {mode: "daily_brief", session: "morning", cron: "0 8 * * *",   since_hours: 12, top_k: 20, name: "fin-pulse morning"},
  noon:     {mode: "daily_brief", session: "noon",    cron: "30 12 * * *", since_hours: 12, top_k: 15, name: "fin-pulse noon"},
  evening:  {mode: "daily_brief", session: "evening", cron: "0 19 * * *",  since_hours: 12, top_k: 20, name: "fin-pulse evening"},
  radar:    {mode: "hot_radar",                       cron: "*/15 * * * *", since_hours: 24, limit: 100, cooldown_s: 600, name: "fin-pulse radar"},
};

function ScheduleDialog(props) {
  const t = useT();
  const tpl = props.template || "morning";
  const preset = SCHEDULE_TEMPLATES[tpl] || SCHEDULE_TEMPLATES.morning;
  const channels = props.channels || [];
  const firstChannel = channels[0] || {};
  const tzDisplay = (function () {
    try { return Intl.DateTimeFormat().resolvedOptions().timeZone || ""; } catch (_) { return ""; }
  })();

  const [form, setForm] = useState({
    name: preset.name,
    cron: preset.cron,
    channel: firstChannel.channel_id || "",
    chat_id: firstChannel.chat_id || "",
    rules_text: tpl === "radar" ? (props.defaultRulesText || "+美联储") : "",
    enabled: true,
  });
  const [submitting, setSubmitting] = useState(false);

  const update = function (key, val) {
    setForm(function (prev) { return Object.assign({}, prev, {[key]: val}); });
  };

  const onChannelChange = function (e) {
    const cid = e.target.value;
    const pick = channels.find(function (c) { return c.channel_id === cid; }) || {};
    setForm(function (prev) {
      return Object.assign({}, prev, {channel: cid, chat_id: pick.chat_id || prev.chat_id});
    });
  };

  const onSubmit = async function () {
    if (submitting) return;
    if (!form.name.trim()) {
      window.oaToast({level: "warning", message: t("settings.schedules.dialog.name")});
      return;
    }
    if (!form.cron.trim()) {
      window.oaToast({level: "warning", message: t("settings.schedules.dialog.cron")});
      return;
    }
    if (!form.channel || !form.chat_id) {
      window.oaToast({level: "warning", message: t("settings.schedules.dialog.no_channel")});
      return;
    }
    setSubmitting(true);
    try {
      const body = {
        mode: preset.mode,
        name: form.name.trim(),
        cron: form.cron.trim(),
        channel: form.channel,
        chat_id: form.chat_id,
        enabled: !!form.enabled,
      };
      if (preset.mode === "daily_brief") {
        body.session = preset.session;
        body.since_hours = preset.since_hours;
        body.top_k = preset.top_k;
        body.lang = "zh";
      } else {
        body.rules_text = form.rules_text || "";
        body.since_hours = preset.since_hours;
        body.limit = preset.limit;
        body.cooldown_s = preset.cooldown_s;
      }
      const resp = await api("POST", "/schedules", body);
      if (resp && resp.ok) {
        window.oaToast({level: "success", message: "scheduled " + (resp.id || "")});
        props.onDone && props.onDone(true);
      } else {
        window.oaToast({level: "error", message: "failed: " + ((resp && resp.detail) || "")});
      }
    } finally { setSubmitting(false); }
  };

  const hasChannels = channels.length > 0;
  const titleLabel = t("settings.schedules.tpl." + tpl);
  const channelLabel = (function () {
    const pick = channels.find(function (c) { return c.channel_id === form.channel; });
    if (!pick) return "—";
    return formatChannelLabel(pick);
  })();
  const previewMsg = tfmt(
    t("settings.schedules.dialog.preview." + tpl),
    {cron: form.cron || preset.cron, channel: channelLabel}
  );
  const typeLabel = preset.mode === "daily_brief"
    ? t("settings.schedules.dialog.type.digest")
