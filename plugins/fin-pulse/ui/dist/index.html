    <div className="confirm-mask" onClick={function () { props.onDone && props.onDone(false); }}>
      <div className="confirm-dialog" style={{maxWidth: 560}} onClick={function (e) { e.stopPropagation(); }}>
        <div className="card-title" style={{marginBottom: 12}}>
          {tfmt(t("settings.schedules.dialog.title"), {template: titleLabel})}
        </div>
        <div style={{display: "flex", flexDirection: "column", gap: 12}}>
          <label style={{display: "flex", flexDirection: "column", gap: 4}}>
            <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.name")}</span>
            <input className="input" value={form.name} onChange={function (e) { update("name", e.target.value); }} placeholder={preset.name}/>
          </label>
          <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10}}>
            <div style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.type")}</span>
              <div className="input" style={{background: "var(--bg-subtle, rgba(0,0,0,.03))", cursor: "not-allowed"}}>{typeLabel}</div>
            </div>
            <div style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.trigger")}</span>
              <div className="input" style={{background: "var(--bg-subtle, rgba(0,0,0,.03))", cursor: "not-allowed"}}>{t("settings.schedules.dialog.trigger.cron")}</div>
            </div>
          </div>
          <label style={{display: "flex", flexDirection: "column", gap: 4}}>
            <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.time")}</span>
            <input className="input" value={form.cron} onChange={function (e) { update("cron", e.target.value); }} placeholder={preset.cron}/>
            <span className="oa-hint" style={{fontSize: 11}}>
              <a href="https://crontab.guru" target="_blank" rel="noreferrer">crontab.guru</a> · {t("settings.schedules.dialog.cron.hint")} · TZ: {tzDisplay || "host"}
            </span>
          </label>
          {preset.mode === "hot_radar" && (
            <label style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.rules")}</span>
              <textarea className="input" rows={3} value={form.rules_text}
                        onChange={function (e) { update("rules_text", e.target.value); }}/>
            </label>
          )}
          <div style={{display: "flex", flexDirection: "column", gap: 4}}>
            <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.content")}</span>
            <div className="oa-hint" style={{fontSize: 12, padding: "8px 10px", background: "var(--bg-subtle, rgba(0,0,0,.03))", borderRadius: 6, color: "var(--text)"}}>
              {previewMsg}
            </div>
          </div>
          <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10}}>
            <label style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.channel")}</span>
              <select className="input" value={form.channel} onChange={onChannelChange} disabled={!hasChannels}>
                <option value="">{hasChannels ? "—" : t("settings.schedules.dialog.no_channel")}</option>
                {channels.map(function (c) {
                  return <option key={c.channel_id + ":" + (c.chat_id || "")} value={c.channel_id}>{formatChannelLabel(c)}</option>;
                })}
              </select>
            </label>
            <label style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.chat_id")}</span>
              <input className="input" value={form.chat_id} onChange={function (e) { update("chat_id", e.target.value); }}/>
            </label>
          </div>
          <label style={{display: "flex", alignItems: "center", gap: 8, userSelect: "none"}}>
            <input type="checkbox" checked={!!form.enabled}
                   onChange={function (e) { update("enabled", e.target.checked); }}/>
            <span style={{fontSize: 13, color: "var(--text)"}}>{t("settings.schedules.dialog.enabled")}</span>
          </label>
        </div>
        <div className="confirm-actions" style={{marginTop: 16}}>
          <button className="btn btn-sm" onClick={function () { props.onDone && props.onDone(false); }}>
            {t("settings.schedules.dialog.cancel")}
          </button>
          <button className="btn btn-sm btn-primary" disabled={submitting || !hasChannels} onClick={onSubmit}>
            {t("settings.schedules.dialog.create")}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Reusable sub-components for the Settings data-source area ──── */

const NEWSNOW_PUBLIC_URL = "https://newsnow.busiyi.world/api/s";
const NEWSNOW_PUBLIC_MIN_INTERVAL_S = 300;

function Collapsible(props) {
  const [open, setOpen] = useState(!!props.defaultOpen);
  return (
    <div className={"coll" + (open ? " coll--open" : "")}>
      <div className="coll-head" onClick={function () { setOpen(!open); }}>
        <span className="coll-head__arrow">▶</span>
        <span className="coll-head__title">{props.title}</span>
        {props.badge != null && <span className="coll-head__badge">{props.badge}</span>}
        {props.extra || null}
      </div>
      {open && <div className="coll-body">{props.children}</div>}
    </div>
  );
}

function ToggleSwitch(props) {
  return (
    <span className={"switch" + (props.on ? " switch--on" : "")}
          onClick={props.onChange}
          title={props.on ? "Enabled" : "Disabled"}>
      <span className="switch__knob"/>
    </span>
  );
}

function ContentTypePill(props) {
  const t = useT();
  var ct = props.type || "news";
  var label = t("settings.sources.ct." + ct) || ct;
  return <span className={"ct-pill ct-pill--" + ct}>{label}</span>;
}

function _sourceDisplayName(s) {
  return (s && (s.display_zh || s.display_en || s.name || s.id)) || "";
}

function _probeSummaryLabel(summary, t) {
  var totals = (summary && summary.totals) || {};
  var fetched = Number(totals.fetched || totals.received || 0);
  var inserted = Number(totals.inserted || 0);
  var updated = Number(totals.updated || 0);
  if (fetched + inserted + updated <= 0) {
    var by = (summary && summary.by_source) || {};
    Object.keys(by).forEach(function (k) {
      var r = by[k] || {};
      fetched += Number(r.fetched || r.received || 0);
      inserted += Number(r.inserted || 0);
      updated += Number(r.updated || 0);
    });
  }
  return tfmt(t("settings.sources.probe.summary"), {
    fetched: fetched,
    inserted: inserted,
    updated: updated,
  });
}

function _parseCustomFeedsFromConfig(cfg) {
  var rawJson = String((cfg && cfg["rss_generic.feeds_json"]) || "").trim();
  if (rawJson) {
    try {
      var parsed = JSON.parse(rawJson);
      if (Array.isArray(parsed)) {
        return parsed.map(function (entry, i) {
          if (typeof entry === "string") return {id: "cf_" + i, url: entry, name: entry, enabled: true};
          return {
            id: String((entry && entry.id) || ("cf_" + i)),
            url: String((entry && entry.url) || ""),
            name: String((entry && entry.name) || (entry && entry.url) || ""),
            enabled: entry && entry.enabled === false ? false : true,
          };
        }).filter(function (f) { return f.url; });
      }
    } catch (_) {}
  }
  var feedsRaw = String((cfg && cfg["rss_generic.feeds"]) || "");
  return feedsRaw.split("\n").map(function (l) { return l.trim(); }).filter(Boolean).map(function (url, i) {
    return {id: "cf_" + i, url: url, name: url.length > 50 ? url.substring(0, 47) + "…" : url, enabled: true};
  });
}

function SourceChip(props) {
  var s = props.source || {};
  var enabled = props.enabled !== false;
  var active = !!props.active;
  var cls = "source-chip " + (enabled ? "source-chip--on" : "source-chip--off") + (active ? " source-chip--active" : "");
  return (
    <button type="button" className={cls} onClick={props.onClick} title={props.title || _sourceDisplayName(s)}>
      <span className="source-chip__dot"/>
      <span>{_sourceDisplayName(s)}</span>
      {props.showType !== false && <span className="source-chip__type">{s.content_type || s.group || s.kind || ""}</span>}
    </button>
  );
}

function SourceRow(props) {
  var s = props.source;
  var t = useT();
  var enabled = props.enabled;
  var probeState = props.probeState;
  var lastError = props.lastError;

  var dotClass = "source-dot source-dot--unknown";
  if (probeState === "ok") dotClass = "source-dot source-dot--ok";
  else if (probeState === "err" || lastError) dotClass = "source-dot source-dot--err";

  return (
    <div className={"source-row" + (enabled ? "" : " source-row--disabled")}>
      <ToggleSwitch on={enabled} onChange={props.onToggle}/>
      <span className="source-row__name">{s.display_zh || s.display_en || s.id}</span>
      <ContentTypePill type={s.content_type}/>
      <span className="source-row__spacer"/>
      <span className={dotClass} title={lastError || (probeState === "ok" ? "OK" : "")}/>
      {props.probeLabel && (
        <span style={{fontSize: 11, color: probeState === "ok" ? "var(--success)" : probeState === "err" ? "var(--danger)" : "var(--text-muted)"}}>
          {props.probeLabel}
        </span>
      )}
      <button className="btn btn-sm"
              disabled={props.probing}
              onClick={props.onProbe}>
        {props.probing ? t("settings.sources.probing") : t("settings.sources.probe")}
      </button>
    </div>
  );
}

/* ── Settings Form ── */

function SettingsForm(props) {
  const t = useT();
  const [config, setConfig] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [channels, setChannels] = useState([]);
  const [schedules, setSchedules] = useState([]);
  const [savingKey, setSavingKey] = useState("");
  const [scheduleDialog, setScheduleDialog] = useState(null);
  const [channelsRefreshing, setChannelsRefreshing] = useState(false);
  const [rowPending, setRowPending] = useState({});

  const [allSources, setAllSources] = useState([]);
  const [probeStates, setProbeStates] = useState({});
  const [probeLabels, setProbeLabels] = useState({});
  const [probingIds, setProbingIds] = useState({});

  const [bingKeywords, setBingKeywords] = useState("");
  const [customFeeds, setCustomFeeds] = useState([]);
  const [addingCustom, setAddingCustom] = useState(false);
  const [newCustomName, setNewCustomName] = useState("");
  const [newCustomUrl, setNewCustomUrl] = useState("");
  const [customProbing, setCustomProbing] = useState({});
  const [customProbeLabels, setCustomProbeLabels] = useState({});

  const reloadAll = useCallback(async function (opts) {
    const silent = !!(opts && opts.silent);
    const [cfg, ch, sched, srcResp] = await Promise.all([
      api("GET", "/config"),
      api("GET", "/scheduler/channels"),
      api("GET", "/schedules"),
      api("GET", "/sources"),
    ]);
    var cfgData = (cfg && cfg.config) || {};
    setConfig(cfgData);
    let list = (ch && Array.isArray(ch.channels)) ? ch.channels : [];
    if (!list.length) {
      const fb = await api("GET", "/available-channels");
      const names = (fb && fb.channels) || [];
      list = names.map(function (n) { return { channel_id: String(n), chat_id: "" }; });
    }
    setChannels(list);
    setSchedules((sched && sched.items) || []);
    if (srcResp && srcResp.ok && Array.isArray(srcResp.items)) {
      setAllSources(srcResp.items);
    }
    setCustomFeeds(_parseCustomFeedsFromConfig(cfgData));
    setLoaded(true);
    if (!silent) return;
  }, []);
  useEffect(function () { reloadAll(); }, [reloadAll]);

  const reloadSchedules = useCallback(async function () {
    const sched = await api("GET", "/schedules");
    setSchedules((sched && sched.items) || []);
  }, []);

  const onRefreshChannels = useCallback(async function () {
    setChannelsRefreshing(true);
    try {
      const ch = await api("GET", "/scheduler/channels");
      let list = (ch && Array.isArray(ch.channels)) ? ch.channels : [];
      if (!list.length) {
        const fb = await api("GET", "/available-channels");
        const names = (fb && fb.channels) || [];
        list = names.map(function (n) { return { channel_id: String(n), chat_id: "" }; });
      }
      setChannels(list);
      window.oaToast({level: "success", message: t("settings.channels.refreshed")});
    } finally { setChannelsRefreshing(false); }
  }, [t]);

  const setCfgField = function (key, value) {
    setConfig(function (prev) { return Object.assign({}, prev, {[key]: value}); });
  };
  const persist = useCallback(async function (updates) {
    const resp = await api("PUT", "/config", {updates: updates});
    if (resp && resp.ok) {
      window.oaToast({level: "success", message: t("settings.saved")});
    } else {
      window.oaToast({level: "error", message: "save failed"});
    }
  }, [t]);

  const onSendTest = useCallback(async function (ch) {
    const channel = (ch && ch.channel_id) || "";
    const defaultChatId = (ch && ch.chat_id) || "";
    const chat_id = window.prompt("chat_id for " + channel, defaultChatId);
    if (!chat_id) return;
    const resp = await api("POST", "/dispatch/send", {
      channel: channel, chat_id: chat_id,
      content: "[fin-pulse] channel test — " + new Date().toISOString(),
      cooldown_s: 0,
    });
    window.oaToast({
      level: resp && resp.ok ? "success" : "error",
      message: resp && resp.ok ? "sent" : "failed: " + (resp && resp.dispatch && resp.dispatch.error || ""),
    });
  }, []);

  const markRow = function (id, key, val) {
    setRowPending(function (prev) {
      const copy = Object.assign({}, prev);
      copy[id] = Object.assign({}, prev[id] || {}, {[key]: val});
      return copy;
    });
  };
  const onTriggerRow = useCallback(async function (s) {
    markRow(s.id, "run", true);
    try {
      const resp = await api("POST", "/schedules/" + s.id + "/trigger");
      window.oaToast({
        level: resp && resp.ok ? "success" : "error",
        message: resp && resp.ok ? t("settings.schedules.row.triggered") : "failed",
      });
    } finally { markRow(s.id, "run", false); }
  }, [t]);
  const onToggleRow = useCallback(async function (s) {
    markRow(s.id, "toggle", true);
    try {
      const resp = await api("POST", "/schedules/" + s.id + "/toggle");
      if (resp && resp.ok) await reloadSchedules();
      else window.oaToast({level: "error", message: "toggle failed"});
    } finally { markRow(s.id, "toggle", false); }
  }, [reloadSchedules]);
  const onDeleteRow = useCallback(async function (s) {
    if (!window.confirm(t("settings.schedules.row.confirm_delete"))) return;
    markRow(s.id, "del", true);
    try {
      const resp = await api("DELETE", "/schedules/" + s.id);
      if (resp && resp.ok) {
        window.oaToast({level: "success", message: t("settings.schedules.row.deleted")});
        await reloadSchedules();
      } else {
        window.oaToast({level: "error", message: "delete failed"});
      }
    } finally { markRow(s.id, "del", false); }
  }, [reloadSchedules, t]);

  /* ── Source toggle ── */
  const onToggleSource = useCallback(async function (sid) {
    var key = "source." + sid + ".enabled";
    var cur = config[key];
    var next = cur === false || cur === "false" ? true : (cur === undefined ? false : !cur);
    setCfgField(key, next);
    await persist({[key]: String(next)});
  }, [config, persist]);

  /* ── Source probe ── */
  const onProbeSource = useCallback(async function (sid) {
    var srcDef = allSources.find(function (s) { return s.id === sid; });
    var isNewsNow = srcDef && srcDef.kind === "newsnow";
    var endpoint = isNewsNow ? "/ingest/source/newsnow" : "/ingest/source/" + sid;
    setProbingIds(function (p) { return Object.assign({}, p, {[sid]: true}); });
    try {
      var resp = await api("POST", endpoint);
      if (resp && resp.ok) {
        setProbeStates(function (p) { return Object.assign({}, p, {[sid]: "ok"}); });
        setProbeLabels(function (p) { return Object.assign({}, p, {[sid]: _probeSummaryLabel(resp.summary, t)}); });
      } else {
        setProbeStates(function (p) { return Object.assign({}, p, {[sid]: "err"}); });
        setProbeLabels(function (p) { return Object.assign({}, p, {[sid]: t("settings.sources.probe.fail")}); });
      }
    } catch (_) {
      setProbeStates(function (p) { return Object.assign({}, p, {[sid]: "err"}); });
      setProbeLabels(function (p) { return Object.assign({}, p, {[sid]: t("settings.sources.probe.fail")}); });
    } finally {
      setProbingIds(function (p) { return Object.assign({}, p, {[sid]: false}); });
    }
  }, [t, allSources]);

  const onProbeSourceGroup = useCallback(async function (key, sources) {
    setProbingIds(function (p) { return Object.assign({}, p, {[key]: true}); });
    try {
      var payload = key === "newsnow" ? null : {sources: sources.map(function (s) { return s.fetcher_id || s.id; })};
      var resp = await api("POST", key === "newsnow" ? "/ingest/source/newsnow" : "/ingest", payload);
      if (resp && resp.ok) {
        setProbeStates(function (p) { return Object.assign({}, p, {[key]: "ok"}); });
        setProbeLabels(function (p) { return Object.assign({}, p, {[key]: _probeSummaryLabel(resp.summary, t)}); });
      } else {
        setProbeStates(function (p) { return Object.assign({}, p, {[key]: "err"}); });
        setProbeLabels(function (p) { return Object.assign({}, p, {[key]: t("settings.sources.probe.fail")}); });
      }
    } catch (_) {
      setProbeStates(function (p) { return Object.assign({}, p, {[key]: "err"}); });
      setProbeLabels(function (p) { return Object.assign({}, p, {[key]: t("settings.sources.probe.fail")}); });
    } finally {
      setProbingIds(function (p) { return Object.assign({}, p, {[key]: false}); });
    }
  }, [t]);

  /* ── Custom feed helpers ── */
  const persistCustomFeeds = useCallback(async function (feeds) {
    var urls = feeds.map(function (f) { return f.url; });
    await persist({
      "rss_generic.feeds": urls.join("\n"),
      "rss_generic.feeds_json": JSON.stringify(feeds.map(function (f) {
        return {name: f.name || f.url, url: f.url, enabled: f.enabled !== false};
      })),
    });
    setCustomFeeds(feeds);
  }, [persist]);

  const onAddBingRss = useCallback(async function () {
    if (!bingKeywords.trim()) return;
    var url = "https://www.bing.com/news/search?q=" + encodeURIComponent(bingKeywords.trim()) + "&format=RSS";
    var feed = {id: "cf_" + Date.now(), url: url, name: "Bing: " + bingKeywords.trim()};
    var next = customFeeds.concat([feed]);
    await persistCustomFeeds(next);
    setBingKeywords("");
    window.oaToast({level: "success", message: t("settings.saved")});
  }, [bingKeywords, customFeeds, persistCustomFeeds, t]);

  const onAddCustomRss = useCallback(async function () {
    if (!newCustomUrl.trim()) return;
    var feed = {id: "cf_" + Date.now(), url: newCustomUrl.trim(), name: newCustomName.trim() || newCustomUrl.trim()};
    var next = customFeeds.concat([feed]);
    await persistCustomFeeds(next);
    setNewCustomName(""); setNewCustomUrl(""); setAddingCustom(false);
    window.oaToast({level: "success", message: t("settings.saved")});
  }, [newCustomName, newCustomUrl, customFeeds, persistCustomFeeds, t]);

  const onDeleteCustom = useCallback(async function (idx) {
    if (!window.confirm(t("settings.sources.custom.delete.confirm"))) return;
    var next = customFeeds.filter(function (_, i) { return i !== idx; });
    await persistCustomFeeds(next);
  }, [customFeeds, persistCustomFeeds, t]);

  const onProbeCustom = useCallback(async function (url, idx) {
    setCustomProbing(function (p) { return Object.assign({}, p, {[idx]: true}); });
    try {
      var resp = await api("POST", "/sources/probe-rss", {url: url});
      if (resp && resp.ok) {
        setCustomProbeLabels(function (p) { return Object.assign({}, p, {[idx]: tfmt(t("settings.sources.probe.ok"), {n: resp.count || 0})}); });
      } else {
        setCustomProbeLabels(function (p) { return Object.assign({}, p, {[idx]: t("settings.sources.probe.fail")}); });
      }
    } catch (_) {
      setCustomProbeLabels(function (p) { return Object.assign({}, p, {[idx]: t("settings.sources.probe.fail")}); });
    } finally {
      setCustomProbing(function (p) { return Object.assign({}, p, {[idx]: false}); });
    }
  }, [t]);

  if (!loaded) return <div className="card"><div className="empty">{t("today.list.loading")}</div></div>;

  /* Classify sources */
  var directSources = allSources.filter(function (s) {
    return s.group === "direct" || s.group === "builtin_rss" ||
      ((s.kind === "direct" || s.kind === "rss") && s.id !== "rss_generic");
  });
  var newsnowSources = allSources.filter(function (s) { return s.kind === "newsnow"; });
  var rssGenericSource = allSources.find(function (s) { return s.id === "rss_generic"; }) || {
    id: "rss_generic", display_zh: t("settings.sources.cat.custom"), content_type: "custom", group: "custom_rss", default_enabled: true
  };

  var isEnabled = function (sid) {
    var v = config["source." + sid + ".enabled"];
    if (v === undefined || v === null || v === "") {
      var def = allSources.find(function (s) { return s.id === sid; });
      return def ? !!def.default_enabled : true;
    }
    return v !== false && v !== "false";
  };

  var rawNewsnowMode = config["newsnow.mode"];
  var newsnowMode = (rawNewsnowMode && String(rawNewsnowMode)) || "public";
  var rawMinInterval = parseInt(config["newsnow.min_interval_s"] || "300", 10);
  var newsnowFloor = (isNaN(rawMinInterval) ? 300 : Math.max(
    newsnowMode === "public" ? NEWSNOW_PUBLIC_MIN_INTERVAL_S : 0,
    rawMinInterval
  ));
  var radarRules = String(config["radar_rules"] || "+美联储 +降息");
  var hasAnyChannel = channels.length > 0;

  return (
    <div>
      {/* ════════ Data Source Management ════════ */}
      <div className="card" style={{padding: "16px 14px"}}>
        <div className="oa-settings-section">
          <div className="oa-settings-section__title">{t("settings.sources.title")}</div>

          {/* Category 1: Direct & RSS */}
          <Collapsible
            title={t("settings.sources.cat.direct")}
            badge={tfmt(t("settings.sources.count"), {n: directSources.length})}
            defaultOpen={true}>
            <div className="source-chip-grid">
              {directSources.map(function (s) {
                return (
                  <SourceChip
                    key={s.id}
                    source={s}
                    enabled={isEnabled(s.id)}
                    onClick={function () { onToggleSource(s.id); }}
                    title={(s.homepage || "") + (config["source." + s.id + ".last_error"] ? "\n" + config["source." + s.id + ".last_error"] : "")}
                  />
                );
              })}
            </div>
            <div className="source-panel-actions">
              <button className="btn btn-sm" disabled={!!probingIds.direct_rss}
                      onClick={function () { onProbeSourceGroup("direct_rss", directSources); }}>
                <Ico name="refresh"/> {probingIds.direct_rss ? t("settings.sources.probing") : t("settings.sources.probe.direct")}
              </button>
              {probeLabels.direct_rss && (
                <span style={{fontSize: 11, color: probeStates.direct_rss === "ok" ? "var(--success)" : "var(--danger)"}}>
                  {probeLabels.direct_rss}
                </span>
              )}
            </div>
          </Collapsible>

          {/* Category 2: Custom sources */}
          <Collapsible
            title={t("settings.sources.cat.custom")}
            badge={tfmt(t("settings.sources.count"), {n: customFeeds.length})}
            defaultOpen={false}>
            <div className="source-chip-grid" style={{marginBottom: 10}}>
              <SourceChip
                source={rssGenericSource}
                enabled={isEnabled("rss_generic")}
                onClick={function () { onToggleSource("rss_generic"); }}
                title={t("settings.sources.rss.master")}
              />
            </div>
            {/* Bing RSS builder */}
            <div className="bing-builder">
              <div className="label">{t("settings.sources.custom.bing.title")}</div>
              <div className="bing-builder__row">
                <input className="input" type="text" style={{flex: 1, minWidth: 120}}
                       placeholder={t("settings.sources.custom.bing.placeholder")}
                       value={bingKeywords}
                       onChange={function (e) { setBingKeywords(e.target.value); }}/>
                <button className="btn btn-sm btn-primary" onClick={onAddBingRss}
                        disabled={!bingKeywords.trim()}>
                  {t("settings.sources.custom.bing.add")}
                </button>
              </div>
              {bingKeywords.trim() && (
                <div className="bing-builder__preview">
                  {"https://www.bing.com/news/search?q=" + encodeURIComponent(bingKeywords.trim()) + "&format=RSS"}
                </div>
              )}
            </div>

            {/* Existing custom feeds */}
            {customFeeds.length === 0 && !addingCustom ? (
              <div className="empty" style={{padding: "10px 0"}}>{t("settings.sources.custom.empty")}</div>
            ) : (
              <div className="source-chip-grid" style={{marginTop: 8}}>
              {customFeeds.map(function (f, idx) {
                return (
                  <div key={f.id} className="source-chip" title={f.url}>
                    <span className="source-chip__dot"/>
                    <span>{f.name}</span>
                    <span className="source-chip__type">RSS</span>
                    {customProbeLabels[idx] && (
                      <span style={{fontSize: 11, color: customProbeLabels[idx].indexOf("OK") >= 0 || customProbeLabels[idx].indexOf("可用") >= 0 ? "var(--success)" : "var(--danger)"}}>
                        {customProbeLabels[idx]}
                      </span>
                    )}
                    <button className="btn btn-sm" disabled={!!customProbing[idx]}
                            onClick={function () { onProbeCustom(f.url, idx); }}>
                      {customProbing[idx] ? t("settings.sources.probing") : t("settings.sources.probe")}
                    </button>
                    <button className="btn btn-sm" onClick={function () { onDeleteCustom(idx); }}>
                      <Ico name="trash"/>
                    </button>
                  </div>
                );
              })}
              </div>
            )}

            {/* Add custom form */}
            {addingCustom ? (
              <div className="custom-add-form">
                <div className="custom-add-form__row">
                  <input className="input" type="text" style={{flex: 1}}
                         placeholder={t("settings.sources.custom.name.placeholder")}
                         value={newCustomName}
                         onChange={function (e) { setNewCustomName(e.target.value); }}/>
                </div>
                <div className="custom-add-form__row">
                  <input className="input" type="text" style={{flex: 1}}
                         placeholder={t("settings.sources.custom.url.placeholder")}
                         value={newCustomUrl}
                         onChange={function (e) { setNewCustomUrl(e.target.value); }}/>
                </div>
                <div style={{display: "flex", gap: 8}}>
                  <button className="btn btn-sm btn-primary" onClick={onAddCustomRss}
                          disabled={!newCustomUrl.trim()}>
                    {t("settings.sources.custom.save")}
                  </button>
                  <button className="btn btn-sm" onClick={function () { setAddingCustom(false); setNewCustomName(""); setNewCustomUrl(""); }}>
                    {t("settings.sources.custom.cancel")}
                  </button>
                </div>
              </div>
            ) : (
              <div style={{paddingTop: 8}}>
                <button className="btn btn-sm" onClick={function () { setAddingCustom(true); }}>
                  {t("settings.sources.custom.add")}
                </button>
              </div>
            )}
          </Collapsible>

          {/* Category 3: NewsNow aggregated */}
          <Collapsible
            title={t("settings.sources.cat.newsnow")}
            badge={tfmt(t("settings.sources.count"), {n: newsnowSources.length})}
            defaultOpen={false}>
            {/* Status bar */}
            <div className="nn-status-bar">
              <span className="nn-status-bar__pill">
                {t("settings.sources.nn.mode")}: {t("settings.newsnow.mode." + newsnowMode)}
              </span>
              {newsnowMode === "public" && (
                <span style={{fontSize: 11, color: "var(--text-muted)"}}>
                  {tfmt(t("settings.sources.nn.warn"), {floor: newsnowFloor})}
                </span>
              )}
              <span className="source-row__spacer"/>
              {/* Mode selector pills */}
              <div style={{display: "flex", gap: 4}}>
                {["off", "public", "self_host"].map(function (m) {
                  var active = newsnowMode === m;
                  return <span key={m}
                               className={"api-pill " + (active ? "" : "api-pill--missing")}
                               style={{cursor: "pointer", fontSize: 11}}
                               onClick={function () {
                                 setCfgField("newsnow.mode", m);
                                 if (m === "public") {
                                   setCfgField("newsnow.api_url", NEWSNOW_PUBLIC_URL);
                                   var cur = parseInt(config["newsnow.min_interval_s"] || "300", 10);
                                   if (isNaN(cur) || cur < NEWSNOW_PUBLIC_MIN_INTERVAL_S) {
                                     setCfgField("newsnow.min_interval_s", String(NEWSNOW_PUBLIC_MIN_INTERVAL_S));
                                   }
                                 }
                                 persist({"newsnow.mode": m});
                               }}>
                    {t("settings.newsnow.mode." + m)}
                  </span>;
                })}
              </div>
            </div>

            {newsnowMode === "public" && (
              <div style={{display: "flex", gap: 8, alignItems: "center", marginBottom: 10, fontSize: 12}}>
                <span style={{color: "var(--text-muted)"}}>{t("settings.sources.nn.floor")}:</span>
                <input className="input" type="number" style={{width: 80}}
                       min={NEWSNOW_PUBLIC_MIN_INTERVAL_S} step={60}
                       value={newsnowFloor}
                       onChange={function (e) {
                         var v = Math.max(NEWSNOW_PUBLIC_MIN_INTERVAL_S, parseInt(e.target.value || "300", 10) || NEWSNOW_PUBLIC_MIN_INTERVAL_S);
                         setCfgField("newsnow.min_interval_s", String(v));
                       }}
                       onBlur={function () { persist({"newsnow.min_interval_s": String(newsnowFloor)}); }}/>
                <span style={{color: "var(--text-muted)", fontSize: 11}}>{t("settings.sources.nn.floor.unit")}</span>
              </div>
            )}

            {/* NewsNow source chips */}
            <div className="source-chip-grid">
              {newsnowSources.map(function (s) {
                var disabled = newsnowMode === "off";
                return (
                  <SourceChip
                    key={s.id}
                    source={s}
                    enabled={!disabled && isEnabled(s.id)}
                    onClick={disabled ? function () {} : function () { onToggleSource(s.id); }}
                    title={String(s.newsnow_id || s.id)}
                  />
                );
              })}
            </div>
            <div className="source-panel-actions">
              <button className="btn btn-sm" disabled={newsnowMode === "off" || !!probingIds.newsnow}
                      onClick={function () { onProbeSourceGroup("newsnow", newsnowSources); }}>
                <Ico name="refresh"/> {probingIds.newsnow ? t("settings.sources.probing") : t("settings.sources.probe.newsnow")}
              </button>
              {probeLabels.newsnow && (
                <span style={{fontSize: 11, color: probeStates.newsnow === "ok" ? "var(--success)" : "var(--danger)"}}>
                  {probeLabels.newsnow}
                </span>
              )}
            </div>
          </Collapsible>
        </div>
      </div>

      {/* ════════ IM Channels ════════ */}
      <div className="card">
        <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8}}>
          <div className="card-title" style={{margin: 0}}>{t("settings.channels.title")}</div>
          <button className="btn btn-sm" type="button"
                  disabled={channelsRefreshing}
                  onClick={onRefreshChannels}>
            <Ico name="refresh"/> {t("settings.channels.refresh")}
          </button>
        </div>
        {!hasAnyChannel ? (
          <div className="oa-config-banner" role="alert">
            <span className="oa-icon oa-config-banner__icon"><Ico name="warn"/></span>
            <div className="oa-config-banner__text">
              <strong>{t("banner.noChannel.title")}</strong>
              <div style={{fontSize: 12, color: "var(--text)", marginTop: 2}}>
                {t("banner.noChannel.desc")}
              </div>
            </div>
          </div>
        ) : (
          <div style={{display: "flex", flexWrap: "wrap", gap: 8}}>
            {channels.map(function (ch, idx) {
              const key = (ch.channel_id || "") + ":" + (ch.chat_id || idx);
              return (
                <div key={key} style={{display: "flex", alignItems: "center", gap: 6}}>
                  <span className="api-pill">{formatChannelLabel(ch)}</span>
                  <button className="btn btn-sm" onClick={function () { onSendTest(ch); }}>
                    <Ico name="send"/> {t("settings.channels.send")}
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* ════════ Scheduled Tasks ════════ */}
      <div className="card">
        <div className="card-title" style={{marginBottom: 6}}>{t("settings.schedules.title")}</div>
        <div className="oa-hint" style={{marginBottom: 10}}>{t("settings.schedules.desc")}</div>
        <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 8, marginBottom: 14}}>
          {["morning", "noon", "evening", "radar"].map(function (tpl) {
            return (
              <button key={tpl}
                      className="btn"
                      type="button"
                      style={{display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 4, padding: "10px 12px", textAlign: "left"}}
                      onClick={function () { setScheduleDialog(tpl); }}>
                <span style={{fontWeight: 600}}>
                  <Ico name={tpl === "radar" ? "target" : "bell"}/> {t("settings.schedules.tpl." + tpl)}
                </span>
                <span className="oa-hint" style={{fontSize: 11}}>{t("settings.schedules.tpl." + tpl + ".desc")}</span>
              </button>
            );
          })}
        </div>
        {schedules.length === 0 ? (
          <div className="empty">{t("settings.schedules.none")}</div>
        ) : (
          <div>
            {schedules.map(function (s) {
              const pending = rowPending[s.id] || {};
              const enabled = s.enabled !== false;
              return (
                <div key={s.id}
                     style={{display: "flex", alignItems: "center", gap: 8, padding: "8px 0", borderBottom: "1px solid var(--border)", flexWrap: "wrap"}}>
                  <span className="api-pill">{s.name || s.id}</span>
                  <span style={{fontSize: 11, color: "var(--text-muted)"}}>{s.cron || s.cron_expression || ""}</span>
                  <span className={"api-pill " + (enabled ? "" : "api-pill--missing")} style={{fontSize: 11}}>
                    {enabled ? t("settings.schedules.row.enabled") : t("settings.schedules.row.disabled")}
                  </span>
                  <span style={{flex: 1, minWidth: 8}}/>
                  <span style={{fontSize: 11, color: "var(--text-muted)"}}>
                    {s.channel || s.channel_id || ""}{s.chat_id ? " · " + s.chat_id : ""}
                  </span>
                  <button className="btn btn-sm"
                          disabled={!!pending.run}
                          onClick={function () { onTriggerRow(s); }}>
                    <Ico name="play"/> {t("settings.schedules.row.run")}
                  </button>
                  <button className="btn btn-sm"
                          disabled={!!pending.toggle}
                          onClick={function () { onToggleRow(s); }}>
                    <Ico name={enabled ? "pause" : "play"}/>{" "}
                    {enabled ? t("settings.schedules.row.pause") : t("settings.schedules.row.resume")}
                  </button>
                  <button className="btn btn-sm"
                          disabled={!!pending.del}
                          onClick={function () { onDeleteRow(s); }}>
                    <Ico name="trash"/> {t("settings.schedules.row.delete")}
                  </button>
                </div>
              );
            })}
          </div>
        )}
        {scheduleDialog ? (
          <ScheduleDialog
            template={scheduleDialog}
            channels={channels}
            defaultRulesText={radarRules}
            onDone={function (ok) {
              setScheduleDialog(null);
              if (ok) reloadAll();
            }}/>
        ) : null}
      </div>

      {/* ════════ LLM ════════ */}
      <div className="card">
        <div className="card-title">{t("settings.llm.title")}</div>
        <div className="oa-hint">{t("settings.llm.hint")}</div>
      </div>
    </div>
  );
}

/* ── App shell ── */
function App() {
  const t = useT();
  const [activeTab, setActiveTab] = useState(0);
  const { settings, loaded } = useSettings();

  /* theme sync from host ctx */
  useEffect(function () {
    return onEvent("openakita:theme-change", function (d) {
      const theme = (d && d.theme) || "light";
      document.documentElement.setAttribute("data-theme", theme.indexOf("dark") >= 0 ? "dark" : "light");
    });
  }, []);

  /* shortcut keys (d → theme toggle, Esc → close modal) */
  useEffect(function () {
    function onKey(e) {
      const tag = (e.target && e.target.tagName) || "";
      if (tag === "INPUT" || tag === "TEXTAREA" || e.target.isContentEditable) return;
      if (e.key === "d") {
        const current = document.documentElement.getAttribute("data-theme") || "light";
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        try { localStorage.setItem("fp-theme", next); } catch (_) {}
      }
    }
    window.addEventListener("keydown", onKey);
    return function () { window.removeEventListener("keydown", onKey); };
  }, []);

  /* The "no IM channel" banner was previously mounted globally on
     every tab. We now scope it strictly to the Settings → IM channels
     card (rendered inside SettingsForm), so the Today / Digests /
     Radar / Ask tabs stay visually clean. */

  return (
    <div className="app">
      <div className="header">
        <h1 className="oa-hero-title">
          <BrandMark />
          <span className="oa-hero-title__text">
            {t("app.title")}
            <span className="oa-hero-title__sub">{t("app.subtitle")}</span>
          </span>
        </h1>
        <div className="header-right" />
      </div>
      <div className="tabs">
        {TAB_IDS.map(function (id, i) {
          return (
            <div key={id}
                 className={"tab " + (activeTab === i ? "active" : "")}
                 onClick={function () { setActiveTab(i); }}>
              <Ico name={TAB_ICONS[id]} /> {t("tabs." + id)}
            </div>
          );
        })}
      </div>
      <div className="content">
        {activeTab === 0 && <TodayTab />}
        {activeTab === 1 && <DigestsTab />}
        {activeTab === 2 && <RadarTab />}
        {activeTab === 3 && <AskTab />}
        {activeTab === 4 && <SettingsTab goToTab={setActiveTab} />}
      </div>
      <ConfirmHost />
    </div>
  );
}

class PluginErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error: error }; }
  componentDidCatch(error, info) { this.setState({ info: info }); console.error("[fin-pulse] render error:", error, info); }
  render() {
    if (!this.state.error) return this.props.children;
    const err = this.state.error;
    const msg = (err && err.message) ? err.message : String(err);
    return (
      <div style={{padding: 24, maxWidth: 820, margin: "0 auto"}}>
        <div className="err-panel">
          <div className="err-panel__title"><Ico name="warn" /> {_i18n.t("err.title")}</div>
          <div className="err-panel__msg">{msg}</div>
          <button className="btn btn-sm" onClick={() => this.setState({ error: null, info: null })}>
            {_i18n.t("err.retry")}
          </button>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <PluginErrorBoundary><App /></PluginErrorBoundary>
);
if (window.OpenAkita && typeof window.OpenAkita.ready === "function") {
  window.OpenAkita.ready();
}
  </script>
</body>
