      <div className="library-hero">
        <div className="library-toolbar">
        <div>
          <h2 className="page-title"><Icon name="mic" /> 音色库</h2>
          <p className="page-subtitle">先选稳定系统音色，需要品牌声线时再上传干净人声样本克隆。</p>
        </div>
        <button className="btn" onClick={() => setShowCreate(!showCreate)}>
          <Icon name="plus" size={13} /> 克隆新音色
        </button>
        </div>
        <div className="library-metrics">
          <div><strong>{systemVoices.length}</strong><span>系统音色</span></div>
          <div><strong>{clonedVoices.length}</strong><span>自定义音色</span></div>
          <div><strong>{sourceCount}</strong><span>音源分类</span></div>
        </div>
      </div>

      <div className="library-callout library-callout--compact">
        <Icon name="info" size={14} />
        <span>建议使用 5-30 秒、无背景音乐、无混响的人声样本；DashScope 克隆需要可访问的音频 URL。</span>
      </div>
      {loadWarning && (
        <div className="library-callout library-callout--warning">
          <Icon name="alert-triangle" size={14} />
          <span>{loadWarning}</span>
        </div>
      )}

      {showCreate && (
        <div className="card library-form">
          <div className="settings-grid two">

              <label>音色名称</label>

            <div className="field">
              <label>语言 / 性别</label>
              <div className="row">
                <select value={draft.language} onChange={(e) => setDraft({ ...draft, language: e.target.value })}>
                  <option value="zh-CN">中文</option>
                  <option value="en-US">英文</option>
                </select>
                <select value={draft.gender} onChange={(e) => setDraft({ ...draft, gender: e.target.value })}>
                  <option value="unknown">未知</option>
                  <option value="female">女声</option>
                  <option value="male">男声</option>

            </div>

          <div className="field">
            <label>参考音频</label>
            <FileUploadCard
              accept="audio/*"
              kind="audio"
              value={draft.audio}
              onUploaded={(audio) => setDraft({ ...draft, audio })}

            />

          <div className="settings-actions">
            <button className="btn btn-ghost" onClick={() => setShowCreate(false)}>取消</button>
            <button className="btn" onClick={cloneVoice} disabled={busy}>

            </button>

      <LibrarySection title="系统音色" count={systemVoices.length}>
        {systemVoices.length === 0 ? (
          <CompactLibraryEmpty icon="mic" title="系统音色暂未加载" hint="请刷新页面或检查后端音色目录。页面不会再撑出大块空白。" />
        ) : (
          <div className="voice-source-stack">
            {systemVoiceGroups.map(({ key, voices, meta }) => (
              <div className="voice-source-block" key={key}>
                <div className="voice-source-head">
                  <div>
                    <h4>{meta.title} <span>· {voices.length}</span></h4>

      <LibrarySection title="自定义音色" count={clonedVoices.length}>
        {clonedVoices.length === 0 ? (
          <CompactLibraryEmpty icon="mic-off" title="暂无自定义音色" hint="点击右上角「克隆新音色」上传一段人声样本。" />

function FiguresTab() {
  const [list, setList] = useState([]);
  const [showCreate, setShowCreate] = useState(false);
  const [draft, setDraft] = useState({ label: "", image: null });
  const [busy, setBusy] = useState(false);

  const load = useCallback(() => {
    api("GET", "/figures").then((r) => setList(r.figures || [])).catch(() => setList([]));
  }, []);
  useEffect(() => { load(); }, [load]);

  const createFigure = async () => {
    if (!draft.label || !draft.image) {
      alert("请填写形象名称并上传人像图");
      return;
    }
    setBusy(true);
    try {
      const r = await api("POST", "/figures", {
        label: draft.label,
        image_path: draft.image.local_path || draft.image.preview_url || "",
        preview_url: draft.image.preview_url || "",
        oss_url: draft.image.oss_url || "",
        oss_key: draft.image.oss_key || "",
      });
      if (!r.ok) throw new Error(r.error || "create failed");
      setDraft({ label: "", image: null });
      setShowCreate(false);
      load();
    } catch (e) {
      alert(`上传形象失败：${e.message}`);
    } finally {
      setBusy(false);
    }
  };

  const del = async (figId) => {
    if (!confirm("确认删除该形象？")) return;
    await api("DELETE", `/figures/${figId}`);
    load();
  };

  const statusOf = (f) => {
    if (f.detect_status) return f.detect_status;
    if (f.detect_pass === true || f.detect_pass === 1) return "pass";
    if (f.detect_pass === false || f.detect_pass === 0) return "pending";
    return "skipped";
  };

  return (
    <div className="library-page library-page--figures">
      <div className="library-hero library-hero--figures">
        <div className="library-toolbar">
          <div>
            <h2 className="page-title"><Icon name="user-square" /> 形象库</h2>
            <p className="page-subtitle">集中管理可复用的人像素材，用于数字人口播、换人和动作驱动。</p>
          </div>
          <button className="btn" onClick={() => setShowCreate(!showCreate)}>
            <Icon name="plus" size={13} /> 上传新形象
          </button>
        </div>
        <div className="figure-guide-grid">
          <div><Icon name="user-plus" size={16} /><strong>正面清晰</strong><span>单人、无遮挡、五官完整</span></div>
          <div><Icon name="image-play" size={16} /><strong>素材复用</strong><span>上传一次，多种数字人模式可直接选用</span></div>
          <div><Icon name="info" size={16} /><strong>检测状态</strong><span>通过检测后合成效果更稳定</span></div>
        </div>
      </div>

      {showCreate && (
        <div className="card library-form figure-form">
          <div>
            <div className="field">
              <label>形象名称</label>
              <input value={draft.label} onChange={(e) => setDraft({ ...draft, label: e.target.value })} placeholder="例如：商务主持人" />
            </div>
            <div className="create-helper-card">
              <Icon name="info" size={16} />
              <div>
                <strong>建议用正面半身照</strong>
                <span>五官清晰、光线均匀、无遮挡和无水印，会减少后续检测失败。</span>
              </div>
            </div>
          </div>
          <div className="field">
            <label>人像图</label>
            <FileUploadCard
              accept="image/*"
              kind="image"
              value={draft.image}
              onUploaded={(image) => setDraft({ ...draft, image })}
              hint="上传后会保存到形象库，可在数字人模式复用"
            />
          </div>
          <div className="settings-actions">
            <button className="btn btn-ghost" onClick={() => setShowCreate(false)}>取消</button>
            <button className="btn" onClick={createFigure} disabled={busy}>
              {busy ? <Spinner /> : <Icon name="save" size={13} />} 上传并保存
            </button>
          </div>
        </div>
      )}

      {list.length === 0 ? (
        <CompactLibraryEmpty
          full
          icon="user-plus"
          title="还没有形象素材"
          hint="点击「上传新形象」添加第一张人像图，之后在数字人创建流程里直接复用。"
        >
          <button className="btn" onClick={() => setShowCreate(true)}>
            <Icon name="plus" size={13} /> 上传新形象
          </button>
        </CompactLibraryEmpty>
      ) : (
        <div className="lib-grid figure-grid">
          {list.map((f) => {
            const status = statusOf(f);
            const kind = status === "pass" ? "success" : status === "fail" ? "danger" : status === "pending" ? "warning" : "info";
            return (
              <div key={f.id} className="lib-card figure-card">
                <div className="fig-thumb-wrap">
                  {f.preview_url ? (
                    <img className="fig-thumb" src={f.preview_url} alt={f.label} />
                  ) : (
                    <div className="fig-thumb-placeholder"><Icon name="user-square" size={32} /></div>
                  )}
                </div>
                <div className="lib-card__head">
                  <div className="min-w-0">
                    <div className="lib-card__title">{f.label}</div>
                    <div className="lib-card__sub">{new Date((f.created_at || 0) * 1000).toLocaleString()}</div>
                  </div>
                  <Tag kind={kind}>{status}</Tag>
                </div>
                {f.detect_message && <div className="lib-card__hint">{f.detect_message}</div>}
                <button className="btn btn-sm btn-danger" onClick={() => del(f.id)}>
                  <Icon name="trash" size={12} /> 删除
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function PromptTab({ settings }) {
  const [guide, setGuide] = useState(DEFAULT_PROMPT_GUIDE);
  const [prompt, setPrompt] = useState("");
  const [mode, setMode] = useState("t2v");
  const [result, setResult] = useState("");
  const [busy, setBusy] = useState(false);
  const [guideWarning, setGuideWarning] = useState("");

  useEffect(() => {
    api("GET", "/prompt-guide")
      .then((r) => {
        setGuide({
          formulas: Object.keys(r.formulas || {}).length ? r.formulas : DEFAULT_PROMPT_GUIDE.formulas,
          templates: (r.templates || []).length ? r.templates : DEFAULT_PROMPT_GUIDE.templates,
          cameras: (r.cameras || []).length ? r.cameras : DEFAULT_PROMPT_GUIDE.cameras,
          atmosphere: Object.keys(r.atmosphere || {}).length ? r.atmosphere : DEFAULT_PROMPT_GUIDE.atmosphere,
        });
        setGuideWarning("");
      })
      .catch((e) => {
        setGuide(DEFAULT_PROMPT_GUIDE);
        if (!settings?.api_key_set) {
          setGuideWarning("");
          return;
        }
        const msg = friendlyApiMessage(e, "后端暂未提供提示词指南，当前使用内置模板。");
        setGuideWarning(msg ? `当前使用内置模板：${msg}` : "");
      });
  }, [settings?.api_key_set]);

  const optimize = async () => {
    setBusy(true);
    try {
      const r = await api("POST", "/prompt-optimize", { prompt, mode });
      setResult(r.ok ? r.result : `失败：${r.error}`);
    } catch (e) {
      const msg = settings?.api_key_set
        ? friendlyApiMessage(e, "AI 优化服务暂不可用，请稍后重试。")
        : "请先在设置里配置 DashScope Key。";
      setResult(`失败：${msg}`);
    } finally {
      setBusy(false);
    }
  };

  const formulas = Object.entries(guide.formulas || {});
  const templates = guide.templates || [];
  const cameras = guide.cameras || [];
  const atmosphere = guide.atmosphere || {};
  const selectedFormula = guide.formulas?.[mode] || "";

  return (
    <div className="prompt-page">
      <div className="prompt-shell">
        <div className="prompt-hero">
          <div>
            <h2 className="page-title"><Icon name="sparkles" /> 提示词工坊</h2>
            <p className="page-subtitle">把一句粗略想法整理成可生成的视频提示词，也可以直接套用模板。</p>
          </div>
          <div className="prompt-hero__steps">
            <span>1 写想法</span>
            <span>2 选模式</span>
            <span>3 AI 优化</span>
          </div>
        </div>
        {guideWarning && (
          <div className="library-callout library-callout--warning">
            <Icon name="alert-triangle" size={14} />
            <span>{guideWarning}</span>
          </div>
        )}

        <div className="prompt-workbench">
          <section className="prompt-panel prompt-panel--compose">
            <div className="prompt-panel__head">
              <div>
                <strong>输入与结构</strong>
                <span>先确定生成模式，再补充原始想法。</span>
              </div>
            </div>
            <div className="prompt-mode-row">
              <div className="field prompt-control-card">
                <label>生成模式</label>
                <select value={mode} onChange={(e) => setMode(e.target.value)}>
                  {formulas.map(([m]) => <option key={m}>{m}</option>)}
                </select>
              </div>
              {selectedFormula && (
                <div className="formula-card">
                  <span>推荐结构</span>
                  <strong>{selectedFormula}</strong>
                </div>
              )}
            </div>
            <div className="field prompt-text-field">
              <label>原始提示词</label>
              <textarea
                value={prompt}
                onChange={(e) => setPrompt(e.target.value)}
                placeholder="输入一句粗略想法，例如：一位主持人在科技发布会现场介绍新品"
              />
            </div>
            <div className="prompt-action-row">
              <button className="btn" onClick={optimize} disabled={busy || !prompt}>
                {busy ? <Spinner /> : <Icon name="wand-sparkles" size={14} />} AI 优化
              </button>
              <span>提示：先写“主体 + 场景 + 动作”，细节可交给 AI 补齐。</span>
            </div>
          </section>
          <section className="prompt-panel prompt-result">
            <div className="prompt-panel__head">
              <div>
                <strong>优化结果</strong>
                <span>生成后可复制到视频/数字人任务中。</span>
              </div>
            </div>
            {result ? <pre className="code-block">{result}</pre> : <Empty icon="sparkles" title="等待优化" hint="左侧输入后点击 AI 优化" />}
          </section>
        </div>

        <GuideSection title="模板示例" defaultOpen>
          <div className="template-grid">
            {templates.slice(0, 12).map((tpl) => (
              <button key={tpl.id || tpl.name} className="template-card" onClick={() => setPrompt(tpl.prompt || tpl.template || "")}>
                <div className="name">{tpl.name || tpl.name_zh || tpl.id}</div>
                <div className="desc">{tpl.desc || tpl.description || (tpl.modes || []).join(" / ")}</div>
              </button>
            ))}
          </div>
        </GuideSection>

        <GuideSection title="各模式配方">
          {formulas.map(([m, f]) => (
            <button key={m} className="guide-row guide-row--button" onClick={() => setMode(m)}>
              <strong>{m}</strong>
              <span>{f}</span>
            </button>
          ))}
        </GuideSection>

        <GuideSection title="镜头与氛围关键词">
          <div className="keyword-panel">
            <div className="keyword-group keyword-group--primary">
              <strong>镜头</strong>
              <div className="keyword-chips">
                {cameras.map((c) => (
                  <span className="keyword-chip" key={c.zh || c.en}>{c.zh || c.en}</span>
                ))}
              </div>
            </div>
            {Object.entries(atmosphere).map(([group, words]) => (
              <div className="keyword-group" key={group}>
                <strong>{group}</strong>
                <div className="keyword-chips">
                  {(words || []).slice(0, 12).map((w) => <span className="keyword-chip" key={w}>{w}</span>)}
                </div>
              </div>
            ))}
          </div>
        </GuideSection>
      </div>
    </div>
  );
}

      <summary><Icon name="info" size={14} /> <span className="guide-section__title">{title}</span></summary>
      <div className="guide-section__body">{children}</div>
    </details>
  );

function fmtMb(v) {
  const n = Number(v || 0);
  if (n >= 1024) return `${(n / 1024).toFixed(1)} GB`;
  return `${n.toFixed(1)} MB`;

function SystemComponentsPanel() {
  const [items, setItems] = useState([]);
  const [status, setStatus] = useState({});
  const [loading, setLoading] = useState(false);

  const refresh = useCallback(async () => {
    setLoading(true);
    try {
      const r = await api("GET", "/system/components");
      setItems(r.items || []);
    } catch (_) {
      setItems([]);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    refresh();
  }, [refresh]);

  useEffect(() => {
    if (!items.some((x) => x.busy || status[x.id]?.busy)) return;
    const timer = setInterval(async () => {
      for (const it of items) {
        try {
          const r = await api("GET", `/system/${it.id}/status`);
          setStatus((prev) => ({ ...prev, [it.id]: r }));
        } catch (_) {}
      }
      refresh();
    }, 3000);
    return () => clearInterval(timer);
  }, [items, status, refresh]);

  const install = async (id) => {
    setStatus((prev) => ({ ...prev, [id]: { busy: true, log_tail: [] } }));
    try {
      await api("POST", `/system/${id}/install`, { method_index: 0 });
      refresh();
    } catch (e) {
      alert(`安装启动失败：${e.message}`);
    }
  };

  if (loading && items.length === 0) {
    return <div className="sysdep-card"><Spinner /> 正在检测系统组件…</div>;
  }

  return (
    <div className="dep-stack">
      <div className="settings-callout">
        FFmpeg 用于长视频拼接、视频预览和后续媒体处理。它是系统级组件，如果机器已经安装，本插件会直接复用。
      </div>
      {items.map((it) => {
        const live = status[it.id] || it.last_install || {};
        const busy = !!(it.busy || live.busy);
        const found = !!(live.found ?? it.found);
        const methods = it.methods || [];
        return (
          <div key={it.id} className="sysdep-card">
            <div className="sysdep-card__head">
              <div className="sysdep-card__title">
                <Icon name="package" size={18} />
                <div>
                  <strong>{it.display_name || it.id}</strong>
                  <p>{it.description}</p>
                </div>
              </div>
              <span className={"sysdep-badge " + (busy ? "busy" : found ? "ok" : "warn")}>
                {busy ? "安装中" : found ? `已安装${it.version ? ` ${it.version}` : ""}` : "未安装"}
              </span>
            </div>
            {it.location && <div className="sysdep-path">{it.location}</div>}
            <div className="sysdep-actions">
              <button
                className={"btn btn-sm " + (!found ? "" : "btn-ghost")}
                disabled={busy || methods.length === 0}
                onClick={() => install(it.id)}
              >
                {busy ? <Spinner /> : <Icon name="download" size={12} />}
                {found ? "重新安装" : "一键安装"}
              </button>
              <button className="btn btn-sm btn-ghost" onClick={refresh} disabled={loading}>
                <Icon name="refresh" size={12} /> 重新检测
              </button>
              {it.homepage && (
                <a className="btn btn-sm btn-ghost" href={it.homepage} target="_blank" rel="noreferrer">
                  官方文档
                </a>
              )}
            </div>
            {!!(live.log_tail || []).length && (
              <pre className="sysdep-log">{(live.log_tail || []).join("\n")}</pre>
            )}
          </div>
        );
      })}
      {items.length === 0 && <div className="text-xs text-muted">没有需要安装的系统组件。</div>}
    </div>
  );
}

function PythonDepsPanel() {
  const [deps, setDeps] = useState(FALLBACK_PYTHON_DEPS);
  const [loading, setLoading] = useState(false);
  const [warning, setWarning] = useState("");

  const refresh = useCallback(async () => {
    setLoading(true);
    try {
      const r = await api("GET", "/python-deps/status");
      const fromApi = Array.isArray(r.deps) ? r.deps : [];
      setDeps(
        FALLBACK_PYTHON_DEPS.map((fallback) => ({
          ...fallback,
          ...(fromApi.find((dep) => dep.id === fallback.id) || {}),
        }))
      );
      setWarning(fromApi.length ? "" : "后端暂未返回依赖状态，已显示待检测清单。");
    } catch (_) {
      setDeps(FALLBACK_PYTHON_DEPS);
      setWarning("依赖状态接口暂不可用，已显示待检测清单。");
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    refresh();
  }, [refresh]);

  const install = async (name) => {
    setDeps((prev) => prev.map((x) => x.id === name ? { ...x, busy: true } : x));
    try {
      await api("POST", "/python-deps/install", { name });
    } catch (e) {
      alert(`安装失败：${e.message}`);
    } finally {
      refresh();
    }
  };

  const total = deps.length;
  const ready = deps.filter((dep) => dep.ok).length;
  const busyCount = deps.filter((dep) => dep.busy).length;

  return (
    <div className="dep-panel">
      <div className="dep-panel__intro">
        <div>
          <div className="dep-panel__intro-title">插件运行依赖</div>
          <div className="dep-panel__intro-text">
            打包版会使用独立 Python 环境。这里可以检查并修复插件私有依赖，不需要手动打开命令行。
          </div>
        </div>
        <div className="dep-summary" aria-label="依赖状态汇总">
          <span className="dep-summary__item"><Icon name="check" size={12} /> {ready}/{total || "—"} 可用</span>
          {busyCount > 0 && <span className="dep-summary__item"><Spinner /> {busyCount} 安装中</span>}
          <button className="btn btn-sm btn-ghost" type="button" onClick={refresh} disabled={loading}>
            {loading ? <Spinner /> : <Icon name="refresh" size={12} />} 刷新
          </button>
        </div>
      </div>
      {loading && deps.length === 0 && <div className="text-xs text-muted">正在检测依赖…</div>}
      {warning && <div className="compact-empty-note">{warning}</div>}
      <div className="dep-grid">
        {deps.map((dep) => {
          const ok = !!dep.ok;
          const busy = !!dep.busy;
          const statusCls = busy ? "busy" : ok ? "ok" : "warn";
          const statusText = busy ? "安装中" : ok ? "可用" : "需安装";
          const logTail = dep.log_tail || [];
          return (
            <div key={dep.id} className={"dep-card dep-card--" + statusCls}>
              <div className="dep-card__head">
                <div className="dep-card__title-row">
                  <span className="dep-icon"><Icon name={ok ? "check" : "package"} size={16} /></span>
                  <div className="min-w-0">
                    <div className="dep-title">{dep.display_name || dep.label || dep.id}</div>
                    <div className="dep-desc">{dep.description || dep.import_name || dep.pip_spec}</div>
                  </div>
                </div>
                <span className={"dep-status dep-status--" + statusCls}>
                  {busy ? <Spinner /> : ok ? <Icon name="check" size={11} /> : null}
                  {statusText}
                </span>
              </div>
              <div className="dep-meta">
                <div className="dep-meta-row">
                  <span className="dep-meta-label">包</span>
                  <code>{dep.pip_spec || dep.import_name || dep.id}</code>
                </div>
                {dep.version && (
                  <div className="dep-meta-row">
                    <span className="dep-meta-label">版本</span>
                    <code>{dep.version}</code>
                  </div>
                )}
                {dep.module_file && (
                  <div className="dep-meta-row">
                    <span className="dep-meta-label">路径</span>
                    <code title={dep.module_file}>{dep.module_file}</code>
                  </div>
                )}
                {!ok && dep.error && (
                  <div className="dep-meta-row text-danger">
                    <span className="dep-meta-label">错误</span>
                    <span>{dep.error}</span>
                  </div>
                )}
                {dep.last_error && (
                  <div className="dep-meta-row text-danger">
                    <span className="dep-meta-label">最近</span>
                    <span>{dep.last_error}</span>
                  </div>
                )}
              </div>
              <div className="dep-card__actions">
                <button className={"btn btn-sm " + (!ok ? "" : "btn-ghost")} disabled={busy} onClick={() => install(dep.id)}>
                  {busy ? <Spinner /> : <Icon name="download" size={12} />}
                  {ok ? "重新安装" : "安装依赖"}
                </button>
                <button className="btn btn-sm btn-ghost" type="button" onClick={refresh}>重新检测</button>
              </div>
              {!!logTail.length && <pre className="dep-log text-xs">{logTail.slice(-8).join("\n")}</pre>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function StorageSettings({ form, setFormValue }) {
  const [stats, setStats] = useState(null);

  const refresh = useCallback(async () => {
    try {
      const r = await api("GET", "/storage/stats");
      setStats(r.stats || null);
    } catch (_) {}
  }, []);

  useEffect(() => {
    refresh();
  }, [refresh]);

  const pick = async (key) => {
    const picked = await window.OpenAkita?.pickFolder?.(`选择 ${key}`);
    if (!picked) return;
    await setFormValue(key, picked, { immediate: true });
    refresh();
  };

  const open = async (path) => {
    if (!path) return;
    try {
      await api("POST", "/storage/open-folder", { path });
    } catch (e) {
      alert(`打开文件夹失败：${e.message}`);
    }
  };

  const cleanup = async () => {
    try {
      const r = await api("POST", "/cleanup", { retention_days: Number(form.retention_days || 30) });
      alert(`已清理 ${r.removed || 0} 条过期任务`);
      refresh();
    } catch (e) {
      alert(`清理失败：${e.message}`);
    }
  };

  const dataDirPath = form.custom_data_dir || stats?.data_dir?.path || "";
  const totalSizeMb = Number(stats?.data_dir?.size_mb || 0);
  const totalFiles = Number(stats?.data_dir?.file_count || 0);
  const statCards = [
    ["output_dir", "成品 outputs"],
    ["uploads", "原始素材 uploads"],
    ["tasks", "任务缓存 tasks"],
    ["cache_dir", "临时缓存 cache"],
  ];

  return (
    <div>
      <SettingField label="数据目录" hint={dataDirPath ? `当前生效：${dataDirPath}` : "留空 = 使用默认目录（由 OpenAkita 管理）"}>
        <div className="folder-row">
          <input
            value={form.custom_data_dir || ""}
            onChange={(e) => setFormValue("custom_data_dir", e.target.value)}
            placeholder="留空 = 使用默认目录（由 OpenAkita 管理）"
          />
          <button className="btn btn-sm btn-ghost" onClick={() => pick("custom_data_dir")}>浏览</button>
          <button className="btn btn-sm btn-ghost" onClick={() => open(dataDirPath)}>打开</button>
        </div>
      </SettingField>

      <div className="settings-grid two storage-options-grid">
        <SettingField label="子目录结构" hint="可改成更大的盘 / 别的用户目录，仅支持绝对路径。">
          <select
            value={form.output_subdir_mode || "task"}
            onChange={(e) => {
              setFormValue("output_subdir_mode", e.target.value, { immediate: true });
            }}
          >
            <option value="task">按任务（tasks/{"{task_id}"}，默认）</option>
            <option value="date">按日期（YYYY-MM-DD）</option>
            <option value="mode">按模式（mode）</option>
            <option value="date_mode">日期 / 模式</option>
            <option value="flat">平铺 outputs</option>
          </select>
        </SettingField>
        <SettingField label="文件命名规则" hint="可用占位符：{task_id} {short_id} {date} {time} {datetime} {mode} {filename} {ext}">
          <select
            value={form.output_naming_rule || "{filename}"}
            onChange={(e) => {
              setFormValue("output_naming_rule", e.target.value, { immediate: true });
            }}
          >
            <option value="{filename}">{"{filename}"}（DashScope 原始文件名，默认）</option>
            <option value="{task_id}">{"{task_id}"}</option>
            <option value="{date}_{mode}_{short_id}">{"{date}_{mode}_{short_id}"}</option>
            <option value="{date}_{time}_{short_id}">{"{date}_{time}_{short_id}"}</option>
            <option value="{mode}_{short_id}">{"{mode}_{short_id}"}</option>
          </select>
        </SettingField>
      </div>

      <div className="storage-stats-block">
        <div
          className="storage-total-card"
          title={stats?.data_dir?.path || dataDirPath || ""}
          onClick={() => open(stats?.data_dir?.path || dataDirPath)}
        >
          <div className="storage-total-card__main">
            <div className="storage-total-card__label">当前总占用</div>
            <div className="storage-total-card__path">
              {stats?.data_dir?.path || dataDirPath || "尚未确定数据目录"}
            </div>
          </div>
          <div className="storage-total-card__value">
            <strong>{stats ? fmtMb(totalSizeMb) : "—"}</strong>
            <span>{stats ? `${totalFiles} 个文件` : "等待统计"}</span>
          </div>
          <button
            className="btn btn-sm btn-ghost storage-total-card__refresh"
            type="button"
            onClick={(e) => {
              e.stopPropagation();
              refresh();
            }}
          >
            <Icon name="refresh" size={12} /> 刷新
          </button>
        </div>
        <div className="storage-grid">
          {statCards.map(([key, label]) => {
            const s = stats?.[key];
            const hasData = !!s;
            return (
              <div
                className={"storage-card" + (hasData ? "" : " storage-card--empty")}
                key={key}
                title={s?.path || ""}
                onClick={() => hasData && open(s.path)}
              >
                <div className="storage-card__label">{label}</div>
                <div className="storage-card__value">{hasData ? fmtMb(s.size_mb) : "—"}</div>
                <div className="storage-card__meta">
                  {hasData ? `${s.file_count} 个文件${s.truncated ? " +" : ""}` : "等待统计"}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <SettingField label="保留天数" hint={`清理 ${form.retention_days || 30} 天前的过期任务。`}>
        <div className="cleanup-row">
          <div className="cleanup-input-group">
            <input
              className="retention-input"
              type="number"
              min="1"
              value={form.retention_days || "30"}
              onChange={(e) => setFormValue("retention_days", e.target.value)}
            />
            <span>天</span>
          </div>
          <div className="cleanup-copy">
            <strong>清理过期任务</strong>
            <span>删除超过 {form.retention_days || 30} 天的历史任务和临时文件，释放本地空间。</span>
          </div>
          <button className="btn btn-sm btn-ghost" onClick={cleanup}>立即清理</button>
        </div>
      </SettingField>
    </div>
  );
}

function TestResult({ status, onDismiss }) {
  if (!status) return null;
  const { kind, title, detail, time } = status;
  const iconNode =
    kind === "ok" ? <Icon name="check" size={14} />
    : kind === "fail" ? <Icon name="alert-triangle" size={14} />
    : kind === "warn" ? <Icon name="alert-triangle" size={14} />
    : <Spinner />;
  return (
    <div className={"settings-test-result settings-test-result--" + kind} role="status">
      <span className="settings-test-result__icon">{iconNode}</span>
      <div className="settings-test-result__body">
        <div className="settings-test-result__head">
          <strong className="settings-test-result__title">{title}</strong>
          {time && <span className="settings-test-result__time">{time}</span>}
        </div>
        {detail && <div className="settings-test-result__detail">{detail}</div>}
      </div>
      {onDismiss && (
        <button
          type="button"
          className="settings-test-result__close"
          onClick={onDismiss}
          aria-label="关闭"
        >
          ×
        </button>
      )}
    </div>
  );
}

function SettingsTab({ catalog, settings, onSave }) {
  catalog = catalog || { modes: [], models: [], default_models: {} };
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);
  const [apiStatus, setApiStatus] = useState(null);
  const [apiTesting, setApiTesting] = useState(false);
  const [ossStatus, setOssStatus] = useState(null);
  const [ossTesting, setOssTesting] = useState(false);
  const autosaveTimers = useRef({});

  const nowStr = () =>
    new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });

  useEffect(() => {
    setForm(settings || {});
  }, [settings]);

  useEffect(() => (
    () => {
      Object.values(autosaveTimers.current).forEach((timer) => clearTimeout(timer));
    }
  ), []);

  const savePartial = async (updates) => {
    const cleanUpdates = Object.fromEntries(
      Object.entries(updates).filter(([key, value]) => {
        if (key !== "api_key") return true;
        const text = String(value || "").trim();
        return !!text && !text.includes("***");
      })
    );
    if (Object.keys(cleanUpdates).length === 0) return;
    setSaving(true);
    try {
      await api("PUT", "/settings", { updates: cleanUpdates });
      setForm((prev) => ({ ...prev, ...cleanUpdates }));
      onSave?.(cleanUpdates, "设置已自动保存");
    } catch (e) {
      alert(`保存失败：${e.message}`);
    } finally {
      setSaving(false);
    }
  };

  const set = (k, v, options = {}) => {
    const delay = options.immediate ? 0 : options.delay ?? 600;
    setForm((prev) => ({ ...prev, [k]: v }));
    clearTimeout(autosaveTimers.current[k]);
    if (delay === 0) {
      return savePartial({ [k]: v });
    }
    autosaveTimers.current[k] = setTimeout(() => savePartial({ [k]: v }), delay);
    return undefined;
  };

  const [apiKeySavedThisSession, setApiKeySavedThisSession] = useState(false);
  const [apiKeyVisible, setApiKeyVisible] = useState(false);
  const [apiKeyPlaintext, setApiKeyPlaintext] = useState("");
  const [apiKeyDirty, setApiKeyDirty] = useState(false);
  const apiKeyConfigured = !!(
    apiKeySavedThisSession || form.api_key_set || settings?.api_key_set
  );
  const apiKeyDraft = String(form.api_key || "");
  const apiKeyNeedsSave = apiKeyDirty && !!apiKeyDraft.trim() && !apiKeyDraft.includes("***");

  const updateApiKeyDraft = (value) => {
    clearTimeout(autosaveTimers.current.api_key);
    setApiKeyPlaintext(value);
    setApiKeyDirty(true);
    setForm((prev) => ({ ...prev, api_key: value }));
  };

  const toggleApiKeyVisible = async () => {
    if (apiKeyVisible) {
      setApiKeyVisible(false);
      return;
    }
    const current = String(form.api_key || "");
    if (current.includes("***") && !apiKeyPlaintext) {
      setApiStatus({
        kind: "info",
        title: "正在读取密钥…",
        detail: "只在点击显示时读取本地保存的完整 Key。",
        time: nowStr(),
      });
      try {
        const r = await api("POST", "/settings/reveal-secret", { key: "api_key" });
        const value = String(r?.value || "");
        setApiKeyPlaintext(value);
        setApiKeyDirty(false);
        setForm((prev) => ({ ...prev, api_key: value, api_key_set: !!value }));
        setApiStatus(null);
      } catch (e) {
        setApiStatus({
          kind: "fail",
          title: "读取密钥失败",
          detail: String(e?.message || e),
          time: nowStr(),
        });
        return;
      }
    }
    setApiKeyVisible(true);
  };

  const saveApiKey = async () => {
    const text = apiKeyDraft.trim();
    if (!text || text.includes("***")) {
      setApiStatus({
        kind: "warn",
        title: apiKeyConfigured ? "无需重复保存" : "请先填写 API Key",
        detail: apiKeyConfigured
          ? "当前密钥已保存。如需更换，请重新粘贴后再点保存密钥。"
          : "把阿里云百炼控制台的 sk-… 粘贴到输入框，再点保存密钥。",
        time: nowStr(),
      });
      return;
    }
    setSaving(true);
    setApiStatus({ kind: "info", title: "保存中…", detail: "正在写入本地配置。", time: nowStr() });
    try {
      await api("PUT", "/settings", { updates: { api_key: text } });
      const next = { api_key: text, api_key_set: true };
      setForm((prev) => ({ ...prev, ...next }));
      setApiKeyPlaintext(text);
      setApiKeyDirty(false);
      setApiKeySavedThisSession(true);
      onSave?.(next, "DashScope API Key 已保存");
      setApiStatus({
        kind: "ok",
        title: "保存成功",
        detail: "DashScope API Key 已写入本地配置，可点击「测试连接」验证。",
        time: nowStr(),
      });
    } catch (e) {
      setApiStatus({
        kind: "fail",
        title: "保存失败",
        detail: String(e?.message || e),
        time: nowStr(),
      });
    } finally {
      setSaving(false);
    }
  };

  const testConnection = async () => {
    setApiTesting(true);
    setApiStatus({ kind: "info", title: "测试中…", detail: "正在请求 DashScope /v1/models。", time: nowStr() });
    try {
      const rawKey = apiKeyPlaintext || form.api_key || "";
      const r = await api("POST", "/test-connection", {
        api_key: rawKey.includes("***") ? "" : rawKey,
      });
      if (r?.ok) {
        setApiStatus({
          kind: "ok",
          title: "连接成功",
          detail: `当前 Key 可用${r.status ? `（HTTP ${r.status}）` : ""}。`,
          time: nowStr(),
        });
      } else {
        setApiStatus({
          kind: "fail",
          title: "连接失败",
          detail: String(r?.message || "未知错误"),
          time: nowStr(),
        });
      }
    } catch (e) {
      setApiStatus({
        kind: "fail",
        title: "测试连接失败",
        detail: String(e?.message || e),
        time: nowStr(),
      });
    } finally {
      setApiTesting(false);
    }
  };

  const ossFieldsFilled = !!(
    String(form.oss_endpoint || "").trim() &&
    String(form.oss_bucket || "").trim() &&
    String(form.oss_access_key_id || "").trim() &&
    String(form.oss_access_key_secret || "").trim()
  );

  const testOss = async () => {
    if (!ossFieldsFilled) {
      setOssStatus({
        kind: "warn",
        title: "请先填写 OSS 凭据",
        detail: "需要 Endpoint、Bucket、AccessKey ID 和 AccessKey Secret 四个字段同时不为空。",
        time: nowStr(),
      });
      return;
    }
    setOssTesting(true);
    setOssStatus({ kind: "info", title: "测试中…", detail: "正在调用 OSS list_objects 探测连通性与权限。", time: nowStr() });
    try {
      const r = await api("POST", "/oss/test", {});
      if (r?.ok) {
        const meta = [r.bucket && `bucket=${r.bucket}`, r.endpoint && `endpoint=${r.endpoint}`, r.prefix && `prefix=${r.prefix}`]
          .filter(Boolean)
          .join("  ·  ");
        setOssStatus({
          kind: "ok",
          title: "OSS 配置可用",
          detail: r.message || meta || "凭据有效，bucket 可读。",
          time: nowStr(),
        });
      } else {
        setOssStatus({
          kind: "fail",
          title: "OSS 测试失败",
          detail: String(r?.message || "未知错误"),
          time: nowStr(),
        });
      }
    } catch (e) {
      setOssStatus({
        kind: "fail",
        title: "OSS 测试失败",
        detail: String(e?.message || e),
        time: nowStr(),
      });
    } finally {
      setOssTesting(false);
    }
  };

  if (!catalog) return <Spinner />;

  return (
    <div className="settings-page">
      <div className="settings-shell">
        <div className="settings-intro">
          <div>
            <h2 className="page-title">
              <Icon name="settings" /> 设置
            </h2>
            <p className="page-subtitle">集中管理模型调用、OSS、默认生成参数、依赖组件和文件目录。</p>
          </div>
          <span className={"autosave-pill" + (saving ? " saving" : "")}>
            {saving ? <Spinner /> : <Icon name="check" size={12} />}
            {saving ? "自动保存中" : "已启用自动保存"}
          </span>
        </div>

        <SettingSection
          icon="key"
          title="阿里云百炼"
          desc="DashScope API（大模型接口）用于提交 HappyHorse / Wan / 数字人任务。"
          className={apiKeyConfigured ? "" : "api-key-section api-key-section--missing"}
        >
          <SettingField label="DashScope API Key" hint={apiKeyConfigured ? "密钥已保存。默认以密码框隐藏；点击「显示」可查看完整 Key，如需更换请重新粘贴后保存。" : "获取地址：阿里云百炼控制台；填写后请点击保存密钥。"}>
          <div className="api-key-input-row">
            <input
              type={apiKeyVisible ? "text" : "password"}
              value={form.api_key || ""}
              onChange={(e) => updateApiKeyDraft(e.target.value)}
              placeholder={apiKeyConfigured ? "(已保存；重新粘贴可更换)" : "sk-xxxxxxxxxxxxxxxx"}
              autoComplete="off"
              spellCheck={false}
            />
            <button className="btn" type="button" onClick={saveApiKey} disabled={saving || !apiKeyNeedsSave}>
              {saving ? <Spinner /> : <Icon name="save" size={12} />} 保存密钥
            </button>
            <button
              className="btn btn-ghost"
              type="button"
              onClick={toggleApiKeyVisible}
              aria-pressed={apiKeyVisible}
              title={apiKeyVisible ? "隐藏密钥" : "显示密钥"}
            >
              {apiKeyVisible ? "隐藏" : "显示"}
            </button>
            <button className="btn btn-ghost" type="button" onClick={testConnection} disabled={saving || apiTesting}>
              {apiTesting ? <Spinner /> : <Icon name="play" size={12} />} 测试连接
            </button>
          </div>
          </SettingField>
          {apiStatus && (
            <TestResult status={apiStatus} onDismiss={() => setApiStatus(null)} />
          )}
          <SettingField label="区域 Endpoint" hint="该配置影响所有 DashScope 请求发往中国区或国际区。">
          <select
            value={form.base_url || "https://dashscope.aliyuncs.com"}
            onChange={(e) => set("base_url", e.target.value, { immediate: true })}
          >
            <option value="https://dashscope.aliyuncs.com">中国（北京）</option>
            <option value="https://dashscope-intl.aliyuncs.com">国际</option>
          </select>
          </SettingField>
        </SettingSection>

        <SettingSection
          icon="cloud"
          title="阿里云 OSS"
          desc="DashScope 只能读取公网可访问素材，上传图片/视频/音频时会通过 OSS 生成输入 URL。"
        >
          <div className="settings-grid two">
            <SettingField label="Endpoint">
            <input
              value={form.oss_endpoint || ""}
              onChange={(e) => set("oss_endpoint", e.target.value)}
              placeholder="oss-cn-beijing.aliyuncs.com"
            />
            </SettingField>
            <SettingField label="Bucket">
            <input
              value={form.oss_bucket || ""}
              onChange={(e) => set("oss_bucket", e.target.value)}
            />
            </SettingField>
            <SettingField label="AccessKey ID">
            <input
              value={form.oss_access_key_id || ""}
              onChange={(e) => set("oss_access_key_id", e.target.value)}
            />
            </SettingField>
            <SettingField label="AccessKey Secret">
            <input
              type="password"
              value={form.oss_access_key_secret || ""}
              onChange={(e) => set("oss_access_key_secret", e.target.value)}
            />
            </SettingField>
          </div>
          <SettingField label="对象路径前缀" hint="用于区分插件上传的文件，建议保持默认。">
          <input
            value={form.oss_path_prefix || "happyhorse-video"}
            onChange={(e) => set("oss_path_prefix", e.target.value)}
          />
          </SettingField>
          <div className="settings-test-bar">
            <div className="text-xs text-muted">
              {ossFieldsFilled
                ? "已填写四个字段，可点击右侧按钮真实连通一次 OSS。"
                : "请先填写 Endpoint、Bucket、AccessKey ID、AccessKey Secret 后再测试。"}
            </div>
            <button
              className="btn btn-ghost"
              type="button"
              onClick={testOss}
              disabled={ossTesting || !ossFieldsFilled}
            >
              {ossTesting ? <Spinner /> : <Icon name="play" size={12} />} 测试 OSS
            </button>
          </div>
          {ossStatus && (
            <TestResult status={ossStatus} onDismiss={() => setOssStatus(null)} />
          )}
        </SettingSection>

        <SettingSection icon="mic" title="TTS 引擎">
          <div className="tts-radio-row">
            <label>
              <input
                type="radio"
                name="tts_engine"
                checked={(form.tts_engine || "cosyvoice") === "cosyvoice"}
                onChange={() => set("tts_engine", "cosyvoice", { immediate: true })}
              />
              CosyVoice（百炼付费）
            </label>
            <label>
              <input
                type="radio"
                name="tts_engine"
                checked={form.tts_engine === "edge"}
                onChange={() => set("tts_engine", "edge", { immediate: true })}
              />
              Edge-TTS（免费）
            </label>
          </div>
          <div className="text-xs text-muted">
            CosyVoice 音色在创建任务时选择，使用百炼 API Key 计费；Edge-TTS 适合快速免费试听。
          </div>
        </SettingSection>

        <SettingSection icon="settings" title="默认偏好">
          <div className="settings-grid two">
            <SettingField label="默认分辨率">
              <select
                value={form.default_resolution || "720P"}
                onChange={(e) => set("default_resolution", e.target.value, { immediate: true })}
              >
                {["480P", "720P", "1080P"].map((resolution) => (
                  <option key={resolution} value={resolution}>{resolution}</option>
                ))}
              </select>
            </SettingField>
            <SettingField label="默认音色">
              <select
                value={form.default_voice || "longxiaochun_v2"}
                onChange={(e) => set("default_voice", e.target.value, { immediate: true })}
              >
                {FALLBACK_SYSTEM_VOICES.map((voice) => (
                  <option key={voice.id} value={voiceValue(voice)}>{voice.label_zh || voice.label || voice.id}</option>
                ))}
              </select>
            </SettingField>
          </div>
          <SettingField label="成本确认阈值（元）" hint="单次任务超过此金额时弹窗确认。">
            <input
              type="number"
              min="0"
              step="0.5"
              value={form.cost_threshold_cny || "5"}
              onChange={(e) => set("cost_threshold_cny", e.target.value)}
            />
          </SettingField>
        </SettingSection>

        <SettingSection
          icon="wand-sparkles"
          title="默认模型"
          desc="在「创建」页切换模式时自动选中的模型；不配置则使用内置默认。"
        >
        <div className="model-default-list">
          <div className="model-default-row">
            <div className="model-default-name">默认图片模型</div>
            <div>
              <select
                value={form.default_image_model || catalog.image?.default_model || "wan27-pro"}
                onChange={(e) => set("default_image_model", e.target.value, { immediate: true })}
              >
                {(catalog.image?.models || []).map((o) => (
                  // Use the short id as the option value to stay
                  // compatible with the existing settings rows already
                  // written by older builds. The backend's
                  // ``image_model_for`` accepts both the short id and
                  // the real ``model_id`` and always resolves to the
                  // real DashScope id before persisting the task row.
                  <option key={o.id} value={o.id}>
                    {o.label_zh}（{o.model_id}）
                  </option>
                ))}
              </select>
            </div>
          </div>
          <div className="model-default-row">
            <div className="model-default-name">默认图片尺寸</div>
            <div>
              <select
                value={form.default_image_size || catalog.image?.default_size || "2K"}
                onChange={(e) => set("default_image_size", e.target.value, { immediate: true })}
              >
                {(() => {
                  // Show only the sizes supported by the currently
                  // selected default model — different image models
                  // share zero size strings ("2K" vs "1024*1024"), so a
                  // global default size that doesn't match the model
                  // produces an instant 400 on submit.
                  const selectedId = form.default_image_model || catalog.image?.default_model || "";
                  const selected = (catalog.image?.models || []).find((m) => m.id === selectedId || m.model_id === selectedId);
                  const list = selected?.sizes?.length
                    ? selected.sizes
                    : (catalog.image?.sizes || ["1K", "2K", "4K", "1024*1024"]);
                  return list.map((s) => <option key={s} value={s}>{s}</option>);
                })()}
              </select>
            </div>
          </div>
          {(catalog.modes || []).map((m) => {
          const opts = (catalog.models || []).filter((x) => x.mode === m.id);
          return (
            <div key={m.id} className="model-default-row">
              <div className="model-default-name">
                {m.label_zh}
              </div>
              <div>
                <select
                  value={form[`default_model_${m.id}`] || catalog.default_models?.[m.id] || ""}
                  onChange={(e) => set(`default_model_${m.id}`, e.target.value, { immediate: true })}
                >
                  {opts.map((o) => (
                    <option key={o.model_id} value={o.model_id}>
                      {o.label_zh}
                    </option>
                  ))}
                </select>
              </div>
            </div>
          );
          })}
        </div>
        </SettingSection>

        <SettingSection
          icon="package"
          title="Python 依赖"
        >
          <PythonDepsPanel />
        </SettingSection>

        <SettingSection
          icon="package"
          title="系统组件"
          desc="依赖下载器会检测并安装系统级 FFmpeg，避免长视频拼接和预览不可用。"
        >
          <SystemComponentsPanel />
        </SettingSection>

        <SettingSection
          icon="folder"
          title="文件夹与存储"
          desc="选择输出和缓存位置，并查看插件当前占用空间。"
        >
          <StorageSettings form={form} setFormValue={set} />
        </SettingSection>

        <SettingSection icon="info" title="高级">
          <div className="settings-grid two">
            <SettingField label="DashScope 请求超时（秒）">
              <input
                type="number"
                min="10"
                max="600"
                value={form.timeout_sec || "60"}
                onChange={(e) => set("timeout_sec", e.target.value)}
              />
            </SettingField>
            <SettingField label="最大重试次数">
              <input
                type="number"
                min="0"
                max="5"
                value={form.max_retries || "2"}
                onChange={(e) => set("max_retries", e.target.value)}
              />
            </SettingField>
          </div>
        </SettingSection>

        <SettingSection icon="info" title="关于">
          <div className="text-sm text-muted">
          <div>快乐马工作室（HappyHorse Studio）v1.0.0</div>
          <div>
            后端：阿里云百炼 DashScope · HappyHorse 1.0 + Wan 2.6/2.7 + 数字人 5 模式
          </div>
          <div>
            <a href="https://bailian.console.aliyun.com" target="_blank" rel="noreferrer">
              百炼控制台
            </a>
          </div>
        </div>
        </SettingSection>

      </div>
    </div>
  );
}

// ── App ─────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState("image");
  const [catalog, setCatalog] = useState(null);
  const [settings, setSettings] = useState(null);
  const [saveToast, setSaveToast] = useState(null);
  const toastTimer = useRef(null);

  const loadAll = useCallback(async () => {
    try {
      const c = await api("GET", "/catalog");
      setCatalog(c.catalog);
    } catch (_) {}
    try {
      const s = await api("GET", "/settings");
      setSettings(s.config);
    } catch (_) {}
  }, []);

  useEffect(() => {
    loadAll();
    if (window.OpenAkita?.ready) window.OpenAkita.ready();
    return () => clearTimeout(toastTimer.current);
  }, [loadAll]);

  const notifySaved = useCallback((message = "设置已自动保存") => {
    clearTimeout(toastTimer.current);
    setSaveToast({
      id: Date.now(),
      message,
      detail: "已写入本地配置",
      time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
    });
    toastTimer.current = setTimeout(() => setSaveToast(null), 3000);
  }, []);

  const notifyTaskSubmitted = useCallback(({ taskId = "", label = "任务" } = {}) => {
    clearTimeout(toastTimer.current);
    setSaveToast({
      id: Date.now(),
      message: `${label}已提交`,
      detail: taskId ? `已在右侧显示进度，任务 ID：${taskId}` : "已在右侧显示进度",
      time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
    });
    toastTimer.current = setTimeout(() => setSaveToast(null), 3500);
  }, []);

  const handleSettingsSaved = useCallback(async (updates, message) => {
    if (updates) {
      setSettings((prev) => ({ ...(prev || {}), ...updates }));
    }
    notifySaved(message || "设置已自动保存");
    await loadAll();
    if (updates) {
      setSettings((prev) => ({ ...(prev || {}), ...updates }));
    }
  }, [loadAll, notifySaved]);

  return (
    <div className="app">
      {saveToast && (
        <div className="settings-save-toast" role="status" aria-live="polite">
          <div className="settings-save-toast__main">
            <Icon name="check" size={15} />
            <div>
              <strong>{saveToast.message}</strong>
              <span>{saveToast.time} {saveToast.detail}</span>
            </div>
          </div>
        </div>
      )}
      <HeaderNav tab={tab} onTab={setTab} />
      <main className="content">
        <div className="app-alert-region">
          <MissingDashScopeBanner settings={settings} onSettings={() => setTab("settings")} />
        </div>
        {tab === "video" && (
          <CreateTab
            catalog={catalog}
            settings={settings}
            onSubmit={(payload) => payload?.goTasks ? setTab("tasks") : notifyTaskSubmitted(payload)}
            onSettings={() => setTab("settings")}
            initialMode="t2v"
            title="视频生成"
            subtitle="文生、图生、首尾帧、参考生成、视频续写和视频编辑统一在这里选择。"
            showModeChooser
            modeIds={["t2v", "i2v", "i2v_end", "r2v", "video_extend", "video_edit"]}
          />
        )}
        {tab === "digital" && (
          <CreateTab
            catalog={catalog}
            settings={settings}
            onSubmit={(payload) => payload?.goTasks ? setTab("tasks") : notifyTaskSubmitted(payload)}
            onSettings={() => setTab("settings")}
            initialMode="photo_speak"
            title="数字人"
            subtitle="围绕人像、源视频和台词创建口播、换嘴、换人或动作驱动任务。"
            showModeChooser
            modeIds={["photo_speak", "video_relip", "video_reface", "pose_drive", "avatar_compose"]}
          />
        )}
        {tab === "image" && (
          <ImageTab
            catalog={catalog}
            settings={settings}
            onSubmit={(payload) => payload?.goTasks ? setTab("tasks") : notifyTaskSubmitted(payload)}
            onSettings={() => setTab("settings")}
          />
        )}
        {tab === "tasks" && <TasksTab />}
        {tab === "storyboard" && <StoryboardTab catalog={catalog} />}
        {tab === "voices" && <VoicesTab settings={settings} />}
        {tab === "figures" && <FiguresTab />}
        {tab === "prompt" && <PromptTab settings={settings} />}
        {tab === "settings" && (
          <SettingsTab catalog={catalog} settings={settings} onSave={handleSettingsSaved} />
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
