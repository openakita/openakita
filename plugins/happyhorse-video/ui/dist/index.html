const PLUGIN_ID = "happyhorse-video";

function apiBase() {
  const meta = (window.OpenAkita && window.OpenAkita.meta) || {};
  const injected = (meta.apiBase || "").replace(/\/$/, "");
  if (injected.includes("/api/plugins/")) {
    return injected;
  }
  return `${injected}/api/plugins/${PLUGIN_ID}`;
}

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  const url = apiBase() + path;
  const res = await fetch(url, opts);
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error(`${res.status} ${text || res.statusText}`);
  }
  return res.json();
}

function friendlyApiMessage(error, fallback) {
  const msg = String(error?.message || error || "");
  if (/404\b/.test(msg)) return fallback;
  if (/api key|api_key|DashScope API Key|未配置|empty/i.test(msg)) return "";
  const jsonStart = msg.indexOf("{");
  if (jsonStart >= 0) {
    try {
      const payload = JSON.parse(msg.slice(jsonStart));
      return payload.detail || payload.message || payload.error || fallback;
    } catch (_) {}
  }
  return msg.replace(/\s*\{.*\}\s*$/, "").trim() || fallback;
}

function friendlyTaskError(message, fallback = "任务执行失败") {
  const msg = String(message || "");
  const jsonStart = msg.indexOf("{");
  if (jsonStart >= 0) {
    try {
      const payload = JSON.parse(msg.slice(jsonStart));
      if (/asynchronous calls/i.test(payload.message || "")) {
        return "当前 DashScope API Key 不支持异步图片调用，已尝试自动改用同步调用；如果仍失败，请切换到千问图片模型或检查账号权限。";
      }
      return payload.detail || payload.message || payload.error || fallback;
    } catch (_) {}
  }
  if (/asynchronous calls/i.test(msg)) {
    return "当前 DashScope API Key 不支持异步图片调用，请切换到同步图片模型或检查账号权限。";
  }
  return msg || fallback;
}

function iconSvg(name) {
  const iconName = (name || "").includes(":") ? name.split(":").pop() : name;
  const factory = window.OpenAkitaIcons && window.OpenAkitaIcons[iconName];
  if (typeof factory === "function") return factory();
  const inner = ICONIFY_ICONS[iconName] || ICONIFY_ICONS.info;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${inner}</svg>`;
}

function Icon({ name, size = 18, className = "icon" }) {
  const svg = iconSvg(name);
  return (
    <span
      className={className}
      style={{ width: size, height: size, display: "inline-flex" }}
      dangerouslySetInnerHTML={{ __html: svg }}
    />
  );
}

function Tag({ children, kind }) {
  const cls = kind ? `tag tag-${kind}` : "tag";
  return <span className={cls}>{children}</span>;
}

function Banner({ kind = "warning", children }) {
  return (
    <div className={`banner banner-${kind}`}>
      <Icon name={kind === "danger" ? "alert-triangle" : "info"} size={16} />
      <div>{children}</div>
    </div>
  );
}

function Empty({ icon, title, hint }) {
  return (
    <div className="empty">
      <Icon name={icon || "inbox"} size={40} className="icon" />
      <div>{title}</div>
      {hint && <div className="text-xs mt-2">{hint}</div>}
    </div>
  );
}

function Spinner() {
  return <span className="spinner" />;
}

function statusKind(status) {
  if (["succeeded", "done", "completed", "downloaded"].includes(status)) return "success";
  if (["running", "processing", "pending", "queued"].includes(status)) return "info";
  if (status === "cancelled") return "warning";
  return "danger";
}

function HeaderNav({ tab, onTab }) {
  const tabsRef = useRef(null);

  useEffect(() => {
    const el = tabsRef.current;
    if (!el) return;
    const onWheel = (e) => {
      if (el.scrollWidth <= el.clientWidth) return;
      const delta = Math.abs(e.deltaY) >= Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
      if (!delta) return;
      e.preventDefault();
      el.scrollLeft += delta;
    };
    el.addEventListener("wheel", onWheel, { passive: false });
    return () => el.removeEventListener("wheel", onWheel);
  }, []);

  return (
    <>
      <header className="header">
        <h1 className="oa-hero-title">
          <span className="oa-hero-title__icon oa-hero-title__icon--app">

        </h1>
        <div className="header-right">
          <span>v1.0.0</span>
        </div>
      </header>
      <div className="tabs" ref={tabsRef}>
        {TABS.map((t) => (
          <button
            key={t.id}
            className={"tab " + (tab === t.id ? "active" : "")}

function useTaskHeartbeat(taskId) {
  const [task, setTask] = useState(null);

  const refresh = useCallback(async () => {
    if (!taskId) {
      setTask(null);
      return;
    }
    try {
      const r = await api("GET", `/tasks/${taskId}`);
      setTask(r.task || null);
    } catch (_) {}
  }, [taskId]);

  useEffect(() => {
    refresh();
    if (!taskId) return;
    const timer = setInterval(refresh, 2500);
    const sse = new EventSource(apiBase() + "/sse");
    sse.addEventListener("task_update", (e) => {
      try {
        const d = JSON.parse(e.data || "{}");
        // Backend wraps the payload as `{event, data: {task_id, ...}}`.
        // Older revisions sent it flat, so accept either shape.
        const tid = d?.data?.task_id || d?.task_id;
        if (!tid || tid === taskId) refresh();
      } catch (_) {
        refresh();
      }
    });
    return () => {
      clearInterval(timer);
      sse.close();
    };
  }, [taskId, refresh]);

  return task;
}

function UploadUrlField({ label, value, onChange, accept = "*/*", kind = "image", hint }) {
  const [uploading, setUploading] = useState(false);
  const [asset, setAsset] = useState(null);
  const inputRef = useRef(null);

  const upload = async (file) => {
    if (!file) return;
    setUploading(true);
    try {
      const fd = new FormData();
      fd.append("file", file);
      const res = await fetch(apiBase() + "/upload", { method: "POST", body: fd });
      const r = await res.json();
      if (!r.ok) throw new Error(r.error || "upload failed");
      setAsset(r);
      if (!r.oss_url) {
        onChange("");
        alert("素材已上传到本地预览，但未配置 OSS，DashScope 无法读取该文件。请先在设置中配置 OSS，或手动粘贴公网 URL。");
        return;
      }
      onChange(r.oss_url);
    } catch (e) {
      alert(`上传失败：${e.message}`);
    } finally {
      setUploading(false);
    }
  };

  const preview = asset?.preview_url || value;
  const isVideo = kind === "video" || /\.(mp4|mov|webm|mkv)(\?|$)/i.test(preview || "");
  const isAudio = kind === "audio" || /\.(mp3|wav|m4a|aac|ogg|flac)(\?|$)/i.test(preview || "");
  const isImage = kind === "image" || /\.(png|jpe?g|webp|gif|bmp)(\?|$)/i.test(preview || "");

  return (
    <div className="field">
      <label>{label}</label>
      <div className={"upload-zone" + (value ? " is-filled" : "")} onClick={() => inputRef.current?.click()}>
        <input
          ref={inputRef}
          type="file"
          accept={accept}
          style={{ display: "none" }}
          onChange={(e) => upload(e.target.files?.[0])}
        />
        {preview && isImage ? (
          <img src={preview} alt="" className="upload-preview" />
        ) : preview && isVideo ? (
          <video src={preview} className="upload-preview" muted />
        ) : (
          <div className="upload-zone__body">
            <span className="upload-zone__icon">
              {uploading ? <Spinner /> : <Icon name={isAudio ? "mic" : isVideo ? "video" : "image-play"} size={22} />}
            </span>
            <div className="upload-zone__text">
              <div className="upload-zone__title">{uploading ? "上传中…" : "点击上传素材"}</div>
              <div className="upload-zone__hint">{hint || "支持本地文件上传，也可以在下方直接粘贴公网 URL"}</div>
            </div>
          </div>
        )}
      </div>
      <input value={value} onChange={(e) => onChange(e.target.value)} placeholder="https://..." />
    </div>
  );
}

// MultiUploadUrlField — N-row upload editor backed by an array of URLs.
// Used by CreateTab for `reference_urls` and `image_urls` so the user
// can either upload several files (each pushed to OSS) or paste public
// URLs, instead of having to comma-separate them in a single textbox.
function MultiUploadUrlField({ label, values, onChange, accept = "*/*", kind = "image", hint, max = 9 }) {
  const list = Array.isArray(values) ? values : [];
  const setAt = (idx, v) => {
    const next = [...list];
    next[idx] = v;
    onChange(next.filter((s, i) => s || i < next.length - 1));
  };
  const removeAt = (idx) => {
    onChange(list.filter((_, i) => i !== idx));
  };
  const append = () => {
    if (list.length >= max) return;
    onChange([...list, ""]);
  };
  const rows = list.length ? list : [""];
  return (
    <div className="field multi-upload-field">
      <label>{label}</label>
      {rows.map((url, idx) => (
        <div key={idx} className="multi-upload-row">
          <UploadUrlField
            label={`#${idx + 1}`}
            value={url}
            onChange={(v) => setAt(idx, v)}
            accept={accept}
            kind={kind}
            hint={idx === 0 ? hint : ""}
          />
          {rows.length > 1 && (
            <button type="button" className="btn btn-ghost btn-sm" onClick={() => removeAt(idx)}>
              <Icon name="trash" size={12} /> 删除
            </button>
          )}
        </div>
      ))}
      {list.length < max && (
        <button type="button" className="btn btn-ghost btn-sm" onClick={append}>
          <Icon name="plus" size={12} /> 添加一张
        </button>
      )}
    </div>
  );
}

    setUploading(true);
    try {
      const fd = new FormData();
      fd.append("file", file);
      const res = await fetch(apiBase() + "/upload", { method: "POST", body: fd });
      const r = await res.json();
      if (!r.ok) throw new Error(r.error || "upload failed");
      onUploaded(r);
      // Mirror UploadUrlField's OSS-missing warning so the user knows
      // the asset is local-only and DashScope models that need a public
      // URL (face-detect, s2v, videoretalk, animate-mix) will fail.
      if (!r.oss_url) {
        alert(
          "素材已上传到本地预览，但未配置 OSS。\n\n" +
          "DashScope 需要公网可访问的 URL；请先在「设置 → OSS」配置 endpoint/bucket/key/secret，" +
          "或手动输入一个公网 URL 后再提交任务。"
        );
      }
    } catch (e) {
      alert(`上传失败：${e.message}`);
    } finally {
      setUploading(false);
    }
  };

  const preview = value?.preview_url || value?.oss_url || "";
  const isImage = kind === "image";
  const isAudio = kind === "audio";

  return (
    <div className={"upload-zone library-upload" + (value ? " is-filled" : "")} onClick={() => inputRef.current?.click()}>
      <input
        ref={inputRef}
        type="file"
        accept={accept}
        style={{ display: "none" }}
        onChange={(e) => upload(e.target.files?.[0])}
      />
      {value && isImage ? (
        <img src={preview} alt="" className="upload-preview" />
      ) : value && isAudio ? (
        <div className="upload-zone__body">
          <span className="upload-zone__icon"><Icon name="mic" size={22} /></span>
          <div className="upload-zone__text">
            <div className="upload-zone__title">{value.asset?.original_name || "音频已上传"}</div>
            <div className="upload-zone__hint">{value.oss_url ? "已生成公网 OSS URL" : "已保存本地预览文件"}</div>
          </div>
        </div>
      ) : (
        <div className="upload-zone__body">
          <span className="upload-zone__icon">
            {uploading ? <Spinner /> : <Icon name={isAudio ? "mic" : "image-up"} size={22} />}
          </span>
          <div className="upload-zone__text">
            <div className="upload-zone__title">{uploading ? "上传中…" : "点击上传素材"}</div>
            <div className="upload-zone__hint">{hint || "选择本地文件后会自动上传并回填到表单"}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function TaskPreviewPane({ taskId, task, costPreview, onGoTasks, showCost = true }) {
  const liveTask = task || null;
  const videoUrl = taskVideoUrl(liveTask);
  const imageUrls = taskImageUrls(liveTask);
  const status = liveTask?.status;

  if (!taskId) {
    return (
      <div className="split-right oa-preview-area">
        <div className="oa-preview-empty">
          <div className="oa-preview-empty__icon">
            <Icon name="film" size={34} />
          </div>
          <div className="oa-preview-empty__title">暂无当前任务</div>
          <div className="oa-preview-empty__hint">左侧填写参数并提交后，这里会显示生成进度和视频预览。</div>
        </div>
        {showCost && <CostPreviewCard costPreview={costPreview} />}
      </div>
    );
  }

  return (
    <div className="split-right oa-preview-area">
      <div className="card task-preview-head">
        <div>
          <h3 className="card-title">本次任务</h3>
          <div className="text-xs text-muted font-mono">{taskId}</div>
        </div>
        <div className="flex gap-2 items-center">
          <TaskStatusBadge status={status || "pending"} />
          {onGoTasks && (
            <button className="btn btn-sm btn-ghost" onClick={onGoTasks}>
              <Icon name="list" size={12} /> 任务详情
            </button>
          )}
        </div>
      </div>

      {(!liveTask || status === "pending" || status === "running") && (
        <ProgressLoader task={liveTask} />
      )}

      {(status === "succeeded" || status === "done") && (
        videoUrl ? (
          <div className="video-player-wrap">
            <video src={videoUrl} controls loop />
          </div>
        ) : imageUrls.length ? (
          <div className={"image-result-grid" + (imageUrls.length === 1 ? " image-result-grid--single" : "")}>
            {imageUrls.map((url, idx) => (
              <a key={url + idx} href={url} target="_blank" rel="noreferrer" className="image-result-card">
                <img src={url} alt={`生成图片 ${idx + 1}`} />
                <span>图片 {idx + 1}</span>
              </a>
            ))}
          </div>
        ) : (
          <div className="video-player-wrap video-player-empty">
            <Empty icon="alert-triangle" title="任务完成但没有返回可预览素材" />
          </div>
        )
      )}

      {(status === "failed" || status === "cancelled" || status === "timeout") && (
        <div className="card">
          <Banner kind="danger">
            {friendlyTaskError(liveTask?.error_message, `任务状态：${status}`)}
          </Banner>
        </div>
      )}

      {liveTask && (
        <div className="card task-meta-card">
          <div className="task-meta-grid">
            <div>
              <span>模式</span>
              <strong>{liveTask.mode || "—"}</strong>
            </div>
            <div>
              <span>模型</span>
              <strong>{liveTask.model_id || "—"}</strong>
            </div>
            <div>
              <span>创建时间</span>
              <strong>{formatTaskTime(liveTask.created_at)}</strong>
            </div>
          </div>
          {liveTask.prompt && (
            <div className="task-prompt-preview">{liveTask.prompt}</div>
          )}
        </div>
      )}

      {showCost && <CostPreviewCard costPreview={costPreview} />}
    </div>
  );
}

function CreateTab({
  catalog,
  settings,
  onSubmit,
  onSettings,
  initialMode = "t2v",
  title = "视频生成",
  subtitle = "按左侧步骤补齐素材、提示词和输出参数，右侧查看成本、进度与预览。",
  showModeChooser = false,
  modeIds = null,
}) {
  catalog = catalog || DEFAULT_CATALOG;
  const [mode, setMode] = useState(initialMode);
  const [modelId, setModelId] = useState("");
  const [prompt, setPrompt] = useState("");
  const [duration, setDuration] = useState(5);
  const [resolution, setResolution] = useState("720P");
  const [aspect, setAspect] = useState("16:9");
  const [voiceId, setVoiceId] = useState("");
  const [text, setText] = useState("");
  const [firstFrame, setFirstFrame] = useState("");
  const [lastFrame, setLastFrame] = useState("");
  const [sourceVideo, setSourceVideo] = useState("");
  const [imageUrl, setImageUrl] = useState("");
  const [imageUrls, setImageUrls] = useState([]);
  const [referenceUrls, setReferenceUrls] = useState([]);
  const [audioUrl, setAudioUrl] = useState("");
  // ── Advanced parameters (Wan 2.6 / 2.7 family) ─────────────────────
  // Each field is silently dropped by the backend when the selected
  // model doesn't advertise the matching ``supports_*`` capability,
  // so users can leave the panel collapsed without breaking anything.
  const [advOpen, setAdvOpen] = useState(false);
  const [promptExtend, setPromptExtend] = useState(true);
  const [negativePrompt, setNegativePrompt] = useState("");
  const [watermark, setWatermark] = useState(false);
  const [shotType, setShotType] = useState("");
  const [drivingAudioUrl, setDrivingAudioUrl] = useState("");
  // ``audioEnabled`` only affects Wan 2.6 *-flash; null = inherit
  // default (the model decides). We initialise to null on first paint.
  const [audioEnabled, setAudioEnabled] = useState(null);
  const [costPreview, setCostPreview] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [previewTaskId, setPreviewTaskId] = useState("");
  const modeIdSet = useMemo(() => (modeIds ? new Set(modeIds) : null), [modeIds]);
  const visibleModeGroups = useMemo(
    () => MODE_GROUPS
      .map((g) => ({ ...g, modes: g.modes.filter((mid) => !modeIdSet || modeIdSet.has(mid)) }))
      .filter((g) => g.modes.length),
    [modeIdSet]
  );

  useEffect(() => {
    setMode(initialMode);
    setPreviewTaskId("");
  }, [initialMode]);

  const modeSpec = useMemo(
    () => (catalog?.modes || []).find((m) => m.id === mode),
    [catalog, mode]
  );
  const modelOptions = useMemo(
    () => (catalog?.models || []).filter((m) => m.mode === mode),
    [catalog, mode]
  );

  // Default model — settings override → registry default → first option.
  useEffect(() => {
    const fromSettings = settings?.[`default_model_${mode}`];
    const fromCatalog = catalog?.default_models?.[mode];
    setModelId(fromSettings || fromCatalog || modelOptions[0]?.model_id || "");
  }, [mode, catalog, settings]);

  // Per-model allowed resolutions / durations / aspects. The global
  // catalog.resolutions list is just the union of every model; using it
  // verbatim lets the user pick e.g. "480P" for happyhorse-1.0-t2v which
  // only accepts 720P/1080P, and DashScope then 422s on submit.
  const modelEntry = useMemo(
    () => modelOptions.find((m) => m.model_id === modelId || m.id === modelId),
    [modelOptions, modelId]
  );
  const allowedResolutions = useMemo(() => {
    const list = (modelEntry?.resolutions && modelEntry.resolutions.length)
      ? modelEntry.resolutions
      : (catalog.resolutions || ["480P", "720P", "1080P"]);
    return list;
  }, [modelEntry, catalog]);
  const allowedAspects = useMemo(() => {
    const list = (modelEntry?.aspects && modelEntry.aspects.length)
      ? modelEntry.aspects
      : (catalog.aspects || ["16:9", "9:16", "1:1", "4:3", "3:4"]);
    return list;
  }, [modelEntry, catalog]);
  const allowedDuration = useMemo(() => {
    const range = modelEntry?.duration_range;
    return Array.isArray(range) && range.length === 2 ? range : [3, 15];
  }, [modelEntry]);

  useEffect(() => {
    if (allowedResolutions.length && !allowedResolutions.includes(resolution)) {
      setResolution(allowedResolutions[0]);
    }
  }, [allowedResolutions]);
  useEffect(() => {
    if (allowedAspects.length && !allowedAspects.includes(aspect)) {
      setAspect(allowedAspects[0]);
    }
  }, [allowedAspects]);
  useEffect(() => {
    const [lo, hi] = allowedDuration;
    if (duration < lo) setDuration(lo);
    else if (duration > hi) setDuration(hi);
  }, [allowedDuration]);

  useEffect(() => {
    if (voiceId) return;
    const voices = (catalog.voices || []).length ? catalog.voices : FALLBACK_SYSTEM_VOICES;
    setVoiceId(settings?.default_voice || voiceValue(voices[0]) || "");
  }, [catalog, settings, voiceId]);

  // Engine is fully derived from the chosen voice; centralize the rule
  // so cost preview and submit can never disagree (and tests can target
  // a single source).
  const ttsEngine = useMemo(
    () => (voiceId.startsWith("zh-") ? "edge" : "cosyvoice"),
    [voiceId]
  );

  // Stable idempotency token per form lifetime — reset after each
  // successful submission. Without this, the previous `web_${Date.now()}`
  // form generated a fresh token on every click, defeating the backend's
  // ``client_request_id`` double-submit guard for rapid double-clicks.
  const requestIdRef = useRef(`web_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`);

  // Cost preview (debounced). The dependency array intentionally includes
  // ``ttsEngine`` so switching from a cosyvoice voice to an Edge-TTS
  // voice (or vice versa) re-runs the preview — both engines have
  // different per-10k-char prices in PRICE_TABLE.
  useEffect(() => {
    if (!mode) return;
    const t = setTimeout(async () => {
      try {
        const r = await api("POST", "/cost-preview", {
          mode,
          model_id: modelId,
          duration,
          resolution,
          aspect_ratio: aspect,
          text,
          tts_engine: ttsEngine,
          // ``audio`` / ``driving_audio_url`` shift the price tier for
          // Wan 2.6 -flash variants; include them so the preview tracks
          // the real cost as the user toggles "background audio".
          ...(audioEnabled !== null ? { audio: audioEnabled } : {}),
          ...(drivingAudioUrl ? { driving_audio_url: drivingAudioUrl } : {}),
        });
        setCostPreview(r);
      } catch (_) {}
    }, 300);
    return () => clearTimeout(t);
  }, [mode, modelId, duration, resolution, aspect, text, ttsEngine, audioEnabled, drivingAudioUrl]);

  const submit = async () => {
    const approved = !costPreview?.exceeds_threshold || window.confirm(
      `本次预估成本为 ${costPreview.formatted_total || "较高"}，已超过阈值。确认继续提交吗？`
    );
    if (!approved) return;
    setSubmitting(true);
    try {
      const body = {
        mode,
        model_id: modelId,
        prompt,
        duration,
        resolution,
        aspect_ratio: aspect,
        voice_id: voiceId,
        tts_engine: ttsEngine,
        text,
        first_frame_url: firstFrame,
        last_frame_url: lastFrame,
        source_video_url: sourceVideo,
        image_url: imageUrl,
        image_urls: (imageUrls || []).map((s) => (s || "").trim()).filter(Boolean),
        reference_urls: (referenceUrls || []).map((s) => (s || "").trim()).filter(Boolean),
        audio_url: audioUrl,
        // ── Advanced (Wan 2.6 / 2.7) parameters ──────────────────────
        // Always sent; the backend silently drops fields the selected
        // model doesn't advertise via ``supports_*``, so the wire
        // payload is consistent regardless of model.
        prompt_extend: !!promptExtend,
        negative_prompt: (negativePrompt || "").trim(),
        watermark: !!watermark,
        shot_type: (shotType || "").trim(),
        driving_audio_url: (drivingAudioUrl || "").trim(),
        ...(audioEnabled !== null ? { audio: audioEnabled } : {}),
        cost_approved: !!costPreview?.exceeds_threshold,
        client_request_id: requestIdRef.current,
      };
      const r = await api("POST", "/tasks", body);
      const tid = r.task?.task_id || r.task?.id || "";
      if (tid) setPreviewTaskId(tid);
      // Reset the token so the next legitimate submit doesn't reuse this
      // one (which would short-circuit to the just-created task row).
      requestIdRef.current = `web_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
      if (tid) onSubmit?.({ taskId: tid, label: "视频任务" });
    } catch (e) {
      alert(`提交失败: ${e.message}`);
    } finally {
      setSubmitting(false);
    }
  };

  const liveTask = useTaskHeartbeat(previewTaskId);

  // Digital-human modes drive purely from image + audio/voice and don't
  // need a text prompt; their MODE spec on the backend reflects that.
  // ``CreateTab`` used to disable submit on `!prompt`, blocking these
  // perfectly valid task shapes.
  const PROMPT_OPTIONAL_MODES = new Set([
    "photo_speak",
    "video_relip",
    "video_reface",
    "pose_drive",
    "avatar_compose",
  ]);
  const promptRequired = !PROMPT_OPTIONAL_MODES.has(mode);
  const submitDisabled = submitting || (promptRequired && !prompt.trim());

  return (
    <div className="split-layout workbench-layout">
      <div className="split-left create-panel">
        <div className="workbench-title">
          <div>
        <h2 className="page-title">
          <Icon name={modeSpec?.icon || "wand-sparkles"} /> {title}
        </h2>
            <p className="page-subtitle">{subtitle}</p>
          </div>
        </div>

        {showModeChooser && (
          <section className="card create-section create-section--mode">
            <div className="create-section__head">
              <h3><Icon name="layers" size={14} /> 生成模式</h3>
              <span>选择当前大类下的具体能力</span>
            </div>
            {visibleModeGroups.map((g) => (
              <div key={g.label} className="mode-block">
                <p className="mode-group-label">{g.label}</p>
                <div className="mode-grid">
                  {g.modes.map((mid) => {
                    const m = (catalog.modes || []).find((x) => x.id === mid);
                    if (!m) return null;
                    return (
                      <button
                        key={mid}
                        className={"mode-btn" + (mode === mid ? " active" : "")}
                        onClick={() => setMode(mid)}
                        title={m.description_zh}
                      >
                        <Icon name={m.icon || "wand-sparkles"} size={18} />
                        <div>{m.label_zh}</div>
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </section>
        )}

        <section className="card create-section">
          <div className="create-section__head">
            <h3><Icon name="settings" size={14} /> 模型与提示词</h3>
            <span>{modeSpec?.label_zh || mode}</span>
          </div>
          <div className="field">
            <label>模型 (model_id)</label>
            <select value={modelId} onChange={(e) => setModelId(e.target.value)}>
              {modelOptions.map((m) => (
                <option key={m.model_id} value={m.model_id}>
                  {m.label_zh}
                  {catalog.default_models?.[mode] === m.model_id ? "（默认）" : ""}
                </option>
              ))}
            </select>
          </div>

          <div className="field">
            <label>提示词 (prompt)</label>
            <textarea
              value={prompt}
              onChange={(e) => setPrompt(e.target.value)}
              placeholder="例如：电影级画质，5秒，16:9，温暖治愈\n0-2秒：中景，主角推开门\n2-5秒：跟镜头，主角走进花园\n【声音】轻柔钢琴 + 鸟鸣"
            />
          </div>
        </section>

        <section className="card create-section">
          <div className="create-section__head">
            <h3><Icon name="image-up" size={14} /> 素材与台词</h3>
            <span>按当前模式显示必填项</span>
          </div>
          {(modeSpec?.required_assets || []).includes("first_frame_url") && (
            <UploadUrlField
              label="首帧素材 (first_frame_url)"
              value={firstFrame}
              onChange={setFirstFrame}
              accept="image/*"
              kind="image"
              hint="上传一张作为视频开头的图片"
            />
          )}
          {(modeSpec?.required_assets || []).includes("last_frame_url") && (
            <UploadUrlField
              label="尾帧素材 (last_frame_url)"
              value={lastFrame}
              onChange={setLastFrame}
              accept="image/*"
              kind="image"
              hint="上传一张作为视频结尾的图片"
            />
          )}
          {(modeSpec?.required_assets || []).includes("source_video_url") && (
            <UploadUrlField
              label="源视频素材 (source_video_url)"
              value={sourceVideo}
              onChange={setSourceVideo}
              accept="video/*"
              kind="video"
              hint="上传需要续写、编辑、换脸或口型重配的视频"
            />
          )}
          {(modeSpec?.required_assets || []).includes("image_url") && (
            <UploadUrlField
              label="人脸 / 形象图 (image_url)"
              value={imageUrl}
              onChange={setImageUrl}
              accept="image/*"
              kind="image"
              hint="正面单人照效果最佳"
            />
          )}
          {(modeSpec?.required_assets || []).includes("image_urls") && (
            <MultiUploadUrlField
              label="额外参考图 (image_urls)"
              values={imageUrls}
              onChange={setImageUrls}
              accept="image/*"
              kind="image"
              hint="按需上传 1-9 张额外参考图，会一并发给 DashScope"
            />
          )}
          {(modeSpec?.required_assets || []).includes("reference_urls") && (
            <MultiUploadUrlField
              label="参考人物图 (reference_urls)"
              values={referenceUrls}
              onChange={setReferenceUrls}
              accept="image/*"
              kind="image"
              hint="r2v / long_video 接受多张参考人物图，多角色互动时建议每个角色一张"
            />
          )}

          {!modeSpec?.native_audio_sync && (
            <div className="create-audio-grid">
              <div className="create-audio-card create-audio-card--tts">
                <div className="create-audio-card__head">
                  <Icon name="mic" size={16} />
                  <div>
                    <strong>文字合成 TTS</strong>
                    <span>选择音色并填写台词，系统会自动生成配音。</span>
                  </div>
                </div>
                <div className="create-audio-form">
                  <div className="field">
                    <label>音色</label>
                    <select value={voiceId} onChange={(e) => setVoiceId(e.target.value)}>
                      <option value="">(无)</option>
                      {((catalog.voices || []).length ? catalog.voices : FALLBACK_SYSTEM_VOICES).map((v) => (
                        <option key={v.id} value={voiceValue(v)}>
                          [{v.engine}] {v.label_zh || v.label}
                        </option>
                      ))}
                    </select>
                  </div>
                  <div className="field">
                    <label>台词</label>
                    <textarea
                      className="voice-script-input"
                      value={text}
                      onChange={(e) => setText(e.target.value)}
                      placeholder="输入要朗读的台词。可以是一段完整口播、旁白或角色对白。"
                    />
                  </div>
                </div>
              </div>
              <div className="create-audio-card create-audio-card--upload">
                <div className="create-audio-card__head">
                  <Icon name="upload" size={16} />
                  <div>
                    <strong>上传成品音频</strong>
                    <span>已有配音时上传音频，会优先于左侧 TTS 使用。</span>
                  </div>
                </div>
                <UploadUrlField
                  label="音频素材"
                  value={audioUrl}
                  onChange={setAudioUrl}
                  accept="audio/*"
                  kind="audio"
                  hint="上传配音音频，或粘贴音频 URL"
                />
              </div>
            </div>
          )}
          {modeSpec?.native_audio_sync && !(modeSpec?.required_assets || []).length && (
            <div className="compact-empty-note">当前模式仅需要提示词和输出参数，无额外素材。</div>
          )}
        </section>

        <section className="card create-section">
          <div className="create-section__head">
            <h3><Icon name="settings" size={14} /> 输出参数</h3>
            <span>控制视频规格</span>
          </div>
          <div className="settings-grid three">
            <div className="field">
              <label>时长 (秒)</label>
              <input
                type="number"
                value={duration}
                onChange={(e) => {
                  const [lo, hi] = allowedDuration;
                  const v = parseInt(e.target.value, 10);
                  if (Number.isFinite(v)) {
                    setDuration(Math.max(lo, Math.min(hi, v)));
                  } else {
                    setDuration(lo);
                  }
                }}
                min={allowedDuration[0]}
                max={allowedDuration[1]}
              />
            </div>
            <div className="field">
              <label>分辨率</label>
              <select value={resolution} onChange={(e) => setResolution(e.target.value)}>
                {allowedResolutions.map((r) => (
                  <option key={r}>{r}</option>
                ))}
              </select>
            </div>
            <div className="field">
              <label>比例</label>
              <select value={aspect} onChange={(e) => setAspect(e.target.value)}>
                {allowedAspects.map((a) => (
                  <option key={a}>{a}</option>
                ))}
              </select>
            </div>
          </div>
        </section>

        {/*
          ── 高级参数面板 ──
          Only render fields the *selected model* actually supports
          (capability flags from the catalog). Wan 2.6 / 2.7 models
          surface most; HappyHorse 1.0 surfaces none (it rejects the
          underlying parameters server-side). The whole section is
          hidden when no advanced field is supported, so the UI stays
          clean for HappyHorse users.
        */}
        {modelEntry && (
          modelEntry.supports_prompt_extend ||
          modelEntry.supports_negative_prompt ||
          modelEntry.supports_watermark ||
          modelEntry.supports_audio_url ||

                    <label title="开启后在画面右下角打印「AI 生成」水印">

                        type="checkbox"

                        onChange={(e) => setWatermark(e.target.checked)}

                      显示水印 (watermark)

                )}
                {modelEntry.shot_types && modelEntry.shot_types.length > 0 && (
                  <div className="field">
                    <label>镜头类型 (shot_type)</label>
                    <select value={shotType} onChange={(e) => setShotType(e.target.value)}>

                      {modelEntry.shot_types.map((s) => (
                        <option key={s} value={s}>

                        </option>
                      ))}
                    </select>
                  </div>
                )}
                {/* Wan 2.6 *-flash variants accept an audio on/off
                    toggle that halves the per-second price when off. */}
                {modelEntry.model_id && /flash/.test(modelEntry.model_id) && (
                  <div className="field">
                    <label title="关闭则生成无声视频；万相 2.6 *-flash 无声档单价减半">
                      生成音轨 (audio)

                    <select
                      value={audioEnabled === null ? "" : audioEnabled ? "true" : "false"}
                      onChange={(e) => {

                      <option value="">（模型默认）</option>
                      <option value="true">开启 audio=true</option>
                      <option value="false">关闭 audio=false（更便宜）</option>

                {modelEntry.supports_audio_url && (
                  <div className="field" style={{ gridColumn: "1 / -1" }}>
                    <UploadUrlField
                      label="背景 / 驱动音频 URL (driving_audio_url)"

                {modelEntry.supports_negative_prompt && (
                  <div className="field" style={{ gridColumn: "1 / -1" }}>

                      rows={2}

        <div className="create-submit-bar">

            {submitting ? <Spinner /> : <Icon name="rocket" size={14} />}
            {submitting ? "提交中…" : "提交任务"}

      <TaskPreviewPane
        taskId={previewTaskId}
        task={liveTask}
        costPreview={costPreview}
        onGoTasks={() => onSubmit?.({ goTasks: true })}

  );
}

// ── Image Tab ───────────────────────────────────────────────────────

function ImageTab({ catalog, settings, onSubmit, onSettings }) {
  catalog = catalog || DEFAULT_CATALOG;
  const imageCatalog = catalog?.image || {};
  const modes = imageCatalog.modes || [];
  const models = imageCatalog.models || [];
  const [mode, setMode] = useState("image_text2img");
  const [modelId, setModelId] = useState(settings?.default_image_model || imageCatalog.default_model || "wan27-pro");
  const [size, setSize] = useState(settings?.default_image_size || imageCatalog.default_size || "2K");
  const [prompt, setPrompt] = useState("");
  const [productName, setProductName] = useState("");
  const [negativePrompt, setNegativePrompt] = useState("");
  const [n, setN] = useState(1);
  const [imageUrls, setImageUrls] = useState("");
  const [styleIndex, setStyleIndex] = useState(0);
  const [outputRatio, setOutputRatio] = useState("");
  const [sketchStyle, setSketchStyle] = useState("<watercolor>");
  const [scenes, setScenes] = useState(["hero", "scene"]);
  const [busy, setBusy] = useState(false);
  const [previewTaskId, setPreviewTaskId] = useState("");

  useEffect(() => {
    setModelId(settings?.default_image_model || imageCatalog.default_model || "wan27-pro");
    setSize(settings?.default_image_size || imageCatalog.default_size || "2K");
  }, [settings, imageCatalog.default_model, imageCatalog.default_size]);

  // Image models declare wildly different size spaces ("2K" vs
  // "1024*1024" vs "1664*928"...). When the user switches models, the
  // previously-chosen size is almost always invalid for the new model
  // and DashScope rejects the request with a 400. Auto-snap the size
  // back into the new model's allowed set whenever the model id
  // changes (or the catalog reloads).
  useEffect(() => {
    const m = models.find((x) => x.id === modelId);
    const allowed = m?.sizes?.length ? m.sizes : (imageCatalog.sizes || []);
    if (allowed.length && !allowed.includes(size)) {
      setSize(m?.default_size || allowed[0]);
    }
  }, [modelId, models, imageCatalog.sizes]);

  const selectedModel = models.find((m) => m.id === modelId) || models[0];
  const sizes = selectedModel?.sizes?.length ? selectedModel.sizes : (imageCatalog.sizes || ["2K"]);
  const modeSpec = modes.find((m) => m.id === mode);
  const requiresImages = (modeSpec?.required_assets || []).includes("images");
  const parsedImages = imageUrls.split(/[\s,]+/).map((s) => s.trim()).filter(Boolean);
  const liveTask = useTaskHeartbeat(previewTaskId);

  // Stable per-form-lifetime idempotency token (see CreateTab notes).
  const imageRequestIdRef = useRef(`web_img_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`);

  const submit = async () => {
    setBusy(true);
    try {
      const r = await api("POST", "/image-tasks", {
        mode,
        prompt,
        product_name: productName,
        model_id: modelId,
        size,
        negative_prompt: negativePrompt,
        n,
        images: parsedImages,
        style_index: styleIndex,
        output_ratio: outputRatio,
        sketch_style: sketchStyle,
        ecommerce_scenes: scenes,
        client_request_id: imageRequestIdRef.current,
        wait_for_completion: false,
      });
      const tid = r.task?.task_id || r.task?.id || "";
      if (tid) setPreviewTaskId(tid);
      // Roll the token so the next submit is treated as a new request.
      imageRequestIdRef.current = `web_img_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
      if (tid) onSubmit?.({ taskId: tid, label: "图片任务" });
    } catch (e) {
      alert(`提交失败：${e.message}`);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="split-layout workbench-layout">
      <div className="split-left create-panel">
        <div className="workbench-title">
          <div>
            <h2 className="page-title"><Icon name="image" /> 图片生成</h2>
            <p className="page-subtitle">先生成分镜图、角色图、电商图，再用 asset_ids 继续图生视频。</p>
          </div>
        </div>

        <section className="card create-section">
          <div className="create-section__head">
            <h3><Icon name="layers" size={14} /> 图片模式</h3>
            <span>万相 / 千问图片能力</span>
          </div>
          <div className="mode-grid image-mode-grid">
            {modes.map((m) => (
              <button key={m.id} className={"mode-btn" + (mode === m.id ? " active" : "")} onClick={() => setMode(m.id)} title={m.description_zh}>
                <Icon name={m.icon || "image"} size={18} />
                <div>{m.label_zh}</div>
              </button>
            ))}
          </div>
        </section>

        <section className="card create-section">
          <div className="create-section__head">
            <h3><Icon name="settings" size={14} /> 模型与提示词</h3>
            <span>{modeSpec?.label_zh || mode}</span>
          </div>
          <div className="settings-grid two">
            <div className="field">
              <label>图片模型</label>
              <select value={modelId} onChange={(e) => setModelId(e.target.value)}>
                {models.map((m) => <option key={m.id} value={m.id}>{m.label_zh}</option>)}
              </select>
            </div>
            <div className="field">
              <label>尺寸</label>
              <select value={size} onChange={(e) => setSize(e.target.value)}>
                {sizes.map((s) => <option key={s}>{s}</option>)}
              </select>
            </div>
          </div>
          <div className="field">
            <label>{mode === "image_ecommerce" ? "商品/画面提示词" : "提示词"}</label>
            <textarea value={prompt} onChange={(e) => setPrompt(e.target.value)} placeholder="描述主体、场景、风格、构图、用途和质量要求" />
          </div>
          {selectedModel?.supports_negative && (
            <div className="field">
              <label>反向提示词 (negative_prompt)</label>
              <input value={negativePrompt} onChange={(e) => setNegativePrompt(e.target.value)} placeholder="不想出现的元素" />
            </div>
          )}
        </section>

        <section className="card create-section">
          <div className="create-section__head">
            <h3><Icon name="upload" size={14} /> 素材与专用参数</h3>
            <span>{requiresImages ? "当前模式需要输入图" : "可直接文生图"}</span>
          </div>
          {requiresImages && (
            <UploadUrlField
              label="输入图片 URLs（可上传；多个用逗号或换行分隔）"
              value={imageUrls}
              onChange={setImageUrls}
              accept="image/*"
              kind="image"
              hint="用于编辑、重绘、扩图或草图生成"
            />
          )}
          <div className="settings-grid three">
            <div className="field">
              <label>生成张数</label>
              <input type="number" min="1" max="4" value={n} onChange={(e) => setN(parseInt(e.target.value, 10) || 1)} />
            </div>
            {mode === "image_style_repaint" && (
              <div className="field">
                <label>风格</label>
                <select value={styleIndex} onChange={(e) => setStyleIndex(parseInt(e.target.value, 10) || 0)}>
                  {(imageCatalog.style_presets || []).map((s) => <option key={s.index} value={s.index}>{s.name}</option>)}
                </select>
              </div>
            )}
            {mode === "image_outpaint" && (
              <div className="field">
                <label>扩图比例</label>
                <select value={outputRatio} onChange={(e) => setOutputRatio(e.target.value)}>
                  <option value="">自动</option>
                  <option value="1:1">1:1</option>
                  <option value="16:9">16:9</option>
                  <option value="9:16">9:16</option>
                  <option value="4:3">4:3</option>
                </select>
              </div>
            )}
            {mode === "image_sketch" && (
              <div className="field">
                <label>草图风格</label>
                <select value={sketchStyle} onChange={(e) => setSketchStyle(e.target.value)}>
                  {(imageCatalog.sketch_styles || []).map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
            )}
          </div>
          {mode === "image_ecommerce" && (
            <>
              <div className="field">
                <label>商品名称</label>
                <input value={productName} onChange={(e) => setProductName(e.target.value)} placeholder="例如：黑色便携咖啡机" />
              </div>
              <div className="filter-group__buttons">
                {(imageCatalog.ecommerce_scenes || []).map((s) => (
                  <button key={s.id} className={"mode-btn" + (scenes.includes(s.id) ? " active" : "")} onClick={() => setScenes((prev) => prev.includes(s.id) ? prev.filter((x) => x !== s.id) : [...prev, s.id])}>
                    {s.name}
                  </button>
                ))}
              </div>
            </>
          )}
        </section>

        <div className="create-submit-bar">
          <button className="btn btn-block" onClick={submit} disabled={busy || (!prompt && !productName && mode !== "image_style_repaint" && mode !== "image_outpaint") || (requiresImages && !parsedImages.length)}>
            {busy ? <Spinner /> : <Icon name="rocket" size={14} />}
            {busy ? "提交中…" : "提交图片任务"}
          </button>
        </div>
      </div>

      <TaskPreviewPane
        taskId={previewTaskId}
        task={liveTask}
        showCost={false}
        onGoTasks={() => onSubmit?.({ goTasks: true })}
      />
    </div>
  );
}

// ── Tasks Tab ───────────────────────────────────────────────────────

function TasksTab() {
  const [tasks, setTasks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedId, setSelectedId] = useState("");
  const [statusFilter, setStatusFilter] = useState("all");
  const [modeFilter, setModeFilter] = useState("all");
  const [actionBusy, setActionBusy] = useState({});

  const refresh = useCallback(async () => {
    setLoading(true);
    try {
      const r = await api("GET", "/tasks?limit=100");
      setTasks(r.tasks || []);
    } finally {
      setLoading(false);
    }
  }, []);

  const runAction = useCallback(async (taskId, action) => {
    if (!taskId || !action) return;
    setActionBusy((prev) => ({ ...prev, [taskId]: action }));
    try {
      if (action === "delete") {
        if (!window.confirm(`确认删除任务 ${taskId}？相关本地文件不会被删除。`)) return;
        await api("DELETE", `/tasks/${taskId}`);
      } else if (action === "cancel") {
        await api("POST", `/tasks/${taskId}/cancel`);
      } else if (action === "retry") {
        await api("POST", `/tasks/${taskId}/retry`);
      }
      await refresh();
    } catch (e) {
      alert(`操作失败：${e.message}`);
    } finally {
      setActionBusy((prev) => {
        const next = { ...prev };
        delete next[taskId];
        return next;
      });
    }
  }, [refresh]);

  useEffect(() => {
    refresh();
    const sse = new EventSource(apiBase() + "/sse");
    sse.addEventListener("task_update", () => refresh());
    sse.addEventListener("chain_update", () => refresh());
    return () => sse.close();
  }, [refresh]);

  useEffect(() => {
    if (!selectedId && tasks.length > 0) setSelectedId(taskIdOf(tasks[0]));
  }, [tasks, selectedId]);

  const selectedTask = useTaskHeartbeat(selectedId);
  const modeFilters = useMemo(() => {
    const known = [
      ["image_text2img", "文生图"],
      ["image_edit", "图像编辑"],
      ["image_style_repaint", "风格重绘"],
      ["image_background", "背景生成"],
      ["image_outpaint", "画面扩展"],
      ["image_sketch", "涂鸦作画"],
      ["image_ecommerce", "电商图"],
      ["t2v", "文生视频"],
      ["i2v", "图生视频"],
      ["i2v_end", "首尾帧"],
      ["r2v", "参考视频"],
      ["video_extend", "视频续写"],
      ["video_edit", "视频编辑"],
      ["photo_speak", "照片说话"],
      ["video_relip", "视频换嘴"],
      ["video_reface", "视频换人"],
      ["pose_drive", "动作驱动"],
      ["avatar_compose", "数字人合成"],
      ["long_video", "分镜长视频"],
    ];
    const labels = new Map(known);
    for (const task of tasks) {
      const mode = task.mode || "";
      if (mode && !labels.has(mode)) labels.set(mode, mode);
    }
    return Array.from(labels.entries());
  }, [tasks]);
  const visibleTasks = useMemo(
    () => tasks.filter((t) => {
      const status = t.status || "";
      const statusOk =
        statusFilter === "all" ||
        status === statusFilter ||
        (statusFilter === "running" && ["processing", "running"].includes(status)) ||
        (statusFilter === "completed" && ["succeeded", "done", "completed"].includes(status));
      const modeOk = modeFilter === "all" || t.mode === modeFilter;
      return statusOk && modeOk;
    }),
    [tasks, statusFilter, modeFilter]
  );
  const statusFilters = [
    ["all", "全部"],
    ["pending", "排队中"],
    ["running", "处理中"],
    ["completed", "已完成"],
    ["failed", "失败"],
    ["cancelled", "已取消"],
  ];
  useEffect(() => {
    if (!visibleTasks.length) return;
    if (!visibleTasks.some((t) => taskIdOf(t) === selectedId)) {
      setSelectedId(taskIdOf(visibleTasks[0]));
    }
  }, [visibleTasks, selectedId]);
  const selectedVisible = visibleTasks.some((t) => taskIdOf(t) === selectedId);

  return (
    <div className="split-layout workbench-layout">
      <div className="split-left oa-list-panel task-list-panel">
        <div className="task-panel-head">
          <div>
            <h2 className="page-title">
              <Icon name="list" /> 任务列表
            </h2>
            <p className="page-subtitle">筛选左侧任务，点击后在右侧查看生成进度、视频和参数。</p>
          </div>
        </div>

        <div className="task-filter-box">
          <div className="filter-group">
            <div className="filter-group__label">状态</div>
            <div className="filter-group__buttons">
              {statusFilters.map(([value, label]) => (
                <button
                  key={value}
                  className={"mode-btn" + (statusFilter === value ? " active" : "")}
                  onClick={() => setStatusFilter(value)}
                >
                  {label}
                </button>
              ))}
            </div>
          </div>
          <div className="filter-group">
            <div className="filter-group__label">模式</div>
            <div className="filter-group__buttons">
              <button
                className={"mode-btn" + (modeFilter === "all" ? " active" : "")}
                onClick={() => setModeFilter("all")}
              >
                全部模式
              </button>
              {modeFilters.map(([m, label]) => (
                <button
                  key={m}
                  className={"mode-btn" + (modeFilter === m ? " active" : "")}
                  onClick={() => setModeFilter(m)}
                >
                  {label}
                </button>
              ))}
            </div>
          </div>
          <div className="task-filter-actions">
            <button className="btn btn-ghost btn-sm" onClick={refresh} disabled={loading}>
              {loading ? <Spinner /> : <Icon name="refresh" size={12} />} 刷新任务
            </button>
            <span>共 {tasks.length} 个任务，当前显示 {visibleTasks.length} 个</span>
          </div>
        </div>

        {loading ? (
          <div className="task-list-loading"><Spinner /> 正在加载任务…</div>
        ) : tasks.length === 0 ? (
          <Empty icon="inbox" title="暂无任务" hint="到「创建」页提交第一个任务" />
        ) : visibleTasks.length === 0 ? (
          <Empty icon="inbox" title="没有匹配任务" hint="调整上方筛选条件查看其他任务" />
        ) : (
          <div className="task-list">
            {visibleTasks.map((t) => {
              const tid = taskIdOf(t);
              const video = taskVideoUrl(t);
              const images = taskImageUrls(t);
              const status = t.status || "";
              const canCancel = ["pending", "queued", "running", "processing"].includes(status);
              const canRetry = ["failed", "timeout", "cancelled"].includes(status);
              const busyAction = actionBusy[tid];
              return (
                <div
                  key={tid}
                  className={"task-card" + (selectedId === tid ? " selected" : "")}
                >
                  <button
                    type="button"
                    className="task-card__main"
                    onClick={() => setSelectedId(tid)}
                  >
                    <div className="task-thumb">
                      {video ? <video src={video} muted /> : images.length ? <img src={images[0]} alt="" /> : <Icon name="film" size={20} />}
                    </div>
                    <div className="task-info">
                      <div className="task-info-head">
                        <strong>{t.mode || "未知模式"}</strong>
                      </div>
                      <div className="task-card-prompt">{t.prompt || t.model_id || tid}</div>
                      <div className="task-meta">
                        <span className="font-mono">{t.model_id || "—"}</span>
                        <span>{formatTaskTime(t.created_at)}</span>
                      </div>
                    </div>
                  </button>
                  <div className="task-card__side" onClick={(e) => e.stopPropagation()}>
                    <TaskStatusBadge status={status} />
                    <div className="task-card__actions">
                      {canCancel && (
                        <button
                          type="button"
                          className="btn btn-sm btn-ghost"
                          disabled={!!busyAction}
                          onClick={() => runAction(tid, "cancel")}
                          title="取消运行中的任务"
                        >
                          {busyAction === "cancel" ? <Spinner /> : <Icon name="x" size={12} />} 取消
                        </button>
                      )}
                      {canRetry && (
                        <button
                          type="button"
                          className="btn btn-sm btn-ghost"
                          disabled={!!busyAction}
                          onClick={() => runAction(tid, "retry")}
                          title="按相同参数重新提交"
                        >
                          {busyAction === "retry" ? <Spinner /> : <Icon name="refresh" size={12} />} 重试
                        </button>
                      )}
                      <button
                        type="button"
                        className="btn btn-sm btn-ghost"
                        disabled={!!busyAction}
                        onClick={() => runAction(tid, "delete")}
                        title="从列表中删除（不会删除本地文件）"
                      >
                        {busyAction === "delete" ? <Spinner /> : <Icon name="trash" size={12} />} 删除
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <div className="oa-list-panel__footer">
          共 {tasks.length} 个任务 · 当前显示 {visibleTasks.length} 个
        </div>
      </div>

      <TaskPreviewPane taskId={selectedVisible ? selectedId : ""} task={selectedVisible ? selectedTask : null} showCost={false} />
    </div>
  );
}

function StoryboardTab({ catalog }) {
  const [story, setStory] = useState("");
  const [totalDuration, setTotalDuration] = useState(60);
  const [segDuration, setSegDuration] = useState(10);
  const [segments, setSegments] = useState([]);
  const [busy, setBusy] = useState(false);
  const [model, setModel] = useState("happyhorse-1.0-i2v");
  const [chainMode, setChainMode] = useState("serial");
  const [activeStep, setActiveStep] = useState("outline");
  const [chainGroupId, setChainGroupId] = useState("");
  const [chainTasks, setChainTasks] = useState([]);
  const [concatResult, setConcatResult] = useState("");
  const [concatResultMeta, setConcatResultMeta] = useState(null);
  const [concatBusy, setConcatBusy] = useState(false);

  const modelOptions = (catalog?.models || []).filter((m) => m.mode === "i2v");
  const completedTasks = chainTasks.filter((t) => ["succeeded", "done", "completed", "downloaded"].includes(t.status));
  const chainDone = chainTasks.length > 0 && completedTasks.length === chainTasks.length;

  const addSegment = () => {
    const nextIndex = segments.length + 1;
    setSegments((prev) => [
      ...prev,
      {
        index: nextIndex,
        duration: segDuration,
        prompt: "",
        transition_to_next: "cut",
      },
    ]);
    setActiveStep("segments");
  };

  const updateSegment = (index, patch) => {
    setSegments((prev) => prev.map((s, i) => (i === index ? { ...s, ...patch } : s)));
  };

  const removeSegment = (index) => {
    setSegments((prev) => prev.filter((_, i) => i !== index).map((s, i) => ({ ...s, index: i + 1 })));
  };

  const refreshChainTasks = useCallback(async (groupId = chainGroupId) => {
    if (!groupId) return;
    try {
      const r = await api("GET", `/tasks?chain_group_id=${encodeURIComponent(groupId)}&limit=100`);
      setChainTasks(r.tasks || []);
    } catch (_) {}
  }, [chainGroupId]);

  useEffect(() => {
    if (!chainGroupId) return;
    refreshChainTasks(chainGroupId);
    const timer = setInterval(() => refreshChainTasks(chainGroupId), 3000);
    return () => clearInterval(timer);
  }, [chainGroupId, refreshChainTasks]);

  const decompose = async () => {
    if (!story.trim()) return;
    setBusy(true);
    try {
      const r = await api("POST", "/storyboard/decompose", {
        story,
        total_duration: totalDuration,
        segment_duration: segDuration,
      });
      if (r.ok) {
        setSegments(r.segments || []);
        setActiveStep("segments");
      }
      else alert(r.error || "拆分镜失败");
    } catch (e) {
      alert(`拆分镜失败：${e.message}`);
    } finally {
      setBusy(false);
    }
  };

  const submit = async () => {
    if (!segments.length) {
      alert("请先生成或手动添加至少一个分镜");
      return;
    }
    // Parallel mode renders all segments simultaneously, which means
    // none of them can chain on the previous segment's last frame. Warn
    // up front so users aren't surprised by visual discontinuity in the
    // final concat — the only segment that respects ``first_frame_url``
    // is segment #1.
    if (chainMode === "parallel" && segments.length > 1) {
      const ok = window.confirm(
        "并行模式会同时生成所有分段，分段之间无法用上一段的尾帧驱动，画面可能出现风格跳变。\n\n" +
        "如需保证视觉连贯，请改用「串行」模式。是否仍然以并行模式提交？"
      );
      if (!ok) return;
    }
    setBusy(true);
    try {
      const r = await api("POST", "/long-video/create", {
        segments,
        model_id: model,
        mode: chainMode,
      });
      setChainGroupId(r.chain_group_id || "");
      setChainTasks([]);
      setConcatResult("");
      setConcatResultMeta(null);
      setActiveStep("progress");
      if (r.chain_group_id) refreshChainTasks(r.chain_group_id);
    } catch (e) {
      alert(`提交失败：${e.message}`);
    } finally {
      setBusy(false);
    }
  };

  const concat = async () => {
    const taskIds = completedTasks.map(taskIdOf).filter(Boolean);
    if (taskIds.length < 2) {
      alert("至少需要 2 段已完成视频才能拼接");
      return;
    }
    setConcatBusy(true);
    try {
      const r = await api("POST", "/long-video/concat", {
        task_ids: taskIds,
        // Use the canonical "crossfade" identifier so the backend can
        // match it directly; the alias map handles legacy "fade" too.
        transition: "crossfade",
        fade_duration: 0.5,
      });
      setConcatResult(r.output_path || "拼接完成");
      setConcatResultMeta({
        preview_url: r.preview_url || "",
        task_id: r.task_id || "",
        asset_ids: r.asset_ids || [],
      });
      setActiveStep("result");
    } catch (e) {
      alert(`拼接失败：${e.message}`);
    } finally {
      setConcatBusy(false);
    }
  };

  const steps = [
    { id: "outline", label: "输入大纲", hint: "从故事自动拆分镜" },
    { id: "segments", label: "编辑分镜", hint: "检查每段提示词与转场" },
    { id: "progress", label: "生成进度", hint: "批量生成每段视频" },
    { id: "result", label: "结果拼接", hint: "合成为完整长视频" },
  ];

  return (
    <div className="storyboard-page">
      <div className="library-toolbar storyboard-hero">
        <div>
          <h2 className="page-title"><Icon name="film" /> 长视频分镜</h2>
          <p className="page-subtitle">梳理大纲 → 编辑分镜 → 批量生成 → 拼接成片，四步走完整条长视频生产线。</p>
        </div>
        <div className="storyboard-hero__actions">
          <span className="storyboard-hero__count">
            <Icon name="list" size={12} /> {segments.length} 段
          </span>
          <button className="btn" onClick={addSegment}>
            <Icon name="plus" size={13} /> 新增分镜
          </button>
        </div>
      </div>

      <div className="story-workflow-tabs">
        {steps.map((step, idx) => (
          <button
            key={step.id}
            className={"story-workflow-tab" + (activeStep === step.id ? " active" : "")}
            onClick={() => setActiveStep(step.id)}
          >
            <span>{idx + 1}</span>
            <strong>{step.label}</strong>
            <small>{step.hint}</small>
          </button>
        ))}
      </div>

      {activeStep === "outline" && (
        <section className="card create-section storyboard-panel storyboard-outline-panel">
          <div className="create-section__head">
            <h3><Icon name="wand-sparkles" size={14} /> 大纲梳理</h3>
            <span>把故事变成一组有连续逻辑的视频分镜</span>
          </div>
          <div className="field">
            <label>故事 / 大纲</label>
            <textarea
              value={story}
              onChange={(e) => setStory(e.target.value)}
              placeholder="描述完整故事、产品脚本或短片大纲。AI 会拆成多段镜头，并尽量处理角色、场景、动作和转场的连续性。"
              className="story-outline-input"
            />
          </div>
          <div className="settings-grid two">
            <div className="field">
              <label>总时长 (秒)</label>
              <input
                type="number"
                value={totalDuration}
                onChange={(e) => setTotalDuration(parseInt(e.target.value, 10) || 60)}
              />
            </div>
            <div className="field">
              <label>每段时长 (秒)</label>
              <input
                type="number"
                value={segDuration}
                onChange={(e) => setSegDuration(parseInt(e.target.value, 10) || 10)}
              />
            </div>
          </div>
          <div className="storyboard-outline-actions">
            <button className="btn btn-block" onClick={decompose} disabled={busy || !story.trim()}>
              {busy ? <Spinner /> : <Icon name="wand-sparkles" size={14} />} 生成分镜草稿
            </button>
            <button className="btn btn-ghost" onClick={() => setActiveStep("segments")}>
              已有脚本，直接编辑分镜 →
            </button>
          </div>
          <div className="storyboard-tips">
            <Icon name="info" size={14} />
            <div>
              <strong>工作流提示</strong>
              <span>提交大纲后 AI 自动拆段；也可以跳过大纲，进入「编辑分镜」手动录入；分镜确认后再去「生成进度」批量生成，最后在「结果拼接」生成完整视频。</span>
            </div>
          </div>
        </section>
      )}

      {activeStep === "segments" && (
        <section className="card create-section storyboard-segments">
          <div className="create-section__head">
            <h3><Icon name="list" size={14} /> 分镜编辑</h3>
            <div className="storyboard-segments__head-actions">
              <button className="btn btn-sm btn-ghost" onClick={() => setActiveStep("outline")}>
                <Icon name="arrow-left" size={12} /> 返回大纲
              </button>
              <button className="btn btn-sm" onClick={addSegment}>
                <Icon name="plus" size={12} /> 新增分镜
              </button>
            </div>
          </div>
          <div className="storyboard-segments__hint">
            <Icon name="info" size={13} />
            <span>每段分镜会生成一个视频任务；串行模式尽量用上一段结果承接下一段，适合完整故事。</span>
            <span className="text-faint">共 {segments.length} 段</span>
          </div>

          {segments.length === 0 ? (
            <CompactLibraryEmpty
              full
              icon="film"
              title="还没有分镜"
              hint="可以返回「输入大纲」让 AI 自动拆解，也可以直接点「新增分镜」录入已有脚本。"
            >
              <button className="btn btn-ghost" onClick={() => setActiveStep("outline")}>
                <Icon name="arrow-left" size={13} /> 返回输入大纲
              </button>
              <button className="btn" onClick={addSegment}>
                <Icon name="plus" size={13} /> 新增第一段
              </button>
            </CompactLibraryEmpty>
          ) : (
            <div className="story-segment-list">
              {segments.map((s, i) => (
                <div key={i} className="story-segment-card">
                  <div className="story-segment-card__head">
                    <strong>#{s.index || i + 1}</strong>
                    <button className="btn btn-sm btn-ghost" onClick={() => removeSegment(i)}>
                      <Icon name="trash" size={12} /> 删除
                    </button>
                  </div>
                  <div className="settings-grid two">
                    <div className="field">
                      <label>时长 (秒)</label>
                      <input
                        type="number"
                        value={s.duration || segDuration}
                        onChange={(e) => updateSegment(i, { duration: parseInt(e.target.value, 10) || segDuration })}
                      />
                    </div>
                    <div className="field">
                      <label>转场</label>
                      <select
                        value={s.transition_to_next || "cut"}
                        onChange={(e) => updateSegment(i, { transition_to_next: e.target.value })}
                      >
                        <option value="cut">直接切</option>
                        <option value="fade">淡入淡出</option>
                        <option value="match">动作承接</option>
                      </select>
                    </div>
                  </div>
                  <div className="field">
                    <label>本段提示词</label>
                    <textarea
                      value={s.prompt || ""}
                      onChange={(e) => updateSegment(i, { prompt: e.target.value })}
                      placeholder="描述这一段的主体、动作、镜头、环境、声音和与前后段的衔接方式"
                    />
                  </div>
                </div>
              ))}
            </div>
          )}
          <div className="storyboard-next-bar">
            <button className="btn btn-ghost" onClick={() => setActiveStep("outline")}>
              <Icon name="arrow-left" size={12} /> 返回大纲
            </button>
            <button className="btn" onClick={() => setActiveStep("progress")} disabled={!segments.length}>
              下一步：配置并生成 →
            </button>
          </div>
        </section>
      )}

      {activeStep === "progress" && (
        <div className="storyboard-workbench storyboard-workbench--generate">
          <section className="card create-section storyboard-panel">
            <div className="create-section__head">
              <h3><Icon name="settings" size={14} /> 生成配置</h3>
              <span>{segments.length} 个分镜待生成</span>
            </div>
            <div className="field">
              <label>基础模型</label>
              <select value={model} onChange={(e) => setModel(e.target.value)}>
                {modelOptions.length ? (
                  modelOptions.map((m) => (
                    <option key={m.model_id} value={m.model_id}>
                      {m.label_zh}
                    </option>
                  ))
                ) : (
                  <option value="happyhorse-1.0-i2v">HappyHorse 1.0 图生视频</option>
                )}
              </select>
            </div>
            <div className="field">
              <label>串接方式</label>
              <select value={chainMode} onChange={(e) => setChainMode(e.target.value)}>
                <option value="serial">串行（首尾帧承接）</option>
                <option value="parallel">并行（独立生成）</option>
                <option value="cloud_extend">云端续写</option>
              </select>
            </div>
            <div className="create-helper-card">
              <Icon name="info" size={16} />
              <div>
                <strong>生成逻辑</strong>
                <span>提交后会为每段分镜创建独立视频任务，并用同一个 chain_group 追踪整组进度。</span>
              </div>
            </div>
            <div className="storyboard-panel__footer">
              <button className="btn btn-ghost" onClick={() => setActiveStep("segments")}>
                <Icon name="arrow-left" size={12} /> 返回分镜
              </button>
              <button className="btn btn-block" onClick={submit} disabled={busy || !segments.length}>
                {busy ? <Spinner /> : <Icon name="rocket" size={14} />} 提交生成
              </button>
            </div>
          </section>

          <section className="card create-section storyboard-panel">
            <div className="create-section__head">
              <h3><Icon name="list" size={14} /> 生成进度</h3>
              <span>{chainGroupId ? `chain_group: ${chainGroupId.slice(0, 8)}…` : "尚未提交"}</span>
            </div>
            <div className="storyboard-panel__body">
              {!chainGroupId ? (
                <CompactLibraryEmpty
                  full
                  icon="rocket"
                  title="等待提交生成"
                  hint="左侧确认模型和串接方式后提交，即可在这里跟踪每段视频的生成进度。"
                />
              ) : chainTasks.length === 0 ? (
                <div className="task-list-loading"><Spinner /> 正在创建分镜任务…</div>
              ) : (
                <div className="story-progress-list">
                  {chainTasks.map((t, i) => (
                    <div key={taskIdOf(t) || i} className="story-progress-item">
                      <span>#{i + 1}</span>
                      <div>
                        <strong>{t.model_id || t.mode || "分镜任务"}</strong>
                        <small>{taskIdOf(t)}</small>
                      </div>
                      <TaskStatusBadge status={t.status} />
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="storyboard-panel__footer">
              <button
                className="btn btn-ghost"
                onClick={() => refreshChainTasks()}
                disabled={!chainGroupId}
              >
                <Icon name="refresh" size={12} /> 刷新进度
              </button>
              <button
                className="btn"
                onClick={() => setActiveStep("result")}
                disabled={!chainGroupId}
              >
                查看拼接 →
              </button>
            </div>
          </section>
        </div>
      )}

      {activeStep === "result" && (
        <section className="card create-section storyboard-result-panel">
          <div className="create-section__head">
            <h3><Icon name="film" size={14} /> 结果拼接</h3>
            <span>{completedTasks.length}/{chainTasks.length || segments.length} 段已完成</span>
          </div>
          <div className="story-result-summary">
            <div>
              <strong>分段视频</strong>
              <span>{chainTasks.length ? `已追踪 ${chainTasks.length} 个分镜任务` : "还没有提交生成任务"}</span>
            </div>
            <div>
              <strong>完整视频</strong>
              <span>{concatResult || "等待分段完成后拼接"}</span>
            </div>
          </div>
          {concatResultMeta?.preview_url && (
            <div className="video-player-wrap">
              <video src={concatResultMeta.preview_url} controls loop />
            </div>
          )}
          {concatResultMeta?.task_id && (
            <div className="text-xs text-muted mt-2">
              已生成长视频任务 <span className="font-mono">{concatResultMeta.task_id}</span>
              {concatResultMeta.asset_ids?.length ? `，发布到 Asset Bus (${concatResultMeta.asset_ids.length})` : ""}
              ；可在「任务」页查看。
            </div>
          )}
          {chainTasks.length > 0 ? (
            <div className="story-progress-list">
              {chainTasks.map((t, i) => (
                <div key={taskIdOf(t) || i} className="story-progress-item">
                  <span>#{i + 1}</span>
                  <div>
                    <strong>{t.video_url ? "视频已生成" : "等待视频结果"}</strong>
                    <small>{taskIdOf(t)}</small>
                  </div>
                  <TaskStatusBadge status={t.status} />
                </div>
              ))}
            </div>
          ) : (
            <CompactLibraryEmpty
              full
              icon="film"
              title="还没有可拼接的成片"
              hint="先在「生成进度」提交，等待每段视频完成后回到这里点「拼接完整视频」。"
            >
              <button className="btn btn-ghost" onClick={() => setActiveStep("progress")}>
                <Icon name="arrow-left" size={13} /> 返回进度
              </button>
            </CompactLibraryEmpty>
          )}
          <div className="storyboard-next-bar">
            <button className="btn btn-ghost" onClick={() => setActiveStep("progress")}>
              <Icon name="arrow-left" size={12} /> 返回进度
            </button>
            <button
              className="btn"
              onClick={concat}
              disabled={concatBusy || !chainDone || completedTasks.length < 2}
            >
              {concatBusy ? <Spinner /> : <Icon name="film" size={14} />} 拼接完整视频
            </button>
          </div>
        </section>
      )}
    </div>
  );
}

// ── Voices Tab ──────────────────────────────────────────────────────

function VoicesTab({ settings }) {
  const [data, setData] = useState({ system: FALLBACK_SYSTEM_VOICES, cloned: [] });
  const [showCreate, setShowCreate] = useState(false);
  const [draft, setDraft] = useState({ label: "", audio: null, language: "zh-CN", gender: "unknown" });
  const [busy, setBusy] = useState(false);
  const [previewing, setPreviewing] = useState("");
  const [previewResult, setPreviewResult] = useState({});
  const [loadWarning, setLoadWarning] = useState("");

  const load = useCallback(() => {
    api("GET", "/voices")
      .then((r) => {
        const system = (r.system || []).length ? r.system : FALLBACK_SYSTEM_VOICES;
        setData({ system, cloned: r.cloned || [] });
        setLoadWarning((r.system || []).length ? "" : "后端暂未返回系统音色，当前显示内置常用音色。");
      })
      .catch((e) => {
        setData({ system: FALLBACK_SYSTEM_VOICES, cloned: [] });
        if (!settings?.api_key_set) {
          setLoadWarning("");
          return;
        }
        const msg = friendlyApiMessage(e, "后端暂未提供音色列表，当前显示内置常用音色。");
        setLoadWarning(msg ? `已切换为内置常用音色：${msg}` : "");
      });
  }, [settings?.api_key_set]);

  useEffect(() => { load(); }, [load]);

  const preview = async (vid) => {
    setPreviewing(vid);
    try {
      const r = await api("POST", "/voices/preview", {
        voice_id: vid,
        text: "你好，这是一段试听。",
      });
      if (!r.ok) throw new Error(r.error || "preview failed");
      const url = r.preview_url || r.url || "";
      setPreviewResult((prev) => ({
        ...prev,
        [vid]: { url, label: url ? "试听已就绪" : (r.audio_path || "试听已生成") },
      }));
      if (url) {
        try {
          const audio = new Audio(url);
          audio.play().catch(() => {});
        } catch (_) {}
      }
    } catch (e) {
      const msg = settings?.api_key_set
        ? friendlyApiMessage(e, "试听服务暂不可用，请稍后重试。")
        : "请先在设置里配置 DashScope Key。";
      setPreviewResult((prev) => ({ ...prev, [vid]: { url: "", label: `试听失败：${msg}` } }));
    } finally {
      setPreviewing("");
    }
  };

  const cloneVoice = async () => {
    if (!draft.label || !draft.audio) {
      alert("请填写音色名称并上传参考音频");
      return;
    }
    setBusy(true);
    try {
      const sample = draft.audio.oss_url || draft.audio.preview_url || draft.audio.local_path || "";
      if (!draft.audio.oss_url) {
        alert("音色克隆需要 DashScope 可访问的 OSS 音频 URL。请先在设置里配置 OSS 后重新上传参考音频。");
        setBusy(false);
        return;
      }
      const r = await api("POST", "/voices/clone", {
        label: draft.label,
        sample_audio_url: draft.audio.oss_url || sample,
        language: draft.language,
        gender: draft.gender,
      });
      if (!r.ok) throw new Error(r.error || "clone failed");
      setDraft({ label: "", audio: null, language: "zh-CN", gender: "unknown" });
      setShowCreate(false);
      load();
    } catch (e) {
      const msg = settings?.api_key_set
        ? friendlyApiMessage(e, "音色克隆服务暂不可用，请稍后重试。")
        : "请先在设置里配置 DashScope Key。";
      alert(`克隆失败：${msg}`);
    } finally {
      setBusy(false);
    }
  };

  const del = async (voiceId) => {
    if (!confirm("确认删除该自定义音色？")) return;
    await api("DELETE", `/voices/${voiceId}`);
    load();
  };

  const systemVoices = data.system || [];
  const clonedVoices = data.cloned || [];
  const systemVoiceGroups = useMemo(() => {
    const groups = { cosyvoice: [], edge: [], other: [] };
    for (const voice of systemVoices) {
      const key = voice.engine === "edge" || voice.engine === "cosyvoice" ? voice.engine : "other";
      groups[key].push(voice);
    }
    return ["cosyvoice", "edge", "other"]
      .map((key) => ({ key, voices: groups[key], meta: VOICE_SOURCE_META[key] }))
      .filter((group) => group.voices.length > 0);
  }, [systemVoices]);
  const sourceCount = systemVoiceGroups.length + (clonedVoices.length ? 1 : 0);
  const voiceMeta = (voice, custom = false) => {
    if (custom) return VOICE_SOURCE_META.custom;
    return VOICE_SOURCE_META[voice.engine] || VOICE_SOURCE_META.other;
  };

  const VoiceCard = ({ v, custom = false }) => (
    <div className="lib-card">
      <div className="lib-card__head">
        <div className="min-w-0">
          <div className="lib-card__title">{v.label_zh || v.label || v.id}</div>
          <div className="lib-card__sub">
            {v.gender || "unknown"} · {v.language || "zh-CN"}
            {(v.style_zh || v.style) ? ` · ${v.style_zh || v.style}` : ""}
          </div>
        </div>
        <Tag kind={voiceMeta(v, custom).kind}>
          {voiceMeta(v, custom).title}
        </Tag>
      </div>
      <div className="voice-media">
        {previewing === v.id ? (
          <span className="voice-media__busy"><Spinner /> 合成试听中…</span>
        ) : previewResult[v.id]?.url ? (
          <audio controls src={previewResult[v.id].url} style={{ width: "100%" }} />
        ) : previewResult[v.id]?.label ? (
          <span className="voice-media__empty">{previewResult[v.id].label}</span>
        ) : previewResult[v.id] ? (
          <span className="voice-media__empty">{String(previewResult[v.id])}</span>
        ) : (
          <span className="voice-media__empty">尚未生成试听音频，点击下方按钮</span>
        )}
      </div>
      <button className="voice-play-btn" onClick={() => preview(v.id)} disabled={previewing === v.id}>
        <Icon name="play" size={12} /> 试听
      </button>

        <button className="btn btn-sm btn-danger" onClick={() => del(v.id)}>
