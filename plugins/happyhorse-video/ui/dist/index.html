const PLUGIN_ID = "happyhorse-video";

function apiBase() {
  const meta = (window.OpenAkita && window.OpenAkita.meta) || {};
  if (meta.apiBase) return meta.apiBase.replace(/\/$/, "");
  return `/api/plugins/${PLUGIN_ID}`;
}

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  const url = apiBase() + path;
  const res = await fetch(url, opts);
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error(`${res.status} ${text || res.statusText}`);
  }
  return res.json();
}

function friendlyApiMessage(error, fallback) {
  const msg = String(error?.message || error || "");
  if (/404\b/.test(msg)) return fallback;
  if (/api key|api_key|DashScope API Key|未配置|empty/i.test(msg)) return "";
  const jsonStart = msg.indexOf("{");
  if (jsonStart >= 0) {
    try {
      const payload = JSON.parse(msg.slice(jsonStart));
      return payload.detail || payload.message || payload.error || fallback;
    } catch (_) {}
  }
  return msg.replace(/\s*\{.*\}\s*$/, "").trim() || fallback;
}

function iconSvg(name) {
  const iconName = (name || "").includes(":") ? name.split(":").pop() : name;
  const factory = window.OpenAkitaIcons && window.OpenAkitaIcons[iconName];
  if (typeof factory === "function") return factory();
  const inner = ICONIFY_ICONS[iconName] || ICONIFY_ICONS.info;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${inner}</svg>`;
}

function Icon({ name, size = 18, className = "icon" }) {
  const svg = iconSvg(name);
  return (
    <span
      className={className}
      style={{ width: size, height: size, display: "inline-flex" }}
      dangerouslySetInnerHTML={{ __html: svg }}
    />
  );
}

function Tag({ children, kind }) {
  const cls = kind ? `tag tag-${kind}` : "tag";
  return <span className={cls}>{children}</span>;
}

function Banner({ kind = "warning", children }) {
  return (
    <div className={`banner banner-${kind}`}>
      <Icon name={kind === "danger" ? "alert-triangle" : "info"} size={16} />
      <div>{children}</div>
    </div>
  );
}

function Empty({ icon, title, hint }) {
  return (
    <div className="empty">
      <Icon name={icon || "inbox"} size={40} className="icon" />
      <div>{title}</div>
      {hint && <div className="text-xs mt-2">{hint}</div>}
    </div>
  );
}

function Spinner() {
  return <span className="spinner" />;
}

  if (["running", "processing", "pending", "queued"].includes(status)) return "info";

}

function taskImageUrls(task) {
  const assetPaths = task?.asset_paths || {};
  const urls = task?.image_urls || assetPaths.image_urls || [];
  if (Array.isArray(urls) && urls.length) return urls;

function useTaskHeartbeat(taskId) {
  const [task, setTask] = useState(null);

  const refresh = useCallback(async () => {
    if (!taskId) {
      setTask(null);
      return;
    }
    try {
      const r = await api("GET", `/tasks/${taskId}`);
      setTask(r.task || null);
    } catch (_) {}
  }, [taskId]);

  useEffect(() => {
    refresh();
    if (!taskId) return;
    const timer = setInterval(refresh, 2500);
    const sse = new EventSource(apiBase() + "/sse");
    sse.addEventListener("task_update", (e) => {
      try {
        const d = JSON.parse(e.data || "{}");
        if (!d.task_id || d.task_id === taskId) refresh();
      } catch (_) {
        refresh();
      }
    });
    return () => {
      clearInterval(timer);
      sse.close();
    };
  }, [taskId, refresh]);

  return task;
}

function UploadUrlField({ label, value, onChange, accept = "*/*", kind = "image", hint }) {
  const [uploading, setUploading] = useState(false);
  const [asset, setAsset] = useState(null);
  const inputRef = useRef(null);

  const upload = async (file) => {
    if (!file) return;
    setUploading(true);
    try {
      const fd = new FormData();
      fd.append("file", file);
      const res = await fetch(apiBase() + "/upload", { method: "POST", body: fd });
      const r = await res.json();
      if (!r.ok) throw new Error(r.error || "upload failed");
      setAsset(r);
      onChange(r.oss_url || r.preview_url || "");
    } catch (e) {
      alert(`上传失败：${e.message}`);
    } finally {
      setUploading(false);
    }
  };

  const preview = asset?.preview_url || value;
  const isVideo = kind === "video" || /\.(mp4|mov|webm|mkv)(\?|$)/i.test(preview || "");
  const isImage = kind === "image" || /\.(png|jpe?g|webp|gif|bmp)(\?|$)/i.test(preview || "");

  return (
    <div className="field">
      <label>{label}</label>
      <div className={"upload-zone" + (value ? " is-filled" : "")} onClick={() => inputRef.current?.click()}>
        <input
          ref={inputRef}
          type="file"
          accept={accept}
          style={{ display: "none" }}
          onChange={(e) => upload(e.target.files?.[0])}
        />
        {preview && isImage ? (
          <img src={preview} alt="" className="upload-preview" />
        ) : preview && isVideo ? (
          <video src={preview} className="upload-preview" muted />
        ) : (
          <div className="upload-zone__body">
            <span className="upload-zone__icon">
              {uploading ? <Spinner /> : <Icon name={isVideo ? "video" : "image-play"} size={22} />}
            </span>
            <div className="upload-zone__text">
              <div className="upload-zone__title">{uploading ? "上传中…" : "点击上传素材"}</div>
              <div className="upload-zone__hint">{hint || "支持本地文件上传，也可以在下方直接粘贴公网 URL"}</div>
            </div>
          </div>
        )}
      </div>
      <input value={value} onChange={(e) => onChange(e.target.value)} placeholder="https://..." />
    </div>
  );
}

  showModeChooser = false,
  modeIds = null,
}) {
  catalog = catalog || DEFAULT_CATALOG;
  const [mode, setMode] = useState(initialMode);
  const [modelId, setModelId] = useState("");
  const [prompt, setPrompt] = useState("");
  const [duration, setDuration] = useState(5);
  const [resolution, setResolution] = useState("720P");
  const [aspect, setAspect] = useState("16:9");
  const [voiceId, setVoiceId] = useState("");
  const [text, setText] = useState("");
  const [firstFrame, setFirstFrame] = useState("");
  const [lastFrame, setLastFrame] = useState("");
  const [sourceVideo, setSourceVideo] = useState("");
  const [imageUrl, setImageUrl] = useState("");
  const [imageUrls, setImageUrls] = useState("");
  const [referenceUrls, setReferenceUrls] = useState("");
  const [audioUrl, setAudioUrl] = useState("");
  const [costPreview, setCostPreview] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [previewTaskId, setPreviewTaskId] = useState("");
  const modeIdSet = useMemo(() => (modeIds ? new Set(modeIds) : null), [modeIds]);
  const visibleModeGroups = useMemo(
    () => MODE_GROUPS
      .map((g) => ({ ...g, modes: g.modes.filter((mid) => !modeIdSet || modeIdSet.has(mid)) }))
      .filter((g) => g.modes.length),
    [modeIdSet]
  );

  useEffect(() => {
    setMode(initialMode);
    setPreviewTaskId("");
  }, [initialMode]);

  const modeSpec = useMemo(
    () => (catalog?.modes || []).find((m) => m.id === mode),
    [catalog, mode]
  );
  const modelOptions = useMemo(
    () => (catalog?.models || []).filter((m) => m.mode === mode),
    [catalog, mode]
  );

  // Default model — settings override → registry default → first option.
  useEffect(() => {
    const fromSettings = settings?.[`default_model_${mode}`];
    const fromCatalog = catalog?.default_models?.[mode];
    setModelId(fromSettings || fromCatalog || modelOptions[0]?.model_id || "");
  }, [mode, catalog, settings]);

  // Cost preview (debounced).
  useEffect(() => {
    if (!mode) return;
    const t = setTimeout(async () => {
      try {
        const r = await api("POST", "/cost-preview", {
          mode,
          model_id: modelId,
          duration,
          resolution,
          aspect_ratio: aspect,
          text,
        });
        setCostPreview(r);
      } catch (_) {}
    }, 300);
    return () => clearTimeout(t);
  }, [mode, modelId, duration, resolution, aspect, text]);

  const submit = async () => {
    const approved = !costPreview?.exceeds_threshold || window.confirm(
      `本次预估成本为 ${costPreview.formatted_total || "较高"}，已超过阈值。确认继续提交吗？`
    );
    if (!approved) return;
    setSubmitting(true);
    try {
      const body = {
        mode,
        model_id: modelId,
        prompt,
        duration,
        resolution,
        aspect_ratio: aspect,
        voice_id: voiceId,
        text,
        first_frame_url: firstFrame,
        last_frame_url: lastFrame,
        source_video_url: sourceVideo,
        image_url: imageUrl,
        image_urls: imageUrls
          .split(/[\s,]+/)
          .map((s) => s.trim())
          .filter(Boolean),
        reference_urls: referenceUrls
          .split(/[\s,]+/)
          .map((s) => s.trim())
          .filter(Boolean),
        audio_url: audioUrl,
        cost_approved: !!costPreview?.exceeds_threshold,
        client_request_id: `web_${Date.now()}`,
      };
      const r = await api("POST", "/tasks", body);
      const tid = r.task?.task_id || r.task?.id || "";
      if (tid) setPreviewTaskId(tid);
    } catch (e) {
      alert(`提交失败: ${e.message}`);
    } finally {
      setSubmitting(false);
    }
  };

  const liveTask = useTaskHeartbeat(previewTaskId);
  return (
    <div className="split-layout workbench-layout">
      <div className="split-left create-panel">
        <div className="workbench-title">
          <div>
        <h2 className="page-title">
          <Icon name={modeSpec?.icon || "wand-sparkles"} /> {title}
        </h2>
            <p className="page-subtitle">{subtitle}</p>
          </div>
        </div>

        <MissingDashScopeBanner settings={settings} onSettings={onSettings} />

        {showModeChooser ? (

// ── Tasks Tab ───────────────────────────────────────────────────────

function TasksTab() {
  const [tasks, setTasks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedId, setSelectedId] = useState("");
  const [statusFilter, setStatusFilter] = useState("all");
  const [modeFilter, setModeFilter] = useState("all");

  const refresh = useCallback(async () => {
    setLoading(true);
    try {
      const r = await api("GET", "/tasks?limit=100");
      setTasks(r.tasks || []);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    refresh();
    const sse = new EventSource(apiBase() + "/sse");
    sse.addEventListener("task_update", () => refresh());
    sse.addEventListener("chain_update", () => refresh());
    return () => sse.close();
  }, [refresh]);

  useEffect(() => {
    if (!selectedId && tasks.length > 0) setSelectedId(taskIdOf(tasks[0]));
  }, [tasks, selectedId]);

  const selectedTask = useTaskHeartbeat(selectedId);
  const modeFilters = useMemo(() => {
    const seen = new Set();
    return tasks
      .map((t) => t.mode || "")
      .filter((m) => {
        if (!m || seen.has(m)) return false;
        seen.add(m);
        return true;
      });
  }, [tasks]);
  const visibleTasks = useMemo(
    () => tasks.filter((t) => {
      const status = t.status || "";
      const statusOk =
        statusFilter === "all" ||
        status === statusFilter ||
        (statusFilter === "running" && ["processing", "running"].includes(status)) ||
        (statusFilter === "completed" && ["succeeded", "done", "completed"].includes(status));
      const modeOk = modeFilter === "all" || t.mode === modeFilter;
      return statusOk && modeOk;
    }),
    [tasks, statusFilter, modeFilter]
  );
  const statusFilters = [
    ["all", "全部"],
    ["pending", "排队中"],
    ["running", "处理中"],
    ["completed", "已完成"],
    ["failed", "失败"],
    ["cancelled", "已取消"],
  ];
  useEffect(() => {
    if (!visibleTasks.length) return;
    if (!visibleTasks.some((t) => taskIdOf(t) === selectedId)) {
      setSelectedId(taskIdOf(visibleTasks[0]));
    }
  }, [visibleTasks, selectedId]);
  const selectedVisible = visibleTasks.some((t) => taskIdOf(t) === selectedId);

  return (
    <div className="split-layout workbench-layout">
      <div className="split-left oa-list-panel task-list-panel">
        <div className="task-panel-head">
          <div>
            <h2 className="page-title">
              <Icon name="list" /> 任务列表
            </h2>
            <p className="page-subtitle">筛选左侧任务，点击后在右侧查看生成进度、视频和参数。</p>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={refresh}>
            <Icon name="refresh" size={12} /> 刷新
          </button>
        </div>

        <div className="task-filter-box">
          <div className="filter-group">
            <div className="filter-group__label">状态</div>
            <div className="filter-group__buttons">
              {statusFilters.map(([value, label]) => (
                <button
                  key={value}
                  className={"mode-btn" + (statusFilter === value ? " active" : "")}
                  onClick={() => setStatusFilter(value)}
                >
                  {label}
                </button>
              ))}
            </div>
          </div>
          <div className="filter-group">
            <div className="filter-group__label">模式</div>
            <div className="filter-group__buttons">
              <button
                className={"mode-btn" + (modeFilter === "all" ? " active" : "")}
                onClick={() => setModeFilter("all")}
              >
                全部模式
              </button>
              {modeFilters.map((m) => (
                <button
                  key={m}
                  className={"mode-btn" + (modeFilter === m ? " active" : "")}
                  onClick={() => setModeFilter(m)}
                >
                  {m}
                </button>
              ))}
            </div>
          </div>
        </div>

        {loading ? (
          <div className="task-list-loading"><Spinner /> 正在加载任务…</div>
        ) : tasks.length === 0 ? (
          <Empty icon="inbox" title="暂无任务" hint="到「创建」页提交第一个任务" />
        ) : visibleTasks.length === 0 ? (
          <Empty icon="inbox" title="没有匹配任务" hint="调整上方筛选条件查看其他任务" />
        ) : (
          <div className="task-list">
            {visibleTasks.map((t) => {
              const tid = taskIdOf(t);
              const video = taskVideoUrl(t);
              const images = taskImageUrls(t);
              return (
                <button
                  key={tid}
                  className={"task-card" + (selectedId === tid ? " selected" : "")}
                  onClick={() => setSelectedId(tid)}
                >
                  <div className="task-thumb">
                    {video ? <video src={video} muted /> : images.length ? <img src={images[0]} alt="" /> : <Icon name="film" size={20} />}
                  </div>
                  <div className="task-info">
                    <div className="task-info-head">
                      <strong>{t.mode || "未知模式"}</strong>
                      <TaskStatusBadge status={t.status} />
                    </div>
                    <div className="task-card-prompt">{t.prompt || t.model_id || tid}</div>
                    <div className="task-meta">
                      <span className="font-mono">{t.model_id || "—"}</span>
                      <span>{formatTaskTime(t.created_at)}</span>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
        <div className="oa-list-panel__footer">
          共 {tasks.length} 个任务 · 当前显示 {visibleTasks.length} 个
        </div>
      </div>

      <TaskPreviewPane taskId={selectedVisible ? selectedId : ""} task={selectedVisible ? selectedTask : null} showCost={false} />
    </div>
  );
}

function StoryboardTab({ catalog }) {
  const [story, setStory] = useState("");
  const [totalDuration, setTotalDuration] = useState(60);
  const [segDuration, setSegDuration] = useState(10);
  const [segments, setSegments] = useState([]);
  const [busy, setBusy] = useState(false);
  const [model, setModel] = useState("happyhorse-1.0-i2v");
  const [chainMode, setChainMode] = useState("serial");
  const outlineRef = useRef(null);
  const segmentsRef = useRef(null);
  const configRef = useRef(null);

  const jumpTo = (ref) => {
    ref.current?.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  const modelOptions = (catalog?.models || []).filter((m) => m.mode === "i2v");

  const addSegment = () => {
    const nextIndex = segments.length + 1;
    setSegments((prev) => [
      ...prev,
      {
        index: nextIndex,
        duration: segDuration,
        prompt: "",
        transition_to_next: "cut",
      },
    ]);
    setTimeout(() => jumpTo(segmentsRef), 0);
  };

  const updateSegment = (index, patch) => {
    setSegments((prev) => prev.map((s, i) => (i === index ? { ...s, ...patch } : s)));
  };

  const removeSegment = (index) => {
    setSegments((prev) => prev.filter((_, i) => i !== index).map((s, i) => ({ ...s, index: i + 1 })));
  };

  const decompose = async () => {
    if (!story.trim()) return;
    setBusy(true);
    try {
      const r = await api("POST", "/storyboard/decompose", {
        story,
        total_duration: totalDuration,
        segment_duration: segDuration,
      });
      if (r.ok) setSegments(r.segments || []);
      else alert(r.error || "拆分镜失败");
    } catch (e) {
      alert(`拆分镜失败：${e.message}`);
    } finally {
      setBusy(false);
    }
  };

  const submit = async () => {
    if (!segments.length) {
      alert("请先生成或手动添加至少一个分镜");
      return;
    }
    setBusy(true);
    try {
      const r = await api("POST", "/long-video/create", {
        segments,
        model_id: model,
        mode: chainMode,
      });
      alert(`已提交，chain_group_id: ${r.chain_group_id}`);
    } catch (e) {
      alert(`提交失败：${e.message}`);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="storyboard-page">
      <div className="library-toolbar">
        <div>
          <h2 className="page-title"><Icon name="film" /> 长视频分镜</h2>
          <p className="page-subtitle">不是单向向导。你可以从大纲、分镜草稿或生成配置任意一步进入，再继续往下做。</p>
        </div>
        <button className="btn" onClick={addSegment}>
          <Icon name="plus" size={13} /> 新增分镜
        </button>
      </div>

      <div className="story-flow-grid">
        <button className="story-flow-card" onClick={() => jumpTo(outlineRef)}>
          <Icon name="wand-sparkles" size={18} />
          <strong>从故事大纲开始</strong>
          <span>写一句话或一段故事，让 AI 先拆成可编辑分镜。</span>
        </button>
        <button className="story-flow-card" onClick={addSegment}>
          <Icon name="film" size={18} />
          <strong>从分镜草稿开始</strong>
          <span>已有脚本时直接新增分镜，不必先跑 AI 拆解。</span>
        </button>
        <button className="story-flow-card" onClick={() => jumpTo(configRef)}>
          <Icon name="settings" size={18} />
          <strong>从生成配置开始</strong>
          <span>先选模型和串接方式，再回头补齐每段提示词。</span>
        </button>
      </div>

      <div className="storyboard-workbench">
        <section className="card create-section storyboard-panel" ref={outlineRef}>
          <div className="create-section__head">
            <h3><Icon name="wand-sparkles" size={14} /> 大纲拆分</h3>
            <span>可选入口</span>
          </div>
          <div className="field">
            <label>故事 / 大纲</label>
            <textarea
              value={story}
              onChange={(e) => setStory(e.target.value)}
              placeholder="一句话或一段话描述你的故事，AI 会自动拆分镜并生成每段的提示词"
              className="story-outline-input"
            />
          </div>
          <div className="settings-grid two">
            <div className="field">
              <label>总时长 (秒)</label>
              <input
                type="number"
                value={totalDuration}
                onChange={(e) => setTotalDuration(parseInt(e.target.value, 10) || 60)}
              />
            </div>
            <div className="field">
              <label>每段时长 (秒)</label>
              <input
                type="number"
                value={segDuration}
                onChange={(e) => setSegDuration(parseInt(e.target.value, 10) || 10)}
              />
            </div>
          </div>
          <button className="btn" onClick={decompose} disabled={busy || !story.trim()}>
            {busy ? <Spinner /> : <Icon name="wand-sparkles" size={14} />} AI 拆分镜
          </button>
        </section>

        <section className="card create-section storyboard-panel" ref={configRef}>
          <div className="create-section__head">
            <h3><Icon name="settings" size={14} /> 生成配置</h3>
            <span>{segments.length} 个分镜待生成</span>
          </div>
          <div className="field">
            <label>基础模型</label>
            <select value={model} onChange={(e) => setModel(e.target.value)}>
              {modelOptions.length ? (
                modelOptions.map((m) => (
                  <option key={m.model_id} value={m.model_id}>
                    {m.label_zh}
                  </option>
                ))
              ) : (
                <option value="happyhorse-1.0-i2v">HappyHorse 1.0 图生视频</option>
              )}
            </select>
          </div>
          <div className="field">
            <label>串接方式</label>
            <select value={chainMode} onChange={(e) => setChainMode(e.target.value)}>
              <option value="serial">串行（首尾帧承接）</option>
              <option value="parallel">并行（独立生成）</option>
              <option value="cloud_extend">云端续写</option>

          <div className="create-helper-card">
            <Icon name="info" size={16} />
            <div>
              <strong>可以先配置，也可以最后配置</strong>

          <div className="row">
            <button className="btn btn-ghost" onClick={addSegment}>

function VoicesTab({ settings }) {
  const [data, setData] = useState({ system: FALLBACK_SYSTEM_VOICES, cloned: [] });
  const [showCreate, setShowCreate] = useState(false);
  const [draft, setDraft] = useState({ label: "", audio: null, language: "zh-CN", gender: "unknown" });
  const [busy, setBusy] = useState(false);
  const [previewing, setPreviewing] = useState("");
  const [previewResult, setPreviewResult] = useState({});
  const [loadWarning, setLoadWarning] = useState("");

  const load = useCallback(() => {
    api("GET", "/voices")
      .then((r) => {
        const system = (r.system || []).length ? r.system : FALLBACK_SYSTEM_VOICES;
        setData({ system, cloned: r.cloned || [] });
        setLoadWarning((r.system || []).length ? "" : "后端暂未返回系统音色，当前显示内置常用音色。");
      })
      .catch((e) => {
        setData({ system: FALLBACK_SYSTEM_VOICES, cloned: [] });
        if (!settings?.api_key_set) {
          setLoadWarning("");
          return;
        }
        const msg = friendlyApiMessage(e, "后端暂未提供音色列表，当前显示内置常用音色。");
        setLoadWarning(msg ? `已切换为内置常用音色：${msg}` : "");
      });
  }, [settings?.api_key_set]);

  useEffect(() => { load(); }, [load]);

  const preview = async (vid) => {
    setPreviewing(vid);
    try {
      const r = await api("POST", "/voices/preview", {
        voice_id: vid,
        text: "你好，这是一段试听。",
      });
      if (!r.ok) throw new Error(r.error || "preview failed");
      setPreviewResult((prev) => ({ ...prev, [vid]: r.audio_path || "试听已生成" }));
    } catch (e) {
      const msg = settings?.api_key_set
        ? friendlyApiMessage(e, "试听服务暂不可用，请稍后重试。")
        : "请先在设置里配置 DashScope Key。";
      setPreviewResult((prev) => ({ ...prev, [vid]: `试听失败：${msg}` }));
    } finally {
      setPreviewing("");
    }
  };

  const cloneVoice = async () => {
    if (!draft.label || !draft.audio) {
      alert("请填写音色名称并上传参考音频");
      return;
    }
    setBusy(true);
    try {
      const sample = draft.audio.oss_url || draft.audio.preview_url || draft.audio.local_path || "";
      const r = await api("POST", "/voices/clone", {
        label: draft.label,
        sample_audio_url: sample,
        language: draft.language,
        gender: draft.gender,
      });
      if (!r.ok) throw new Error(r.error || "clone failed");
      setDraft({ label: "", audio: null, language: "zh-CN", gender: "unknown" });
      setShowCreate(false);
      load();
    } catch (e) {
      const msg = settings?.api_key_set
        ? friendlyApiMessage(e, "音色克隆服务暂不可用，请稍后重试。")
        : "请先在设置里配置 DashScope Key。";
      alert(`克隆失败：${msg}`);
    } finally {
      setBusy(false);
    }
  };

  const del = async (voiceId) => {
    if (!confirm("确认删除该自定义音色？")) return;
    await api("DELETE", `/voices/${voiceId}`);
    load();
  };

  const VoiceCard = ({ v, custom = false }) => (
    <div className="lib-card">
      <div className="lib-card__head">
        <div className="min-w-0">
          <div className="lib-card__title">{v.label_zh || v.label || v.id}</div>
          <div className="lib-card__sub">{v.gender || "unknown"} · {v.language || "zh-CN"}</div>
        </div>
        <Tag kind={v.engine === "edge" ? "success" : "info"}>{v.engine || "cosyvoice"}</Tag>
      </div>
      <div className="voice-media">
        {previewing === v.id ? (
          <span className="voice-media__busy"><Spinner /> 合成试听中…</span>
        ) : previewResult[v.id] ? (
          <span className="voice-media__empty">{previewResult[v.id]}</span>
        ) : (
          <span className="voice-media__empty">尚未生成试听音频，点击下方按钮</span>
        )}
      </div>
      <button className="voice-play-btn" onClick={() => preview(v.id)} disabled={previewing === v.id}>
        <Icon name="play" size={12} /> 试听
      </button>
      {custom && (
        <button className="btn btn-sm btn-danger" onClick={() => del(v.id)}>
          <Icon name="trash" size={12} /> 删除
        </button>
      )}
    </div>
  );

  const systemVoices = data.system || [];
  const clonedVoices = data.cloned || [];

  return (
    <div className="library-page library-page--voices">
      <div className="library-hero">
        <div className="library-toolbar">
        <div>
          <h2 className="page-title"><Icon name="mic" /> 音色库</h2>
          <p className="page-subtitle">先选稳定系统音色，需要品牌声线时再上传干净人声样本克隆。</p>
        </div>
        <button className="btn" onClick={() => setShowCreate(!showCreate)}>
          <Icon name="plus" size={13} /> 克隆新音色
        </button>
        </div>
        <div className="library-metrics">
          <div><strong>{systemVoices.length}</strong><span>系统音色</span></div>
          <div><strong>{clonedVoices.length}</strong><span>自定义音色</span></div>
          <div><strong>{settings?.api_key_set ? "可用" : "待配置"}</strong><span>DashScope</span></div>
        </div>
      </div>

      <div className="library-callout library-callout--compact">
        <Icon name="info" size={14} />
        <span>建议使用 5-30 秒、无背景音乐、无混响的人声样本；DashScope 克隆需要可访问的音频 URL。</span>
      </div>
      {loadWarning && (
        <div className="library-callout library-callout--warning">
          <Icon name="alert-triangle" size={14} />
          <span>{loadWarning}</span>
        </div>
      )}

      {showCreate && (
        <div className="card library-form">
          <div className="settings-grid two">
            <div className="field">
              <label>音色名称</label>
              <input value={draft.label} onChange={(e) => setDraft({ ...draft, label: e.target.value })} placeholder="例如：温柔女声" />
            </div>
            <div className="field">
              <label>语言 / 性别</label>
              <div className="row">
                <select value={draft.language} onChange={(e) => setDraft({ ...draft, language: e.target.value })}>
                  <option value="zh-CN">中文</option>
                  <option value="en-US">英文</option>
                </select>
                <select value={draft.gender} onChange={(e) => setDraft({ ...draft, gender: e.target.value })}>
                  <option value="unknown">未知</option>
                  <option value="female">女声</option>
                  <option value="male">男声</option>
                </select>
              </div>
            </div>
          </div>
          <div className="field">
            <label>参考音频</label>
            <FileUploadCard
              accept="audio/*"
              kind="audio"
              value={draft.audio}
              onUploaded={(audio) => setDraft({ ...draft, audio })}
              hint="上传 5-30 秒清晰干声，噪音越少克隆越稳定"
            />
          </div>
          <div className="settings-actions">
            <button className="btn btn-ghost" onClick={() => setShowCreate(false)}>取消</button>
            <button className="btn" onClick={cloneVoice} disabled={busy}>
              {busy ? <Spinner /> : <Icon name="save" size={13} />} 提交克隆
            </button>
          </div>
        </div>
      )}

      <LibrarySection title="系统音色" count={systemVoices.length}>
        {systemVoices.length === 0 ? (
          <CompactLibraryEmpty icon="mic" title="系统音色暂未加载" hint="请刷新页面或检查后端音色目录。页面不会再撑出大块空白。" />
        ) : (
          <div className="lib-grid voice-grid">{systemVoices.map((v) => <VoiceCard key={v.id} v={v} />)}</div>
        )}
      </LibrarySection>

      <LibrarySection title="自定义音色" count={clonedVoices.length}>
        {clonedVoices.length === 0 ? (
          <CompactLibraryEmpty icon="mic-off" title="暂无自定义音色" hint="点击右上角「克隆新音色」上传一段人声样本。" />
        ) : (
          <div className="lib-grid voice-grid">{clonedVoices.map((v) => <VoiceCard key={v.id} v={v} custom />)}</div>
        )}
      </LibrarySection>
    </div>
  );
}

function FiguresTab() {
  const [list, setList] = useState([]);
  const [showCreate, setShowCreate] = useState(false);
  const [draft, setDraft] = useState({ label: "", image: null });
  const [busy, setBusy] = useState(false);

  const load = useCallback(() => {
    api("GET", "/figures").then((r) => setList(r.figures || [])).catch(() => setList([]));
  }, []);
  useEffect(() => { load(); }, [load]);

  const createFigure = async () => {
    if (!draft.label || !draft.image) {
      alert("请填写形象名称并上传人像图");
      return;
    }
    setBusy(true);
    try {
      const r = await api("POST", "/figures", {
        label: draft.label,
        image_path: draft.image.local_path || draft.image.preview_url || "",
        preview_url: draft.image.preview_url || "",
        oss_url: draft.image.oss_url || "",
        oss_key: draft.image.oss_key || "",
      });
      if (!r.ok) throw new Error(r.error || "create failed");
      setDraft({ label: "", image: null });
      setShowCreate(false);
      load();
    } catch (e) {
      alert(`上传形象失败：${e.message}`);
    } finally {
      setBusy(false);
    }
  };

  const del = async (figId) => {
    if (!confirm("确认删除该形象？")) return;
    await api("DELETE", `/figures/${figId}`);
    load();
  };

  const statusOf = (f) => {
    if (f.detect_status) return f.detect_status;
    if (f.detect_pass === true || f.detect_pass === 1) return "pass";
    if (f.detect_pass === false || f.detect_pass === 0) return "pending";
    return "skipped";
  };

  return (
    <div className="library-page library-page--figures">
      <div className="library-hero library-hero--figures">
        <div className="library-toolbar">
          <div>
            <h2 className="page-title"><Icon name="user-square" /> 形象库</h2>
            <p className="page-subtitle">集中管理可复用的人像素材，用于数字人口播、换人和动作驱动。</p>
          </div>
          <button className="btn" onClick={() => setShowCreate(!showCreate)}>
            <Icon name="plus" size={13} /> 上传新形象
          </button>
        </div>
        <div className="figure-guide-grid">
          <div><Icon name="user-plus" size={16} /><strong>正面清晰</strong><span>单人、无遮挡、五官完整</span></div>
          <div><Icon name="image-play" size={16} /><strong>素材复用</strong><span>上传一次，多种数字人模式可直接选用</span></div>
          <div><Icon name="info" size={16} /><strong>检测状态</strong><span>通过检测后合成效果更稳定</span></div>
        </div>
      </div>

      {showCreate && (
        <div className="card library-form figure-form">
          <div>
            <div className="field">
              <label>形象名称</label>
              <input value={draft.label} onChange={(e) => setDraft({ ...draft, label: e.target.value })} placeholder="例如：商务主持人" />
            </div>
            <div className="create-helper-card">
              <Icon name="info" size={16} />
              <div>
                <strong>建议用正面半身照</strong>
                <span>五官清晰、光线均匀、无遮挡和无水印，会减少后续检测失败。</span>
              </div>
            </div>
          </div>
          <div className="field">
            <label>人像图</label>
            <FileUploadCard
              accept="image/*"
              kind="image"
              value={draft.image}
              onUploaded={(image) => setDraft({ ...draft, image })}
              hint="上传后会保存到形象库，可在数字人模式复用"
            />
          </div>
          <div className="settings-actions">
            <button className="btn btn-ghost" onClick={() => setShowCreate(false)}>取消</button>
            <button className="btn" onClick={createFigure} disabled={busy}>
              {busy ? <Spinner /> : <Icon name="save" size={13} />} 上传并保存
            </button>
          </div>
        </div>
      )}

      {list.length === 0 ? (
        <CompactLibraryEmpty
          icon="user-plus"
          title="还没有形象素材"
          hint="点击「上传新形象」添加第一张人像图，之后在数字人创建流程里直接复用。"
        />
      ) : (
        <div className="lib-grid figure-grid">
          {list.map((f) => {
            const status = statusOf(f);
            const kind = status === "pass" ? "success" : status === "fail" ? "danger" : status === "pending" ? "warning" : "info";
            return (
              <div key={f.id} className="lib-card figure-card">
                <div className="fig-thumb-wrap">
                  {f.preview_url ? (
                    <img className="fig-thumb" src={f.preview_url} alt={f.label} />
                  ) : (
                    <div className="fig-thumb-placeholder"><Icon name="user-square" size={32} /></div>
                  )}
                </div>
                <div className="lib-card__head">
                  <div className="min-w-0">
                    <div className="lib-card__title">{f.label}</div>
                    <div className="lib-card__sub">{new Date((f.created_at || 0) * 1000).toLocaleString()}</div>
                  </div>
                  <Tag kind={kind}>{status}</Tag>
                </div>
                {f.detect_message && <div className="lib-card__hint">{f.detect_message}</div>}
                <button className="btn btn-sm btn-danger" onClick={() => del(f.id)}>
                  <Icon name="trash" size={12} /> 删除
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function PromptTab({ settings }) {

  useEffect(() => {
    api("GET", "/prompt-guide")
      .then((r) => {
        setGuide({
          formulas: Object.keys(r.formulas || {}).length ? r.formulas : DEFAULT_PROMPT_GUIDE.formulas,
          templates: (r.templates || []).length ? r.templates : DEFAULT_PROMPT_GUIDE.templates,
          cameras: (r.cameras || []).length ? r.cameras : DEFAULT_PROMPT_GUIDE.cameras,
          atmosphere: Object.keys(r.atmosphere || {}).length ? r.atmosphere : DEFAULT_PROMPT_GUIDE.atmosphere,
        });
        setGuideWarning("");
      })
      .catch((e) => {
        setGuide(DEFAULT_PROMPT_GUIDE);
        if (!settings?.api_key_set) {
          setGuideWarning("");
          return;
        }
        const msg = friendlyApiMessage(e, "后端暂未提供提示词指南，当前使用内置模板。");
        setGuideWarning(msg ? `当前使用内置模板：${msg}` : "");
      });
  }, [settings?.api_key_set]);

  const optimize = async () => {
    setBusy(true);
    try {
      const r = await api("POST", "/prompt-optimize", { prompt, mode });
      setResult(r.ok ? r.result : `失败：${r.error}`);
    } catch (e) {
      const msg = settings?.api_key_set
        ? friendlyApiMessage(e, "AI 优化服务暂不可用，请稍后重试。")
        : "请先在设置里配置 DashScope Key。";
      setResult(`失败：${msg}`);
    } finally {
      setBusy(false);
    }
  };

  const formulas = Object.entries(guide.formulas || {});
  const templates = guide.templates || [];
  const cameras = guide.cameras || [];
  const atmosphere = guide.atmosphere || {};
  const selectedFormula = guide.formulas?.[mode] || "";

  return (
    <div className="prompt-page">
      <div className="prompt-shell">
        <div className="prompt-hero">
          <div>
            <h2 className="page-title"><Icon name="sparkles" /> 提示词工坊</h2>
            <p className="page-subtitle">把一句粗略想法整理成可生成的视频提示词，也可以直接套用模板。</p>
          </div>
          <div className="prompt-hero__steps">
            <span>1 写想法</span>
            <span>2 选模式</span>
            <span>3 AI 优化</span>
          </div>
        </div>
        {guideWarning && (
          <div className="library-callout library-callout--warning">
            <Icon name="alert-triangle" size={14} />
            <span>{guideWarning}</span>
          </div>
        )}

        <div className="prompt-workbench card">
          <div className="prompt-workbench__main">
            <div className="prompt-mode-row">
              <div className="field">
                <label>生成模式</label>
                <select value={mode} onChange={(e) => setMode(e.target.value)}>
                  {formulas.map(([m]) => <option key={m}>{m}</option>)}
                </select>
              </div>
              {selectedFormula && (
                <div className="formula-card">
                  <span>推荐结构</span>
                  <strong>{selectedFormula}</strong>
                </div>
              )}
            </div>
            <div className="field">
              <label>原始提示词</label>
              <textarea
                value={prompt}
                onChange={(e) => setPrompt(e.target.value)}
                placeholder="输入一句粗略想法，例如：一位主持人在科技发布会现场介绍新品"
              />
            </div>
            <div className="prompt-action-row">
            <button className="btn" onClick={optimize} disabled={busy || !prompt}>
              {busy ? <Spinner /> : <Icon name="wand-sparkles" size={14} />} AI 优化
            </button>
            <span>提示：先写“主体 + 场景 + 动作”，细节可交给 AI 补齐。</span>
            </div>
          </div>
          <div className="prompt-result">
            <div className="prompt-result__title">优化结果</div>
            {result ? <pre className="code-block">{result}</pre> : <Empty icon="sparkles" title="等待优化" hint="左侧输入后点击 AI 优化" />}
          </div>
        </div>

        <GuideSection title="模板示例" defaultOpen>
          <div className="template-grid">
            {templates.slice(0, 12).map((tpl) => (
              <button key={tpl.id || tpl.name} className="template-card" onClick={() => setPrompt(tpl.prompt || tpl.template || "")}>
                <div className="name">{tpl.name || tpl.name_zh || tpl.id}</div>
                <div className="desc">{tpl.desc || tpl.description || (tpl.modes || []).join(" / ")}</div>
              </button>
            ))}
          </div>
        </GuideSection>

        <GuideSection title="各模式配方">
          {formulas.map(([m, f]) => (
            <button key={m} className="guide-row guide-row--button" onClick={() => setMode(m)}>
              <strong>{m}</strong>
              <span>{f}</span>
            </button>
          ))}
        </GuideSection>

        <GuideSection title="镜头与氛围关键词">
          <div className="keyword-panel">
            {cameras.map((c) => (
              <span className="keyword-chip" key={c.zh || c.en}>{c.zh || c.en}</span>
            ))}
            {Object.entries(atmosphere).map(([group, words]) => (
              <div className="keyword-group" key={group}>
                <strong>{group}</strong>
                {(words || []).slice(0, 12).map((w) => <span className="keyword-chip" key={w}>{w}</span>)}
              </div>
            ))}
          </div>
        </GuideSection>
      </div>
    </div>
  );
}

function fmtMb(v) {
  const n = Number(v || 0);
  if (n >= 1024) return `${(n / 1024).toFixed(1)} GB`;
  return `${n.toFixed(1)} MB`;
}

function SettingSection({ icon, title, desc, action, className = "", children }) {
  return (
    <section className={"setting-section oa-settings-section " + className}>
      <div className="settings-section__head">
        <div>
        <div className="settings-section__title">
          <Icon name={icon || "settings"} size={15} />

        {action}
      </div>
      <div className="settings-section__body">{children}</div>
    </section>
  );
}

function SystemComponentsPanel() {
  const [items, setItems] = useState([]);
  const [status, setStatus] = useState({});
  const [loading, setLoading] = useState(false);

  const refresh = useCallback(async () => {
    setLoading(true);
    try {
      const r = await api("GET", "/system/components");
      setItems(r.items || []);
    } catch (_) {
      setItems([]);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    refresh();
  }, [refresh]);

  useEffect(() => {
    if (!items.some((x) => x.busy || status[x.id]?.busy)) return;
    const timer = setInterval(async () => {
      for (const it of items) {
        try {
          const r = await api("GET", `/system/${it.id}/status`);
          setStatus((prev) => ({ ...prev, [it.id]: r }));
        } catch (_) {}
      }
      refresh();
    }, 3000);
    return () => clearInterval(timer);
  }, [items, status, refresh]);

  const install = async (id) => {
    setStatus((prev) => ({ ...prev, [id]: { busy: true, log_tail: [] } }));
    try {
      await api("POST", `/system/${id}/install`, { method_index: 0 });
      refresh();
    } catch (e) {
      alert(`安装启动失败：${e.message}`);
    }
  };

  if (loading && items.length === 0) {
    return <div className="sysdep-card"><Spinner /> 正在检测系统组件…</div>;
  }

  return (
    <div className="dep-stack">
      <div className="settings-callout">
        FFmpeg 用于长视频拼接、视频预览和后续媒体处理。它是系统级组件，如果机器已经安装，本插件会直接复用。
      </div>
      {items.map((it) => {
        const live = status[it.id] || it.last_install || {};
        const busy = !!(it.busy || live.busy);
        const found = !!(live.found ?? it.found);
        const methods = it.methods || [];
        return (
          <div key={it.id} className="sysdep-card">
            <div className="sysdep-card__head">
              <div className="sysdep-card__title">
                <Icon name="package" size={18} />
                <div>
                  <strong>{it.display_name || it.id}</strong>
                  <p>{it.description}</p>
                </div>
              </div>
              <span className={"sysdep-badge " + (busy ? "busy" : found ? "ok" : "warn")}>
                {busy ? "安装中" : found ? `已安装${it.version ? ` ${it.version}` : ""}` : "未安装"}
              </span>
            </div>
            {it.location && <div className="sysdep-path">{it.location}</div>}
            <div className="sysdep-actions">
              <button
                className={"btn btn-sm " + (!found ? "" : "btn-ghost")}
                disabled={busy || methods.length === 0}
                onClick={() => install(it.id)}
              >
                {busy ? <Spinner /> : <Icon name="download" size={12} />}
                {found ? "重新安装" : "一键安装"}
              </button>
              <button className="btn btn-sm btn-ghost" onClick={refresh} disabled={loading}>
                <Icon name="refresh" size={12} /> 重新检测
              </button>
              {it.homepage && (
                <a className="btn btn-sm btn-ghost" href={it.homepage} target="_blank" rel="noreferrer">
                  官方文档
                </a>
              )}
            </div>
            {!!(live.log_tail || []).length && (
              <pre className="sysdep-log">{(live.log_tail || []).join("\n")}</pre>
            )}
          </div>
        );
      })}
      {items.length === 0 && <div className="text-xs text-muted">没有需要安装的系统组件。</div>}
    </div>
  );
}

function PythonDepsPanel() {
  const [deps, setDeps] = useState(FALLBACK_PYTHON_DEPS);
  const [loading, setLoading] = useState(false);
  const [warning, setWarning] = useState("");

  const refresh = useCallback(async () => {
    setLoading(true);
    try {
      const r = await api("GET", "/python-deps/status");
      const fromApi = Array.isArray(r.deps) ? r.deps : [];
      setDeps(
        FALLBACK_PYTHON_DEPS.map((fallback) => ({
          ...fallback,
          ...(fromApi.find((dep) => dep.id === fallback.id) || {}),
        }))
      );
      setWarning(fromApi.length ? "" : "后端暂未返回依赖状态，已显示待检测清单。");
    } catch (_) {
      setDeps(FALLBACK_PYTHON_DEPS);
      setWarning("依赖状态接口暂不可用，已显示待检测清单。");
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    refresh();
  }, [refresh]);

  const install = async (name) => {
    setDeps((prev) => prev.map((x) => x.id === name ? { ...x, busy: true } : x));
    try {
      await api("POST", "/python-deps/install", { name });
    } catch (e) {
      alert(`安装失败：${e.message}`);
    } finally {
      refresh();
    }
  };

  const total = deps.length;
  const ready = deps.filter((dep) => dep.ok).length;
  const busyCount = deps.filter((dep) => dep.busy).length;

  return (
    <div className="dep-panel">
      <div className="dep-panel__intro">
        <div>
          <div className="dep-panel__intro-title">插件运行依赖</div>
          <div className="dep-panel__intro-text">
            打包版会使用独立 Python 环境。这里可以检查并修复插件私有依赖，不需要手动打开命令行。
          </div>
        </div>
        <div className="dep-summary" aria-label="依赖状态汇总">
          <span className="dep-summary__item"><Icon name="check" size={12} /> {ready}/{total || "—"} 可用</span>
          {busyCount > 0 && <span className="dep-summary__item"><Spinner /> {busyCount} 安装中</span>}
          <button className="btn btn-sm btn-ghost" type="button" onClick={refresh} disabled={loading}>
            {loading ? <Spinner /> : <Icon name="refresh" size={12} />} 刷新
          </button>
        </div>
      </div>
      {loading && deps.length === 0 && <div className="text-xs text-muted">正在检测依赖…</div>}
      {warning && <div className="compact-empty-note">{warning}</div>}
      <div className="dep-grid">
        {deps.map((dep) => {
          const ok = !!dep.ok;
          const busy = !!dep.busy;
          const statusCls = busy ? "busy" : ok ? "ok" : "warn";
          const statusText = busy ? "安装中" : ok ? "可用" : "需安装";
          const logTail = dep.log_tail || [];
          return (
            <div key={dep.id} className={"dep-card dep-card--" + statusCls}>
              <div className="dep-card__head">
                <div className="dep-card__title-row">
                  <span className="dep-icon"><Icon name={ok ? "check" : "package"} size={16} /></span>
                  <div className="min-w-0">
                    <div className="dep-title">{dep.display_name || dep.label || dep.id}</div>
                    <div className="dep-desc">{dep.description || dep.import_name || dep.pip_spec}</div>
                  </div>
                </div>
                <span className={"dep-status dep-status--" + statusCls}>
                  {busy ? <Spinner /> : ok ? <Icon name="check" size={11} /> : null}
                  {statusText}
                </span>
              </div>
              <div className="dep-meta">
                <div className="dep-meta-row">
                  <span className="dep-meta-label">包</span>
                  <code>{dep.pip_spec || dep.import_name || dep.id}</code>
                </div>
                {dep.version && (
                  <div className="dep-meta-row">
                    <span className="dep-meta-label">版本</span>
                    <code>{dep.version}</code>
                  </div>
                )}
                {dep.module_file && (
                  <div className="dep-meta-row">
                    <span className="dep-meta-label">路径</span>
                    <code title={dep.module_file}>{dep.module_file}</code>
                  </div>
                )}
                {!ok && dep.error && (
                  <div className="dep-meta-row text-danger">
                    <span className="dep-meta-label">错误</span>
                    <span>{dep.error}</span>
                  </div>
                )}
                {dep.last_error && (
                  <div className="dep-meta-row text-danger">
                    <span className="dep-meta-label">最近</span>
                    <span>{dep.last_error}</span>
                  </div>
                )}
              </div>
              <div className="dep-card__actions">
                <button className={"btn btn-sm " + (!ok ? "" : "btn-ghost")} disabled={busy} onClick={() => install(dep.id)}>
                  {busy ? <Spinner /> : <Icon name="download" size={12} />}
                  {ok ? "重新安装" : "安装依赖"}
                </button>
                <button className="btn btn-sm btn-ghost" type="button" onClick={refresh}>重新检测</button>
              </div>
              {!!logTail.length && <pre className="dep-log text-xs">{logTail.slice(-8).join("\n")}</pre>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function StorageSettings({ form, setFormValue, save }) {
  const [stats, setStats] = useState(null);

  const refresh = useCallback(async () => {
    try {
      const r = await api("GET", "/storage/stats");
      setStats(r.stats || null);
    } catch (_) {}
  }, []);

  useEffect(() => {
    refresh();
  }, [refresh]);

  const pick = async (key) => {
    const picked = await window.OpenAkita?.pickFolder?.(`选择 ${key}`);
    if (!picked) return;
    setFormValue(key, picked);
    await save({ [key]: picked });
    refresh();
  };

  const open = async (path) => {
    if (!path) return;
    try {
      await api("POST", "/storage/open-folder", { path });
    } catch (e) {
      alert(`打开文件夹失败：${e.message}`);
    }
  };

  const cleanup = async () => {
    try {
      const r = await api("POST", "/cleanup", { retention_days: Number(form.retention_days || 30) });
      alert(`已清理 ${r.removed || 0} 条过期任务`);
      refresh();
    } catch (e) {
      alert(`清理失败：${e.message}`);
    }
  };

  const dataDirPath = form.custom_data_dir || stats?.data_dir?.path || "";
  const statCards = [
    ["data_dir", "数据目录"],
    ["output_dir", "成品 outputs"],
    ["uploads", "原始素材 uploads"],
    ["tasks", "任务缓存 tasks"],
  ];

  return (
    <div>
      <SettingField label="数据目录" hint={dataDirPath ? `当前生效：${dataDirPath}` : "留空 = 使用默认目录（由 OpenAkita 管理）"}>
        <div className="folder-row">
          <input
            value={form.custom_data_dir || ""}
            onChange={(e) => setFormValue("custom_data_dir", e.target.value)}
            onBlur={(e) => save({ custom_data_dir: e.target.value })}
            placeholder="留空 = 使用默认目录（由 OpenAkita 管理）"
          />
          <button className="btn btn-sm btn-ghost" onClick={() => pick("custom_data_dir")}>浏览</button>
          <button className="btn btn-sm btn-ghost" onClick={() => open(dataDirPath)}>打开</button>
        </div>
      </SettingField>

      <div className="settings-grid two storage-options-grid">
        <SettingField label="子目录结构" hint="可改成更大的盘 / 别的用户目录，仅支持绝对路径。">
          <select
            value={form.output_subdir_mode || "task"}
            onChange={(e) => {
              setFormValue("output_subdir_mode", e.target.value);
              save({ output_subdir_mode: e.target.value });
            }}
          >
            <option value="task">按任务（tasks/{"{task_id}"}，默认）</option>
            <option value="date">按日期（YYYY-MM-DD）</option>
            <option value="mode">按模式（mode）</option>
            <option value="date_mode">日期 / 模式</option>
            <option value="flat">平铺 outputs</option>
          </select>
        </SettingField>
        <SettingField label="文件命名规则" hint="可用占位符：{task_id} {short_id} {date} {time} {datetime} {mode} {filename} {ext}">
          <select
            value={form.output_naming_rule || "{filename}"}
            onChange={(e) => {
              setFormValue("output_naming_rule", e.target.value);
              save({ output_naming_rule: e.target.value });
            }}
          >
            <option value="{filename}">{"{filename}"}（DashScope 原始文件名，默认）</option>
            <option value="{task_id}">{"{task_id}"}</option>
            <option value="{date}_{mode}_{short_id}">{"{date}_{mode}_{short_id}"}</option>
            <option value="{date}_{time}_{short_id}">{"{date}_{time}_{short_id}"}</option>
            <option value="{mode}_{short_id}">{"{mode}_{short_id}"}</option>
          </select>
        </SettingField>
      </div>

      {stats && (
        <div className="storage-grid">
          {statCards.map(([key, label]) => {
            const s = stats[key];
            if (!s) return null;
            return (
            <div className="storage-card" key={key} title={s.path} onClick={() => open(s.path)}>
              <div className="storage-card__label">{label}</div>
              <div className="storage-card__value">{fmtMb(s.size_mb)}</div>
              <div className="storage-card__meta">{s.file_count} 个文件{s.truncated ? " +" : ""}</div>
            </div>
            );
          })}
        </div>
      )}
      <SettingField label="保留天数" hint={`清理 ${form.retention_days || 30} 天前的过期任务。`}>
        <div className="cleanup-row">
        <input
          className="retention-input"
          type="number"
          min="1"
          value={form.retention_days || "30"}
          onChange={(e) => setFormValue("retention_days", e.target.value)}
          onBlur={(e) => save({ retention_days: e.target.value })}
        />
        <span className="text-xs text-muted">清理 {form.retention_days || 30} 天前的过期任务。</span>
        <button className="btn btn-sm btn-ghost" onClick={cleanup}>立即清理</button>
        </div>
      </SettingField>
    </div>
  );
}

function SettingsTab({ catalog, settings, onSave }) {
  catalog = catalog || { modes: [], models: [], default_models: {} };
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    setForm(settings || {});
  }, [settings]);

  const set = (k, v) => setForm({ ...form, [k]: v });

  const save = async () => {
    setSaving(true);
    try {
      await api("PUT", "/settings", { updates: form });
      onSave?.();
    } catch (e) {
      alert(`保存失败：${e.message}`);
    } finally {
      setSaving(false);
    }
  };

  const savePartial = async (updates) => {
    setSaving(true);
    try {
      await api("PUT", "/settings", { updates });
      setForm((prev) => ({ ...prev, ...updates }));
      onSave?.();
    } catch (e) {
      alert(`保存失败：${e.message}`);
    } finally {
      setSaving(false);
    }
  };

  const testConnection = async () => {
    const rawKey = form.api_key || "";
    const r = await api("POST", "/test-connection", {
      api_key: rawKey.includes("***") ? "" : rawKey,
    });
    alert(r.ok ? "连接成功" : `失败：${r.message || "unknown"}`);
  };

  if (!catalog) return <Spinner />;

  return (
    <div className="settings-page">
      <div className="settings-shell">
        <h2 className="page-title">
          <Icon name="settings" /> 设置
        </h2>
        <p className="page-subtitle">集中管理模型调用、OSS、默认生成参数、依赖组件和文件目录。</p>

        <SettingSection
          icon="key"
          title="阿里云百炼"
          desc="DashScope API（大模型接口）用于提交 HappyHorse / Wan / 数字人任务。"
          className={settings?.api_key_set ? "" : "api-key-section api-key-section--missing"}
          action={
            <button className="btn btn-sm btn-ghost" onClick={testConnection}>
              测试连接
            </button>
          }
        >
          <SettingField label="DashScope API Key" hint={settings?.api_key_set ? "已保存密钥；留空或保持脱敏值不会覆盖旧密钥。" : "获取地址：阿里云百炼控制台"}>
          <div className="api-key-input-row">
            <input
              type="password"
              value={form.api_key || ""}
              onChange={(e) => set("api_key", e.target.value)}
              placeholder={settings?.api_key_set ? "(已保存)" : "sk-xxxxxxxxxxxxxxxx"}
            />
            <button
              className="btn btn-ghost"
              type="button"
              onClick={(e) => {
                const input = e.currentTarget.parentElement?.querySelector("input");
                if (input) input.type = input.type === "password" ? "text" : "password";
              }}
            >
              显示
            </button>
            <button className="btn" onClick={save} disabled={saving}>
              保存
            </button>
          </div>
          </SettingField>
          <SettingField label="区域 Endpoint" hint="该配置影响所有 DashScope 请求发往中国区或国际区。">
          <select
            value={form.base_url || "https://dashscope.aliyuncs.com"}
            onChange={(e) => set("base_url", e.target.value)}
          >
            <option value="https://dashscope.aliyuncs.com">中国（北京）</option>
            <option value="https://dashscope-intl.aliyuncs.com">国际</option>
          </select>
          </SettingField>
        </SettingSection>

        <SettingSection
          icon="cloud"
          title="阿里云 OSS"
          desc="DashScope 只能读取公网可访问素材，上传图片/视频/音频时会通过 OSS 生成输入 URL。"
        >
          <div className="settings-grid two">
            <SettingField label="Endpoint">
            <input
              value={form.oss_endpoint || ""}
              onChange={(e) => set("oss_endpoint", e.target.value)}
              placeholder="oss-cn-beijing.aliyuncs.com"
            />
            </SettingField>
            <SettingField label="Bucket">
            <input
              value={form.oss_bucket || ""}
              onChange={(e) => set("oss_bucket", e.target.value)}
            />
            </SettingField>
            <SettingField label="AccessKey ID">
            <input
              value={form.oss_access_key_id || ""}
              onChange={(e) => set("oss_access_key_id", e.target.value)}
            />
            </SettingField>
            <SettingField label="AccessKey Secret">
            <input
              type="password"
              value={form.oss_access_key_secret || ""}
              onChange={(e) => set("oss_access_key_secret", e.target.value)}
            />
            </SettingField>
          </div>
          <SettingField label="对象路径前缀" hint="用于区分插件上传的文件，建议保持默认。">
          <input
            value={form.oss_path_prefix || "happyhorse-video"}
            onChange={(e) => set("oss_path_prefix", e.target.value)}
          />
          </SettingField>
          <button className="btn btn-sm" onClick={save} disabled={saving}>
            保存 OSS 配置
          </button>
        </SettingSection>

        <SettingSection icon="mic" title="TTS 引擎">
          <div className="tts-radio-row">
            <label>
              <input
                type="radio"
                name="tts_engine"
                checked={(form.tts_engine || "cosyvoice") === "cosyvoice"}
                onChange={() => set("tts_engine", "cosyvoice")}
              />
              CosyVoice（百炼付费）
            </label>
            <label>
              <input
                type="radio"
                name="tts_engine"
                checked={form.tts_engine === "edge"}
                onChange={() => set("tts_engine", "edge")}
              />
              Edge-TTS（免费）
            </label>
          </div>
          <div className="text-xs text-muted">
            CosyVoice 音色在创建任务时选择，使用百炼 API Key 计费；Edge-TTS 适合快速免费试听。
          </div>
        </SettingSection>

        <SettingSection icon="settings" title="默认偏好">
          <div className="settings-grid two">
            <SettingField label="默认分辨率">
              <select
                value={form.default_resolution || "720P"}
                onChange={(e) => set("default_resolution", e.target.value)}
              >
                {["480P", "720P", "1080P"].map((resolution) => (
                  <option key={resolution} value={resolution}>{resolution}</option>
                ))}
              </select>
            </SettingField>
            <SettingField label="默认音色">
              <select
                value={form.default_voice || "longxiaochun_v2"}
                onChange={(e) => set("default_voice", e.target.value)}
              >
                {FALLBACK_SYSTEM_VOICES.map((voice) => (
                  <option key={voice.id} value={voice.id}>{voice.label_zh || voice.label || voice.id}</option>
                ))}
              </select>
            </SettingField>
          </div>
          <SettingField label="成本确认阈值（元）" hint="单次任务超过此金额时弹窗确认。">
            <input
              type="number"
              min="0"
              step="0.5"
              value={form.cost_threshold_cny || "5"}
              onChange={(e) => set("cost_threshold_cny", e.target.value)}
            />
          </SettingField>
        </SettingSection>

        <SettingSection
          icon="wand-sparkles"
          title="默认模型"
          desc="在「创建」页切换模式时自动选中的模型；不配置则使用内置默认。"
        >
        <div className="model-default-list">
          <div className="model-default-row">
            <div className="model-default-name">默认图片模型</div>
            <div>
              <select
                value={form.default_image_model || catalog.image?.default_model || "wan27-pro"}
                onChange={(e) => set("default_image_model", e.target.value)}
              >
                {(catalog.image?.models || []).map((o) => (
                  <option key={o.id} value={o.id}>{o.label_zh}</option>
                ))}
              </select>
            </div>
          </div>
          <div className="model-default-row">
            <div className="model-default-name">默认图片尺寸</div>
            <div>
              <select
                value={form.default_image_size || catalog.image?.default_size || "2K"}
                onChange={(e) => set("default_image_size", e.target.value)}
              >
                {(catalog.image?.sizes || ["1K", "2K", "4K", "1024*1024"]).map((s) => (
                  <option key={s} value={s}>{s}</option>
                ))}
              </select>
            </div>
          </div>
          {(catalog.modes || []).map((m) => {
          const opts = (catalog.models || []).filter((x) => x.mode === m.id);
          return (
            <div key={m.id} className="model-default-row">
              <div className="model-default-name">
                {m.label_zh}
              </div>
              <div>
                <select
                  value={form[`default_model_${m.id}`] || catalog.default_models?.[m.id] || ""}
                  onChange={(e) => set(`default_model_${m.id}`, e.target.value)}
                >
                  {opts.map((o) => (
                    <option key={o.model_id} value={o.model_id}>
                      {o.label_zh}
                    </option>
                  ))}
                </select>
              </div>
            </div>
          );
          })}
        </div>
          <button className="btn btn-sm" onClick={save} disabled={saving}>
            保存默认模型
          </button>
        </SettingSection>

        <SettingSection
          icon="package"
          title="Python 依赖"
        >
          <PythonDepsPanel />
        </SettingSection>

        <SettingSection
          icon="package"
          title="系统组件"
          desc="依赖下载器会检测并安装系统级 FFmpeg，避免长视频拼接和预览不可用。"
        >
          <SystemComponentsPanel />
        </SettingSection>

        <SettingSection
          icon="folder"
          title="文件夹与存储"
          desc="选择输出和缓存位置，并查看插件当前占用空间。"
        >
          <StorageSettings form={form} setFormValue={set} save={savePartial} />
        </SettingSection>

        <SettingSection icon="info" title="高级">
          <div className="settings-grid two">
            <SettingField label="DashScope 请求超时（秒）">
              <input
                type="number"
                min="10"
                max="600"
                value={form.timeout_sec || "60"}
                onChange={(e) => set("timeout_sec", e.target.value)}
              />
            </SettingField>
            <SettingField label="最大重试次数">
              <input
                type="number"
                min="0"
                max="5"
                value={form.max_retries || "2"}
                onChange={(e) => set("max_retries", e.target.value)}
              />
            </SettingField>
          </div>
        </SettingSection>

        <SettingSection icon="info" title="关于">
          <div className="text-sm text-muted">
          <div>快乐马工作室（HappyHorse Studio）v1.0.0</div>
          <div>
            后端：阿里云百炼 DashScope · HappyHorse 1.0 + Wan 2.6/2.7 + 数字人 5 模式
          </div>
          <div>
            <a href="https://bailian.console.aliyun.com" target="_blank" rel="noreferrer">
              百炼控制台
            </a>
          </div>
        </div>
        </SettingSection>

        <button className="btn btn-block settings-save-btn" onClick={save} disabled={saving}>
          {saving ? <Spinner /> : <Icon name="check" size={14} />} 保存设置
        </button>
      </div>
    </div>
  );
}

// ── App ─────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState("image");
  const [catalog, setCatalog] = useState(null);
  const [settings, setSettings] = useState(null);

  const loadAll = useCallback(async () => {
    try {
      const c = await api("GET", "/catalog");
      setCatalog(c.catalog);
    } catch (_) {}
    try {
      const s = await api("GET", "/settings");
      setSettings(s.config);
    } catch (_) {}
  }, []);

  useEffect(() => {
    loadAll();
    if (window.OpenAkita?.ready) window.OpenAkita.ready();
  }, [loadAll]);

  return (
    <div className="app">
      <HeaderNav tab={tab} onTab={setTab} settings={settings} />
      <main className="content">
        {tab === "t2v" && (
          <CreateTab
            catalog={catalog}
            settings={settings}
            onSubmit={() => setTab("tasks")}
            onSettings={() => setTab("settings")}
            initialMode="t2v"
            title="文生视频"
            subtitle="从一句提示词开始，补充镜头、氛围、时长和比例后直接生成视频。"
          />
        )}
        {tab === "i2v" && (
          <CreateTab
            catalog={catalog}
            settings={settings}
            onSubmit={() => setTab("tasks")}
            onSettings={() => setTab("settings")}
            initialMode="i2v"
            title="图生视频"
            subtitle="先上传首帧图，再描述动作、镜头运动和氛围，让静态画面动起来。"
          />
        )}
        {tab === "i2v_end" && (
          <CreateTab
            catalog={catalog}
            settings={settings}
            onSubmit={() => setTab("tasks")}
            onSettings={() => setTab("settings")}
            initialMode="i2v_end"
            title="首尾帧生视频"
            subtitle="上传开头和结尾两张图，由模型生成中间的自然过渡。"
          />
        )}
        {tab === "video_extend" && (
          <CreateTab
            catalog={catalog}
            settings={settings}
            onSubmit={() => setTab("tasks")}
            onSettings={() => setTab("settings")}
            initialMode="video_extend"
            title="视频续写"
            subtitle="上传已有视频，从结尾继续延展新的镜头内容。"
          />
        )}
        {tab === "r2v" && (
          <CreateTab
            catalog={catalog}
            settings={settings}
            onSubmit={() => setTab("tasks")}
            onSettings={() => setTab("settings")}
            initialMode="r2v"
            title="多模态参考生视频"
            subtitle="用角色、物品或场景参考图保持一致性，再用提示词控制互动和镜头。"
          />
        )}
        {tab === "video_edit" && (
          <CreateTab
            catalog={catalog}
            settings={settings}
            onSubmit={() => setTab("tasks")}
            onSettings={() => setTab("settings")}
            initialMode="video_edit"
            title="视频编辑"
            subtitle="上传已有视频，用提示词描述风格转换、局部替换或画面增强目标。"
          />
        )}
        {tab === "digital" && (
          <CreateTab
            catalog={catalog}
            settings={settings}
            onSubmit={() => setTab("tasks")}
            onSettings={() => setTab("settings")}
            initialMode="photo_speak"
            title="数字人"
            subtitle="围绕人像、源视频和台词创建口播、换嘴、换人或动作驱动任务。"
            showModeChooser
            modeIds={["photo_speak", "video_relip", "video_reface", "pose_drive", "avatar_compose"]}
          />
        )}
        {tab === "image" && (
          <ImageTab
            catalog={catalog}
            settings={settings}
            onSubmit={() => setTab("tasks")}
            onSettings={() => setTab("settings")}
          />
        )}
        {tab === "tasks" && <TasksTab />}
        {tab === "storyboard" && <StoryboardTab catalog={catalog} />}
        {tab === "voices" && <VoicesTab settings={settings} />}
        {tab === "figures" && <FiguresTab />}
        {tab === "prompt" && <PromptTab settings={settings} />}
        {tab === "settings" && (
          <SettingsTab catalog={catalog} settings={settings} onSave={loadAll} />
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
