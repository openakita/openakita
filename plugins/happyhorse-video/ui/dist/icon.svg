<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="HappyHorse Studio">
  <title>HappyHorse Studio</title>
  <desc>App icon rendered with Iconify tabler:horse-toy and an Alibaba Cloud inspired orange theme.</desc>
  <defs>
    <linearGradient id="hh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB15E"/>
      <stop offset="0.48" stop-color="#FF6A00"/>
      <stop offset="1" stop-color="#C84700"/>
    </linearGradient>
    <linearGradient id="hh-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.68" stop-color="#FFF2E6"/>
      <stop offset="1" stop-color="#FFE1BF"/>
