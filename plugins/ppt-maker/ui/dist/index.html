<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PPT Maker · PPT 制作助手</title>
    <script src="./_assets/bootstrap.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="./_assets/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="./_assets/i18n.js"></script>
    <script src="./_assets/icons.js"></script>
    <script src="./_assets/markdown-mini.js"></script>
    <script type="text/babel">
      const { useCallback, useEffect, useMemo, useRef, useState } = React;
      const PLUGIN_BASE = "/api/plugins/ppt-maker";
      const tabs = [
        ["Create", "创建"],
        ["Projects", "项目"],
        ["Materials", "素材"],
        ["Templates", "模板"],
        ["Exports", "导出"],
        ["Settings", "设置"],
      ];
      const modes = [
        { id: "topic_to_deck", title: "主题生成", icon: "spark", desc: "从一句目标开始生成汇报大纲", input: "告诉我主题、受众、场景和希望说服谁。", next: "创建项目后先确认大纲。" },
        { id: "files_to_deck", title: "资料生成", icon: "doc", desc: "把文档资料整理成结构化 PPT", input: "先到素材页解析 Markdown、PDF、DOCX 或参考 PPT。", next: "建议先上传/解析资料，再创建项目。" },
        { id: "outline_to_deck", title: "大纲生成", icon: "outline", desc: "将已有提纲补全为演示文稿", input: "在需求描述中粘贴章节、页标题或会议提纲。", next: "大纲会进入确认流程，可再调整页序。" },
        { id: "table_to_deck", title: "表格汇报", icon: "table", desc: "从 CSV/XLSX 生成数据洞察页", input: "先到素材页完成数据体检、自动洞察和图表方案。", next: "必须绑定已完成分析的数据集。" },
        { id: "template_deck", title: "企业模板", icon: "template", desc: "按品牌模板生成客户提案", input: "先到模板页上传企业 PPTX 并完成诊断。", next: "建议绑定已诊断模板。" },
        { id: "revise_deck", title: "改稿优化", icon: "edit", desc: "针对已有页面做改写和审计", input: "上传参考 PPT 或在需求里说明要改哪几页。", next: "适合做二次润色、重排和审计。" },
      ];
      const stylePresets = [
        ["tech_business", "科技商务", "橙红玫红色系，适合产品、技术、管理层汇报"],
        ["consulting", "咨询汇报", "结构强、结论先行，适合方案和复盘"],
        ["executive", "高管简报", "内容更克制，适合董事会和经营会"],
        ["education", "课程培训", "阅读友好，适合教学和内部培训"],
        ["custom", "自定义", "手动输入颜色、语气或视觉偏好"],
      ];

      function request(path, options = {}) {
        const api = window.OpenAkita;
        const url = path.startsWith("/api/") ? path : `${PLUGIN_BASE}${path}`;
        if (api && typeof api.request === "function") {
          return api.request(url, options);
        }
        const init = {
          method: options.method || "GET",
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        };
        if (options.body) init.body = JSON.stringify(options.body);
        return fetch(url, init).then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const contentType = response.headers.get("content-type") || "";
          return contentType.includes("application/json") ? response.json() : response.text();
        });
      }

      function uploadFile(file, projectId = "", extra = {}) {
        const form = new FormData();
        form.append("file", file);
        if (projectId) form.append("project_id", projectId);
        Object.entries(extra || {}).forEach(([key, value]) => {
          if (value != null && value !== "") form.append(key, value);
        });
        return fetch(`${PLUGIN_BASE}/upload`, { method: "POST", body: form }).then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.json();
        });
      }

      function useDraft(key, initial) {
        const [value, setValue] = useState(() => {
          try { return JSON.parse(localStorage.getItem(key)) || initial; } catch (_) { return initial; }
        });
        useEffect(() => localStorage.setItem(key, JSON.stringify(value)), [key, value]);
        return [value, setValue];
      }

      function shortId(value) {
        return value ? String(value).slice(0, 12) : "";
      }

      function statusClass(status) {
        if (status === "ready" || status === "succeeded" || status === "profiled" || status === "diagnosed") return "done";
        if (status === "failed") return "failed";
        if (status === "cancelled") return "cancelled";
        if (String(status || "").includes("ready") || String(status || "").includes("confirmed")) return "approval";
        return "pending";
      }

      function formatElapsed(sec) {
        const s = Math.max(0, Math.round(sec || 0));
        const mm = String(Math.floor(s / 60)).padStart(2, "0");
        const ss = String(s % 60).padStart(2, "0");
        return `${mm}:${ss}`;
      }

      function mergeDependency(snapshot, dependency) {
        if (!dependency) return snapshot;
        const groups = snapshot?.groups || [];
        const nextGroups = groups.some((item) => item.id === dependency.id)
          ? groups.map((item) => item.id === dependency.id ? { ...item, ...dependency } : item)
          : [...groups, dependency];
        return { ...(snapshot || { ok: true }), groups: nextGroups };
      }

      function storageLabel(key) {
        return ({
          root: "插件数据目录",
          uploads: "用户上传资料",
          projects: "项目工作区",
          datasets: "表格分析",
          templates: "模板诊断",
          exports: "导出文件",
        })[key] || key;
      }

      function settingLabel(key) {
        return ({
          uploads_dir: "上传资料目录",
          datasets_dir: "表格分析目录",
          templates_dir: "模板诊断目录",
          projects_dir: "项目工作区目录",
          exports_dir: "导出文件目录",
        })[key] || key;
      }

      function defaultPlaceholder(key) {
        return ({
          uploads_dir: "默认: 插件数据目录/uploads",
          datasets_dir: "默认: 插件数据目录/datasets",
          templates_dir: "默认: 插件数据目录/templates",
          projects_dir: "默认: 插件数据目录/projects",
          exports_dir: "默认: 插件数据目录/exports",
        })[key] || "留空使用默认目录";
      }

      function storageKeyForSetting(key) {
        return ({
          uploads_dir: "uploads",
          datasets_dir: "datasets",
          templates_dir: "templates",
          projects_dir: "projects",
          exports_dir: "exports",
        })[key] || "root";
      }

      function JsonBlock({ value }) {
        return <pre className="json-block">{JSON.stringify(value, null, 2)}</pre>;
      }

      function TableAnalysisSummary({ dataset }) {
        const profile = dataset?.profile;
        const insights = dataset?.insights;
        const chartSpecs = dataset?.chart_specs || insights?.chart_suggestions || [];
        const qualityWarnings = profile?.quality_warnings || [];
        const missingWarnings = qualityWarnings.filter((item) => item.includes("缺失值超过 30%"));
        const otherWarnings = qualityWarnings.filter((item) => !item.includes("缺失值超过 30%"));
        const missingColumns = missingWarnings.map((item) => item.replace(/^列\s+/, "").replace(/\s+缺失值超过 30%。?$/, ""));
        const chartTypeName = (type) => ({
          line: "趋势折线图",
          bar: "柱状图",
          horizontal_bar: "横向条形图",
          pie: "占比饼图",
          table: "明细摘要表",
          metric_cards: "核心指标卡",
        })[type] || type;
        const chartReason = (spec) => {
          if (spec.type === "metric_cards") return "适合在 PPT 中提炼多个关键数值，作为经营指标或核心 KPI 展示。";
          if (spec.type === "table") return "适合保留关键明细，方便在汇报中给出数据依据。";
          if (spec.type === "line") return `适合观察 ${spec.y || "指标"} 随 ${spec.x || "时间/维度"} 的变化趋势。`;
          if (spec.type === "bar" || spec.type === "horizontal_bar") return `适合比较不同 ${spec.x || "分类"} 下的 ${spec.y || "指标"} 差异。`;
          return spec.reason || "可作为演示文稿中的候选图表。";
        };
        if (!dataset) return null;
        if (!profile) {
          return (
            <div className="analysis-help">
              <strong>数据集尚未完成分析。</strong>
              <div>执行分析后，系统将生成字段结构、质量检查、指标/维度识别与推荐图表方案，供后续 PPT 生成流程引用。</div>
            </div>
          );
        }
        return (
          <div className="analysis-summary">
            <div className="analysis-help">
              <strong>分析结果概览</strong>
              <div>系统已完成字段识别、数据质量检查、候选指标/维度提取，并生成可用于演示文稿的数据叙事与图表方案。</div>
            </div>
            <div className="summary-grid">
              <div className="summary-card"><span>行数</span><strong>{profile.row_count}</strong></div>
              <div className="summary-card"><span>列数</span><strong>{profile.column_count}</strong></div>
              <div className="summary-card"><span>候选指标</span><strong>{profile.candidate_metrics?.length || 0}</strong></div>
              <div className="summary-card"><span>候选维度</span><strong>{profile.candidate_dimensions?.length || 0}</strong></div>
            </div>
            <div className="analysis-section">
              <h4>自动洞察</h4>
              {(insights?.key_findings || []).map((item, index) => <p key={index}>{item}</p>)}
              {!(insights?.key_findings || []).length && <p className="text-muted">暂未生成洞察。</p>}
            </div>
            <div className="analysis-section">
              <h4>图表方案</h4>
              {chartSpecs.map((spec) => (
                <div className="chart-spec-card" key={spec.id}>
                  <strong>{spec.title}</strong>
                  <span>{chartTypeName(spec.type)} · {chartReason(spec)}</span>
                </div>
              ))}
              {!chartSpecs.length && <p className="text-muted">暂未生成图表方案。</p>}
            </div>
            {qualityWarnings.length > 0 && (
              <div className="analysis-section warning quality-summary">
                <div className="quality-summary__head">
                  <h4>使用前检查</h4>
                  <span>{qualityWarnings.length} 项提醒</span>
                </div>
                <p className="quality-summary__intro">这里不是报错，而是在提醒：这些字段可能缺值较多或表格过宽，生成 PPT 时建议只选关键列，或先清洗数据。</p>
                <div className="quality-summary__items">
                  {otherWarnings.map((item, index) => <div className="quality-chip" key={index}>{item}</div>)}
                  {missingColumns.length > 0 && (
                    <div className="quality-chip">
                      {missingColumns.length} 个字段缺失较多：{missingColumns.slice(0, 6).join("、")}{missingColumns.length > 6 ? ` 等 ${missingColumns.length} 个` : ""}
                    </div>
                  )}
                </div>
                {missingColumns.length > 6 && (
                  <details className="quality-details">
                    <summary>查看全部缺失字段</summary>
                    <div>{missingColumns.join("、")}</div>
                  </details>
                )}
              </div>
            )}
          </div>
        );
      }

      function AnalysisModal({ dataset, onClose }) {
        if (!dataset) return null;
        return (
          <div className="modal-mask" onClick={onClose}>
            <div className="modal-card analysis-modal" onClick={(e) => e.stopPropagation()}>
              <div className="analysis-modal__head">
                <div>
                  <strong>表格分析结果</strong>
                  <span>{dataset.dataset?.name || dataset.dataset?.id || "数据集"}</span>
                </div>
                <button className="btn btn-sm" onClick={onClose}>关闭</button>
              </div>
              <div className="analysis-modal__body">
                <TableAnalysisSummary dataset={dataset} />
                <details style={{marginTop: 12}}>
                  <summary className="text-xs text-muted">查看原始 JSON</summary>
                  <JsonBlock value={dataset} />
                </details>
              </div>
            </div>
          </div>
        );
      }

      function DeleteAssetConfirmModal({ target, onClose, onConfirm }) {
        const [deleteFiles, setDeleteFiles] = useState(false);
        if (!target) return null;
        return (
          <div className="modal-mask" onClick={onClose}>
            <div className="modal-card delete-modal" onClick={(e) => e.stopPropagation()}>
              <div className="delete-modal__head">
                <div className="delete-modal__icon" aria-hidden="true">!</div>
                <div className="delete-modal__title">
                  <strong>{target.ids ? "确认删除该数据集文件夹？" : "确认删除该素材？"}</strong>
                  <div className="delete-modal__target">
                    <span className="delete-modal__tag">{target.ids ? "目标文件夹" : "目标素材"}</span>
                    <span className="delete-modal__name" title={target.name || target.id}>{target.name || target.id}</span>
                  </div>
                </div>
                <button className="btn btn-sm" onClick={onClose}>关闭</button>
              </div>
              <div className="delete-modal__body">
                <p>默认只删除素材库里的登记记录，不影响磁盘上的原始文件。删除后，{target.ids ? "这个文件夹及其中素材" : "这条素材"}不会再出现在当前列表中。</p>
                <label className="delete-modal__option">
                  <input type="checkbox" checked={deleteFiles} onChange={(e) => setDeleteFiles(e.target.checked)} />
                  <span>同时删除插件存储目录里的文件和分析结果</span>
                </label>
                <div className="delete-modal__hint">为避免误删，系统只会删除插件保存目录内的内容；手动登记的外部路径会自动保留。</div>
              </div>
              <div className="modal-actions">
                <button className="btn" onClick={onClose}>取消</button>
                <button className="btn btn-danger" onClick={() => onConfirm(deleteFiles)}>确认删除</button>
              </div>
            </div>
          </div>
        );
      }

      function ErrorPanel({ error }) {
        if (!error) return null;
        return <div className="oa-config-banner error-panel"><span className="oa-config-banner__icon">!</span><div className="oa-config-banner__text"><strong>错误</strong><br />{String(error.message || error)}</div></div>;
      }

      function ProgressPanel({ event }) {
        if (!event) return null;
        return (
          <div className="oa-config-banner oa-config-banner--info">
            <span className="oa-config-banner__icon">i</span>
            <div className="oa-config-banner__text"><strong>{event.status || event.step}</strong><br />进度 {Math.round((event.progress || 0) * 100)}%</div>
          </div>
        );
      }

      function CostBreakdown({ draft }) {
        const complexity = draft.mode === "table_to_deck" || draft.mode === "template_deck" ? "中" : "低";
        return <div className="oa-cost"><div className="range">{draft.slide_count} 页</div><div className="human">复杂度 {complexity}，会生成 outline/design/IR/audit。</div><span className="conf medium">PPTX 可编辑导出</span></div>;
      }

      function FileUploadZone({ hint = "拖入文件或点击上传。", accept = "", multiple = false, disabled = false, manual = false, uploadExtra = {}, onFilesSelected, onUploaded, onUploads }) {
        const inputId = `upload-${Math.random().toString(36).slice(2)}`;
        async function handleChange(e) {
          const files = Array.from(e.target.files || []);
          if (!files.length) return;
          if (manual) {
            if (onFilesSelected) onFilesSelected(files);
            e.target.value = "";
            return;
          }
          const results = [];
          for (const file of files) {
            const data = await uploadFile(file, "", uploadExtra);
            results.push(data);
            if (onUploaded) onUploaded(data);
          }
          if (onUploads) onUploads(results);
          e.target.value = "";
        }
        return (
          <label className={`upload-zone ${disabled ? "is-disabled" : ""}`} htmlFor={disabled ? undefined : inputId}>
            <input id={inputId} type="file" accept={accept} multiple={multiple} disabled={disabled} onChange={handleChange} />
            <div className="upload-zone__title">点击上传素材</div>
            <div className="upload-zone__hint">{hint}</div>
          </label>
        );
      }

      function PreviewShell({ title, hint, children }) {
        return (
          <div className={"split-right oa-preview-area" + (!children ? " oa-preview-area--centered" : "")}>
            {children || (
              <div className="oa-preview-empty">
                <span className="oa-preview-empty__icon">P</span>
                <div className="oa-preview-empty__title">{title}</div>
                <div className="oa-preview-empty__hint">{hint}</div>
              </div>
            )}
          </div>
        );
      }

      function FolderPickerModal({ open, title, initialPath, onCancel, onSelect }) {
        const [path, setPath] = useState("");
        const [items, setItems] = useState([]);
        const [parent, setParent] = useState(null);
        const [isAnchor, setIsAnchor] = useState(true);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");
        const [newFolderMode, setNewFolderMode] = useState(false);
        const [newFolderName, setNewFolderName] = useState("");
        const newFolderInputRef = useRef(null);

        const load = useCallback(async (nextPath) => {
          setLoading(true);
          setError("");
          try {
            const qs = nextPath ? `?path=${encodeURIComponent(nextPath)}` : "";
            const data = await request(`/storage/list-dir${qs}`);
            setPath(data.path || "");
            setParent(data.parent || null);
            setItems(data.items || []);
            setIsAnchor(!!data.is_anchor);
          } catch (err) {
            setError(String(err.message || err));
            if (nextPath) {
              try {
                const data = await request("/storage/list-dir");
                setPath(data.path || "");
                setParent(data.parent || null);
                setItems(data.items || []);
                setIsAnchor(!!data.is_anchor);
              } catch (_) {}
            }
          } finally {
            setLoading(false);
          }
        }, []);

        useEffect(() => {
          if (!open) return;
          setNewFolderMode(false);
          setNewFolderName("");
          load(initialPath || "");
        }, [open, initialPath, load]);

        useEffect(() => {
          if (newFolderMode && newFolderInputRef.current) newFolderInputRef.current.focus();
        }, [newFolderMode]);

        const crumbs = (() => {
          if (!path) return [];
          const norm = path.replace(/\\/g, "/");
          const parts = norm.split("/").filter(Boolean);
          const out = [];
          if (norm.startsWith("/")) {
            out.push({ name: "/", path: "/" });
            let acc = "";
            for (const part of parts) {
              acc += "/" + part;
              out.push({ name: part, path: acc });
            }
          } else if (parts[0] && /^[A-Za-z]:$/.test(parts[0])) {
            out.push({ name: parts[0], path: parts[0] + "/" });
            let acc = parts[0];
            for (let i = 1; i < parts.length; i++) {
              acc += "/" + parts[i];
              out.push({ name: parts[i], path: acc });
            }
          } else {
            out.push({ name: path, path });
          }
          return out;
        })();

        async function createFolder() {
          const name = newFolderName.trim();
          if (!name || !path) return;
          await request("/storage/mkdir", { method: "POST", body: { parent: path, name } });
          setNewFolderName("");
          setNewFolderMode(false);
          await load(path);
        }

        if (!open) return null;
        return (
          <div className="modal-mask" onClick={onCancel}>
            <div className="modal-card folder-picker" onClick={(e) => e.stopPropagation()}>
              <div className="folder-picker__head">
                <div className="folder-picker__title">{title || "选择文件夹"}</div>
                <div className="folder-picker__crumbs">
                  <span className="folder-picker__crumb" onClick={() => load("")}>起始位置</span>
                  {crumbs.map((crumb, index) => (
                    <React.Fragment key={index}>
                      <span className="folder-picker__crumb-sep">/</span>
                      <span className="folder-picker__crumb" onClick={() => load(crumb.path)} title={crumb.path}>{crumb.name}</span>
                    </React.Fragment>
                  ))}
                </div>
              </div>
              {error && <div className="folder-picker__error">无法读取目录：{error}</div>}
              <div className="folder-picker__body">
                <div className="folder-picker__sidebar">
                  <div className="folder-picker__shortcut" onClick={() => load("")}>起始位置</div>
                </div>
                <div className="folder-picker__list">
                  {loading && <div className="folder-picker__empty">加载中...</div>}
                  {!loading && !isAnchor && parent && (
                    <div className="folder-picker__item" onClick={() => load(parent)}>
                      <span className="folder-picker__item-icon">↰</span><span className="folder-picker__item-name">..</span>
                    </div>
                  )}
                  {!loading && items.length === 0 && <div className="folder-picker__empty">这个目录下没有子文件夹</div>}
                  {!loading && items.map((item) => (
                    <div className="folder-picker__item" key={item.path} onClick={() => load(item.path)} title={item.path}>
                      <span className="folder-picker__item-icon">📁</span><span className="folder-picker__item-name">{item.name}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div className="folder-picker__foot">
                {newFolderMode ? (
                  <>
                    <input ref={newFolderInputRef} className="folder-picker__newinput" value={newFolderName} onChange={(e) => setNewFolderName(e.target.value)} placeholder="输入新文件夹名称" />
                    <button className="btn btn-sm" onClick={() => setNewFolderMode(false)}>取消</button>
                    <button className="btn btn-sm btn-primary" disabled={!newFolderName.trim()} onClick={() => createFolder().catch((err) => setError(String(err.message || err)))}>创建</button>
                  </>
                ) : (
                  <>
                    <span className="folder-picker__current" title={path}>{path || "请选择一个起始位置"}</span>
                    <button className="btn btn-sm" disabled={!path || isAnchor} onClick={() => setNewFolderMode(true)}>新建文件夹</button>
                    <button className="btn btn-sm" onClick={onCancel}>取消</button>
                    <button className="btn btn-sm btn-primary" disabled={!path || isAnchor} onClick={() => onSelect(path)}>选择此文件夹</button>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      function Icon({ name }) {
        const paths = {
          ppt: "m2.859 2.878l12.57-1.796a.5.5 0 0 1 .571.495v20.847a.5.5 0 0 1-.57.495L2.858 21.123a1 1 0 0 1-.859-.99V3.868a1 1 0 0 1 .859-.99ZM4 4.735v14.53l10 1.43V3.305L4 4.735ZM17 19h3V5h-3V3h4a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1h-4v-2ZM5 8h8v6H7v2H5V8Zm2 2v2h4v-2H7Z",
          spark: "M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3Zm6 9l.9 2.1L21 15l-2.1.9L18 18l-.9-2.1L15 15l2.1-.9L18 12ZM6 13l1.1 2.9L10 17l-2.9 1.1L6 21l-1.1-2.9L2 17l2.9-1.1L6 13Z",
          doc: "M6 3h7l5 5v13H6V3Zm7 0v5h5",
          outline: "M5 6h14M5 12h14M5 18h8",
          table: "M4 5h16v14H4V5Zm0 5h16M10 5v14",
          template: "M4 5h16v14H4V5Zm2 2v4h12V7H6Zm0 7h5v3H6v-3Zm8 0h4v3h-4v-3Z",
          edit: "M4 20h4l11-11-4-4L4 16v4Zm12-16 4 4",
        };
        return <svg className={"ui-icon " + (name === "ppt" ? "ui-icon-fill" : "")} viewBox="0 0 24 24" aria-hidden="true"><path d={paths[name] || paths.ppt} /></svg>;
      }

      function ModeChips({ active, onChange }) {
        return (
          <div className="mode-group">
            {modes.map((mode) => (
              <button key={mode.id} type="button" className={"mode-chip " + (active === mode.id ? "active" : "")} onClick={() => onChange(mode.id)}>
                <span className="mode-chip__head"><span className="mode-chip__icon"><Icon name={mode.icon} /></span><span className="mode-chip__title">{mode.title}</span></span>
                <span className="mode-chip__desc">{mode.desc}</span>
              </button>
            ))}
          </div>
        );
      }

      function FlowHint({ mode }) {
        const meta = modes.find((item) => item.id === mode) || modes[0];
        return (
          <div className="flow-hint">
            <div><strong>当前模式：</strong>{meta.title}</div>
            <div>{meta.input}</div>
            <div className="text-dim">{meta.next}</div>
          </div>
        );
      }

      function CreateTab({ setError, refreshProjects, datasets, templates, onNavigate }) {
        const [draft, setDraft] = useDraft("ppt-maker:create", {
          mode: "topic_to_deck",
          title: "OpenAkita 插件生态路线图",
          prompt: "面向企业管理层，科技商务风",
          audience: "企业管理层",
          style: "tech_business",
          custom_style: "",
          slide_count: 8,
          dataset_id: "",
          template_id: "",
        });
        const [result, setResult] = useState(null);
        const update = (key, value) => setDraft({ ...draft, [key]: value });
        async function startProject() {
          setError(null);
          const body = {
            mode: draft.mode,
            title: draft.title,
            prompt: draft.prompt,
            audience: draft.audience,
            style: draft.style === "custom" ? (draft.custom_style || "custom") : draft.style,
            slide_count: draft.slide_count,
            dataset_id: draft.dataset_id || null,
            template_id: draft.template_id || null,
            metadata: { source: "ppt-maker-ui" },
          };
          const data = await request("/projects", { method: "POST", body });
          setResult(data);
          refreshProjects();
        }
        async function generateDeck() {
          const projectId = result?.project?.id;
          if (!projectId) return;
          setError(null);
          setResult(await request(`/projects/${projectId}/retry`, { method: "POST" }));
          refreshProjects();
        }
        return (
          <div className="split-layout">
            <div className="split-left">
              <ModeChips active={draft.mode} onChange={(mode) => update("mode", mode)} />
              <FlowHint mode={draft.mode} />
              <div className="card">
                <div className="label">基础信息</div>
                <div className="grid-2">
                  <div className="form-row"><div className="text-xs text-muted">标题</div><input className="input" value={draft.title} onChange={(e) => update("title", e.target.value)} /></div>
                  <div className="form-row"><div className="text-xs text-muted">受众</div><input className="input" value={draft.audience} onChange={(e) => update("audience", e.target.value)} /></div>
                </div>
                <div className="grid-2">
                  <div className="form-row"><div className="text-xs text-muted">页数</div><input className="input" type="number" min="1" max="80" value={draft.slide_count} onChange={(e) => update("slide_count", Number(e.target.value))} /></div>
                  <div className="form-row">
                    <div className="text-xs text-muted">风格预设</div>
                    <select className="input select" value={draft.style} onChange={(e) => update("style", e.target.value)}>
                      {stylePresets.map(([id, name]) => <option key={id} value={id}>{name}</option>)}
                    </select>
                  </div>
                </div>
                <div className="style-help">{(stylePresets.find(([id]) => id === draft.style) || stylePresets[0])[2]}</div>
                {draft.style === "custom" && (
                  <div className="form-row"><div className="text-xs text-muted">自定义风格</div><input className="input" value={draft.custom_style || ""} onChange={(e) => update("custom_style", e.target.value)} placeholder="例如：深紫渐变、少文字、多图表、咨询风" /></div>
                )}
                <div className="form-row"><div className="text-xs text-muted">需求描述</div><textarea className="input textarea" value={draft.prompt} onChange={(e) => update("prompt", e.target.value)} /></div>
              </div>
              <div className="card">
                <div className="label">素材绑定</div>
                <div className="resource-guide">
                  <div className={"resource-card " + (draft.mode === "files_to_deck" || draft.mode === "revise_deck" || draft.mode === "table_to_deck" ? "required" : "")}>
                    <div><strong>素材库</strong><span>{draft.mode === "files_to_deck" || draft.mode === "revise_deck" ? "建议先解析" : draft.mode === "table_to_deck" ? "必需先分析" : "可选"}</span></div>
                    <p>Markdown / PDF / DOCX / PPTX 走解析；CSV / XLSX 走分析。同一个数据集可同时放参考资料和数据文件。</p>
                    <button className="btn btn-sm" onClick={() => onNavigate("Materials")}>去素材页</button>
                  </div>
                  <div className={"resource-card " + (draft.mode === "template_deck" ? "required" : "")}>
                    <div><strong>企业模板</strong><span>{draft.mode === "template_deck" ? "推荐" : "可选"}</span></div>
                    <p>PPTX 模板需先诊断出 brand tokens 和 layout map。</p>
                    <button className="btn btn-sm" onClick={() => onNavigate("Templates")}>去模板页</button>
                  </div>
                </div>
                <div className="form-row">
                  <div className="text-xs text-muted">数据集（table_to_deck）</div>
                  <select className="input select" value={draft.dataset_id || ""} onChange={(e) => update("dataset_id", e.target.value)}>
                    <option value="">{draft.mode === "table_to_deck" ? "请选择已分析数据集" : "不绑定数据集"}</option>
                    {datasets.map((item) => <option key={item.id} value={item.id}>{item.name} · {item.status}</option>)}
                  </select>
                </div>
                <div className="form-row">
                  <div className="text-xs text-muted">企业模板（template_deck）</div>
                  <select className="input select" value={draft.template_id || ""} onChange={(e) => update("template_id", e.target.value)}>
                    <option value="">{draft.mode === "template_deck" ? "请选择已诊断模板" : "不绑定模板"}</option>
                    {templates.map((item) => <option key={item.id} value={item.id}>{item.name} · {item.status}</option>)}
                  </select>
                </div>
                <CostBreakdown draft={draft} />
              </div>
              <div className="flex gap-2" style={{marginTop: 14}}>
                <button className="btn btn-primary btn-block" onClick={startProject}>创建项目</button>
                <button className="btn" onClick={generateDeck} disabled={!result?.project?.id}>继续生成</button>
              </div>
            </div>
            <PreviewShell title="暂无项目预览" hint="在左侧填写需求并创建项目">
              {result && <div style={{width: "100%"}}><div className="card-title">本次生成状态</div><JsonBlock value={result} /></div>}
            </PreviewShell>
          </div>
        );
      }

      function ProjectsTab({ projects, refreshProjects, setError }) {
        const [detail, setDetail] = useState(null);
        async function load(projectId) { setError(null); setDetail(await request(`/projects/${projectId}`)); }
        async function retry(projectId) { setError(null); setDetail(await request(`/projects/${projectId}/retry`, { method: "POST" })); refreshProjects(); }
        async function cancel(projectId) { setError(null); await request(`/projects/${projectId}/cancel`, { method: "POST" }); refreshProjects(); }
        async function remove(projectId) { setError(null); await request(`/projects/${projectId}`, { method: "DELETE" }); setDetail(null); refreshProjects(); }
        return (
          <div className="split-layout">
            <div className="split-left oa-list-panel">
              <div className="oa-list-panel__filters"><button className="btn btn-primary" onClick={refreshProjects}>刷新项目</button></div>
              <hr className="oa-list-panel__divider" />
              <div className="oa-list-panel__items">
                {projects.map((p) => (
                  <div className="task-card" key={p.id} onClick={() => load(p.id)}>
                    <div className="task-info">
                      <h4>{p.title}</h4>
                      <div className="task-meta"><span>{p.mode}</span><span className={"badge badge-" + statusClass(p.status)}>{p.status}</span><span>{shortId(p.id)}</span></div>
                      <div className="flex gap-2 flex-wrap" style={{marginTop: 8}}>
                        <button className="btn btn-sm" onClick={(e) => { e.stopPropagation(); retry(p.id); }}>继续/重试</button>
                        <button className="btn btn-sm" onClick={(e) => { e.stopPropagation(); cancel(p.id); }}>取消</button>
                        <button className="btn btn-sm btn-danger" onClick={(e) => { e.stopPropagation(); remove(p.id); }}>删除</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="oa-list-panel__footer">共 {projects.length} 个项目</div>
            </div>
            <PreviewShell title="未选择项目" hint="在左侧项目列表中点击一项查看详情">
              {detail && <div style={{width: "100%"}}><div className="card-title">项目详情</div><JsonBlock value={detail} /></div>}
            </PreviewShell>
          </div>
        );
      }

      const TABLE_EXTS = ["csv", "tsv", "xlsx"];
      const SOURCE_EXTS = ["md", "markdown", "txt", "pdf", "docx", "pptx"];
      function fileExt(name) {
        const idx = String(name || "").lastIndexOf(".");
        return idx >= 0 ? name.slice(idx + 1).toLowerCase() : "";
      }
      function isTableFile(name) { return TABLE_EXTS.includes(fileExt(name)); }
      function materialBucket(item) {
        if (item.assetType === "dataset") {
          return item.status === "profiled" ? "processed" : "pending";
        }
        return item.status === "parsed" ? "processed" : "pending";
      }
      function bucketLabel(bucket) {
        return bucket === "processed" ? "已处理" : "待处理";
      }
      function typeLabel(item) {
        return item.assetType === "dataset" ? "表格数据" : "参考资料";
      }
      function buildMaterials(sources, datasets) {
        const items = [];
        for (const dataset of datasets) {
          items.push({
            assetType: "dataset",
            id: dataset.id,
            name: dataset.name,
            kind: dataset.metadata?.kind || "table",
            status: dataset.status,
            collection: dataset.metadata?.collection || dataset.name || "未分组",
            path: dataset.original_path,
            updatedAt: dataset.updated_at || dataset.created_at,
            raw: dataset,
          });
        }
        for (const source of sources) {
          items.push({
            assetType: "source",
            id: source.id,
            name: source.filename,
            kind: source.kind,
            status: source.status,
            collection: source.metadata?.collection || "未分组",
            path: source.path,
            updatedAt: source.updated_at || source.created_at,
            raw: source,
          });
        }
        return items;
      }

      function MaterialsTab({ setError, refreshData, sources, datasets }) {
        const [collectionName, setCollectionName] = useState("");
        const [pendingFiles, setPendingFiles] = useState([]);
        const [uploading, setUploading] = useState(false);
        const [processAfterUpload, setProcessAfterUpload] = useState(false);
        const [uploadPhase, setUploadPhase] = useState("");
        const [selected, setSelected] = useState({});
        const [statusFilter, setStatusFilter] = useState("all");
        const [typeFilter, setTypeFilter] = useState("all");
        const [expandedCollections, setExpandedCollections] = useState({});
        const [analysisModal, setAnalysisModal] = useState(null);
        const [parseModal, setParseModal] = useState(null);
        const [deleteTarget, setDeleteTarget] = useState(null);
        const materials = buildMaterials(sources, datasets);
        async function registerUploadedAsDataset(uploadedSource) {
          const uploadedPath = uploadedSource?.path || "";
          if (!uploadedPath) return null;
          const name = collectionName.trim();
          return await request("/datasets", {
            method: "POST",
            body: { path: uploadedPath, name: uploadedSource.filename || name, collection_name: name },
          });
        }
        async function processMaterial(item, options = {}) {
          const showResult = options.showResult !== false;
          setError(null);
          if (item.assetType === "dataset") {
            const data = await request(`/datasets/${item.id}/profile`, { method: "POST" });
            if (showResult) setAnalysisModal(data);
          } else {
            const data = await request(`/sources/${item.id}/parse`, { method: "POST" });
            if (showResult) setParseModal({ source: item.raw, parsed: data?.parsed });
          }
          refreshData();
        }
        async function confirmUpload() {
          setError(null);
          if (!collectionName.trim()) throw new Error("请先填写素材集名称，再上传文件。");
          if (!pendingFiles.length) throw new Error("请先选择要上传的素材文件。");
          setUploading(true);
          setUploadPhase("上传素材中...");
          try {
            const uploadedMaterials = [];
            for (const file of pendingFiles) {
              const uploaded = await uploadFile(file, "", { collection_name: collectionName.trim() });
              if (isTableFile(uploaded?.source?.filename || file.name)) {
                const created = await registerUploadedAsDataset(uploaded.source);
                if (created?.dataset) {
                  uploadedMaterials.push({ assetType: "dataset", id: created.dataset.id, raw: created.dataset });
                }
              } else if (uploaded?.source) {
                uploadedMaterials.push({ assetType: "source", id: uploaded.source.id, raw: uploaded.source });
              }
            }
            if (processAfterUpload && uploadedMaterials.length > 0) {
              setUploadPhase("同步处理中，请稍候...");
              for (const item of uploadedMaterials) {
                await processMaterial(item, { showResult: false });
              }
            }
            setPendingFiles([]);
            refreshData();
          } finally {
            setUploadPhase("");
            setUploading(false);
          }
        }
        const visibleMaterials = materials.filter((item) => {
          if (statusFilter !== "all" && materialBucket(item) !== statusFilter) return false;
          if (typeFilter !== "all" && item.assetType !== typeFilter) return false;
          return true;
        });
        const groupedCollections = visibleMaterials.reduce((acc, item) => {
          const key = item.collection || "未分组";
          acc[key] = acc[key] || [];
          acc[key].push(item);
          return acc;
        }, {});
        const selectedIds = Object.entries(selected).filter(([, value]) => value).map(([id]) => id);
        function toggleSelected(id) { setSelected((prev) => ({ ...prev, [id]: !prev[id] })); }
        function toggleCollection(name) { setExpandedCollections((prev) => ({ ...prev, [name]: prev[name] === false })); }
        function selectCollection(items) {
          setSelected(items.reduce((acc, item) => ({ ...acc, [item.id]: true }), {}));
        }
        async function processSelected() {
          for (const id of selectedIds) {
            const item = materials.find((entry) => entry.id === id);
            if (item) await processMaterial(item);
          }
          setSelected({});
        }
        async function processCollection(name) {
          setError(null);
          const group = materials.filter((item) => (item.collection || "未分组") === name);
          for (const item of group) await processMaterial(item);
          setSelected({});
        }
        async function viewResult(item) {
          setError(null);
          if (item.assetType === "dataset") {
            if (item.status === "profiled") {
              setAnalysisModal(await request(`/datasets/${item.id}/analysis`));
            } else {
              setAnalysisModal({ dataset: item.raw });
            }
          } else if (item.status === "parsed") {
            setParseModal({ source: item.raw, parsed: item.raw.metadata?.parsed });
          }
        }
        async function confirmDelete(deleteFiles) {
          if (!deleteTarget) return;
          setError(null);
          const targets = deleteTarget.targets || [{ id: deleteTarget.id, assetType: deleteTarget.assetType }];
          for (const entry of targets) {
            const endpoint = entry.assetType === "dataset" ? "datasets" : "sources";
            await request(`/${endpoint}/${entry.id}`, { method: "DELETE", body: { delete_files: deleteFiles } });
          }
          setDeleteTarget(null);
          setSelected((prev) => {
            const next = { ...prev };
            targets.forEach(({ id }) => { delete next[id]; });
            return next;
          });
          refreshData();
        }
        const stats = {
          total: materials.length,
          processed: materials.filter((item) => materialBucket(item) === "processed").length,
          pending: materials.filter((item) => materialBucket(item) === "pending").length,
          tables: materials.filter((item) => item.assetType === "dataset").length,
          docs: materials.filter((item) => item.assetType === "source").length,
        };
        return (
          <div className="asset-workspace">
            <div className="asset-toolbar card">
              <div>
                <div className="label">素材库</div>
                <p>资料和表格统一在这里管理：上传 CSV/XLSX 自动建数据集做体检分析；上传 Markdown/PDF/DOCX/PPTX 自动登记并支持解析。</p>
              </div>
              <div className="asset-stats">
                <span>全部 <strong>{stats.total}</strong></span>
                <span>已处理 <strong>{stats.processed}</strong></span>
                <span>待处理 <strong>{stats.pending}</strong></span>
                <span>表格 <strong>{stats.tables}</strong></span>
                <span>资料 <strong>{stats.docs}</strong></span>
              </div>
            </div>
            <div className="asset-grid-layout">
              <div className="asset-sidebar asset-sidebar--upload card">
                <div className="form-row">
                  <div className="field-title">素材集名称（必填）</div>
                  <input className="input" value={collectionName} onChange={(e) => setCollectionName(e.target.value)} placeholder="例如：2026Q2 销售汇报素材" />
                </div>
                <div className="field-title">上传素材文件</div>
                <FileUploadZone multiple manual accept=".md,.markdown,.txt,.pdf,.docx,.pptx,.csv,.tsv,.xlsx" disabled={!collectionName.trim() || uploading} onFilesSelected={(files) => setPendingFiles((prev) => [...prev, ...files])} hint="先填写素材集名称，再选择一个或多个文件；CSV/XLSX 会建数据集，资料类只登记不分析。" />
                <label className="upload-process-option">
                  <input type="checkbox" checked={processAfterUpload} onChange={(e) => setProcessAfterUpload(e.target.checked)} disabled={uploading} />
                  <span>
                    <strong>上传后同步处理素材</strong>
                    <small>表格需要分析、资料需要解析后才方便用于生成。勾选后会等处理完成再结束上传，结果请到右侧素材管理卡片查看。</small>
                  </span>
                </label>
                <div className="pending-upload">
                  <div className="pending-upload__head">
                    <span>{pendingFiles.length ? `待上传文件（${pendingFiles.length}）` : "待上传文件预览"}</span>
                    {pendingFiles.length > 0 && (
                      <span className="pending-upload__hint">点击 × 可移除单个文件</span>
                    )}
                  </div>
                  {pendingFiles.length === 0 ? (
                    <div className="pending-upload__empty">
                      还没有选择文件。<br />从上方"点击上传素材"挑选文件，预览会显示在这里。
                    </div>
                  ) : (
                    <div className="pending-upload__list">
                      {pendingFiles.map((file, index) => (
                        <div className="pending-upload__item" key={`${file.name}-${index}`}>
                          <span className={"pending-upload__item-icon " + (isTableFile(file.name) ? "is-table" : "is-doc")}>{isTableFile(file.name) ? "表" : "文"}</span>
                          <span className="pending-upload__item-name" title={file.name}>{file.name}</span>
                          <span className="pending-upload__item-size">{(file.size / 1024).toFixed(1)} KB</span>
                          <button className="pending-upload__item-remove" onClick={() => setPendingFiles((prev) => prev.filter((_, i) => i !== index))} title="移除该文件">×</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <button className="btn btn-primary btn-block" onClick={() => confirmUpload().catch(setError)} disabled={!collectionName.trim() || pendingFiles.length === 0 || uploading}>{uploading ? (uploadPhase || "上传中...") : "确认上传"}</button>
              </div>
              <div className="asset-main card">
                <div className="asset-main__head">
                  <strong className="section-title">素材管理</strong>
                  <span>{visibleMaterials.length} 个结果</span>
                </div>
                <div className="asset-main__controls">
                  <div className="asset-filter">
                    <span className="asset-filter__label">状态</span>
                    <button className={statusFilter === "all" ? "active" : ""} onClick={() => setStatusFilter("all")}>全部</button>
                    <button className={statusFilter === "pending" ? "active" : ""} onClick={() => setStatusFilter("pending")}>待处理</button>
                    <button className={statusFilter === "processed" ? "active" : ""} onClick={() => setStatusFilter("processed")}>已处理</button>
                  </div>
                  <div className="asset-filter">
                    <span className="asset-filter__label">类型</span>
                    <button className={typeFilter === "all" ? "active" : ""} onClick={() => setTypeFilter("all")}>全部</button>
                    <button className={typeFilter === "source" ? "active" : ""} onClick={() => setTypeFilter("source")}>资料</button>
                    <button className={typeFilter === "dataset" ? "active" : ""} onClick={() => setTypeFilter("dataset")}>表格</button>
                  </div>
                  <button className="btn btn-primary" onClick={() => processSelected().catch(setError)} disabled={selectedIds.length === 0}>处理选中素材 ({selectedIds.length})</button>
                </div>
                <div className="collection-accordion">
                  {Object.entries(groupedCollections).map(([name, items]) => {
                    const processedCount = items.filter((item) => materialBucket(item) === "processed").length;
                    const open = expandedCollections[name] !== false;
                    return (
                      <section className="collection-panel" key={name}>
                        <div className="collection-panel__head" onClick={() => toggleCollection(name)} role="button" tabIndex="0">
                          <div>
                            <strong>{open ? "▾" : "▸"} {name}</strong>
                            <span>{items.length} 个素材 · 已处理 {processedCount} · 待处理 {items.length - processedCount}</span>
                          </div>
                          <div className="collection-panel__actions" onClick={(e) => e.stopPropagation()}>
                            <button className="btn btn-sm" onClick={() => selectCollection(items)}>选择整组</button>
                            <button className="btn btn-sm btn-primary" onClick={() => processCollection(name).catch(setError)}>整组处理</button>
                            <button className="btn btn-sm btn-danger" onClick={() => setDeleteTarget({ name: `素材集：${name}`, ids: items.map((item) => item.id), targets: items.map((item) => ({ id: item.id, assetType: item.assetType })) })}>删除文件夹</button>
                          </div>

          setError(null);

            setTemplate(created);
            refreshData();
          }

          if (!deleteTarget) return;
          setError(null);
          await request(`/templates/${deleteTarget.id}`, { method: "DELETE", body: { delete_files: deleteFiles } });

      function PythonDepCard({ dep, onInstall, onUninstall }) {
        const [confirmingUninstall, setConfirmingUninstall] = useState(false);

            <div className="pydep-row__status">

                <span className="sysdep-card__badge sysdep-card__badge--busy">
                  <span className="sysdep-spinner" />

              {busy && <button className="btn btn-sm" disabled>{opKind === "uninstall" ? "卸载中..." : "安装中..."}</button>}
            </div>
            <div className="pydep-row__detail">
              {!busy && dep.installed && confirmingUninstall && (
                <div className="sysdep-card__sudo-hint" style={{borderColor:"var(--danger)", background:"rgba(239,68,68,.08)"}}>
                  <div>确认卸载这个依赖组吗？这些包安装在当前 Python 环境中，卸载后对应能力会不可用。</div>
                  <div className="sysdep-card__sudo-cmd"><code>pip uninstall -y {dep.packages?.join(" ")}</code></div>
                  <div className="flex gap-2" style={{justifyContent:"flex-end", marginTop: 10}}>
                    <button className="btn btn-sm" onClick={() => setConfirmingUninstall(false)}>取消</button>

                <div className="sysdep-log">
                  <div className="sysdep-log__head">

                    {dep.elapsed_sec != null && <span>{formatElapsed(dep.elapsed_sec)}</span>}

                  <pre className={"sysdep-log__body" + (!logLines.length ? " sysdep-log__body--empty" : "")}>

                  </pre>

          </div>

      }

      function SettingsTab({ health, setHealth, setError }) {
        const [deps, setDeps] = useState(null);
        const [storage, setStorage] = useState(null);
        const [settings, setSettings] = useState({});
        const [folderPicker, setFolderPicker] = useState(null);
        const [activeOps, setActiveOps] = useState({});
        const [checkingHealth, setCheckingHealth] = useState(false);
        const [loadingDeps, setLoadingDeps] = useState(false);
        const [recheckingDeps, setRecheckingDeps] = useState(false);
        const [notice, setNotice] = useState("");
        const pollRef = useRef(null);
        const regularDeps = (deps?.groups || []).filter((dep) => !dep.detect_only);
        const experimentalDeps = (deps?.groups || []).filter((dep) => dep.detect_only);

        const updateDependency = useCallback((dependency) => {
          setDeps((prev) => mergeDependency(prev, dependency));
        }, []);

        async function checkHealth() {
          setError(null);
          setCheckingHealth(true);
          try {
            const data = await request("/healthz");
            setHealth(data);
          } finally {
            setCheckingHealth(false);
          }
        }

        const loadDeps = useCallback(async ({ quiet = false } = {}) => {
          setError(null);
          if (!quiet) setLoadingDeps(true);
          try {
            const data = await request("/system/python-deps");
            setDeps(data);
            return data;
          } finally {
            if (!quiet) setLoadingDeps(false);
          }
        }, [setError]);

        async function recheckDeps() {
          setRecheckingDeps(true);
          const t0 = Date.now();
          try {
            await loadDeps({ quiet: true });
          } finally {
            const elapsed = Date.now() - t0;
            if (elapsed < 400) await new Promise((resolve) => setTimeout(resolve, 400 - elapsed));
            setRecheckingDeps(false);
          }
        }

        async function startDepOp(depId, opKind) {
          setError(null);
          setNotice(opKind === "uninstall" ? "卸载已开始，正在等待 pip 输出..." : "安装已开始，正在等待 pip 输出...");
          updateDependency({ id: depId, busy: true, status: "running", op_kind: opKind, log_tail: [], elapsed_sec: 0 });
          setActiveOps((prev) => ({ ...prev, [depId]: opKind }));
          try {
            const data = await request(`/system/python-deps/${depId}/${opKind}`, { method: "POST" });
            updateDependency(data.dependency);
            if (!data.dependency?.busy) {
              setActiveOps((prev) => {
                const next = { ...prev };
                delete next[depId];
                return next;
              });
            }
          } catch (err) {
            setActiveOps((prev) => {
              const next = { ...prev };
              delete next[depId];
              return next;
            });
            throw err;
          }
        }

        useEffect(() => {
          if (Object.keys(activeOps).length === 0) {
            if (pollRef.current) clearInterval(pollRef.current);
            pollRef.current = null;
            return;
          }
          const tick = async () => {
            for (const [depId, opKind] of Object.entries(activeOps)) {
              try {
                const data = await request(`/system/python-deps/${depId}/status`);
                const dependency = data.dependency;
                updateDependency(dependency);
                if (!dependency?.busy) {
                  setActiveOps((prev) => {
                    const next = { ...prev };
                    delete next[depId];
                    return next;
                  });
                  const ok = opKind === "uninstall" ? !dependency.installed : dependency.installed;
                  setNotice(ok
                    ? `${depId} ${opKind === "uninstall" ? "已卸载" : "已安装"}，状态已自动刷新。`
                    : `${depId} ${opKind === "uninstall" ? "卸载" : "安装"}未完成，请查看日志。`);
                }
              } catch (_) {
                // 临时网络抖动时继续下一轮轮询。
              }
            }
          };
          tick();
          pollRef.current = setInterval(tick, 2500);
          return () => {
            if (pollRef.current) clearInterval(pollRef.current);
            pollRef.current = null;
          };
        }, [activeOps, updateDependency]);

        async function loadStorage() { setError(null); setStorage(await request("/storage/stats")); }
        async function loadSettings() {
          const data = await request("/settings");
          setSettings(data.settings || {});
        }
        async function saveSettings(updates) {
          const data = await request("/settings", { method: "PUT", body: { updates } });
          setSettings(data.settings || {});
          await loadStorage();
        }
        async function openFolder(key, path = "") { setError(null); await request("/storage/open-folder", { method: "POST", body: { key, path } }); }
        function chooseFolder(configKey) {
          setFolderPicker({ key: configKey, title: `选择${settingLabel(configKey)}`, initialPath: settings[configKey] || "" });
        }
        async function handleFolderSelected(path) {
          if (!folderPicker) return;
          const key = folderPicker.key;
          setFolderPicker(null);
          await saveSettings({ [key]: path });
          setNotice(`${settingLabel(key)}已切换到 ${path}`);
        }
        useEffect(() => { loadStorage().catch(() => {}); loadSettings().catch(() => {}); loadDeps({ quiet: true }).catch(() => {}); }, [loadDeps]);
        return (
          <div className="centered-tab">
            <div className="centered-tab__inner">
              <div className="setting-section">
                <h3 className="setting-title">系统组件与依赖下载</h3>
                <div className="deps-help deps-help--system">
                  <strong>可选依赖只服务于对应能力，不会影响基础主题生成。</strong>
                  <div>文档解析、表格处理、图表渲染、高级导出和 Marp 桥接都按需安装。这里使用白名单依赖组，禁止输入任意 pip 包名。安装会调用当前 OpenAkita 使用的 Python 环境执行 pip，完成后自动刷新状态。</div>
                </div>
                <div className="flex gap-2 flex-wrap" style={{marginBottom: 12}}>
                  <button className="btn btn-primary" onClick={checkHealth} disabled={checkingHealth}>
                    {checkingHealth ? <><span className="sysdep-spinner" /> 健康检查中...</> : "健康检查"}
                  </button>
                  <button className="btn" onClick={recheckDeps} disabled={loadingDeps || recheckingDeps}>
                    {loadingDeps || recheckingDeps ? <><span className="sysdep-spinner" /> 检测中...</> : "检测可选依赖"}
                  </button>
                </div>
                {health && (
                  <div className="health-card">
                    <strong>健康检查通过</strong>
                    <span>插件：{health.plugin} · 阶段：{health.phase} · Pipeline：{health.pipeline_steps} 步</span>
                    <code>{health.data_dir}</code>
                  </div>
                )}
                <div className="sysdep-card sysdep-card--compact">
                  <div className="sysdep-card__head">
                    <div className="sysdep-card__title">Python 可选依赖</div>
                  </div>
                  <div className="pydep-list">
                    {regularDeps.map((dep) => (
                      <PythonDepCard
                        key={dep.id}
                        dep={dep}
                        onInstall={(depId) => startDepOp(depId, "install").catch(setError)}
                        onUninstall={(depId) => startDepOp(depId, "uninstall").catch(setError)}
                      />
                    ))}
                  </div>
                </div>
                {experimentalDeps.length > 0 && (
                  <div className="sysdep-card sysdep-card--compact">
                    <div className="sysdep-card__head">
                      <div className="sysdep-card__title">高级 / 实验功能</div>
                      <span className="sysdep-card__badge sysdep-card__badge--missing">暂未启用</span>
                    </div>
                    <div className="experimental-list">
                      {experimentalDeps.map((dep) => (
                        <div className="experimental-row" key={dep.id}>
                          <div>
                            <strong>{dep.id}</strong>
                            <span>{dep.description}</span>
                          </div>
                          <span>仅检测 · 当前版本不参与基础 PPT 生成</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              <div className="setting-section">
                <h3 className="setting-title">文件夹、归集与命名</h3>
                <div className="deps-help">
                  <strong>每类目录都可以自定义，适合大量客户资料、表格和模板分开管理。</strong>
                  <div>留空时使用插件数据目录；点击“选择”可浏览本机文件夹并新建目录。上传文件会按下方归集和命名规则保存，分析结果和导出文件也会写入对应目录。</div>
                </div>
                {["uploads_dir", "datasets_dir", "templates_dir", "projects_dir", "exports_dir"].map((key) => (
                  <div className="form-row" key={key}>
                    <div className="text-xs text-muted">{settingLabel(key)}</div>
                    <div className="folder-row">
                      <input className="input" value={settings[key] || ""} placeholder={defaultPlaceholder(key)} onChange={(e) => setSettings({ ...settings, [key]: e.target.value })} onBlur={(e) => saveSettings({ [key]: e.target.value }).catch(setError)} />
                      <button className="btn btn-sm" onClick={() => chooseFolder(key)}>选择</button>
                      <button className="btn btn-sm" onClick={() => openFolder(storageKeyForSetting(key), settings[key] || "")}>打开</button>
                    </div>
                  </div>
                ))}
                <div className="grid-2">
                  <div className="form-row">
                    <div className="text-xs text-muted">上传归集方式</div>
                    <select className="input select" value={settings.upload_subdir_mode || "type"} onChange={(e) => saveSettings({ upload_subdir_mode: e.target.value }).catch(setError)}>
                      <option value="type">按用途自动归档（资料 / 表格 / 模板）</option>
                      <option value="date">按上传日期归档</option>
                      <option value="flat">全部保存到当前目录</option>
                    </select>
                  </div>
                  <div className="form-row">
                    <div className="text-xs text-muted">分析结果归集方式</div>
                    <select className="input select" value={settings.analysis_subdir_mode || "date"} onChange={(e) => saveSettings({ analysis_subdir_mode: e.target.value }).catch(setError)}>
                      <option value="date">按分析日期和记录编号归档</option>
                      <option value="flat">按记录编号归档</option>
                    </select>
                  </div>
                </div>
                <div className="grid-2">
                  <div className="form-row">
                    <div className="text-xs text-muted">上传文件命名规则</div>
                    <select className="input select" value={settings.upload_naming_rule || "{date}_{original}"} onChange={(e) => saveSettings({ upload_naming_rule: e.target.value }).catch(setError)}>
                      <option value="{date}_{original}">日期_原文件名</option>
                      <option value="{original}">保留原文件名</option>
                      <option value="{kind}_{date}_{original}">类型_日期_原文件名</option>
                    </select>
                  </div>
                  <div className="form-row">
                    <div className="text-xs text-muted">导出文件命名规则</div>
                    <select className="input select" value={settings.export_naming_rule || "{date}_{project_id}"} onChange={(e) => saveSettings({ export_naming_rule: e.target.value }).catch(setError)}>
                      <option value="{date}_{project_id}">日期_项目ID</option>
                      <option value="{project_id}">项目ID</option>
                    </select>
                  </div>
                </div>
                <div className="folder-row" style={{marginTop: 8}}>
                  <input className="input" readOnly value={storage?.data_dir || health?.data_dir || "点击刷新查看默认目录"} />
                  <button className="btn btn-sm" onClick={() => openFolder("root")}>打开根目录</button>
                  <button className="btn btn-sm" onClick={loadStorage}>刷新空间</button>
                </div>
                {storage?.stats && (
                  <div className="storage-grid">
                    {Object.entries(storage.stats).map(([key, item]) => (
                      <div key={key} className="storage-card">
                        <div className="text-xs text-dim">{storageLabel(key)}</div>

                        <button className="btn btn-sm" onClick={() => openFolder(key)}>打开</button>
                      </div>

                  </div>
                )}
              </div>
              <FolderPickerModal
                open={!!folderPicker}

                initialPath={folderPicker?.initialPath}
                onCancel={() => setFolderPicker(null)}

              />
            </div>
          </div>
        );

      function App() {
        const [active, setActive] = useState("Create");
        const [projects, setProjects] = useState([]);
        const [sources, setSources] = useState([]);
        const [datasets, setDatasets] = useState([]);
        const [templates, setTemplates] = useState([]);
        const [health, setHealth] = useState(null);
        const [error, setError] = useState(null);
        const [event, setEvent] = useState(null);
        async function refreshProjects() {
          try { const data = await request("/projects"); setProjects(data.projects || []); } catch (err) { setError(err); }
        }
        async function refreshData() {
          try {
            const [sourceData, datasetData, templateData] = await Promise.all([request("/sources"), request("/datasets"), request("/templates")]);
            setSources(sourceData.sources || []);
            setDatasets(datasetData.datasets || []);
            setTemplates(templateData.templates || []);
          } catch (err) { setError(err); }
        }
        useEffect(() => {
          refreshProjects();
          refreshData();
          const onTask = (e) => setEvent(e.detail || e);
          window.addEventListener("task_update", onTask);
          return () => window.removeEventListener("task_update", onTask);
        }, []);
        const props = { projects, refreshProjects, sources, datasets, templates, refreshData, health, setHealth, setError };
        props.onNavigate = setActive;
        const body = useMemo(() => ({
          Create: <CreateTab {...props} />,
          Projects: <ProjectsTab {...props} />,
          Materials: <MaterialsTab {...props} />,
          Templates: <TemplatesTab {...props} />,
          Exports: <ExportsTab {...props} />,
          Settings: <SettingsTab {...props} />,
        }[active]), [active, projects, sources, datasets, templates, health]);
        return (
          <main className="app">
            <header className="header">
              <h1>
                <span className="ak-logo"><Icon name="ppt" /></span>
                <span className="brand-copy"><span className="brand-title">PPT 制作助手</span><span className="ak-sub">需求梳理 · 表格洞察 · 模板适配 · PPTX 导出</span></span>
              </h1>
              <div className="header-right"><span>OpenAkita Plugin</span></div>
            </header>
            <nav className="tabs">{tabs.map(([id, label]) => <button key={id} className={"tab " + (active === id ? "active" : "")} onClick={() => setActive(id)}>{label}</button>)}</nav>
            <section className="content">
              <div className="tab-body" data-tab={active}>
                <ErrorPanel error={error} />
                <ProgressPanel event={event} />
                {body}
              </div>
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
