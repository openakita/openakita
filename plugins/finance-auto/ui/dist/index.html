<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>财务自动化</title>
    <link rel="icon" href="./icon.svg" />
    <link rel="stylesheet" href="./_assets/styles.css" />
    <!-- React + ReactDOM via UMD CDN，与 excel-maker 插件一致 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <!-- ─────────────────────────────────────────────────────────────────
         共享：API 客户端 + 桥接 + 工具函数
         ───────────────────────────────────────────────────────────── -->
    <script type="text/babel" data-presets="env,react">
      const { useEffect, useMemo, useState, useRef, useCallback } = React;

      const PLUGIN_ID = "finance-auto";
      const _inIframe = window.parent && window.parent !== window;
      let _bridgeCtx = null;
      let _bridgeConnected = false;

      // ----- 与主程通信桥（OpenAkita PluginAppHost 协议） -----
      // bridge:handshake / bridge:ready 用于声明 SPA 已挂好；bridge:render-ready
      // 在 React 首帧渲染后发，让主程立即收起 loading 罩。
      function postBridge(message) {
        if (_inIframe) window.parent.postMessage({ __akita_bridge: true, ...message }, "*");
      }

      window.addEventListener("message", (event) => {
        const data = event.data;
        if (!data || typeof data !== "object") return;
        if (data.type === "bridge:init") {
          _bridgeCtx = data.ctx || data.payload || {};
          _bridgeConnected = true;
        }
      });

      // 进入 iframe 后立即广播 handshake，主程收到后认为 bridge 可用。
      if (_inIframe) {
        const t = setInterval(() => postBridge({ type: "bridge:handshake", pluginId: PLUGIN_ID }), 250);
        setTimeout(() => clearInterval(t), 8000);
      }

      function detectApiBase() {
        // 在 iframe 内部时 location.origin 已经是主程的 origin（同源静态挂载）。
        // 单独打开 ui/dist/index.html 调试时（端口 5173/1420）走 18900。
        const loc = window.location;
        if (loc.port === "5173" || loc.port === "1420") return "http://127.0.0.1:18900";
        return loc.origin;
      }

      const API_BASE = detectApiBase();
      const PLUGIN_BASE = `${API_BASE}/api/plugins/${PLUGIN_ID}`;

      // 统一 fetch 包装：JSON 体自动 stringify，带超时，错误统一抛带 detail 的 Error。
      async function api(method, path, body, opts = {}) {
        const url = path.startsWith("http") ? path : `${PLUGIN_BASE}${path}`;
        const isForm = body instanceof FormData;
        const controller = new AbortController();
        const timeoutMs = opts.timeoutMs ?? 30000;
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
          const resp = await fetch(url, {
            method,
            headers: isForm
              ? undefined
              : body == null
                ? undefined
                : { "Content-Type": "application/json" },
            body: isForm ? body : body == null ? undefined : JSON.stringify(body),
            signal: controller.signal,
          });
          if (resp.status === 204) return null;
          // 导出端点直接返回二进制流，由调用方处理。
          if (opts.raw) return resp;
          const ct = resp.headers.get("content-type") || "";
          let data = null;
          if (ct.includes("application/json")) {
            data = await resp.json().catch(() => null);
          } else {
            data = await resp.text().catch(() => null);
          }
          if (!resp.ok) {
            const detail = (data && data.detail) || (typeof data === "string" ? data : "");
            const err = new Error(`${resp.status} ${resp.statusText}${detail ? " · " + detail : ""}`);
            err.status = resp.status;
            err.body = data;
            throw err;
          }
          return data;
        } finally {
          clearTimeout(timer);
        }
      }

      // ----- 简易 toast hook -----
      function useToasts() {
        const [items, setItems] = useState([]);
        const push = useCallback((msg, type = "ok", ttl = 4000) => {
          const id = Math.random().toString(36).slice(2);
          setItems((cur) => [...cur, { id, msg, type }]);
          setTimeout(() => setItems((cur) => cur.filter((x) => x.id !== id)), ttl);
        }, []);
        const view = (
          <div className="toast-wrap">
            {items.map((t) => (
              <div key={t.id} className={`toast ${t.type === "err" ? "err" : t.type === "warn" ? "warn" : ""}`}>
                {t.msg}
              </div>
            ))}
          </div>
        );
        return { push, view };
      }

      // ----- 通用 hook：拉取任意端点 -----
      function useFetch(path, deps = [], opts = {}) {
        const [data, setData] = useState(null);
        const [error, setError] = useState(null);
        const [loading, setLoading] = useState(true);
        const reload = useCallback(() => {
          if (!path) { setLoading(false); return; }
          setLoading(true);
          setError(null);
          return api("GET", path, null, opts)
            .then((d) => { setData(d); setLoading(false); return d; })
            .catch((e) => { setError(e); setLoading(false); throw e; });
        // eslint-disable-next-line
        }, [path, JSON.stringify(opts)]);
        useEffect(() => { reload(); /* eslint-disable-next-line */ }, deps);
        return { data, error, loading, reload };
      }

      // ----- 通用：格式化 -----
      function fmtMoney(v) {
        if (v == null) return "—";
        const n = Number(v);
        if (Number.isNaN(n)) return String(v);
        return n.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      function fmtTs(s) {
        if (!s) return "—";
        // ISO -> "MM-DD HH:mm"
        try {
          const d = new Date(s);
          const pad = (n) => String(n).padStart(2, "0");
          return `${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        } catch { return s; }
      }
      function shortHash(s) { return s ? s.slice(0, 8) : "—"; }

      // ----- 工业枚举 / 准则 / 辅助核算 选项 -----
      // 顺序贴合财务用户在国内 ERP 选行业 / 准则的常见认知。
      const INDUSTRY_OPTS = [
        { v: "general",       l: "一般工商业（默认）" },
        { v: "manufacturing", l: "制造业" },
        { v: "trading",       l: "贸易 / 批发零售" },
        { v: "service",       l: "服务业" },
        { v: "construction",  l: "建筑施工" },
        { v: "real_estate",   l: "房地产" },
        { v: "tech",          l: "科技 / 软件" },
      ];
      const STANDARD_OPTS = [
        { v: "cas",   l: "企业会计准则" },
        { v: "small", l: "小企业会计准则" },
        { v: "other", l: "其他 / 自定义" },
      ];
      const AUX_OPTS = [
        { v: "full",  l: "全辅助（项目/部门/客户单独存）" },
        { v: "light", l: "轻辅助（仅 aux_text 列）" },
        { v: "none",  l: "不存辅助" },
      ];

      // ─────────────────────────────────────────────────────────────────
      //  公用 UI 子组件
      // ─────────────────────────────────────────────────────────────────
      function TopBar({ crumbs, right }) {
        return (
          <div className="topbar">
            <div className="topbar-left">
              <span className="brand-icon">财</span>
              <div>
                <div className="topbar-title">财务自动化</div>
                <div className="topbar-subtitle">M1 W3 · 首版界面</div>
              </div>
              {crumbs && crumbs.length > 0 && (
                <div className="crumb" style={{ marginLeft: 16 }}>
                  {crumbs.map((c, i) => (
                    <React.Fragment key={i}>
                      {i > 0 && <span className="crumb-sep">/</span>}
                      {c.onClick ? (
                        <button className="linklike" onClick={c.onClick}>{c.label}</button>
                      ) : (
                        <span style={{ color: "var(--text)" }}>{c.label}</span>
                      )}
                    </React.Fragment>
                  ))}
                </div>
              )}
            </div>
            <div className="topbar-right">{right}</div>
          </div>
        );
      }

      function Spinner() { return <span className="spinner" />; }

      function EmptyState({ title, desc }) {
        return <div className="empty"><div style={{ fontWeight: 500, color: "var(--text)" }}>{title}</div>{desc && <div style={{ marginTop: 4 }}>{desc}</div>}</div>;
      }

      function Modal({ open, onClose, title, sub, children, footer }) {
        useEffect(() => {
          if (!open) return;
          const handler = (e) => { if (e.key === "Escape") onClose && onClose(); };
          window.addEventListener("keydown", handler);
          return () => window.removeEventListener("keydown", handler);
        }, [open, onClose]);
        if (!open) return null;
        return (
          <div className="modal-backdrop" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose && onClose(); }}>
            <div className="modal" onMouseDown={(e) => e.stopPropagation()}>
              <h3>{title}</h3>
              {sub && <p className="sub">{sub}</p>}
              {children}
              {footer && <div className="modal-actions">{footer}</div>}
            </div>
          </div>
        );
      }

      function Drawer({ open, onClose, title, children }) {
        if (!open) return null;
        return (
          <>
            <div className="drawer-backdrop" onClick={onClose} />
            <div className="drawer">
              <div className="drawer-header">
                <h3>{title}</h3>
                <button className="btn subtle sm" onClick={onClose}>关闭 ✕</button>
              </div>
              <div className="drawer-body">{children}</div>
            </div>
          </>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  视图占位（commit 2/3/4 才真正实现）
      // ─────────────────────────────────────────────────────────────────
      function ScaffoldNotice() {
        return (
          <div className="card">
            <h3 className="card-title">UI 启动 · 占位</h3>
            <p className="card-sub">视图实现将在后续 commit 中逐步加入。</p>
            <div className="text-sm text-muted">
              本页表示前端骨架已就绪：iframe 桥接、API 客户端、Toast、Modal、Drawer、表格 / 表单 CSS 都已落地，
              下一步将填入 OrgListView / OrgDetailView / ReportView。
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  视图：OrgListView —— 列表 + 创建账套
      //
      // 数据：GET /orgs                           （拉取已有账套）
      //       POST /orgs                          （新建）
      //
      // 关键 UX：
      //   * 加载中显示骨架行（不闪空表）
      //   * 后端 409（编码重名）转成表单内联错误，不是 toast，避免重打
      //   * 提交按钮 in-flight 期间禁用 + spinner，防止重复 POST
      //   * 列表中每行都是可点的（cursor + hover），点击跳转到 detail
      // ─────────────────────────────────────────────────────────────────
      function OrgListView({ onOpenOrg, toast }) {
        const { data, loading, error, reload } = useFetch("/orgs", []);
        const [openCreate, setOpenCreate] = useState(false);
        const orgs = (data && data.organizations) || [];

        return (
          <>
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="page-title">账套管理</h2>
                <p className="page-subtitle">每一个账套对应一组余额表 / 报表 / 审计底稿。</p>
              </div>
              <div className="flex gap-2">
                <button className="btn" onClick={reload} disabled={loading}>
                  {loading ? <Spinner /> : "刷新"}
                </button>
                <button className="btn primary" onClick={() => setOpenCreate(true)}>+ 新建账套</button>
              </div>
            </div>

            <div className="card">
              {error && (
                <div className="upload-result err">
                  无法读取账套列表：{error.message}
                </div>
              )}
              <table className="tbl">
                <thead>
                  <tr>
                    <th>名称</th>
                    <th>编码</th>
                    <th>行业</th>
                    <th>准则</th>
                    <th>辅助核算</th>
                    <th>创建于</th>
                  </tr>
                </thead>
                <tbody>
                  {loading && Array.from({ length: 3 }).map((_, i) => (
                    <tr key={i}>
                      <td colSpan={6}><span className="skeleton" /></td>
                    </tr>
                  ))}
                  {!loading && orgs.length === 0 && !error && (
                    <tr>
                      <td colSpan={6}>
                        <EmptyState
                          title="还没有账套"
                          desc="点击右上角「+ 新建账套」开始创建。"
                        />
                      </td>
                    </tr>
                  )}
                  {!loading && orgs.map((o) => (
                    <tr key={o.id} className="clickable" onClick={() => onOpenOrg(o.id)}>
                      <td>
                        <div style={{ fontWeight: 500 }}>{o.name || <span className="text-muted">（未命名）</span>}</div>
                        <div className="text-xs text-muted mono">{o.id}</div>
                      </td>
                      <td className="mono">{o.code}</td>
                      <td>{(INDUSTRY_OPTS.find((x) => x.v === o.industry) || {}).l || o.industry}</td>
                      <td>{(STANDARD_OPTS.find((x) => x.v === o.standard) || {}).l || o.standard}</td>
                      <td>{(AUX_OPTS.find((x) => x.v === o.aux_mode) || {}).l || o.aux_mode}</td>
                      <td className="text-muted">{fmtTs(o.created_at)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <CreateOrgDialog
              open={openCreate}
              onClose={() => setOpenCreate(false)}
              onCreated={(org) => {
                setOpenCreate(false);
                toast(`账套「${org.name}」创建成功`);
                reload();
              }}
              onError={(msg) => toast(msg, "err")}
            />
          </>
        );
      }

      function CreateOrgDialog({ open, onClose, onCreated, onError }) {
        const [name, setName] = useState("");
        const [code, setCode] = useState("");
        const [industry, setIndustry] = useState("general");
        const [standard, setStandard] = useState("cas");
        const [auxMode, setAuxMode] = useState("full");
        const [submitting, setSubmitting] = useState(false);
        const [fieldErr, setFieldErr] = useState({});
        const firstInputRef = useRef(null);

        useEffect(() => {
          if (open) {
            setName(""); setCode(""); setIndustry("general"); setStandard("cas"); setAuxMode("full");
            setFieldErr({});
            setTimeout(() => firstInputRef.current && firstInputRef.current.focus(), 50);
          }
        }, [open]);

        const submit = async () => {
          const errs = {};
          if (!name.trim()) errs.name = "请输入账套名称";
          if (!code.trim()) errs.code = "请输入账套编码（用于唯一标识，例如 A 公司 → COMP_A）";
          setFieldErr(errs);
          if (Object.keys(errs).length > 0) return;
          setSubmitting(true);
          try {
            const org = await api("POST", "/orgs", {
              name: name.trim(),
              code: code.trim(),
              industry,
              standard,
              aux_mode: auxMode,
            });
            onCreated(org);
          } catch (e) {
            // 409 = 编码重复；显示在 code 字段下而不是 toast
            if (e.status === 409) {
              setFieldErr({ code: "该编码已存在，请换一个" });
            } else {
              onError(`创建失败：${e.message}`);
            }
          } finally {
            setSubmitting(false);
          }
        };

        return (
          <Modal
            open={open}
            onClose={submitting ? undefined : onClose}
            title="新建账套"
            sub="账套是财务数据的最小隔离单位 —— 每家公司 / 每年财务都建一个独立账套"
            footer={
              <>
                <button className="btn" onClick={onClose} disabled={submitting}>取消</button>
                <button className="btn primary" onClick={submit} disabled={submitting}>
                  {submitting && <Spinner />}
                  {submitting ? "创建中…" : "创建"}
                </button>
              </>
            }
          >
            <div className="row">
              <div>
                <label className="lbl">账套名称<span className="required">*</span></label>
                <input
                  ref={firstInputRef}
                  className="field"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="例如：北京 A 公司 2025"
                  maxLength={128}
                />
                {fieldErr.name && <div className="helper" style={{ color: "var(--danger)" }}>{fieldErr.name}</div>}
              </div>
              <div>
                <label className="lbl">账套编码<span className="required">*</span></label>
                <input
                  className="field mono"
                  value={code}
                  onChange={(e) => setCode(e.target.value)}
                  placeholder="例如：COMP_A_2025"
                  maxLength={64}
                />
                {fieldErr.code
                  ? <div className="helper" style={{ color: "var(--danger)" }}>{fieldErr.code}</div>
                  : <div className="helper">系统内唯一，建议英文 / 数字 / 下划线，方便后续 API 引用。</div>}
              </div>
            </div>

            <div className="row cols-2 mt-3">
              <div>
                <label className="lbl">行业</label>
                <select className="field" value={industry} onChange={(e) => setIndustry(e.target.value)}>
                  {INDUSTRY_OPTS.map((o) => <option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
              </div>
              <div>
                <label className="lbl">会计准则</label>
                <select className="field" value={standard} onChange={(e) => setStandard(e.target.value)}>
                  {STANDARD_OPTS.map((o) => <option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
              </div>
            </div>

            <div className="row mt-3">
              <div>
                <label className="lbl">辅助核算模式</label>
                <select className="field" value={auxMode} onChange={(e) => setAuxMode(e.target.value)}>
                  {AUX_OPTS.map((o) => <option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
                <div className="helper">控制项目 / 部门 / 客户辅助维度的存储方式。一般工商业可保留默认「全辅助」。</div>
              </div>
            </div>
          </Modal>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  视图：OrgDetailView —— 账套详情 + 三个 Tab
      //
      // Tab A 「余额表导入」：
      //    POST /orgs/{id}/imports  （上传 .xls / .xlsx）
      //    GET  /orgs/{id}/imports  （历史列表）
      //    GET  /orgs/{id}/imports/{import_id}/rows?limit&offset
      //
      // Tab B / C 在后续 commit 实装。
      // ─────────────────────────────────────────────────────────────────
      function OrgDetailView({ orgId, period, onBack, onOpenReport, toast }) {
        const [tab, setTab] = useState("import");
        const orgs = useFetch("/orgs", []);
        const org = useMemo(() => {
          if (!orgs.data) return null;
          return orgs.data.organizations.find((o) => o.id === orgId);
        }, [orgs.data, orgId]);

        return (
          <>
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="page-title">
                  {org ? org.name : <span className="skeleton" style={{ width: 200 }} />}
                  {org && <span className="badge info" style={{ marginLeft: 10 }}>{(STANDARD_OPTS.find((x) => x.v === org.standard) || {}).l}</span>}
                </h2>
                <p className="page-subtitle">
                  {org && (
                    <>
                      <span className="mono">{org.code}</span>
                      {" · "}{(INDUSTRY_OPTS.find((x) => x.v === org.industry) || {}).l || org.industry}
                      {" · "}辅助核算：{(AUX_OPTS.find((x) => x.v === org.aux_mode) || {}).l || org.aux_mode}
                      {" · "}期间 <strong>{period}</strong>
                    </>
                  )}
                </p>
              </div>
              <button className="btn" onClick={onBack}>← 返回账套列表</button>
            </div>

            {orgs.error && (
              <div className="card upload-result err">
                无法读取账套元信息：{orgs.error.message}
              </div>
            )}

            <div className="tabs">
              <button className={`tab ${tab === "import" ? "active" : ""}`} onClick={() => setTab("import")}>余额表导入</button>
              <button className={`tab ${tab === "report" ? "active" : ""}`} onClick={() => setTab("report")}>报表生成</button>
              <button className={`tab ${tab === "vat" ? "active" : ""}`} onClick={() => setTab("vat")}>增值税申报</button>
            </div>

            {tab === "import" && (
              <ImportTab orgId={orgId} period={period} toast={toast} />
            )}
            {tab === "report" && (
              <ReportTab orgId={orgId} period={period} onOpenReport={onOpenReport} toast={toast} />
            )}
            {tab === "vat" && (
              <VatTab orgId={orgId} toast={toast} />
            )}
          </>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  Tab A：余额表导入
      // ─────────────────────────────────────────────────────────────────
      function ImportTab({ orgId, period, toast }) {
        const imports = useFetch(`/orgs/${orgId}/imports`, [orgId]);
        const items = (imports.data && imports.data.imports) || [];

        const [uploading, setUploading] = useState(false);
        const [uploadPct, setUploadPct] = useState(0);
        const [lastResult, setLastResult] = useState(null);
        const [dragging, setDragging] = useState(false);
        const fileInputRef = useRef(null);
        const [previewId, setPreviewId] = useState(null);

        const upload = async (file) => {
          if (!file) return;
          if (!/\.(xls|xlsx)$/i.test(file.name)) {
            toast(`只接受 .xls / .xlsx 文件，收到：${file.name}`, "err");
            return;
          }
          setUploading(true);
          setLastResult(null);
          setUploadPct(0);
          try {
            // 用 XHR 走原生 progress 事件 —— fetch() 在浏览器侧没有上传进度。
            const result = await new Promise((resolve, reject) => {
              const xhr = new XMLHttpRequest();
              const fd = new FormData();
              fd.append("file", file);
              fd.append("period_id", period);
              xhr.open("POST", `${PLUGIN_BASE}/orgs/${orgId}/imports`);
              xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) setUploadPct(Math.round((e.loaded / e.total) * 100));
              };
              xhr.onload = () => {
                try {
                  const body = JSON.parse(xhr.responseText || "{}");
                  if (xhr.status >= 200 && xhr.status < 300) resolve(body);
                  else reject(new Error(`${xhr.status} ${xhr.statusText} · ${(body && body.detail) || ""}`));
                } catch (e) { reject(e); }
              };
              xhr.onerror = () => reject(new Error("网络错误：无法连接到后端"));
              xhr.send(fd);
            });
            setLastResult({ ok: true, ...result, source_file: file.name });
            toast(`导入成功，共解析 ${result.row_count} 行（${result.parser_used}）`);
            imports.reload();
          } catch (e) {
            setLastResult({ ok: false, error: e.message, source_file: file.name });
            toast(`导入失败：${e.message}`, "err");
          } finally {
            setUploading(false);
          }
        };

        const onDrop = (e) => {
          e.preventDefault();
          setDragging(false);
          const f = e.dataTransfer.files && e.dataTransfer.files[0];
          if (f) upload(f);
        };

        return (
          <>
            <div className="card">
              <h3 className="card-title">上传余额表</h3>
              <p className="card-sub">
                支持 .xls（金蝶 / 用友 / 苏达通用导出）和 .xlsx。当前期间：<strong>{period}</strong>
              </p>
              <div
                className={`dropzone ${dragging ? "dragging" : ""} ${uploading ? "" : ""}`}
                onClick={() => !uploading && fileInputRef.current && fileInputRef.current.click()}
                onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
                onDragLeave={() => setDragging(false)}
                onDrop={onDrop}
              >
                {uploading ? (
                  <>
                    <Spinner />
                    <div className="mt-2 text-sm">上传中… {uploadPct}%</div>
                    <div className="progress" style={{ maxWidth: 320, marginTop: 8 }}>
                      <div className="bar" style={{ width: `${uploadPct}%` }} />
                    </div>
                  </>
                ) : (
                  <>
                    <div style={{ fontSize: 14, fontWeight: 500 }}>拖拽 .xls / .xlsx 到此处</div>
                    <div className="hint">或点击选择文件 · 单文件不超过 64 MB</div>
                  </>
                )}
                <input
                  ref={fileInputRef}
                  type="file"
                  accept=".xls,.xlsx"
                  onChange={(e) => {
                    const f = e.target.files && e.target.files[0];
                    if (f) upload(f);
                    e.target.value = "";
                  }}
                />
              </div>

              {lastResult && (
                <div className={`upload-result ${lastResult.ok ? "ok" : "err"}`}>
                  {lastResult.ok ? (
                    <>
                      <strong>{lastResult.source_file}</strong> · 解析成功 · {lastResult.row_count} 行 ·
                      解析器：<span className="mono">{lastResult.parser_used}</span> ·
                      sha256: <span className="mono">{shortHash(lastResult.file_sha256)}</span>
                      {lastResult.import_id && (
                        <>
                          {" · "}
                          <button className="btn subtle sm" onClick={() => setPreviewId(lastResult.import_id)}>查看明细</button>
                        </>
                      )}
                    </>
                  ) : (
                    <>
                      <strong>{lastResult.source_file}</strong> 导入失败：{lastResult.error}
                    </>
                  )}
                </div>
              )}
            </div>

            <div className="card">
              <div className="flex items-center justify-between mb-2">
                <div>
                  <h3 className="card-title">历史导入</h3>
                  <p className="card-sub">点「明细」分页查看解析后的余额表行。</p>
                </div>
                <button className="btn sm" onClick={imports.reload} disabled={imports.loading}>
                  {imports.loading ? <Spinner /> : "刷新"}
                </button>
              </div>
              <table className="tbl">
                <thead>
                  <tr>
                    <th>上传时间</th>
                    <th>文件</th>
                    <th className="num">行数</th>
                    <th>解析器</th>
                    <th>状态</th>
                    <th>SHA256</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {imports.loading && Array.from({ length: 2 }).map((_, i) => (
                    <tr key={i}><td colSpan={7}><span className="skeleton" /></td></tr>
                  ))}
                  {!imports.loading && items.length === 0 && (
                    <tr><td colSpan={7}><EmptyState title="暂无历史导入" /></td></tr>
                  )}
                  {!imports.loading && items.map((it) => (
                    <tr key={it.id}>
                      <td className="text-muted">{fmtTs(it.uploaded_at)}</td>
                      <td>{it.source_file || <span className="text-muted">（未命名）</span>}</td>
                      <td className="num">{it.row_count}</td>
                      <td className="mono">{it.parser_used || "—"}</td>
                      <td>
                        {it.status === "ok" && <span className="badge ok">成功</span>}
                        {it.status === "failed" && <span className="badge err">失败</span>}
                        {it.status === "pending" && <span className="badge warn">处理中</span>}
                      </td>
                      <td className="mono text-xs">{shortHash(it.file_sha256)}</td>
                      <td>
                        {it.status === "ok" && (
                          <button className="btn sm subtle" onClick={() => setPreviewId(it.id)}>明细</button>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {previewId && (
              <ImportRowsDrawer
                orgId={orgId}
                importId={previewId}
                onClose={() => setPreviewId(null)}
              />
            )}
          </>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  导入明细抽屉：分页查看 trial_balance_rows
      // ─────────────────────────────────────────────────────────────────
      function ImportRowsDrawer({ orgId, importId, onClose }) {
        const PAGE = 20;
        const [offset, setOffset] = useState(0);
        const path = `/orgs/${orgId}/imports/${importId}/rows?limit=${PAGE}&offset=${offset}`;
        const { data, loading, error } = useFetch(path, [orgId, importId, offset]);

        const rows = (data && data.rows) || [];
        const total = (data && data.total) || 0;
        const last = Math.max(0, Math.ceil(total / PAGE) - 1);
        const cur = Math.floor(offset / PAGE);

        return (
          <Drawer open onClose={onClose} title={`导入明细 · ${importId.slice(-12)}`}>
            <div className="flex items-center justify-between mb-2">
              <div className="text-sm text-muted">共 <strong>{total}</strong> 行 · 当前 <strong>{cur + 1}</strong> / {last + 1} 页</div>
              <div className="flex gap-2">
                <button className="btn sm" disabled={cur === 0 || loading} onClick={() => setOffset(Math.max(0, offset - PAGE))}>上一页</button>
                <button className="btn sm" disabled={cur >= last || loading} onClick={() => setOffset(offset + PAGE)}>下一页</button>
              </div>
            </div>

            {error && <div className="upload-result err">{error.message}</div>}

            <table className="tbl">
              <thead>
                <tr>
                  <th className="num">#</th>
                  <th>科目</th>
                  <th>名称</th>
                  <th className="num">期初借</th>
                  <th className="num">期初贷</th>
                  <th className="num">期末借</th>
                  <th className="num">期末贷</th>
                </tr>
              </thead>
              <tbody>
                {loading && Array.from({ length: 4 }).map((_, i) => (
                  <tr key={i}><td colSpan={7}><span className="skeleton" /></td></tr>
                ))}
                {!loading && rows.map((r) => (
                  <tr key={r.id}>
                    <td className="num text-muted">{r.row_index}</td>
                    <td className="mono">{r.full_code || r.raw_code || "—"}</td>
                    <td>{r.account_name || <span className="text-muted">（无名）</span>}</td>
                    <td className="num">{fmtMoney(r.opening_debit)}</td>
                    <td className="num">{fmtMoney(r.opening_credit)}</td>
                    <td className="num">{fmtMoney(r.closing_debit)}</td>
                    <td className="num">{fmtMoney(r.closing_credit)}</td>
                  </tr>
                ))}
                {!loading && rows.length === 0 && (
                  <tr><td colSpan={7}><EmptyState title="该次导入没有数据" /></td></tr>
                )}
              </tbody>
            </table>
          </Drawer>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  Tab B：报表生成
      //  POST /orgs/{id}/reports/{kind}/generate
      //  GET  /orgs/{id}/reports
      //  kind ∈ {balance_sheet, income_statement}
      //  accounting_standard ∈ {small_enterprise, general_enterprise}
      // ─────────────────────────────────────────────────────────────────
      const REPORT_KINDS = [
        { v: "balance_sheet",    l: "资产负债表" },
        { v: "income_statement", l: "利润表" },
      ];
      const ACCT_STD_OPTS = [
        { v: "general_enterprise", l: "企业会计准则", note: "上市 / 一般企业" },
        { v: "small_enterprise",   l: "小企业会计准则", note: "微小企业" },
      ];

      function ReportTab({ orgId, period, onOpenReport, toast }) {
        const reports = useFetch(`/orgs/${orgId}/reports`, [orgId]);
        const items = (reports.data && reports.data.reports) || [];

        const [kind, setKind] = useState("balance_sheet");
        const [standard, setStandard] = useState("general_enterprise");
        const [generating, setGenerating] = useState(false);

        const onGenerate = async () => {
          setGenerating(true);
          try {
            const resp = await api(
              "POST",
              `/orgs/${orgId}/reports/${kind}/generate`,
              { period_id: period, accounting_standard: standard },
            );
            const reportId = resp && resp.report && resp.report.id;
            const cellCount = resp && resp.report && resp.report.cell_count;
            if (reportId) {
              toast(`报表已生成（${cellCount} 行），点击查看`);
              onOpenReport(reportId);
            } else {
              toast("生成成功但未返回 report_id", "warn");
              reports.reload();
            }
          } catch (e) {
            // 后端 404：未找到对应期间的成功导入 → 友好引导
            if (e.status === 404) {
              toast("当前期间还没有成功导入的余额表，请先到「余额表导入」上传。", "err");
            } else {
              toast(`生成失败：${e.message}`, "err");
            }
          } finally {
            setGenerating(false);
          }
        };

        return (
          <>
            <div className="card">
              <h3 className="card-title">生成新报表</h3>
              <p className="card-sub">
                基于当前期间 <strong>{period}</strong> 最新一次成功导入的余额表生成。
              </p>
              <div className="row cols-3">
                <div>
                  <label className="lbl">报表类型</label>
                  <select className="field" value={kind} onChange={(e) => setKind(e.target.value)}>
                    {REPORT_KINDS.map((o) => <option key={o.v} value={o.v}>{o.l}</option>)}
                  </select>
                </div>
                <div>
                  <label className="lbl">会计准则</label>
                  <select className="field" value={standard} onChange={(e) => setStandard(e.target.value)}>
                    {ACCT_STD_OPTS.map((o) => <option key={o.v} value={o.v}>{o.l}</option>)}
                  </select>
                  <div className="helper">{(ACCT_STD_OPTS.find((o) => o.v === standard) || {}).note}</div>
                </div>
                <div style={{ display: "flex", alignItems: "flex-end" }}>
                  <button className="btn primary" onClick={onGenerate} disabled={generating} style={{ width: "100%" }}>
                    {generating && <Spinner />}
                    {generating ? "生成中…" : "生成报表"}
                  </button>
                </div>
              </div>
            </div>

            <div className="card">
              <div className="flex items-center justify-between mb-2">
                <div>
                  <h3 className="card-title">已生成的报表</h3>
                  <p className="card-sub">点行可打开追溯视图。</p>
                </div>
                <button className="btn sm" onClick={reports.reload} disabled={reports.loading}>
                  {reports.loading ? <Spinner /> : "刷新"}
                </button>
              </div>

              <table className="tbl">
                <thead>
                  <tr>
                    <th>生成时间</th>
                    <th>类型</th>
                    <th>准则</th>
                    <th>期间</th>
                    <th className="num">单元格数</th>
                    <th>状态</th>
                    <th>告警</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {reports.loading && Array.from({ length: 2 }).map((_, i) => (
                    <tr key={i}><td colSpan={8}><span className="skeleton" /></td></tr>
                  ))}
                  {!reports.loading && items.length === 0 && (
                    <tr><td colSpan={8}><EmptyState title="还没有生成过报表" /></td></tr>
                  )}
                  {!reports.loading && items.map((r) => (
                    <tr key={r.id} className="clickable" onClick={() => onOpenReport(r.id)}>
                      <td className="text-muted">{fmtTs(r.generated_at)}</td>
                      <td>{(REPORT_KINDS.find((x) => x.v === r.sheet_kind) || {}).l || r.sheet_kind}</td>
                      <td>{(ACCT_STD_OPTS.find((x) => x.v === r.accounting_standard) || {}).l || r.accounting_standard}</td>
                      <td className="mono">{r.period_id}</td>
                      <td className="num">{r.cell_count}</td>
                      <td>{r.status === "ok" ? <span className="badge ok">ok</span> : <span className="badge err">{r.status}</span>}</td>
                      <td>
                        {r.warnings && r.warnings.length > 0
                          ? <span className="badge warn" title={r.warnings.join("\n")}>{r.warnings.length} 项</span>
                          : <span className="text-muted">—</span>}
                      </td>
                      <td><button className="btn sm subtle">查看 →</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        );
      }

      // commit 5 占位 ↓
      function VatTab({ orgId, toast }) {
        return <ScaffoldNotice />;
      }

      // ─────────────────────────────────────────────────────────────────
      //  视图：ReportView —— 报表查看器 + cell 追溯抽屉 + Excel 导出
      //
      //  GET /orgs/{org_id}/reports/{report_id}            —— { report, cells }
      //  GET /orgs/{org_id}/imports/{import_id}/rows       —— 解码 source_rows
      //  GET /orgs/{org_id}/reports/{report_id}/export?format=xlsx —— 二进制
      //
      //  cell.source_rows 是字符串 ID 数组（指向 trial_balance_rows.id）。
      //  我们一次性拉对应 import 的所有行，做 id → row 的 map，抽屉里就能
      //  立刻显示被聚合的明细，不会再追加请求。
      // ─────────────────────────────────────────────────────────────────
      function ReportView({ orgId, reportId, onBack, toast }) {
        const { data, loading, error, reload } = useFetch(
          `/orgs/${orgId}/reports/${reportId}`,
          [orgId, reportId],
        );
        const [drawerCell, setDrawerCell] = useState(null);
        const [exporting, setExporting] = useState(false);

        const report = data && data.report;
        const cells = (data && data.cells) || [];

        // 一次性拉余额表所有行（用于追溯抽屉）。后端 list_rows 端点的 limit
        // 上限 500，我们直接取大数 + 简单分页即可（M1 场景下行数 < 1500）。
        const sourceImportId = report && report.source_import_id;
        const [rowMap, setRowMap] = useState(null);
        const [rowMapLoading, setRowMapLoading] = useState(false);

        useEffect(() => {
          if (!sourceImportId) { setRowMap(null); return; }
          let cancelled = false;
          setRowMapLoading(true);
          (async () => {
            try {
              const acc = {};
              let offset = 0;
              const limit = 500;
              for (let page = 0; page < 10; page++) {
                const r = await api("GET", `/orgs/${orgId}/imports/${sourceImportId}/rows?limit=${limit}&offset=${offset}`);
                const got = (r && r.rows) || [];
                got.forEach((row) => { acc[row.id] = row; });
                if (got.length < limit) break;
                offset += limit;
                if (offset >= (r && r.total ? r.total : 0)) break;
              }
              if (!cancelled) setRowMap(acc);
            } catch (e) {
              if (!cancelled) toast(`无法读取追溯所需的余额表行：${e.message}`, "warn");
            } finally {
              if (!cancelled) setRowMapLoading(false);
            }
          })();
          return () => { cancelled = true; };
        }, [orgId, sourceImportId]);

        const onExport = async () => {
          setExporting(true);
          try {
            const resp = await api(
              "GET",
              `/orgs/${orgId}/reports/${reportId}/export?format=xlsx`,
              null,
              { raw: true, timeoutMs: 60000 },
            );
            if (!resp.ok) {
              const txt = await resp.text();
              throw new Error(`${resp.status} · ${txt.slice(0, 200)}`);
            }
            const blob = await resp.blob();
            // 从 Content-Disposition 解析后端设置的文件名；解析失败则用 reportId 兜底
            const disp = resp.headers.get("content-disposition") || "";
            let filename = `${reportId}.xlsx`;
            const m = disp.match(/filename\*?=(?:UTF-8'')?["']?([^"';]+)["']?/i);
            if (m) filename = decodeURIComponent(m[1]);
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1500);
            toast(`已下载 ${filename}`);
          } catch (e) {
            toast(`导出失败：${e.message}`, "err");
          } finally {
            setExporting(false);
          }
        };

        if (error) {
          return (
            <div className="card">
              <button className="btn mb-3" onClick={onBack}>← 返回</button>
              <div className="upload-result err">无法读取报表：{error.message}</div>
            </div>
          );
        }

        return (
          <>
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="page-title">
                  {report
                    ? (REPORT_KINDS.find((x) => x.v === report.sheet_kind) || {}).l || report.sheet_kind
                    : <span className="skeleton" style={{ width: 200 }} />}
                </h2>
                <p className="page-subtitle">
                  {report && (
                    <>
                      <span className="mono">{report.id}</span>
                      {" · 期间 "}<strong>{report.period_id}</strong>
                      {" · "}{(ACCT_STD_OPTS.find((x) => x.v === report.accounting_standard) || {}).l || report.accounting_standard}
                      {" · "}{report.cell_count} 个单元格
                    </>
                  )}
                </p>
              </div>
              <div className="flex gap-2">
                <button className="btn" onClick={onBack}>← 返回账套</button>
                <button className="btn" onClick={reload}>{loading ? <Spinner /> : "刷新"}</button>
                <button className="btn primary" onClick={onExport} disabled={exporting || loading}>
                  {exporting && <Spinner />}
                  {exporting ? "导出中…" : "导出 Excel"}
                </button>
              </div>
            </div>

            {report && report.warnings && report.warnings.length > 0 && (
              <div className="card upload-result" style={{ background: "rgba(217,119,6,0.05)", borderColor: "rgba(217,119,6,0.30)" }}>
                <strong>{report.warnings.length} 项告警：</strong>
                <ul className="text-xs" style={{ margin: "4px 0 0 18px" }}>
                  {report.warnings.map((w, i) => <li key={i}>{w}</li>)}
                </ul>
              </div>
            )}

            <div className="card" style={{ padding: 0, overflow: "hidden" }}>
              {loading && <div className="empty"><Spinner /> 加载报表中…</div>}
              {!loading && cells.length > 0 && (
                <table className="report-table">
                  <thead>
                    <tr>
                      <th>项目</th>
                      <th>代码</th>
                      <th className="num">金额（元）</th>
                      <th>备注</th>
                    </tr>
                  </thead>
                  <tbody>
                    {cells.map((c) => {
                      const isSection = c.data_source === "section";
                      const isLeaf = !isSection;
                      const tdLabelCls = `label indent-${Math.min(c.indent_level || 0, 3)}`;
                      const trCls = isSection ? "section" : (c.is_total ? "total" : "");
                      const sourcesCount = (c.source_rows || []).length;
                      // 只有非 section / 非 TBD 且有源行的 cell 才点击有意义。
                      // 但允许任何叶子点击，方便用户即使 source_rows=[] 也能看公式。
                      return (
                        <tr key={c.id} className={trCls}>
                          <td className={tdLabelCls}>
                            {isLeaf
                              ? (
                                  <span
                                    className={`cell-clickable`}
                                    onClick={() => setDrawerCell(c)}
                                    style={{ cursor: "pointer" }}
                                  >
                                    {c.target_label}
                                    {sourcesCount > 0 && <span className="text-xs text-muted" style={{ marginLeft: 6 }}>· {sourcesCount} 源</span>}
                                  </span>
                                )
                              : <strong>{c.target_label}</strong>}
                          </td>
                          <td className="mono text-xs">{c.code || c.reference_code || ""}</td>
                          <td className={`num ${c.is_tbd ? "tbd" : ""}`}>
                            {isSection ? "" : (c.is_tbd ? "[TBD]" : fmtMoney(c.value))}
                          </td>
                          <td className="text-xs text-muted">{c.notes || (c.is_total ? "合计" : "")}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
              {!loading && cells.length === 0 && (
                <EmptyState title="该报表没有任何单元格" />
              )}
            </div>

            <CellTraceDrawer
              cell={drawerCell}
              rowMap={rowMap}
              rowMapLoading={rowMapLoading}
              onClose={() => setDrawerCell(null)}
            />
          </>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  追溯抽屉：展示一个 cell 由哪些 trial_balance_rows 计算得到
      // ─────────────────────────────────────────────────────────────────
      function CellTraceDrawer({ cell, rowMap, rowMapLoading, onClose }) {
        if (!cell) return null;
        const sourceRows = (cell.source_rows || []).map((id) => rowMap && rowMap[id]).filter(Boolean);
        const totalAmount = sourceRows.reduce((s, r) => {
          // 简单的 |closing_debit - closing_credit| 估值，仅作为追溯展示用途。
          return s + Math.abs((r.closing_debit || 0) - (r.closing_credit || 0));
        }, 0);

        return (
          <Drawer open onClose={onClose} title={`单元格追溯 · ${cell.target_label}`}>
            <div className="drawer-row">
              <span className="k">值</span>
              <span className="v"><strong>{cell.is_tbd ? "[TBD]" : fmtMoney(cell.value)}</strong> 元</span>
            </div>
            <div className="drawer-row">
              <span className="k">来源规则</span>
              <span className="v mono text-xs">{cell.code || cell.reference_code || "—"}</span>
            </div>
            <div className="drawer-row">
              <span className="k">取数方式</span>
              <span className="v">{cell.data_source}</span>
            </div>
            <div className="drawer-row">
              <span className="k">符号 / 合计</span>
              <span className="v">
                {cell.sign > 0 ? "+1" : (cell.sign < 0 ? "-1" : "0")}
                {cell.is_total && <span className="badge info" style={{ marginLeft: 6 }}>合计行</span>}
                {cell.is_tbd && <span className="badge warn" style={{ marginLeft: 6 }}>TBD</span>}
              </span>
            </div>
            {cell.formula && (
              <div className="mt-3">
                <div className="text-xs text-muted mb-2">公式</div>
                <pre className="mono text-xs" style={{ background: "var(--bg-soft)", padding: 10, borderRadius: 6, overflowX: "auto" }}>
                  {cell.formula}
                </pre>
              </div>
            )}

            <div className="mt-3">
              <div className="text-xs text-muted mb-2">
                参与计算的余额行
                {rowMapLoading && <Spinner />}
                {!rowMapLoading && (
                  <span> · 共 <strong>{(cell.source_rows || []).length}</strong> 行
                    {sourceRows.length < (cell.source_rows || []).length && (
                      <span className="text-xs"> （已解析 {sourceRows.length}）</span>
                    )}
                  </span>
                )}
              </div>
              {!rowMapLoading && sourceRows.length === 0 && (
                <div className="text-sm text-muted" style={{ padding: 12, background: "var(--bg-soft)", borderRadius: 6 }}>
                  {cell.data_source === "section"
                    ? "Section 行不参与取数，仅作为分隔符。"
                    : (cell.formula
                        ? "由公式计算得到，没有直接的余额表源行。"
                        : (cell.is_tbd
                            ? "TBD 行：业务方尚未确认对应科目编码。"
                            : "没有匹配到任何余额表行（可能是科目过滤结果为空）。"))}
                </div>
              )}
              {sourceRows.length > 0 && (
                <table className="tbl" style={{ marginTop: 4 }}>
                  <thead>
                    <tr>
                      <th>科目</th>
                      <th>名称</th>
                      <th className="num">期末借</th>
                      <th className="num">期末贷</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sourceRows.slice(0, 200).map((r) => (
                      <tr key={r.id}>
                        <td className="mono text-xs">{r.full_code || r.raw_code || "—"}</td>
                        <td>{r.account_name || <span className="text-muted">（无名）</span>}</td>
                        <td className="num">{fmtMoney(r.closing_debit)}</td>
                        <td className="num">{fmtMoney(r.closing_credit)}</td>
                      </tr>
                    ))}
                    {sourceRows.length > 200 && (
                      <tr>
                        <td colSpan={4} className="text-xs text-muted text-center">
                          ……还有 {sourceRows.length - 200} 行未列出
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              )}
            </div>

            {cell.notes && (
              <div className="mt-3">
                <div className="text-xs text-muted mb-2">备注</div>
                <div className="text-sm">{cell.notes}</div>
              </div>
            )}
          </Drawer>
        );
      }

      // ─────────────────────────────────────────────────────────────────
      //  Root：极简 hash router（#/orgs / #/orgs/<id> / #/orgs/<id>/reports/<rid>）
      // ─────────────────────────────────────────────────────────────────
      function App() {
        const [route, setRoute] = useState(window.location.hash || "#/orgs");
        const [period, setPeriod] = useState("2025-FY");
        const toasts = useToasts();

        useEffect(() => {
          const onHash = () => setRoute(window.location.hash || "#/orgs");
          window.addEventListener("hashchange", onHash);
          // 让主程的 PluginAppHost 立即收起 loading 罩 —— 第一帧已经渲染了。
          postBridge({ type: "bridge:render-ready", pluginId: PLUGIN_ID });
          return () => window.removeEventListener("hashchange", onHash);
        }, []);

        const navigate = (h) => { window.location.hash = h; };

        // 解析路由
        const m1 = route.match(/^#\/orgs\/?$/);
        const m2 = route.match(/^#\/orgs\/([^/]+)\/?$/);
        const m3 = route.match(/^#\/orgs\/([^/]+)\/reports\/([^/]+)\/?$/);

        let body, crumbs;
        if (m3) {
          const [, oid, rid] = m3;
          crumbs = [
            { label: "账套", onClick: () => navigate("#/orgs") },
            { label: oid.slice(-8), onClick: () => navigate(`#/orgs/${oid}`) },
            { label: "报表" },
          ];
          body = (
            <ReportView
              orgId={oid}
              reportId={rid}
              onBack={() => navigate(`#/orgs/${oid}`)}
              toast={toasts.push}
            />
          );
        } else if (m2) {
          const [, oid] = m2;
          crumbs = [
            { label: "账套", onClick: () => navigate("#/orgs") },
            { label: oid.slice(-8) },
          ];
          body = (
            <OrgDetailView
              orgId={oid}
              period={period}
              onBack={() => navigate("#/orgs")}
              onOpenReport={(rid) => navigate(`#/orgs/${oid}/reports/${rid}`)}
              toast={toasts.push}
            />
          );
        } else {
          crumbs = [{ label: "账套" }];
          body = (
            <OrgListView
              onOpenOrg={(oid) => navigate(`#/orgs/${oid}`)}
              toast={toasts.push}
            />
          );
        }

        return (
          <div className="app">
            <TopBar
              crumbs={crumbs}
              right={
                <>
                  <span>期间</span>
                  <select className="field" style={{ width: 110, padding: "3px 8px" }} value={period} onChange={(e) => setPeriod(e.target.value)}>
                    <option value="2025-FY">2025 年度</option>
                    <option value="2024-FY">2024 年度</option>
                  </select>
                </>
              }
            />
            <div className="main">{body}</div>
            {toasts.view}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
