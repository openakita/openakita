<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Manga Studio">
  <title>Manga Studio</title>
  <desc>App icon  manga panel grid with a speech bubble, evoking comic-drama storytelling.</desc>
  <defs>
    <linearGradient id="manga-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="0.55" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="manga-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FCE7F3"/>
    </linearGradient>
    <filter id="manga-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#4C1D95" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="17" fill="url(#manga-bg)"/>
