    <rect x="31" y="14" width="20" height="14" rx="2.5" fill="url(#manga-paper)" stroke="#1F2937" stroke-width="1.4"/>
    <rect x="13" y="30" width="20" height="20" rx="2.5" fill="url(#manga-paper)" stroke="#1F2937" stroke-width="1.4"/>
    <rect x="35" y="30" width="16" height="20" rx="2.5" fill="url(#manga-paper)" stroke="#1F2937" stroke-width="1.4"/>
    <line x1="16" y1="19" x2="26" y2="19" stroke="#9333EA" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="16" y1="22" x2="22" y2="22" stroke="#9333EA" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="41" cy="21" r="2.3" fill="#F472B6"/>
