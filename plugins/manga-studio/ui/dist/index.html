function CostBreakdown({ cost, t, lang }) {
  return (
    <div>
      {(cost.items || []).map(function(it, idx) {
        return (
          <div key={idx} className="cost-row">
            <div className="label" style={{ margin: 0 }}>
              {(lang === "zh" ? it.label_zh : it.label_en) || it.label_en || it.kind}
            </div>
            <div className="val">{it.formatted}</div>
          </div>
        );
      })}
      <div className={"cost-row total" + (cost.exceeds_threshold ? " over" : "")}>
        <div className="label" style={{ margin: 0 }}>{t("studio.cost.total")}</div>
        <div className="val">{cost.formatted_total}</div>
      </div>
      {cost.exceeds_threshold && (
        <div className="threshold-warn">
          {t("studio.cost.exceeds")}
        </div>
      )}
    </div>
  );
}

function TaskCard({ task, t, onCancel }) {
  var [expanded, setExpanded] = useState(false);
  var status = task.status || "pending";
  var step = task.current_step || "queued";
  var stepKey = STEP_KEYS[step] || ("tasks.step." + step);
  var progress = Math.max(0, Math.min(100, Number(task.progress) || 0));
  var isActive = status === "running" || status === "pending";
  var error = task.error_message;
  var hints = null;
  if (task.error_hints_json) {
    try {
      hints = typeof task.error_hints_json === "string" ? JSON.parse(task.error_hints_json) : task.error_hints_json;
    } catch (_) {}
  }
  var hintLine = hints && (hints.hint_zh || hints.hint_en);

  // Decode params + cost breakdown lazily so the card renders fast.
  var params = null;
  if (task.params_json) {
    try {
      params = typeof task.params_json === "string" ? JSON.parse(task.params_json) : task.params_json;
    } catch (_) {}
  }
  var cost = null;
  if (task.cost_breakdown_json) {
    try {
      cost = typeof task.cost_breakdown_json === "string" ? JSON.parse(task.cost_breakdown_json) : task.cost_breakdown_json;
    } catch (_) {}
  }

  return (
    <div className="task-card">
      <div className="task-card__head">
        <div className="task-card__title">{task.id}</div>
        <span className={"status-chip status-chip--" + status}>{status}</span>
      </div>
      <div className="task-card__meta">
        {task.episode_id && <span>ep · {task.episode_id}</span>}
        {task.backend && <span>backend · {task.backend}</span>}
        {cost && cost.formatted_total && <span>cost · {cost.formatted_total}</span>}
      </div>
      <div className="task-card__progress">
        <div className="task-card__progress-fill" style={{ width: progress + "%" }} />
      </div>
      <div className="task-card__step">
        {t(stepKey)} · {progress}%
      </div>
      {error && (
        <div className="task-card__error">
          {hintLine || error}
        </div>
      )}
      <div className="mt-2" style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        {isActive && (
          <button className="btn btn-sm btn-danger" onClick={onCancel}>
            {t("tasks.cancel")}
          </button>
        )}
        <button
          className="btn btn-sm"
          onClick={function() { setExpanded(function(v) { return !v; }); }}
        >
          {expanded ? t("tasks.detail.hide") : t("tasks.detail.show")}
        </button>
      </div>
      {expanded && (
        <div className="task-card__detail">
          {params && (
            <div className="task-card__detail-block">
              <div className="task-card__detail-label">{t("tasks.detail.params")}</div>
              <pre className="task-card__detail-pre">{JSON.stringify(params, null, 2)}</pre>
            </div>
          )}
          {cost && cost.items && cost.items.length > 0 && (
            <div className="task-card__detail-block">
              <div className="task-card__detail-label">{t("tasks.detail.cost")}</div>
              <pre className="task-card__detail-pre">{JSON.stringify(cost, null, 2)}</pre>
            </div>
          )}
          {hints && (
            <div className="task-card__detail-block">
              <div className="task-card__detail-label">{t("tasks.detail.hints")}</div>
              <pre className="task-card__detail-pre">{JSON.stringify(hints, null, 2)}</pre>
            </div>
          )}
          {!params && !cost && !hints && (
            <div className="text-muted" style={{ fontSize: 12 }}>{t("tasks.detail.empty")}</div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Characters tab (Phase 3.4) ──
// Manages reusable character cards. Each card has 1-3 reference images
// that the pipeline forwards to wan2.7-image (multi-ref) or to the
// IP-Adapter node in the workflow backend, driving cross-panel
// character consistency. The Studio tab pulls from this list at submit
// time so the user binds characters into an episode by ID, not by
// re-typing them every run.
function Characters({ t, catalog, toast }) {
  const [items, setItems] = useState(null); // null=loading, []=empty
  const [editing, setEditing] = useState(null); // null | "new" | row
  const [reloadKey, setReloadKey] = useState(0);

  useEffect(function() {
    pluginApi("GET", "/characters").then(function(r) {
      if (r && r.ok && r.body) setItems(r.body.characters || []);
      else setItems([]);
    });
  }, [reloadKey]);

  function reload() { setReloadKey(function(k) { return k + 1; }); }

  function onSaved(msg) {
    if (msg) toast(msg, "success");
    setEditing(null);
    reload();
  }

  if (editing) {
    return (
      <CharacterEditor
        t={t}
        catalog={catalog}
        toast={toast}
        initial={editing === "new" ? null : editing}
        onCancel={function() { setEditing(null); }}
        onSaved={onSaved}
      />
    );
  }

  return (
    <div>
      <div className="tab-header">
        <div>
          <div className="tab-header__title">🎭 {t("char.title")}</div>
          <div className="tab-header__sub">{t("char.subtitle")}</div>
        </div>
        <button className="btn btn-primary" onClick={function() { setEditing("new"); }}>
          {t("char.btn.new")}
        </button>
      </div>

      {items === null ? (
        <div className="text-muted">{t("common.loading")}</div>
      ) : items.length === 0 ? (
        <div className="empty-state">
          <div className="empty-state__icon">👥</div>
          <div className="empty-state__title">{t("char.list.empty.title")}</div>
          <div className="empty-state__hint">{t("char.list.empty.hint")}</div>
        </div>
      ) : (
        <div className="char-grid">
          {items.map(function(it) {
            return (
              <div
                key={it.id}
                className="char-card"
                onClick={function() { setEditing(it); }}
              >
                <div className="char-card__thumb-row">
                  {(it.ref_images || it.ref_images_json || []).slice(0, 3).map(function(url, i) {
                    return <img key={i} className="char-card__thumb" src={url} alt={"ref " + (i + 1)} />;
                  })}
                  {(!it.ref_images || it.ref_images.length === 0) && (!it.ref_images_json || it.ref_images_json.length === 0) ? (
                    <div className="char-card__thumb--placeholder">?</div>
                  ) : null}
                </div>
                <div className="char-card__name">{it.name}</div>
                <div className="char-card__meta">
                  <span className="char-card__chip">{t("char.role." + (it.role_type || "supporting"))}</span>
                  {it.gender ? (
                    <span className="char-card__chip">{t("char.gender." + it.gender)}</span>
                  ) : null}
                </div>
                {it.description ? (
                  <div className="char-card__desc">{it.description}</div>
                ) : null}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// Editor form for a single character — opens for both create and edit.
// The "save" branches on whether `initial` is null (POST) or set (PUT).
function CharacterEditor({ t, catalog, toast, initial, onCancel, onSaved }) {
  const isEdit = initial && initial.id;
  const [draft, setDraft] = useState(function() {
    // appearance is stored as a dict in the DB but presented as a
    // single text line in the UI (Pixelle-style "one happy path").
    // Unwrap legacy strings or {description: ...} dicts; everything
    // else collapses to a JSON-stringified blob the user can edit.
    function unwrapAppearance(a) {
      if (!a) return "";
      if (typeof a === "string") return a;
      if (typeof a === "object") {
        if (typeof a.description === "string") return a.description;
        try { return JSON.stringify(a); } catch (_) { return ""; }
      }
      return "";
    }
    if (initial) {
      return {
        name: initial.name || "",
        role_type: initial.role_type || "supporting",
        gender: initial.gender || "",
        age_range: initial.age_range || "",
        appearance: unwrapAppearance(initial.appearance_json || initial.appearance),
        personality: initial.personality || "",
        description: initial.description || "",
        default_voice_id: initial.default_voice_id || "",
        ref_images: (initial.ref_images_json || initial.ref_images || []).slice(0),
      };
    }
    return {
      name: "",
      role_type: "supporting",
      gender: "",
      age_range: "",
      appearance: "",
      personality: "",
      description: "",
      default_voice_id: "",
      ref_images: [],
    };
  });
  const [uploading, setUploading] = useState(false);
  const [saving, setSaving] = useState(false);
  const fileRef = useRef(null);

  function patch(updates) { setDraft(function(prev) { return Object.assign({}, prev, updates); }); }

  async function uploadRef(ev) {
    var file = ev.target.files && ev.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      toast(t("char.toast.upload_failed", { msg: "> 5 MB" }), "error");
      return;
    }
    setUploading(true);
    try {
      var fd = new FormData();
      fd.append("file", file, file.name);
      // FormData needs the multipart route; pluginApi forwards FormData
      // when the body isn't a plain object.
      var r = await pluginApi("POST", "/upload?kind=character_ref", fd);
      if (r && r.ok && r.body && r.body.preview_url) {
        patch({ ref_images: draft.ref_images.concat([r.body.preview_url]) });
      } else {
        toast(t("char.toast.upload_failed", { msg: (r && r.body && r.body.detail) || "?" }), "error");
      }
    } catch (e) {
      toast(t("char.toast.upload_failed", { msg: String(e) }), "error");
    } finally {
      setUploading(false);
      if (fileRef.current) fileRef.current.value = "";
    }
  }

  function removeRef(i) {
    var next = draft.ref_images.slice();
    next.splice(i, 1);
    patch({ ref_images: next });
  }

  async function save() {
    if (!draft.name || !draft.name.trim()) {
      toast(t("char.toast.save_failed", { msg: t("char.label.name") }), "error");
      return;
    }
    setSaving(true);
    try {
      // Server expects appearance as a dict; wrap the free-text input
      // as {"description": text} so the user doesn't have to write JSON.
      var appearance = {};
      if (draft.appearance && draft.appearance.trim()) {
        appearance = { description: draft.appearance.trim() };
      }
      var body = {
        name: draft.name.trim(),
        role_type: draft.role_type || "supporting",
        appearance: appearance,
        personality: draft.personality || "",
        description: draft.description || "",
        ref_images: draft.ref_images || [],
      };
      if (draft.gender) body.gender = draft.gender;
      if (draft.age_range) body.age_range = draft.age_range;
      if (draft.default_voice_id) body.default_voice_id = draft.default_voice_id;

      var r;
      if (isEdit) {
        r = await pluginApi("PUT", "/characters/" + initial.id, body);
      } else {
        r = await pluginApi("POST", "/characters", body);
      }
      if (r && r.ok && r.body && r.body.ok) {
        onSaved(isEdit ? t("char.toast.updated") : t("char.toast.created"));
      } else {
        var msg = (r && r.body && (r.body.detail || r.body.message)) || "?";
        toast(t("char.toast.save_failed", { msg: msg }), "error");
      }
    } catch (e) {
      toast(t("char.toast.save_failed", { msg: String(e) }), "error");
    } finally {
      setSaving(false);
    }
  }

  async function onDelete() {
    if (!isEdit) return;
    if (!window.confirm(t("char.confirm.delete"))) return;
    var r = await pluginApi("DELETE", "/characters/" + initial.id);
    if (r && r.ok) {
      onSaved(t("char.toast.deleted"));
    } else {
      toast(t("char.toast.save_failed", { msg: (r && r.body && r.body.detail) || "?" }), "error");
    }
  }

  var roles = ["protagonist", "supporting", "antagonist", "cameo"];
  var genders = ["female", "male", "neutral"];
  var voices = (catalog && catalog.voices) || [];

  return (
    <div className="char-editor">
      <div>
        <label className="char-editor__label">{t("char.label.name")} *</label>
        <input
          className="input"
          value={draft.name}
          onChange={function(e) { patch({ name: e.target.value }); }}
          placeholder={t("char.placeholder.name")}
        />
      </div>
      <div>
        <label className="char-editor__label">{t("char.label.role")}</label>
        <select
          className="input"
          value={draft.role_type}
          onChange={function(e) { patch({ role_type: e.target.value }); }}
        >
          {roles.map(function(r) {
            return <option key={r} value={r}>{t("char.role." + r)}</option>;
          })}
        </select>
      </div>
      <div>
        <label className="char-editor__label">{t("char.label.gender")}</label>
        <select
          className="input"
          value={draft.gender}
          onChange={function(e) { patch({ gender: e.target.value }); }}
        >
          <option value="">{t("char.gender.unknown")}</option>
          {genders.map(function(g) {
            return <option key={g} value={g}>{t("char.gender." + g)}</option>;
          })}
        </select>
      </div>
      <div>
        <label className="char-editor__label">{t("char.label.age")}</label>
        <input
          className="input"
          value={draft.age_range}
          onChange={function(e) { patch({ age_range: e.target.value }); }}
          placeholder="16-18"
        />
      </div>
      <div className="char-editor__field--full">
        <label className="char-editor__label">{t("char.label.appearance")}</label>
        <input
          className="input"
          value={draft.appearance}
          onChange={function(e) { patch({ appearance: e.target.value }); }}
          placeholder={t("char.placeholder.appearance")}
        />
      </div>
      <div>
        <label className="char-editor__label">{t("char.label.personality")}</label>
        <input
          className="input"
          value={draft.personality}
          onChange={function(e) { patch({ personality: e.target.value }); }}
          placeholder={t("char.placeholder.personality")}
        />
      </div>
      <div>
        <label className="char-editor__label">{t("char.label.voice")}</label>
        <select
          className="input"
          value={draft.default_voice_id}
          onChange={function(e) { patch({ default_voice_id: e.target.value }); }}
        >
          <option value="">—</option>
          {voices.map(function(v) {
            return <option key={v.id} value={v.id}>{v.label || v.id}</option>;
          })}
        </select>
      </div>
      <div className="char-editor__field--full">
        <label className="char-editor__label">{t("char.label.description")}</label>
        <input
          className="input"
          value={draft.description}
          onChange={function(e) { patch({ description: e.target.value }); }}
          placeholder={t("char.placeholder.description")}
        />
      </div>
      <div className="char-editor__field--full">
        <label className="char-editor__label">{t("char.label.refs")}</label>
        <div className="char-refs-grid">
          {(draft.ref_images || []).map(function(url, i) {
            return (
              <div key={i} className="char-refs-thumb">
                <img src={url} alt={"ref " + (i + 1)} />
                <button
                  type="button"
                  className="char-refs-thumb__remove"
                  title={t("char.refs.remove")}
                  onClick={function() { removeRef(i); }}
                >×</button>
              </div>
            );
          })}
          <label className="char-refs-uploader">
            {uploading ? t("char.refs.uploading") : t("char.refs.upload")}
            <input
              ref={fileRef}
              type="file"
              accept="image/png,image/jpeg,image/webp"
              style={{ display: "none" }}
              onChange={uploadRef}
              disabled={uploading}
            />
          </label>
        </div>
        <div className="text-muted" style={{ fontSize: 11, marginTop: 6 }}>
          {(draft.ref_images && draft.ref_images.length > 0)
            ? t("char.refs.hint")
            : t("char.refs.empty")}
        </div>
      </div>
      <div className="char-editor__footer">
        <div>
          {isEdit ? (
            <button
              className="btn btn-danger"
              onClick={onDelete}
              disabled={saving}
            >{t("char.btn.delete")}</button>
          ) : <span />}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn" onClick={onCancel} disabled={saving}>
            {t("char.btn.cancel")}
          </button>
          <button className="btn btn-primary" onClick={save} disabled={saving}>
            {saving ? t("studio.btn.submit.loading") : t("char.btn.save")}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Workflows tab (Phase 3.5) ──
// Configures the RunningHub / local-ComfyUI backend that the pipeline
// uses when ``backend != "direct"`` on a generation request. The
// "Test Connection" button hits POST /workflows/probe (which the
// backend implemented in Phase 3.2) — RunningHub probes don't trigger
// a billable workflow run.
function Workflows({ t, settings, setSettings, toast }) {
  // Local draft so the user can stage changes before saving without
  // affecting the global settings state. Initialised from `settings`
  // on mount and re-synced if the parent reloads.
  const [draft, setDraft] = useState(null);
  const [saving, setSaving] = useState(false);
  const [probing, setProbing] = useState(false);
  const [probe, setProbe] = useState(null); // null=idle, {ok, backend, message}

  useEffect(function() {
    if (settings) setDraft(Object.assign({}, settings));
  }, [settings]);

  if (!draft) return <div className="text-muted">{t("common.loading")}</div>;

  function patch(updates) {
    setDraft(function(prev) { return Object.assign({}, prev, updates); });
  }

  function isRedacted(value) {
    // Match the redaction format from `_redact` in plugin.py: leaves
    // first 4 + last 4 chars + bullet fill in between.
    return typeof value === "string" && value.indexOf("•") >= 0;
  }

  async function saveDraft() {
    setSaving(true);
    try {
      // Build the payload for PUT /settings — skip api_key fields whose
      // value is still the redacted dot-mask (user didn't edit them),
      // so the backend doesn't overwrite the real key with bullets.
      var payload = {};
      var keys = [
        "comfy_backend",
        "runninghub_api_key",
        "runninghub_workflow_image",
        "runninghub_workflow_animate",
        "runninghub_workflow_t2v",
        "comfyui_local_url",
        "comfyui_workflow_image",
        "comfyui_workflow_animate",
        "comfyui_workflow_t2v",
      ];
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        var v = draft[k];
        // Skip undefined; persist empty strings (user clearing a field).
        if (v === undefined) continue;
        if (k === "runninghub_api_key" && isRedacted(v)) continue;
        payload[k] = v;
      }
      var r = await pluginApi("PUT", "/settings", payload);
      if (r && r.ok && r.body && r.body.ok) {
        toast(t("wf.toast.saved"), "success");
        if (r.body.settings) setSettings(r.body.settings);
      } else {
        toast(t("settings.toast.failed", {
          msg: (r && r.body && (r.body.detail || r.body.message)) || "?",
        }), "error");
      }
    } catch (e) {
      toast(t("settings.toast.failed", { msg: String(e) }), "error");
    } finally {
      setSaving(false);
    }
  }

  async function probeBackend() {
    setProbing(true);
    setProbe(null);
    try {
      // The probe always reads from currently-saved settings (not draft)
      // — make sure the user has saved changes first if they want to
      // test new credentials. We DON'T auto-save here because that
      // would surprise the user.
      var r = await pluginApi("POST", "/workflows/probe");
      if (r && r.ok && r.body && r.body.probe) {
        setProbe(r.body.probe);
      } else {
        setProbe({
          ok: false,
          backend: draft.comfy_backend || "?",
          message: (r && r.body && (r.body.detail || r.body.message)) || "probe failed",
        });
      }
    } catch (e) {
      setProbe({ ok: false, backend: draft.comfy_backend || "?", message: String(e) });
    } finally {
      setProbing(false);
    }
  }

  var backend = draft.comfy_backend || "runninghub";

  return (
    <div>
      <div className="tab-header">
        <div>
          <div className="tab-header__title">🔌 {t("wf.title")}</div>
          <div className="tab-header__sub">{t("wf.subtitle")}</div>
        </div>
      </div>

      <div className="wf-card">
        <div className="wf-card__title">{t("wf.section.backend")}</div>
        <div className="wf-backend-toggle">
          <button
            className={"wf-backend-toggle__btn" + (backend === "runninghub" ? " active" : "")}
            onClick={function() { patch({ comfy_backend: "runninghub" }); }}
          >{t("wf.option.runninghub")}</button>
          <button
            className={"wf-backend-toggle__btn" + (backend === "comfyui_local" ? " active" : "")}
            onClick={function() { patch({ comfy_backend: "comfyui_local" }); }}
          >{t("wf.option.comfyui_local")}</button>
        </div>
      </div>

      {backend === "runninghub" ? (
        <div className="wf-card">
          <div className="wf-card__title">{t("wf.section.runninghub")}</div>
          <div className="wf-row">
            <label className="wf-row__label">{t("wf.label.rh_api_key")}</label>
            <input
              className="input"
              type="password"
              value={draft.runninghub_api_key || ""}
              onChange={function(e) { patch({ runninghub_api_key: e.target.value }); }}
              placeholder={t("wf.placeholder.rh_api_key")}
            />
            <div className="wf-card__hint" style={{ marginTop: 4, marginBottom: 0 }}>
              {t("wf.hint.rh_api_key")}
            </div>
          </div>
        </div>
      ) : (
        <div className="wf-card">
          <div className="wf-card__title">{t("wf.section.comfyui_local")}</div>
          <div className="wf-row">
            <label className="wf-row__label">{t("wf.label.local_url")}</label>
            <input
              className="input"
              value={draft.comfyui_local_url || ""}
              onChange={function(e) { patch({ comfyui_local_url: e.target.value }); }}
              placeholder={t("wf.placeholder.local_url")}
            />
            <div className="wf-card__hint" style={{ marginTop: 4, marginBottom: 0 }}>
              {t("wf.hint.local_url")}
            </div>
          </div>
        </div>
      )}

      <div className="wf-card">
        <div className="wf-card__title">{t("wf.section.workflows")}</div>
        <div className="wf-card__hint">
          {backend === "runninghub" ? t("wf.workflow.hint.runninghub") : t("wf.workflow.hint.comfyui_local")}
        </div>
        {[
          { key: "image", label: t("wf.label.image") },
          { key: "animate", label: t("wf.label.animate") },
          { key: "t2v", label: t("wf.label.t2v") },
        ].map(function(it) {
          var fieldKey = (backend === "runninghub" ? "runninghub_workflow_" : "comfyui_workflow_") + it.key;
          return (
            <div className="wf-row" key={it.key}>
              <label className="wf-row__label">{it.label}</label>
              <input
                className="input"
                value={draft[fieldKey] || ""}
                onChange={function(e) {
                  var u = {}; u[fieldKey] = e.target.value; patch(u);
                }}
                placeholder={backend === "runninghub" ? t("wf.placeholder.workflow_id_rh") : t("wf.placeholder.workflow_path_local")}
              />
            </div>
          );
        })}
      </div>

      <div className="wf-card">
        <div className="wf-card__title">{t("wf.section.probe")}</div>
        {probe === null ? (
          <div className="wf-probe-banner wf-probe-banner--idle">
            {t("wf.probe.idle")}
          </div>
        ) : probe.ok ? (
          <div className="wf-probe-banner wf-probe-banner--ok">
            <div className="wf-probe-banner__title">
              {t("wf.probe.ok")} · backend={probe.backend}
            </div>
            <div>{probe.message}</div>
          </div>
        ) : (
          <div className="wf-probe-banner wf-probe-banner--fail">
            <div className="wf-probe-banner__title">
              {t("wf.probe.fail")} · backend={probe.backend}
            </div>
            <div>{probe.message}</div>
            {probe.message && /comfykit/i.test(probe.message) ? (
              <div style={{ marginTop: 6, fontSize: 11 }}>{t("wf.probe.dependency_hint")}</div>
            ) : null}
          </div>
        )}
        <div className="wf-actions">
          <button
            className="btn"
            onClick={probeBackend}
            disabled={probing}
          >{probing ? t("wf.btn.probe.loading") : t("wf.btn.probe")}</button>
        </div>
      </div>

      <div className="wf-actions">
        <button
          className="btn btn-primary"
          onClick={saveDraft}
          disabled={saving}
        >{saving ? t("wf.btn.save.loading") : t("wf.btn.save")}</button>
      </div>
    </div>
  );
}

// ── Series tab (Phase 4.1 + 4.3) ──
// Multi-episode container. A series carries the default visual style,
// ratio, backend preference, and bound character list — when the user
// fires off a new episode under a series, the Studio tab pre-fills
// from these defaults so they don't re-pick the same options every
// run. The Phase-1 backend already created the routes; this commit
// just lights up the UI on top.
function Series({ t, catalog, toast }) {
  const [items, setItems] = useState(null);
  const [editing, setEditing] = useState(null); // null | "new" | row
  const [reloadKey, setReloadKey] = useState(0);

  useEffect(function() {
    pluginApi("GET", "/series").then(function(r) {
      if (r && r.ok && r.body) setItems(r.body.series || []);
      else setItems([]);
    });
  }, [reloadKey]);

  function reload() { setReloadKey(function(k) { return k + 1; }); }
  function onSaved(msg) {
    if (msg) toast(msg, "success");
    setEditing(null);
    reload();
  }

  if (editing) {
    return (
      <SeriesEditor
        t={t}
        catalog={catalog}
        toast={toast}
        initial={editing === "new" ? null : editing}
        onCancel={function() { setEditing(null); }}
        onSaved={onSaved}
      />
    );
  }

  return (
    <div>
      <div className="tab-header">
        <div>
          <div className="tab-header__title">📺 {t("series.title")}</div>
          <div className="tab-header__sub">{t("series.subtitle")}</div>
        </div>
        <button className="btn btn-primary" onClick={function() { setEditing("new"); }}>
          {t("series.btn.new")}
        </button>
      </div>

      {items === null ? (
        <div className="text-muted">{t("common.loading")}</div>
      ) : items.length === 0 ? (
        <div className="empty-state">
          <div className="empty-state__icon">📺</div>
          <div className="empty-state__title">{t("series.list.empty.title")}</div>
          <div className="empty-state__hint">{t("series.list.empty.hint")}</div>
        </div>
      ) : (
        <div className="series-grid">
          {items.map(function(it) {
            var chars = it.default_characters_json || it.default_characters || [];
            return (
              <div
                key={it.id}
                className="series-card"
                onClick={function() { setEditing(it); }}
              >
                {it.cover_url ? (
                  <img className="series-card__cover" src={it.cover_url} alt={it.title} />
                ) : (
                  <div className="series-card__cover series-card__cover--placeholder">📺</div>
                )}
                <div className="series-card__title">{it.title}</div>
                <div className="series-card__meta">
                  <span className="series-card__chip">{it.visual_style || "shonen"}</span>
                  <span className="series-card__chip">{it.ratio || "9:16"}</span>
                  <span className="series-card__chip">{it.backend_pref || "direct"}</span>
                  <span className="series-card__chip">
                    {chars.length > 0
                      ? t("series.card.chars_count", { n: chars.length })
                      : t("series.card.no_chars")}
                  </span>
                </div>
                {it.summary ? (
                  <div className="series-card__summary">{it.summary}</div>
                ) : null}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// Editor for a single series — same shape as CharacterEditor (POST/PUT
// branches on whether `initial` is set). Pulls the character list from
// /characters so the user picks "default characters" by clicking
// chips, not by typing IDs by hand.
function SeriesEditor({ t, catalog, toast, initial, onCancel, onSaved }) {
  const isEdit = initial && initial.id;
  const [draft, setDraft] = useState(function() {
    if (initial) {
      return {
        title: initial.title || "",
        summary: initial.summary || "",
        visual_style: initial.visual_style || "shonen",
        ratio: initial.ratio || "9:16",
        backend_pref: initial.backend_pref || "direct",
        default_characters: (initial.default_characters_json || initial.default_characters || []).slice(0),
        cover_url: initial.cover_url || "",
      };
    }
    return {
      title: "",
      summary: "",
      visual_style: "shonen",
      ratio: "9:16",
      backend_pref: "direct",
      default_characters: [],
      cover_url: "",
    };
  });
  const [characters, setCharacters] = useState(null);
  const [episodes, setEpisodes] = useState(null);
  const [saving, setSaving] = useState(false);

  useEffect(function() {
    pluginApi("GET", "/characters").then(function(r) {
      if (r && r.ok && r.body) setCharacters(r.body.characters || []);
      else setCharacters([]);
    });
  }, []);

  // Phase 4.3 preview — load episodes that already belong to this
  // series so the user sees their continuity without leaving the tab.
  useEffect(function() {
    if (!isEdit) return;
    pluginApi("GET", "/episodes?series_id=" + encodeURIComponent(initial.id)).then(function(r) {
      if (r && r.ok && r.body) setEpisodes(r.body.episodes || []);
      else setEpisodes([]);
    });
  }, [isEdit, initial && initial.id]);

  function patch(updates) { setDraft(function(prev) { return Object.assign({}, prev, updates); }); }

  function toggleChar(cid) {
    var list = draft.default_characters || [];
    var i = list.indexOf(cid);
    if (i < 0) patch({ default_characters: list.concat([cid]) });
    else { var n = list.slice(); n.splice(i, 1); patch({ default_characters: n }); }
  }

  async function save() {
    if (!draft.title || !draft.title.trim()) {
      toast(t("char.toast.save_failed", { msg: t("series.label.title") }), "error");
      return;
    }
    setSaving(true);
    try {
      var body = {
        title: draft.title.trim(),
        summary: draft.summary || "",
        visual_style: draft.visual_style || "shonen",
        ratio: draft.ratio || "9:16",
        backend_pref: draft.backend_pref || "direct",
        default_characters: draft.default_characters || [],
        cover_url: draft.cover_url || "",
      };
      var r;
      if (isEdit) r = await pluginApi("PUT", "/series/" + initial.id, body);
      else r = await pluginApi("POST", "/series", body);
      if (r && r.ok && r.body && r.body.ok) {
        onSaved(isEdit ? t("series.toast.updated") : t("series.toast.created"));
      } else {
        var msg = (r && r.body && (r.body.detail || r.body.message)) || "?";
        toast(t("char.toast.save_failed", { msg: msg }), "error");
      }
    } catch (e) {
      toast(t("char.toast.save_failed", { msg: String(e) }), "error");
    } finally {
      setSaving(false);
    }
  }

  async function onDelete() {
    if (!isEdit) return;
    if (!window.confirm(t("series.confirm.delete"))) return;
    var r = await pluginApi("DELETE", "/series/" + initial.id);
    if (r && r.ok) onSaved(t("series.toast.deleted"));
    else toast(t("char.toast.save_failed", { msg: (r && r.body && r.body.detail) || "?" }), "error");
  }

  var styles = (catalog && catalog.visual_styles) || [];
  var ratios = (catalog && catalog.ratios) || ["9:16", "16:9", "1:1", "4:5"];
  var backends = ["direct", "runninghub", "comfyui_local"];

  return (
    <div className="series-editor">
      <div className="series-editor__field--full">
        <label className="char-editor__label">{t("series.label.title")} *</label>
        <input
          className="input"
          value={draft.title}
          onChange={function(e) { patch({ title: e.target.value }); }}
          placeholder={t("series.placeholder.title")}
        />
      </div>
      <div className="series-editor__field--full">
        <label className="char-editor__label">{t("series.label.summary")}</label>
        <input
          className="input"
          value={draft.summary}
          onChange={function(e) { patch({ summary: e.target.value }); }}
          placeholder={t("series.placeholder.summary")}
        />
      </div>
      <div>
        <label className="char-editor__label">{t("series.label.style")}</label>
        <select
          className="input"
          value={draft.visual_style}
          onChange={function(e) { patch({ visual_style: e.target.value }); }}
        >
          {styles.length > 0
            ? styles.map(function(s) { return <option key={s.id} value={s.id}>{s.label_zh || s.label_en || s.id}</option>; })
            : <option value="shonen">shonen</option>}
        </select>
      </div>
      <div>
        <label className="char-editor__label">{t("series.label.ratio")}</label>
        <select
          className="input"
          value={draft.ratio}
          onChange={function(e) { patch({ ratio: e.target.value }); }}
        >
          {ratios.map(function(r) { return <option key={r} value={r}>{r}</option>; })}
        </select>
      </div>
      <div>
        <label className="char-editor__label">{t("series.label.backend")}</label>
        <select
          className="input"
          value={draft.backend_pref}
          onChange={function(e) { patch({ backend_pref: e.target.value }); }}
        >
          {backends.map(function(b) {
            return <option key={b} value={b}>{t("studio.backend." + b)}</option>;
          })}
        </select>
      </div>
      <div>
        <label className="char-editor__label">{t("series.label.cover")}</label>
        <input
          className="input"
          value={draft.cover_url}
          onChange={function(e) { patch({ cover_url: e.target.value }); }}
          placeholder={t("series.placeholder.cover")}
        />
      </div>
      <div className="series-editor__field--full">
        <label className="char-editor__label">{t("series.label.characters")}</label>
        {characters === null ? (
          <div className="text-muted" style={{ fontSize: 12 }}>{t("common.loading")}</div>
        ) : characters.length === 0 ? (
          <div className="text-muted" style={{ fontSize: 12 }}>{t("char.list.empty.title")}</div>
        ) : (
          <div className="series-editor__chargrid">
            {characters.map(function(c) {
              var picked = (draft.default_characters || []).indexOf(c.id) >= 0;
              return (
                <span
                  key={c.id}
                  className={"series-editor__charchip" + (picked ? " active" : "")}
                  onClick={function() { toggleChar(c.id); }}
                >{c.name}</span>
              );
            })}
          </div>
        )}
      </div>

      {isEdit ? (
        <div className="series-editor__field--full">
          <label className="char-editor__label">{t("series.section.episodes")}</label>
          {episodes === null ? (
            <div className="text-muted" style={{ fontSize: 12 }}>{t("common.loading")}</div>
          ) : episodes.length === 0 ? (
            <div className="text-muted" style={{ fontSize: 12 }}>{t("series.episodes.empty")}</div>
          ) : (
            <div className="ep-list">
              {episodes.map(function(ep) {
                var prefix = ep.episode_no ? "EP" + String(ep.episode_no).padStart(2, "0") : "";
                var dur = ep.duration_sec ? Math.round(ep.duration_sec) + "s" : null;
                var when = ep.created_at ? new Date(ep.created_at * 1000).toLocaleString() : null;
                var meta = [prefix, dur, when].filter(function(x) { return !!x; }).join(" · ");
                return (
                  <div key={ep.id} className="ep-item">
                    <div style={{ minWidth: 0, flex: 1 }}>
                      <div className="ep-item__title">{ep.title || ep.id}</div>
                      <div className="ep-item__meta">{meta || ep.id}</div>
                    </div>
                    {ep.final_video_url ? (
                      <a
                        className="btn btn-primary"
                        href={ep.final_video_url}
                        target="_blank"
                        rel="noreferrer noopener"
                        style={{ flexShrink: 0, padding: "4px 10px", fontSize: 12 }}
                      >▶</a>
                    ) : null}
                    <button
                      className="btn btn-danger"
                      style={{ flexShrink: 0, padding: "4px 10px", fontSize: 12 }}
                      title={t("series.episodes.delete")}
                      onClick={async function() {
                        if (!window.confirm(t("series.episodes.confirm_delete", { title: ep.title || ep.id }))) {
                          return;
                        }
                        var dr = await pluginApi("DELETE", "/episodes/" + encodeURIComponent(ep.id));
                        if (dr && dr.ok) {
                          setEpisodes(function(prev) {
                            return (prev || []).filter(function(x) { return x.id !== ep.id; });
                          });
                        } else {
                          var detail = (dr && dr.body && dr.body.detail) || ("HTTP " + (dr && dr.status));
                          if (typeof toast === "function") toast(t("series.episodes.delete_failed", { msg: detail }), "error");
                        }
                      }}
                    >🗑</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      ) : null}

      <div className="series-editor__footer">
        <div>
          {isEdit ? (
            <button className="btn btn-danger" onClick={onDelete} disabled={saving}>
              {t("series.btn.delete")}
            </button>
          ) : <span />}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn" onClick={onCancel} disabled={saving}>
            {t("series.btn.cancel")}
          </button>
          <button className="btn btn-primary" onClick={save} disabled={saving}>
            {saving ? t("studio.btn.submit.loading") : t("series.btn.save")}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Stub tabs ──
function StubTab({ t, label, phase }) {
  return (
    <div>
      <div className="stub-card">
        <div className="empty-state__icon">🚧</div>
        <div className="stub-card__title">{t("stub.title", { label: label })}</div>
        <div>{t("stub.desc")}</div>
        <div className="stub-card__phase">{t("stub.phase", { n: phase })}</div>
      </div>
    </div>
  );
}

// ── Settings tab ──
function Settings({ t, settings, setSettings, toast }) {
  const [draft, setDraft] = useState(null);
  const [saving, setSaving] = useState(false);

  useEffect(function() {
    if (settings) setDraft(Object.assign({}, settings));
  }, [settings]);

  if (!draft) return <div className="text-muted">{t("common.loading")}</div>;

  function patch(updates) { setDraft(function(prev) { return Object.assign({}, prev, updates); }); }

  async function save() {
    setSaving(true);
    try {
      // Skip redacted fields whose dot-mask value the user didn't change —
      // detect by comparing against the bullet character we know the host
      // returned in `settings`.
      var payload = {};
      Object.keys(draft).forEach(function(k) {
        var v = draft[k];
        var orig = settings ? settings[k] : "";
        if (typeof v === "string" && v.indexOf("•") !== -1 && v === orig) return;
        payload[k] = v;
      });
      var r = await pluginApi("PUT", "/settings", payload);
      if (!r.ok) {
        toast(t("settings.toast.failed", { msg: (r.body && r.body.detail) || ("HTTP " + r.status) }), "error");
        return;
      }
      if (r.body && r.body.settings) setSettings(r.body.settings);
      toast(t("settings.toast.saved"), "success");
    } finally {
      setSaving(false);
    }
  }

  return (
    <div style={{ maxWidth: 720 }}>
      <div className="tab-header">
        <div>
          <div className="tab-header__title">⚙️ {t("settings.title")}</div>
          <div className="tab-header__sub">{t("settings.subtitle")}</div>
        </div>
      </div>
      <div className="card">
        <div className="card-title">🔑 {t("settings.section.api")}</div>
        <div className="form-row">
          <div className="label">{t("settings.label.ark")}</div>
          <input
            className="input" type="password"
            value={draft.ark_api_key || ""}
            placeholder="sk-..."
            onChange={function(e) { patch({ ark_api_key: e.target.value }); }}
          />
        </div>
        <div className="form-row">
          <div className="label">{t("settings.label.dashscope")}</div>
          <input
            className="input" type="password"
            value={draft.dashscope_api_key || ""}
            placeholder="sk-..."
            onChange={function(e) { patch({ dashscope_api_key: e.target.value }); }}
          />
        </div>
        <div className="form-row">
          <div className="label">{t("settings.label.tts")}</div>
          <select
            className="input select"
            value={draft.tts_engine || "edge"}
            onChange={function(e) { patch({ tts_engine: e.target.value }); }}
          >
            <option value="edge">{t("settings.tts.edge")}</option>
            <option value="cosyvoice">{t("settings.tts.cosyvoice")}</option>
          </select>
        </div>
      </div>

      <div className="card">
        <div className="card-title">💰 {t("settings.section.cost")}</div>
        <div className="form-row">
          <div className="label">{t("settings.label.threshold")}</div>
          <input
            className="input" type="number" min="0" step="0.5"
            value={draft.cost_threshold_cny != null ? draft.cost_threshold_cny : 5}
            onChange={function(e) { patch({ cost_threshold_cny: Number(e.target.value) }); }}
          />
          <div className="text-xs text-muted mt-2">{t("settings.threshold.hint")}</div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">📦 {t("settings.section.oss")}</div>
        <div className="text-xs text-muted mb-2">{t("settings.oss.hint")}</div>
        <div className="form-row">
          <div className="label">{t("settings.label.oss_endpoint")}</div>
          <input
            className="input" type="text"
            placeholder="https://oss-cn-hangzhou.aliyuncs.com"
            value={draft.oss_endpoint || ""}
            onChange={function(e) { patch({ oss_endpoint: e.target.value }); }}
          />
        </div>
        <div className="form-row">
          <div className="label">{t("settings.label.oss_bucket")}</div>
          <input
            className="input" type="text"
            placeholder="my-manga-assets"
            value={draft.oss_bucket || ""}
            onChange={function(e) { patch({ oss_bucket: e.target.value }); }}
          />
        </div>
        <div className="form-row">
          <div className="label">{t("settings.label.oss_ak")}</div>
          <input
            className="input" type="text"
            placeholder="LTAI..."
            value={draft.oss_access_key_id || ""}
            onChange={function(e) { patch({ oss_access_key_id: e.target.value }); }}
          />
        </div>
        <div className="form-row">
          <div className="label">{t("settings.label.oss_sk")}</div>
          <input
            className="input" type="password"
            value={draft.oss_access_key_secret || ""}
            onChange={function(e) { patch({ oss_access_key_secret: e.target.value }); }}
          />
        </div>
      </div>

      <button className="btn btn-primary" onClick={save} disabled={saving}>
        {saving ? <span className="spinner-sm"></span> : "💾"}
        <span>{t("settings.btn.save")}</span>
      </button>

      <StorageCard t={t} toast={toast} />
    </div>
  );
}

function StorageCard({ t, toast }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);

  const load = useCallback(async function () {
    setLoading(true);
    setErr(null);
    try {
      var r = await pluginApi("GET", "/storage");
      if (!r.ok) {
        var msg = (r.body && r.body.detail) || ("HTTP " + r.status);
        setErr(msg);
        return;
      }
      setData(r.body);
    } catch (ex) {
      setErr(String(ex));
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(function () { load(); }, [load]);

  function formatBytes(n) {
    if (n == null) return "-";
    var u = ["B", "KB", "MB", "GB", "TB"];
    var i = 0;
    var v = Number(n);
    while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
    return v.toFixed(v < 10 && i > 0 ? 1 : 0) + " " + u[i];
  }

  return (
    <div className="card" style={{ marginTop: 16 }}>
      <div className="card-title" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span>{t("settings.section.storage")}</span>
        <button className="btn" onClick={load} disabled={loading} style={{ padding: "4px 12px", fontSize: 12 }}>
          {loading ? <span className="spinner-sm"></span> : null}
          <span>{t("settings.storage.refresh")}</span>
        </button>
      </div>
      {err ? (
        <div className="text-muted" style={{ color: "var(--danger)" }}>
          {t("settings.storage.failed", { msg: err })}
        </div>
      ) : !data ? (
        <div className="text-muted">{t("settings.storage.loading")}</div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "auto 1fr", gap: "6px 12px", fontSize: 13 }}>
          <div className="text-muted">{t("settings.storage.dir")}</div>
          <div style={{ wordBreak: "break-all", fontFamily: "monospace" }}>{data.data_dir}</div>
          <div className="text-muted">{t("settings.storage.size")}</div>
          <div>{formatBytes(data.stats && data.stats.total_bytes)}</div>
          <div className="text-muted">{t("settings.storage.files")}</div>
          <div>
            {(data.stats && data.stats.total_files) || 0}
            {data.stats && data.stats.truncated ? "+" : ""}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
