server {
    listen 80;
    server_name _;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm;
    gzip_min_length 1024;

    # ── Static assets (frontend) ────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Serve /web/ → SPA fallback
    location /web/ {
        try_files $uri $uri/ /web/index.html;

        # Cache hashed assets aggressively; html never
        location ~* \.(js|css|wasm|woff2?|ttf|svg|png|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Redirect bare root to /web/
    location = / {
        return 301 /web/;
    }

    # ── API proxy → OpenAkita backend ───────────────────────────────────────
    # OPENAKITA_BACKEND env var is resolved at runtime via envsubst or
    # a fixed upstream. Default: http://host.docker.internal:18900
    location /api/ {
        proxy_pass         http://openakita-backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── WebSocket proxy ──────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://openakita-backend/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# Upstream block — resolved at build time; override BACKEND_HOST at runtime
# via docker-compose environment + envsubst if you need dynamic resolution.
upstream openakita-backend {
    server ${BACKEND_HOST}:${BACKEND_PORT};
}
