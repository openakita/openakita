<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenAkita — 最佳实践任务完整交互流程模拟</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --bg-card-hover: #273549;
    --primary: #3b82f6;
    --primary-dim: rgba(59,130,246,0.15);
    --text: #e2e8f0;
    --text-dim: #92a4c9;
    --text-muted: #64748b;
    --border: rgba(59,130,246,0.1);
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ========== Top Bar ========== */
  .top-bar {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(15,23,42,0.9);
    backdrop-filter: blur(8px);
    z-index: 100;
  }
  .top-bar h1 { font-size: 14px; font-weight: 600; color: var(--primary); }
  .top-bar .phase-label {
    font-size: 13px;
    color: var(--text-dim);
    background: var(--primary-dim);
    padding: 4px 12px;
    border-radius: 999px;
  }

  /* ========== Layout ========== */
  .layout {
    display: flex;
    height: calc(100vh - 48px);
  }

  /* Left sidebar */
  .left-sidebar {
    width: 240px;
    border-right: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .left-sidebar h3 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }
  .bp-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all .15s;
    border: 1px solid transparent;
  }
  .bp-entry:hover { background: var(--bg-card); }
  .bp-entry.active { background: var(--primary-dim); border-color: rgba(59,130,246,0.3); }
  .bp-entry .material-symbols-outlined { font-size: 18px; color: var(--primary); }

  /* Middle chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .chat-header {
    height: 48px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    flex-shrink: 0;
  }
  .chat-header .material-symbols-outlined { color: var(--primary); font-size: 20px; }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .chat-messages .message-list {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Right panel — SSE events */
  .right-panel {
    width: 360px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .right-panel-header {
    height: 48px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
  }
  .right-panel-header .material-symbols-outlined { font-size: 18px; color: var(--primary); }
  .event-log {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
  }
  .event-entry {
    padding: 8px 10px;
    margin-bottom: 6px;
    border-radius: 6px;
    background: var(--bg-card);
    border-left: 3px solid var(--text-muted);
    opacity: 0;
    animation: fadeSlideIn 0.3s ease forwards;
    position: relative;
  }
  .event-entry.api-call { border-left-color: var(--yellow); background: rgba(251,191,36,0.06); }
  .event-entry.sse-event { border-left-color: var(--primary); }
  .event-entry.user-action { border-left-color: var(--green); background: rgba(52,211,153,0.06); }
  .event-entry .event-type {
    font-weight: 700;
    font-size: 11px;
    margin-bottom: 2px;
  }
  .event-entry .event-type.api { color: var(--yellow); }
  .event-entry .event-type.sse { color: var(--primary); }
  .event-entry .event-type.user { color: var(--green); }
  .event-entry .event-detail { color: var(--text-muted); line-height: 1.5; }
  .event-entry .event-renders {
    color: var(--text-dim);
    font-style: italic;
    margin-top: 3px;
    font-size: 10px;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ========== Chat Message Styles ========== */
  /* User message bubble */
  .msg-user {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-left: 48px;
  }
  .msg-user .bubble {
    background: var(--primary);
    color: #fff;
    padding: 12px 16px;
    border-radius: 16px 16px 4px 16px;
    font-size: 13px;
    line-height: 1.6;
    max-width: 80%;
    white-space: pre-wrap;
  }
  .msg-user .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }

  /* AI message */
  .msg-ai {
    display: flex;
    gap: 10px;
    margin-right: 48px;
  }
  .msg-ai .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), rgba(59,130,246,0.5));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .msg-ai .avatar .material-symbols-outlined { color: #fff; font-size: 16px; }
  .msg-ai .content {
    flex: 1;
    font-size: 13px;
    line-height: 1.6;
    color: #cbd5e1;
    white-space: pre-wrap;
  }

  /* TaskCard (direct mode) */
  .card-task-direct {
    background: rgba(30,41,59,0.6);
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 12px 16px;
  }
  .card-task-direct .card-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .card-task-direct .card-header .material-symbols-outlined { color: var(--primary); font-size: 18px; }
  .card-task-direct .card-header span { font-size: 13px; font-weight: 600; color: #fff; }
  .card-task-direct .card-header .status { margin-left: auto; font-size: 11px; color: var(--text-dim); }
  .card-task-direct .card-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  /* TaskCard (confirm mode) */
  .card-task-confirm {
    background: rgba(30,41,59,0.6);
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 12px 16px;
  }
  .card-task-confirm .card-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .card-task-confirm .card-header .material-symbols-outlined { color: var(--primary); font-size: 18px; }
  .card-task-confirm .card-header span { font-size: 13px; font-weight: 600; color: #fff; }
  .card-task-confirm .card-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-bottom: 12px; }
  .card-task-confirm .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  .card-task-confirm .btn-row button {
    height: 36px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; transition: all .15s;
    padding: 0 16px;
  }
  .card-task-confirm .btn-dismiss { background: var(--bg-card); color: #fff; }
  .card-task-confirm .btn-dismiss:hover { background: var(--bg-card-hover); }
  .card-task-confirm .btn-confirm { background: var(--primary); color: #fff; font-weight: 600; }
  .card-task-confirm .btn-confirm:hover { background: rgba(59,130,246,0.8); }

  /* StepInputForm */
  .card-input-form {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(30,41,59,0.6);
    padding: 16px;
  }
  .card-input-form .form-header {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: #cbd5e1;
    margin-bottom: 8px;
  }
  .card-input-form .form-header .material-symbols-outlined { font-size: 18px; color: var(--primary); }
  .card-input-form .form-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
  .card-input-form .field-group { margin-bottom: 12px; }
  .card-input-form label {
    display: block; font-size: 12px; font-weight: 500; color: #cbd5e1; margin-bottom: 4px;
  }
  .card-input-form label .req { color: var(--red); margin-left: 2px; }
  .card-input-form input,
  .card-input-form textarea {
    width: 100%;
    background: rgba(15,23,42,0.5);
    border: 1px solid #475569;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border .15s;
  }
  .card-input-form input:focus,
  .card-input-form textarea:focus { border-color: var(--primary); }
  .card-input-form input.prefilled { color: var(--primary); }
  .card-input-form .submit-row { display: flex; justify-content: flex-end; margin-top: 12px; }
  .card-input-form .btn-submit {
    display: flex; align-items: center; gap: 4px;
    padding: 8px 16px; border-radius: 6px;
    background: var(--primary); color: #fff;
    font-size: 12px; font-weight: 600;
    border: none; cursor: pointer; transition: all .15s;
  }
  .card-input-form .btn-submit:hover { background: rgba(59,130,246,0.8); }
  .card-input-form .btn-submit.disabled { background: var(--text-muted); cursor: not-allowed; }
  .card-input-form .btn-submit .material-symbols-outlined { font-size: 16px; }

  /* ConfirmExecutionCard */
  .card-confirm-exec {
    display: flex;
    gap: 10px;
    margin-right: 48px;
  }
  .card-confirm-exec .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), rgba(59,130,246,0.5));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-confirm-exec .avatar .material-symbols-outlined { color: #fff; font-size: 16px; }
  .card-confirm-exec .body { flex: 1; }
  .card-confirm-exec .body .text { font-size: 13px; color: #cbd5e1; line-height: 1.6; margin-bottom: 10px; }
  .card-confirm-exec .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  .card-confirm-exec .btn-row button {
    padding: 8px 16px; border-radius: 8px; font-size: 13px; border: none; cursor: pointer; transition: all .15s;
  }
  .card-confirm-exec .btn-exec { background: var(--primary); color: #fff; font-weight: 600; }
  .card-confirm-exec .btn-exec:hover { background: rgba(59,130,246,0.8); }
  .card-confirm-exec .btn-edit { background: var(--bg-card); color: #cbd5e1; }
  .card-confirm-exec .btn-edit:hover { background: var(--bg-card-hover); }

  /* StripCard (TaskStepCard / SubStepCard) */
  .strip-card {
    display: flex; align-items: center; gap: 10px;
    height: 44px; padding: 0 16px;
    border-radius: 8px;
    background: rgba(30,41,59,0.6);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all .15s;
  }
  .strip-card:hover { background: var(--bg-card); }
  .strip-card.indented { margin-left: 24px; }
  .strip-card .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--primary);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .strip-card .check { color: var(--green); font-size: 16px; }
  .strip-card .icon { color: var(--text-dim); font-size: 18px; }
  .strip-card .title { flex: 1; font-size: 13px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .strip-card .arrow { color: var(--text-dim); font-size: 16px; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* AI continuation (no avatar, aligned with ai content) */
  .msg-ai-cont {
    margin-left: 42px; /* 32px avatar + 10px gap */
    margin-right: 48px;
    font-size: 13px;
    line-height: 1.6;
    color: #cbd5e1;
    white-space: pre-wrap;
  }

  /* AI block — avatar + mixed children (text, cards, forms) */
  .msg-ai-block {
    display: flex;
    gap: 10px;
    margin-right: 48px;
  }
  .msg-ai-block > .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), rgba(59,130,246,0.5));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .msg-ai-block > .avatar .material-symbols-outlined { color: #fff; font-size: 16px; }
  .msg-ai-block > .children {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg-ai-block .block-text {
    font-size: 13px;
    line-height: 1.6;
    color: #cbd5e1;
    white-space: pre-wrap;
  }

  /* StepSummaryCard */
  .card-step-summary {
    background: rgba(30,41,59,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .card-step-summary .summary-text { font-size: 13px; color: #cbd5e1; line-height: 1.6; margin-bottom: 8px; }
  .card-step-summary .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  .card-step-summary .btn-row button {
    padding: 6px 12px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; transition: all .15s;
  }
  .card-step-summary .btn-view { background: var(--bg-card); color: #fff; }
  .card-step-summary .btn-view:hover { background: var(--bg-card-hover); }
  .card-step-summary .btn-next { background: var(--primary); color: #fff; font-weight: 600; }
  .card-step-summary .btn-next:hover { background: rgba(59,130,246,0.8); }

  /* Task complete block */
  .card-task-complete {
    background: rgba(52,211,153,0.06);
    border: 1px solid rgba(52,211,153,0.2);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .card-task-complete .complete-header {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--green);
    margin-bottom: 8px;
  }
  .card-task-complete .complete-header .material-symbols-outlined { font-size: 18px; }
  .card-task-complete .complete-summary {
    font-size: 13px; color: #cbd5e1; line-height: 1.6; margin-bottom: 10px;
  }
  .card-task-complete .complete-guide {
    font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px;
    padding: 8px 12px;
    background: rgba(30,41,59,0.5);
    border-radius: 6px;
  }
  .card-task-complete .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
  .card-task-complete .btn-row button {
    padding: 8px 14px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 4px;
  }
  .card-task-complete .btn-row .btn-panel { background: var(--primary); color: #fff; font-weight: 600; }
  .card-task-complete .btn-row .btn-panel:hover { background: rgba(59,130,246,0.8); }
  .card-task-complete .btn-row .btn-export { background: var(--bg-card); color: #fff; }
  .card-task-complete .btn-row .btn-export:hover { background: var(--bg-card-hover); }

  /* ========== Control Bar ========== */
  .control-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: rgba(15,23,42,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 200;
    padding: 0 24px;
  }
  .control-bar .progress-text {
    font-size: 12px; color: var(--text-dim); min-width: 80px;
  }
  .control-bar button {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 24px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .control-bar .btn-prev { background: var(--bg-card); color: var(--text); }
  .control-bar .btn-prev:hover { background: var(--bg-card-hover); }
  .control-bar .btn-prev:disabled { opacity: 0.4; cursor: not-allowed; }
  .control-bar .btn-next-step { background: var(--primary); color: #fff; }
  .control-bar .btn-next-step:hover { background: rgba(59,130,246,0.8); }
  .control-bar .btn-next-step:disabled { opacity: 0.4; cursor: not-allowed; }
  .control-bar .btn-auto {
    background: transparent; border: 1px solid var(--text-muted);
    color: var(--text-dim); padding: 10px 16px;
  }
  .control-bar .btn-auto:hover { border-color: var(--primary); color: var(--primary); }
  .control-bar .btn-auto.active { border-color: var(--green); color: var(--green); }

  .control-bar .progress-bar-wrap {
    flex: 1;
    max-width: 300px;
    height: 4px;
    background: rgba(71,85,105,0.4);
    border-radius: 999px;
    overflow: hidden;
  }
  .control-bar .progress-bar-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 999px;
    transition: width 0.3s ease;
  }

  /* Message appear animation */
  .msg-appear {
    opacity: 0;
    animation: fadeSlideIn 0.35s ease forwards;
  }

  /* Annotation badge */
  .annotation {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 6px;
  }
  .annotation.phase { background: rgba(59,130,246,0.15); color: var(--primary); }
  .annotation.api { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .annotation.new { background: rgba(52,211,153,0.15); color: var(--green); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(71,85,105,0.4); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(71,85,105,0.7); }

  /* Adjust for control bar */
  .layout { height: calc(100vh - 48px - 64px); }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <h1>OpenAkita — 最佳实践任务完整交互流程模拟</h1>
  <div class="phase-label" id="phaseLabel">Phase 0: 初始状态</div>
</div>

<!-- Main Layout -->
<div class="layout">
  <!-- Left Sidebar -->
  <div class="left-sidebar">
    <h3>最佳实践</h3>
    <div class="bp-entry" id="bp-api" onclick="handleBPClick()">
      <span class="material-symbols-outlined">api</span>
      <span>API 设计流水线</span>
    </div>
    <div class="bp-entry">
      <span class="material-symbols-outlined">article</span>
      <span>技术文档生成</span>
    </div>
    <div class="bp-entry">
      <span class="material-symbols-outlined">bug_report</span>
      <span>Bug 排查流程</span>
    </div>

    <h3 style="margin-top:24px">会话列表</h3>
    <div class="bp-entry active" id="session-entry">
      <span class="material-symbols-outlined">chat_bubble</span>
      <span>API 设计流水线</span>
    </div>
  </div>

  <!-- Middle Chat Area -->
  <div class="chat-area">
    <div class="chat-header">
      <span class="material-symbols-outlined">chat_bubble</span>
      <span>API 设计流水线</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message-list" id="messageList">
        <!-- Messages injected here -->
      </div>
    </div>
  </div>

  <!-- Right Panel: SSE Event Log -->
  <div class="right-panel">
    <div class="right-panel-header">
      <span class="material-symbols-outlined">timeline</span>
      <span>SSE 事件流 &amp; API 调用 (持久连接)</span>
    </div>
    <div class="event-log" id="eventLog">
      <!-- Events injected here -->
    </div>
  </div>
</div>

<!-- Control Bar -->
<div class="control-bar">
  <button class="btn-prev" id="btnPrev" onclick="prevStep()" disabled>
    <span class="material-symbols-outlined" style="font-size:16px">arrow_back</span>
    上一步
  </button>
  <div class="progress-text" id="progressText">0 / 0</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
  <button class="btn-next-step" id="btnNext" onclick="nextStep()">
    下一步
    <span class="material-symbols-outlined" style="font-size:16px">arrow_forward</span>
  </button>
  <button class="btn-auto" id="btnAuto" onclick="toggleAuto()">
    <span class="material-symbols-outlined" style="font-size:16px">play_arrow</span>
    自动播放
  </button>
</div>

<script>
// ============================================================
// FLOW DEFINITION — every step in the complete best practice task flow

const STEPS = [

// RENDERING ENGINE
// ============================================================
let currentStep = -1;
let autoInterval = null;

function renderMessage(msg) {
  switch (msg.type) {
    case 'user':
      return `<div class="msg-user msg-appear">
        <div class="bubble">${escHtml(msg.content)}</div>
        <div class="avatar">U</div>
      </div>`;

    case 'ai':
      return `<div class="msg-ai msg-appear">
        <div class="avatar"><span class="material-symbols-outlined">smart_toy</span></div>
        <div class="content">${escHtml(msg.content)}</div>
      </div>`;

    case 'task-card-direct':
      return `<div class="card-task-direct msg-appear">
        <div class="card-header">
          <span class="material-symbols-outlined">task</span>
          <span>${escHtml(msg.name)}</span>
          <span class="status">${msg.status}</span>
        </div>
        <div class="card-desc">${escHtml(msg.desc)}</div>
      </div>`;

    case 'task-card-confirm':
      return `<div class="card-task-confirm msg-appear">
        <div class="card-header">
          <span class="material-symbols-outlined">auto_awesome</span>
          <span>${escHtml(msg.name)}</span>
        </div>
        <div class="card-desc">${escHtml(msg.desc)}</div>
        <div class="btn-row">
          <button class="btn-dismiss">自由探索</button>
          <button class="btn-confirm">使用最佳实践</button>
        </div>
      </div>`;

    case 'input-form':
    case 'input-form-prefilled':
      return `<div class="card-input-form msg-appear" data-step-input-form>
        <div class="form-header">
          <span class="material-symbols-outlined">edit_note</span>
          <span>步骤输入表单</span>
        </div>
        <div class="form-hint">开始步骤「${escHtml(msg.stepName)}」，请提供以下信息：</div>
        ${msg.fields.map(f => `
          <div class="field-group">
            <label>${escHtml(f.label)}${f.required ? '<span class="req">*</span>' : ''}</label>
            ${f.textarea
              ? `<textarea placeholder="${escHtml(f.placeholder || '')}" rows="3" ${f.prefilled ? 'class="prefilled"' : ''}>${escHtml(f.value || '')}</textarea>`
              : `<input type="text" placeholder="${escHtml(f.placeholder || '')}" value="${escHtml(f.value || '')}" ${f.prefilled ? 'class="prefilled"' : ''}>`
            }
          </div>
        `).join('')}
        <div class="submit-row">
          <button class="btn-submit">
            <span class="material-symbols-outlined">check_circle</span>
            确认提交
          </button>
        </div>
      </div>`;

    case 'input-form-filled':
      return `<div class="card-input-form msg-appear" data-step-input-form style="opacity:0.7">
        <div class="form-header">
          <span class="material-symbols-outlined">edit_note</span>
          <span>步骤输入表单</span>
        </div>
        <div class="form-hint">步骤「${escHtml(msg.stepName)}」</div>
        ${msg.fields.map(f => `
          <div class="field-group">
            <label>${escHtml(f.label)}${f.required ? '<span class="req">*</span>' : ''}</label>
            ${f.textarea
              ? `<textarea disabled rows="2" style="color:var(--text-dim)">${escHtml(f.value || '')}</textarea>`
              : `<input type="text" disabled value="${escHtml(f.value || '')}" style="color:var(--text-dim)">`
            }
          </div>
        `).join('')}
        <div class="submit-row">
          <button class="btn-submit disabled">
            <span class="material-symbols-outlined">check_circle</span>
            已提交
          </button>
        </div>
      </div>`;

    case 'confirm-exec':
      return `<div class="card-confirm-exec msg-appear">
        <div class="avatar"><span class="material-symbols-outlined">smart_toy</span></div>
        <div class="body">
          <div class="text">${escHtml(msg.content)}</div>
          <div class="btn-row">
            <button class="btn-exec">确认执行</button>
            <button class="btn-edit">修改输入</button>
          </div>
        </div>
      </div>`;

    case 'task-step-card':
      return `<div class="strip-card msg-appear" id="step-card-${currentStep}">
        ${msg.status === 'running'
          ? '<div class="spinner"></div>'
          : '<span class="material-symbols-outlined check">check_circle</span>'
        }
        <span class="material-symbols-outlined icon">checklist</span>
        <span class="title">${escHtml(msg.title)}</span>
        <span class="material-symbols-outlined arrow">arrow_forward</span>
      </div>`;

    case 'sub-step-card':
    case 'sub-step-card-done':
      return `<div class="strip-card indented msg-appear">
        ${msg.status === 'running'
          ? '<div class="spinner"></div>'
          : '<span class="material-symbols-outlined check">check_circle</span>'
        }
        <span class="material-symbols-outlined icon">${msg.icon || 'build'}</span>
        <span class="title">${escHtml(msg.title)}</span>
        <span class="material-symbols-outlined arrow">arrow_forward</span>
      </div>`;

    case 'ai-cont':
      return `<div class="msg-ai-cont msg-appear">${escHtml(msg.content)}</div>`;

    case 'ai-block': {
      const childrenHtml = (msg.children || []).map(child => {
        if (child.type === 'text') {
          return `<div class="block-text">${escHtml(child.content)}</div>`;
        }
        return renderMessage(child).replace(' msg-appear', '');
      }).join('');
      return `<div class="msg-ai-block msg-appear">
        <div class="avatar"><span class="material-symbols-outlined">smart_toy</span></div>
        <div class="children">${childrenHtml}</div>
      </div>`;
    }

    case 'task-complete':
      return `<div class="card-task-complete">
        <div class="complete-header">
          <span class="material-symbols-outlined">check_circle</span>
          <span>任务完成</span>
        </div>
        <div class="complete-summary">${escHtml(msg.summary)}</div>
        <div class="complete-guide">${escHtml(msg.guide)}</div>
        <div class="btn-row">
          <button class="btn-panel"><span class="material-symbols-outlined" style="font-size:14px">open_in_new</span> 查看 & 编辑输出</button>
          <button class="btn-export"><span class="material-symbols-outlined" style="font-size:14px">download</span> 导出</button>
        </div>
      </div>`;

    case 'step-summary':
    case 'step-summary-final':
      return `<div class="card-step-summary msg-appear">
        <div class="summary-text">${escHtml(msg.summary)}</div>
        <div class="btn-row">
          <button class="btn-view">查看输出并编辑</button>
          ${msg.hasNext
            ? `<button class="btn-next">直接进入下一步 →</button>`
            : ''
          }
        </div>
      </div>`;

    default:
      return '';
  }
}

function renderEvent(evt) {
  const typeClass = evt.type === 'api' ? 'api-call' : evt.type === 'sse' ? 'sse-event' : 'user-action';
  const labelClass = evt.type === 'api' ? 'api' : evt.type === 'sse' ? 'sse' : 'user';
  return `<div class="event-entry ${typeClass}">
    <div class="event-type ${labelClass}">${escHtml(evt.label)}</div>
    <div class="event-detail">${escHtml(evt.detail)}</div>
    ${evt.renders ? `<div class="event-renders">${escHtml(evt.renders)}</div>` : ''}
  </div>`;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// STEP CONTROLLER
// ============================================================
const messageList = document.getElementById('messageList');
const eventLog = document.getElementById('eventLog');
const phaseLabel = document.getElementById('phaseLabel');
const progressText = document.getElementById('progressText');
const progressBar = document.getElementById('progressBar');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');

// Track all rendered HTML per step for prev/next
const renderedMessages = []; // cumulative message HTML per step
const renderedEvents = [];   // cumulative event HTML per step

function nextStep() {
  if (currentStep >= STEPS.length - 1) return;
  currentStep++;
  applyStep(currentStep);
}

function prevStep() {
  if (currentStep <= 0) return;
  currentStep--;
  replayToStep(currentStep);
}

function applyStep(idx) {
  const step = STEPS[idx];

  // Update phase label
  phaseLabel.textContent = step.phase;

  // Handle sidebar action
  if (step.sidebarAction === 'highlight-bp') {
    document.getElementById('bp-api').classList.add('active');
  }

  // Handle replaceLastForm — remove last form before adding filled version
  if (step.replaceLastForm) {
    const forms = messageList.querySelectorAll('[data-step-input-form]');
    if (forms.length > 0) forms[forms.length - 1].remove();
  }

  // Handle annotation
  if (step.annotation) {
    messageList.innerHTML += `<div class="annotation new msg-appear">${escHtml(step.annotation)}</div>`;
  }

  // Handle replaceSubStep — remove running sub step card before adding completed version
  if (step.replaceSubStep) {
    const strips = messageList.querySelectorAll('.strip-card.indented');
    if (strips.length > 0) strips[strips.length - 1].remove();
  }

  // Render messages
  for (const msg of step.messages) {
    messageList.innerHTML += renderMessage(msg);
  }

  // Update step card status if needed
  if (step.updateStepCard) {
    const cards = messageList.querySelectorAll('.strip-card:not(.indented)');
    if (cards.length > 0) {
      const last = cards[cards.length - 1];
      const spinner = last.querySelector('.spinner');
      if (spinner) {
        spinner.outerHTML = '<span class="material-symbols-outlined check">check_circle</span>';
      }
    }
  }
  if (step.updateStepCard2) {
    const cards = messageList.querySelectorAll('.strip-card:not(.indented)');
    if (cards.length > 0) {
      const last = cards[cards.length - 1];
      const spinner = last.querySelector('.spinner');
      if (spinner) {
        spinner.outerHTML = '<span class="material-symbols-outlined check">check_circle</span>';
      }
    }
  }

  // Render events
  for (const evt of step.events) {
    eventLog.innerHTML += renderEvent(evt);
  }

  // Auto-scroll
  const chatMsgs = document.getElementById('chatMessages');
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
  eventLog.scrollTop = eventLog.scrollHeight;

  updateControls();
}

function replayToStep(targetIdx) {
  // Clear and replay from start
  messageList.innerHTML = '';
  eventLog.innerHTML = '';
  document.getElementById('bp-api').classList.remove('active');

  for (let i = 0; i <= targetIdx; i++) {
    const step = STEPS[i];
    phaseLabel.textContent = step.phase;

    if (step.sidebarAction === 'highlight-bp') {
      document.getElementById('bp-api').classList.add('active');
    }

    if (step.replaceLastForm) {
      const forms = messageList.querySelectorAll('[data-step-input-form]');
      if (forms.length > 0) forms[forms.length - 1].remove();
    }
    if (step.annotation) {
      messageList.innerHTML += `<div class="annotation new">${escHtml(step.annotation)}</div>`;
    }
    if (step.replaceSubStep) {
      const strips = messageList.querySelectorAll('.strip-card.indented');
      if (strips.length > 0) strips[strips.length - 1].remove();
    }
    for (const msg of step.messages) {
      messageList.innerHTML += renderMessage(msg);
    }
    if (step.updateStepCard || step.updateStepCard2) {
      const cards = messageList.querySelectorAll('.strip-card:not(.indented)');
      if (cards.length > 0) {
        const last = cards[cards.length - 1];
        const spinner = last.querySelector('.spinner');
        if (spinner) {
          spinner.outerHTML = '<span class="material-symbols-outlined check">check_circle</span>';
        }
      }
    }
    for (const evt of step.events) {
      eventLog.innerHTML += renderEvent(evt);
    }
  }

  const chatMsgs = document.getElementById('chatMessages');
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
  eventLog.scrollTop = eventLog.scrollHeight;

  updateControls();
}

function updateControls() {
  btnPrev.disabled = currentStep <= 0;
  btnNext.disabled = currentStep >= STEPS.length - 1;
  progressText.textContent = `${currentStep + 1} / ${STEPS.length}`;
  progressBar.style.width = `${((currentStep + 1) / STEPS.length) * 100}%`;
}

function handleBPClick() {
  if (currentStep < 0) nextStep();
}

function toggleAuto() {
  const btn = document.getElementById('btnAuto');
  if (autoInterval) {
    clearInterval(autoInterval);
    autoInterval = null;
    btn.classList.remove('active');
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">play_arrow</span> 自动播放';
  } else {
    btn.classList.add('active');
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">pause</span> 暂停';
    autoInterval = setInterval(() => {
      if (currentStep >= STEPS.length - 1) {
        clearInterval(autoInterval);
        autoInterval = null;
        btn.classList.remove('active');
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">play_arrow</span> 自动播放';
        return;
      }
      nextStep();
    }, 2000);
  }
}

// Initial state
updateControls();

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
});
</script>
